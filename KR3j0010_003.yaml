body:
  text: 天文訓天墬未形馮馮翼翼洞洞灟灟故曰太始太始生虛霩虛霩生宇宙宇宙生元氣元氣有涯垠清陽者薄靡而為天重濁者滯凝而為地清妙之合專易重濁之凝竭難故天先成而地後定天地之襲精為陰陽陰陽之專精為四時四時之散精為萬物積陽之熱氣久者生火火氣之精者為日積陰之寒氣久者為水水氣之精者為月日月之淫氣精者為星辰天受日月星辰地受水潦塵埃昔者共工與顓頊爭為帝怒而觸不周之山天柱折地維絕天傾西北故日月星辰移焉地不滿東南故水潦塵埃歸焉天道曰員地道曰方方者主幽員者主明明者吐氣者也是故火日外景幽者含氣者也是故水月內景吐氣者施含氣者化是故陽施陰化天地之偏氣怒者為風天地之合氣和者為雨陰陽相薄感而為雷激而為霆亂而為霧陽氣勝則散而為雨露陰氣勝則凝而為霜雪毛羽者飛行之類也故屬於陽介鱗者蟄伏之類也故屬於陰日者陽之主也是故春夏則群獸除日至而麋鹿解月者陰之宗也是以月虧而魚腦減月死而蠃硥膲火上蕁水下流故鳥動而高魚動而下物類相動本標相應故陽燧見日則燃而為火方諸見月則津而為水虎嘯而谷風至龍舉而景雲屬麒麟鬭而日月食鯨魚死而彗星出蠶珥絲而商弦絕賁星墜而勃海決人主之情上通于天故誅暴則多飄風枉法令則多蟲螟殺不辜則國赤地令不收則多淫雨四時者天之吏也日月者天之使也星辰者天之期也虹蜺彗星者天之忌也天有九野九千九百九十九隅去地億五萬里五星八風五官六府紫宮太微軒轅咸池四守天河何謂九野中央曰鈞天其星角亢氐東方曰蒼天其星房心東北方曰變天其星尾箕斗牽牛北方曰玄天其星須女虛危營室西北方曰幽天其星東壁奎婁西方曰昊天其星胃昴畢西南方曰朱天其星觜嶲參東井南方曰炎天其星輿鬼柳七星東南方曰陽天其星張翼軫何謂五星東方木也其帝太皞其佐句芒執規而治春其神為歲星其獸蒼龍其音角其日甲乙南方火也其帝炎帝其佐朱明執衡而治夏其神為熒惑其獸朱鳥其音徵其日丙丁中央土也其帝黃帝其佐后土執繩而制四方其神為鎮星其獸黃龍其音宮其日戊己西方金也其帝少昊其佐蓐收執矩而治秋其神為太白其獸白虎其音商其日庚辛北方水也其帝顓頊其佐玄冥執權而治冬其神為辰星其獸玄武其音羽其日壬癸太陰在四仲則歲星行三宿太陰在四鉤則歲星行二宿二八十六三四十二故十二歲而行二十八宿日行十二分度之一歲行三十度十六分度之七十二歲而周天熒惑常以十月入太微受制而出行列宿司无道之國為亂為賊為疾為喪為饑為兵出入無常辨變其色時見時匿鎮星以甲寅元始建斗歲鎮一宿當居而弗居其國亡土未當居而居之其國益地歲熟日行二十八分度之一歲行十三度百一十二分度之五二十八歲而周天太白元始以甲寅正月與營室晨出東方二百四十日而入入百二十日而夕出西方二百四十日而入入三十五日而復出東方出以辰戌入以丑未未當出而出未當入而入天下偃兵當入而不入當出而不出天下興兵辰星正四時常以二月春分效奎婁以五月夏至效東井輿鬼以八月秋分效角亢以十一月冬至效斗牽牛出以辰戌入以丑未出二旬而入晨候之東方夕候之西方一時不出其時不和四時不出天下大饑何謂八風距日冬至四十五日條風至條風至四十五日明庶風至明庶風至四十五日清明風至清明風至四十五日景風至景風至四十五日涼風至涼風至四十五日閶闔風至閶闔風至四十五日不周風至不周風至四十五日廣莫風至條風至則出輕繫去稽留明庶風至則正封疆修田疇清明風至則出幣帛使諸侯景風至則爵有位賞有功涼風至則報地德祀四鄉閶闔風至則收縣垂琴瑟不張不周風至則脩宮室繕邊城廣莫風至則閉關梁決罰刑何謂五官東方為田南方為司馬西方為理北方為司空中央為都何謂六府子午丑未寅申卯酉辰戌巳亥是也太微者太一之庭也紫宮者太一之居也軒轅者帝妃之舍也咸池者水衡之囿也天河者群神之闕也四守者所以司賞罰太微者主朱鳥紫宮執斗而左旋日行一度以周於天日冬至入峻狼之山日移一度月行百八十二度八分度之五而夏至牛首之山反覆三百六十五度四分度之一而成一歲太一元始正月建寅日月俱入營室五度天一以始建七十六歲日月復以正月入營室五度無餘分名曰一紀凡二十紀一千五百二十歲大終三終日月星辰復始甲寅元日行危一度而歲有奇四分度之一故四歲而積千四百六十一日而復合故舍八十歲而復故日子午卯酉為二繩丑寅辰巳未申戌亥為四鉤東北為報德之維西南為背陽之維東南為常羊之維西北為蹏通之維日冬至則斗北中繩陰氣極陽氣萌故曰冬至為德日夏至則斗南中繩陽氣極陰氣萌故曰夏至為刑陰氣極則下至黃泉北至北極故不可以鑿地穿井萬物閉藏蟄虫首穴故曰德在室陽氣極則南至南極上至朱天故不可以夷丘上屋萬物蕃息五穀兆長故曰德在野日冬至則火從之日夏至則水從之故五月火正而水漏十一月水正而火勝陽氣為火陰氣為水水勝故夏至溼火勝故冬至燥燥故炭輕溼故炭重日冬至則井水盛盆水溢羊脫毛麋角解鵲始巢八尺之脩日中而景丈三尺日夏至而流黃澤石精出蟬始鳴半夏生蟁䖟不食駒犢鷙鳥不搏黃口八尺之景脩徑尺五寸景脩則陰氣勝景短則陽氣勝陰氣勝則為水陽氣勝則為旱陰陽刑德有七舍何謂七舍室堂庭門巷術野十一月德居室三十日先日至十五日後日至十五日而徙所居各三十日德在室則刑在野德在堂則刑在術德在庭則刑在巷陰陽相德則刑德合門八月二月陰陽氣均日夜分平故曰刑德合門德南則生刑南則殺故曰二月會而萬物生八月會而草木死兩維之閒九十一度十六分度之五而斗日行一度十五日為一節以生二十四時之變斗指子則冬至音比應鍾加十五日指癸則小寒音比無射加十五日指丑則大寒音比南呂加十五日指報德之維則越陰在地故曰距日冬至四十六日而立春陽凍解音比夷則加十五日指寅則驚蟄音比林鍾加十五日指甲則雷雨水音比蕤賓加十五日指卯中繩故曰春分則雷行音比仲呂加十五日指乙則穀雨音比姑洗加十五日指辰則清明風至音比夾鍾加十五日指常羊之維則春分盡故曰有四十六日而立夏大風濟音比太蔟加十五日指巳則小滿音比大呂加十五日指丙則芒種音比黃鍾加十五日指午則陽氣極故曰有四十六日而夏至音比黃鍾加十五日指丁則小暑音比大呂加十五日指未則大暑音比太蔟加十五日指背陽之維則夏分盡故曰有四十六日而立秋涼風至音比夾鍾加十五日指申則處暑音比姑洗加十五日指庚則白露降音比仲呂加十五日指酉中繩故曰秋分雷臧蟄蟲北鄉音比蕤賓加十五日指辛則寒露音比林鍾加十五日指戌則霜降音比夷則加十五日指蹏通之維則秋分盡故曰有四十六日而立冬草木畢死音比南呂加十五日指亥則小雪音比無射加十五日指壬則大雪音比應鍾加十五日指子故曰陽生於子陰生於午陽生於子故十一月日冬至鵲始加巢人氣鍾首陰生於午故五月為小刑薺麥亭歷枯冬生草木必死斗杓為小歲正月建寅月從左行十二辰咸池為大歲二月建卯月從右行四仲終而復始大歲迎者辱背者強左者衰右者昌小歲東南則生西北則殺不可迎也而可背也不可左也而可右也其此之謂也大時者咸池也小時者月建也天維建元常以寅始起右徙一歲而移十二歲而周天終而復始淮南元年冬天一在丙子冬至甲午立春丙子一陰一陽成氣二二陽一陰成氣三合氣而為音合陰而為陽合陽而為律故曰五音六律音自倍而為日律自倍而為辰故日十而辰十二月日行十三度七十六分度之二十八二十九日九百四十分日之四百九十九而為月而以十二月為歲歲有餘十日九百四十分日之八百二十七故十九歲而七閏日冬至子午夏至卯酉冬至加三日則夏至之日也歲遷六日終而復始壬午冬至甲子受制木用事火煙青七十二日丙子受制火用事火煙赤七十二日戊子受制土用事火煙黃七十二日庚子受制金用事火煙白七十二日壬子受制水用事火煙黑七十二日而歲終庚午受制歲遷六日以數推之十歲而復至甲子甲子受制則行柔惠挺群禁開闔扇通障塞毋伐木丙子受制則舉賢良賞有功立封侯出貨財戊子受制則養長老存鰥寡行粰鬻施恩澤庚子受制則繕牆垣脩城郭審群禁飾兵甲儆百官誅不法壬子受制則閉門閭大搜客斷罰刑殺當罪息關梁禁外徙甲子氣燥濁丙子氣燥陽戊子氣溼濁庚子氣燥寒壬子氣清寒丙子干甲子蟄蟲早出故雷早行戊子干甲子胎夭卵毈鳥蟲多傷庚子干甲子有兵壬子干甲子春有霜戊子干丙子霆庚子干丙子夷壬子干丙子雹甲子干丙子地動庚子干戊子五穀有殃壬子干戊子夏寒雨霜甲子干戊子介蟲不為丙子干戊子大旱苽封熯壬子干庚子則魚不為甲子干庚子則草木再死再生丙子干庚子則草木復榮戊子干庚子歲或存或亡甲子干壬子冬乃不藏丙子干壬子星墜戊子干壬子蟄蟲冬出其鄉庚子干壬子冬雷其鄉季春三月豐隆乃出以將其雨至秋三月地氣不藏乃收其殺百蟲蟄伏靜居閉戶青女乃出以降霜雪行十二時之氣以至于仲春二月之夕乃布收其藏而閉其寒女夷鼓歌以司天和以長百穀禽獸草木孟夏之月以熟穀禾雄鳩長鳴為帝候歲是故天不發其陰則萬物不生地不發其陽則萬物不成天員地方道在中央日為德月為刑月歸而萬物死日至而萬物生遠山則山氣藏遠水則水蟲蟄遠木則木葉槁日五日不見失其位也聖人不與也日出于湯谷浴于咸池拂于扶桑是謂晨明登于扶桑爰始將行是謂朏明至于曲阿是謂旦明至于曾泉是謂蚤食至于桑野是謂晏食至于衡陽是謂隅中至于昆吾是謂正中至于鳥次是謂小遷至于悲谷是謂餔時至于女紀是謂大遷至于淵隅是謂高舂至于連石是謂下春至于悲泉爰止其女爰息其馬是謂縣車至于虞淵是謂黃昏淪于蒙谷是謂定昏日入崦嵫經於細柳入虞泉之池曙於蒙谷之浦日西垂景在樹端謂之桑榆行九州七舍有五億萬七千三百九里離以為朝晝昏夜夏日至則陰乘陽是以萬物就而死冬日至則陽乘陰是以萬物仰而生晝者陽之分夜者陰之分是以陽氣勝則日脩而夜短陰氣勝則日短而夜脩其加卯酉則陰陽分日夜平矣帝張四維運之以斗月徙一辰復反其所正月指寅十一月指子一歲而帀終而復始指寅寅則萬物螾螾然也律受太蔟太蔟者蔟而未出也指卯卯則茂茂然律受夾鍾夾鍾者種始莢也指辰辰則振之也律受姑洗姑洗者陳去而新來也指巳巳則生已定也律受仲呂仲呂者中充大也指午午者忤也律受蕤賓蕤賓者安而服之也指未未者味也律受林鍾林鍾者引而止之也指申申者呻之也律受夷則夷則者易其則也德以去矣指酉酉者飽也律受南呂南呂者任包大也指戌戌者滅也律受无射无射者入无厭也指亥亥者閡也律受應鍾應鍾者應其鍾也指子子者茲也律受黃鍾黃鍾者鍾已黃也指丑丑者紐也律受大呂大呂者旅旅而去也日夜平矣故曰規生矩殺衡長權藏繩居中央為四時根道曰規始於一一而不生故分而為陰陽陰陽合和而萬物生故曰一生二二生三三生萬物天地三月而為一時故祭祀三飯以為禮喪紀三踊以為節兵革三軍以為制以三參物三三如九故黃鍾之律九寸而宮音調因而九之九九八十一故黃鍾之數立焉黃者土德之色鍾者氣之所種也日冬至德氣為土土色黃故曰黃鍾律之數六分為雌雄故曰十二鍾以副十二月十二各以三成故置一而十一三之為積分十七萬七千一百四十七黃鍾大數立焉凡十二律黃鍾為宮太蔟為商姑洗為角林鍾為徵南呂為羽物以三成音以五立三與五如八故卵生者八竅律之初生也寫鳳之音故音以八生黃鍾為宮宮者音之君也故黃鍾位子其數八十一主十一月下生林鍾林鍾之數五十四主六月上生太蔟太蔟之數七十二主正月下生南呂南呂之數四十八主八月上生姑洗姑洗之數六十四主三月下生應鍾應鍾之數四十二主十月上生蕤賓蕤賓之數五十七主五月上生大呂大呂之數七十六主十二月下生夷則夷則之數五十一主七月上生夾鍾夾鍾之數六十八主二月下生无射无射之數四十五主九月上生仲呂仲呂之數六十主四月極不生宮生徵徵生商商生羽羽生角角主姑洗姑洗生應鍾不比於正音故為和應鍾生蕤賓不比於正音故為繆日冬至音比應鍾浸以濁日夏至音比黃鍾浸以清以十二律應二十四時之變甲子仲呂之徵也丙子夾鍾之羽也戊子黃鍾之宮也庚子无射之商也壬子夷則之角也古之為度量輕重生乎天道黃鍾之律脩九寸物以三生三三九三九二十七故幅廣二尺七寸古之制也有形則有聲音以八相生故人臂脩四尺尋自倍故八尺而為尋尋者中人之度也有形則有聲音之數五以五乘八五八四十故四丈而為匹中人之度也一匹而為制秋分而禾蔈定蔈定而禾熟律之數十二故十二蔈而當一分律以當辰音以當日日之數十故十分而為寸十寸而為尺十尺而為丈其以為重十二粟而當一分十二分而當一銖十二銖而當半兩衡有左右因倍之故二十四銖為一兩天有四時以成一歲因而四之四四十六故十六兩而為一斤三月而為一時三十日為一月故三十斤為一鈞四時而為一歲故四鈞為一石其以為音也一律而生五音十二律而為六十音因而六之六六三十六故三百六十音以當一歲之日故律歷之數天地之道也下生者倍以三除之上生者四以三除之太陰元始建于甲寅一終而建甲戌二終而建甲午三終而復得甲寅之元歲徙一辰立春之後得其辰而遷其所順前三後五百事可舉太陰所建蟄蟲首穴而處鵲巢鄉而為戶太陰在寅朱鳥在卯勾陳在子玄武在戌白虎在酉寅為建卯為除辰為滿巳為平主生午為定未為執主陷申為破主衡酉為危主杓戌為成主少德亥為收主大德子為開主大歲丑為閉主太陰在寅歲名曰攝提格其雄為歲星舍斗牽牛以正月與之晨出東方東井輿鬼為對太陰在卯歲名曰單閼歲星舍須女虛危以二月與之晨出東方柳七星張為對太陰在辰歲名曰執除歲星舍營室東壁以三月與之晨出東方翼軫為對太陰在巳歲名曰大荒落歲星舍奎婁以四月與之晨出東方角亢為對太陰在午歲名曰敦䍧歲星舍胃昴畢以五月與之晨出東方氐房心為對太陰在未歲名曰協洽歲星舍觜雋參以六月與之晨出東方尾箕為對太陰在申歲名曰涒灘歲星舍東井輿鬼以七月與之晨出東方斗牽牛為對太陰在酉歲名曰作鄂歲星舍柳七星張以八月與之晨出東方須女虛危為對太陰在戌歲名曰閹茂歲星舍翼軫以九月與之晨出東方營室東壁為對太陰在亥歲名曰大淵獻歲星舍角亢以十月與之晨出東方奎婁為對太陰在子歲名曰困敦歲星舍氐房心以十一月與之晨出東方胃昴畢為對太陰在丑歲名曰赤奮若歲星舍尾箕以十二月與之晨出東方觜嶲參為對太陰在甲子刑德合東方宮常徙所不勝合四歲而離離十六歲而復合所以離者刑不得入中宮而徙於木太陰所居日為德辰為刑德剛日自倍因柔日徙所不勝刑水辰之木木辰之水金火立其處凡徙諸神朱鳥在太陰前一鉤陳在後三玄武在前五白虎在後六虛星乘鉤陳而天地襲矣凡日甲剛乙柔丙剛丁柔以至於壬癸木生於亥壯於卯死於未三辰皆木也火生於寅壯於午死於戌三辰皆火也土生於午壯於戌死於寅三辰皆土也金生於巳壯於酉死於丑三辰皆金也水生於申壯於子死於辰三辰皆水也故五勝生一壯五終九五九四十五故神四十五日而一徙以三應五故八徙而歲終凡用太陰右背刑左前德擊鉤陳之衝辰以戰必勝以攻必剋欲知天道以日為主六月當心左周而行分而為十二月與日相當天地重襲後必无殃日正月建營室東壁二月建奎婁三月建胃昴四月建畢觜巂參五月建東井輿鬼六月建柳七星張七月建翼軫八月建角亢氐九月建房心十月建尾箕十一月建斗牽牛十二月建須女虛危星分度角十二亢九氐十五房五心五尾十八箕十一四分一斗二十六牽牛八須女十二虛十危十七營室十六東壁九奎十六婁十二胃十四卯十一畢十六觜嶲二參九東井三十三輿鬼四柳十五七星七張翼各十八軫十七星部地名角亢鄭氐房心宋尾箕燕斗牽牛須女吳越虛危齊營室東壁衛奎婁魯胃昴畢魏觜雋參趙東井輿鬼秦柳七星張周翼軫楚歲星之所居五穀豐昌其對為衝歲乃有殃當居而不居越而之他處主死國亡大陰治春則欲行柔惠溫良太陰治夏則欲布施宣明太陰治秋則欲脩備繕兵太陰治冬則欲猛毅剛彊三歲而改節六歲而易常故三歲而一饑六歲而一衰十二歲而一康甲齊乙東夷丙楚丁南夷戊魏己韓庚秦辛西夷壬衛癸趙子周丑翟寅楚卯鄭辰晉巳衛午秦未宋申齊酉魯戌趙亥燕甲乙寅卯木也丙丁巳午火也戊己四季土也庚辛申酉金也壬癸亥子水也水生木木生火火生土土生金金生水子生母曰義母生子曰保子母相得曰專母勝子曰制子勝母曰困以制擊殺勝而无報以專從事而有功以義行理名立而不墯以保畜養萬物蕃昌以困舉事破滅死亡北斗之神有雌雄十一月始建於子月徙一辰雄左行雌右行五月合午謀刑十一月合子謀德雌所居辰為猒猒日不可以舉百事堪輿徐行雄以音知雌故為奇辰數從甲子始子母相求所合之處為合十日十二辰周六十日凡八合合於歲前則死亡合於歲後則无殃甲戌燕也乙酉齊也丙午越也丁巳楚也庚辰秦也辛卯戎也壬子代也癸亥胡也戊辰戊戌己巳己亥韓也己酉己卯魏也戊午戊子八合天下也太陰小歲星日辰五神皆合其日有雲氣風雨國君當之天神之貴者莫貴於青龍或曰天一或曰太陰太陰所居不可背而可鄉北斗所擊不可與敵天地以設分而為陰陽陽生於陰陰生於陽陰陽相錯四維乃通或死或生萬物乃成蚑行喙息莫貴於人孔竅肢體皆通於天天有九重人亦有九竅天有四時以制十二月人亦有四肢以使十二節天有十二月以制三百六十日人亦有十二肢以使三百六十節故舉事而不順天者逆其生者也以日冬至數至來歲正月朔日滿五十日者民食足不滿五十日日減一升有餘日日益一升其為歲司也攝提格之歲歲早水晚旱稻疾蠶不登菽麥昌民食四升寅在甲曰閼蓬單閼之歲歲和稻菽麥蠶昌民食五升卯在乙曰旃蒙執徐之歲歲早旱晚水小饑蠶閉麥熟民食三升辰在丙曰柔兆大荒落之歲歲有小兵蠶小登麥昌菽疾民食二升巳在丁曰強圉敦䍧之歲歲大旱蠶登稻疾菽麥昌禾不為民食二升午在戊曰著雝協洽之歲歲有小兵蠶登稻昌菽麥不為民食三升未在己曰屠維涒灘之歲歲和小雨行蠶登菽麥昌民食三升申在庚曰上章作鄂之歲歲有大兵民疾蠶不登菽麥不為禾蟲民食五升酉在辛曰重光掩茂之歲歲小饑有兵蠶不登麥不為菽昌民食七升戌在壬曰玄黓大淵獻之歲歲有大兵大饑蠶開菽麥不為禾蟲民食三升困敦之歲歲大霧起大水出蠶登稻疾菽麥昌民食三斗亥在癸曰昭陽赤奮若之歲歲有小兵早水蠶不出稻疾菽不為麥昌民食一升正朝夕先樹一表東方操一表卻去前表十步以參望日始出北廉日直入又樹一表於東方因西方之表以參望日方入北廉則定東方兩表之中與西方之表則東西之正也日冬至日出東南維入西南維至春秋分日出東中入西中夏至出東北維入西北維至則正南欲知東西南北廣袤之數者立四表以為方一里岠先春分若秋分十餘日從岠北表參望日始出及旦以候相應相應則此與日直也輒以南表參望之以入前表數為法除舉廣除立表袤以知從此東西之數也假使視日出入前表中一寸是寸得一里也一里積萬八千寸得從此東萬八千里視日方入入前表半寸則半寸得一里半寸而除一里積寸得三萬六千里除則從此西里數也并之東西里數也則極徑也未春分而直已秋分而不直此處南也未秋分而直已春分而不直此處北也分至而直此處南北中也從中處欲知中南也未秋分而不直此處南北中也從中處欲知南北極遠近從西南表參望日日夏至始出與北表參則是東與東北表等也正東萬八千里則從中北亦萬八千里也倍之南北之里數也其不從中之數也以出入前表之數益損之表入一寸寸減日近一里表出一寸寸益遠一里欲知天之高樹表高一丈正南北相去千里同日度其陰北表二尺南表尺九寸是南千里陰短寸南二萬里則无景是直日下也陰二尺而得高一丈者南一而高五也則置從此南至日下里數因而五之為十萬里則天高也若使景與表等則高與遠等也
