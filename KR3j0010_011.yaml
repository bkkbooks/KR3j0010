body:
  text: 齊俗訓率性而行謂之道得其天性謂之德性失然後貴仁道失然後貴義是故仁義立而道德遷矣禮樂飾則純樸散矣是非形則百姓眩矣珠玉尊則天下爭矣凡此四者衰世之造也末世之用也夫禮者所以別尊卑異貴賤義者所以合君臣父子兄弟夫妻友朋之際也今世之為禮者恭敬而忮為義者布施而德君臣以相非骨肉以生怨則失禮義之本也故構而多責夫水積則生相食之魚土積則生自𡧢之獸禮義飾則生偽匿之士夫吹灰而欲無眯涉水而欲無濡不可得也古者民童蒙不知西東貌不羡乎情而言不溢乎行其衣煖而無文其兵銖而無刃其歌樂而无轉其哭哀而無聲鑿井而飲耕田而食無所施其美亦不求得親戚不相毀譽朋友不相怨德及至禮義之生貨財之貴而詐偽萌興非譽相紛怨德並行於是乃有曾參孝己之美而生盜跖莊蹻之邪故有大路龍旂羽蓋垂緌結駟連騎則必有穿窬拊楗抇墓踰備之姦有詭文繁繡弱緆羅紈必有菅屩跐踦短褐不完者故高下之相傾也短脩之相形也亦明矣夫蝦蟆為鶉水蠆為蟌皆生非其類唯聖人知其化夫胡人見黂不知其可以為布也越人見毳不知其可以為旃也故不通於物者難與言化昔太公望周公旦受封而相見太公望問周公曰何以治魯周公曰尊尊親親太公曰魯從此弱矣周公問太公曰何以治齊太公曰舉賢而上功周公曰後世必有劫殺之君其後齊日以大至於霸二十四世而田氏代之魯日以削至三十二世而亡故易曰履霜堅冰至聖人之見終始微矣故糟丘生乎象𣛰炮格生乎熱斗子路撜溺而受牛謝孔子曰魯國必好救人於患矣子贛贖人而不受金於府孔子曰魯國不復贖人矣子路受而勸德子贛讓而止善孔子之明以小知大以近知遠通於論者也由此觀之廉有所在而不可公行也故行齊於俗可隨也事周於能易為也矜偽以惑世伉行以違眾聖人不以為民俗也廣廈闊屋連闥通房人之所安也鳥入之而憂高山險阻深林叢薄虎豹之所樂也人入之而畏川谷通原積水重泉黿鼉之所便也人入之而死咸池承雲九韶六英人之所樂也鳥獸聞之而驚深谿峭岸峻木尋枝蝯狖之所樂也人上之而慄形殊性詭所以為樂者乃所以為哀所以為安者乃所以為危也乃至天地之所覆載日月之照誋使各便其性安其居處其宜為其能故愚者有所脩智者有所不足柱不可以摘齒筳不可以持屋馬不可以服重牛不可以追速鈆不可以為刀銅不可以為弩鐵不可以為舟木不可以為釜各用之於其所適施之於其所宜即萬物一齊而無由相過夫明鏡便於照形其於以承食不如竹箅犧牛粹毛宜於廟牲其於以致雨不若黑蜧由此觀之物無貴賤因其所貴而貴之物無不貴也因其所賤而賤之物無不賤也夫玉璞不猒厚角䚩不猒薄漆不猒黑粉不猒白此四者相反也所急均則其用一也今之裘與蓑孰急見雨則裘不用升堂則蓑不御此代為帝者也譬若舟車楯䦊窮廬固有所宜也故老子曰不上賢者言不致魚於木沉鳥於淵故堯之治天下也舜為司徒契為司馬禹為司空后稷為大田奚仲為工師其導萬民也水處者漁山處者采谷處者牧陸處者農地宜其事事宜其械械宜其用用宜其人澤皋織罔陵阪耕田得以所有易所無以所工易所拙是故離叛者寡而聽從者眾譬若播棊丸於地員者走澤方者處高各從其所安夫有何上下焉若風之過簫也忽然感之各以清濁應矣夫猨狖得茂木不舍而穴狟狢得埵防弗去而緣物莫避其所利而就其所害是故鄰國相望鷄狗之音相聞而足迹不接諸侯之境車軌不結千里之外者皆各得其所安故亂國若盛治國若虛亡國若不足存國若有餘虛者非無人也皆守其職也盛者非多人也皆徼於末也有餘者非多財也欲節而事寡也不足者非無貨也民躁而費多也故先王之法籍非所作也其所因也其禁誅非所為也其所守也凡治物者不以物以和治和者不以和以人治人者不以人以君治君者不於君以欲治欲者不於欲以性治性者不於性以德治德者不以德以道原人之性蕪濊而不得清明者物或堁之也羌氐僰翟嬰兒生皆同聲及其長也雖重象狄騠不能通其言教俗殊也今令三月嬰兒生而徙國則不能知其故俗由此觀之衣服禮俗者非人之性也所受於外也夫竹之性浮殘以為牒束而投之水則沉失其體也金之性沉託之於舟上則浮勢有所支也夫素之質白染之以涅則黑縑之性黃染之以丹則赤人之性無邪久湛於俗則易易而忘其本合於若性故日月欲明浮雲蓋之河水欲清沙石濊之人性欲平嗜欲害之唯聖人能遺物而反己夫乘舟而惑者不知東西見斗極則寤矣夫性亦人之斗極也有以自見也則不失物之情無以自見也則動而惑營譬若隴西之遊愈躁愈沉孔子謂顏回曰吾服汝也忘而汝服於我也亦忘雖然汝雖忘乎吾猶有不忘者存孔子知其本也夫縱欲而失性動未嘗正也以治身則危以治國則亂以入軍則破是故不聞道者無以反性故古之聖王能得諸己故令行禁止名傳後世德施四海是故凡將舉事必先平意神清意平物乃可正若璽之抑埴正與之正傾與之傾故堯之舉舜也決之於目桓公之取甯戚也斷之於耳而已矣為是釋術數而任耳目其亂必甚矣夫耳目之可以斷也反情性也聽失於誹譽而目淫於采色而欲得事正則難矣夫載哀者聞歌聲而泣載樂者見哭者而笑哀可樂笑可哀者載使然也是故貴虛故水激則波興氣亂則智昏昏智不可以為政波水不可以為平故聖王執一而勿失萬物之情測矣四夷九州服矣夫一者至貴無適於天下聖人託於無適故民命繫矣為仁者必以哀樂論之為義者必以取予明之人目所見不過十里而欲徧照海內之民哀樂弗能給也無天下之委財而欲徧贍萬民利不能足也且喜怒哀樂有感而自然者也故哭之發於口涕之出於目此皆憤於中而形於外者也譬若水之下流煙之上尋也夫有孰推之者故強哭者雖病不哀強親者雖笑不和情發於中而聲應於外故釐負羈之壺飧愈於晉獻公之垂棘趙宣孟之束脯賢於智伯之大鍾故禮豐不足以效愛而誠心可以懷遠故公西華之養親也若與朋友處曾參之養親也若事嚴主烈君其於養一也故胡人彈骨越人契臂中國歃血也所由各異其於信一也三苗髽首羌人括領中國冠笄越人劗髮其於服一也帝顓頊之法婦人不辟男子於路者拂之於四達之衢今之國都男女切踦肩摩於道其於俗一也故四夷之禮不同皆尊其主而愛其親敬其兄獫狁之俗相反皆慈其子而嚴其上夫鳥飛成行獸處成群有孰教之故魯國服儒者之禮行孔子之術地削名卑不能親近來遠越王句踐劗髮文身無皮弁搢笏之服拘罷拒折之容然而勝夫差於五湖南面而霸天下泗上十二諸侯皆率九夷以朝胡貉匈奴之國縱體施髮箕倨反言而國不亡者未必无禮也楚莊王裾衣博袍令行乎天下遂霸諸侯晉文君大布之衣䍧羊之裘韋以帶劍威立于海內豈必鄒魯之禮之謂禮乎是故入其國者從其俗入其家者避其諱不犯禁而入不迕逆而進雖之夷狄徒倮之國結軌乎遠方之外而無所困矣禮者實之文也仁者恩之效也故禮因人情而為之節文而仁發恲以見容禮不過實仁不溢恩也治世之道也夫三年之喪是強人所不及也而以偽輔情也三月之服是絕哀而迫切之性也夫儒墨不原人情之終始而務以行相反之制五縗之服悲哀抱於情葬薶稱於養不強人之所不能為不絕人之所不能已度量不失於適誹譽無所由生古者非不知繁升降槃還之禮也蹀采齊肆夏之容也以為曠日煩民而無所用故制禮足以佐實喻意而已矣古者非不能陳鍾鼓盛筦簫揚干戚奮羽旄也以為費財亂政故制樂足以合歡宣意而已喜不羡於音非不能竭國麋民虛府殫財含珠鱗施綸組節束追送死也以為窮民絕業而無益於槁骨腐肉也故葬薶足以收斂蓋藏而已昔舜葬蒼梧市不變其肆禹葬會稽之山農不易其畝明乎死生之分通乎侈儉之適者也亂國則不然言與行相悖情與貌相反禮節以煩樂擾以淫崇死以害生久喪以招行是以風俗濁於世而誹譽萌於朝是故聖人廢而弗用也義者循理而行宜者也禮者體情而制文者也禮者體也昔有扈氏為義而亡知義而不知宜也魯治禮而削知禮而不知體也有虞氏之禮其社用土祀中霤葬成畝其樂咸池承雲九韶其服尚黃夏后氏之禮其社用松祀戶葬牆置翣其樂夏籥九成六佾六列六英其服尚青殷人之禮其社用石祀門葬樹松其樂大護晨露其服尚白周人之禮其社用栗祀竈葬樹柏其樂大武三象棘下其服尚赤禮樂相詭服制相反然而皆不失親踈之恩上下之倫今握一君之法籍以非傳代之俗譬由膠柱而調瑟也故明主制禮義而為衣分節行而為帶衣足以覆形從典墳虛循撓便身體適行步不務於奇麗之容隅眥之削帶足以結紐收衽束牢連固不亟於為文句䟽短之鞵故制禮義行至德而不拘於儒墨所謂明者非謂其見彼也自見而已所謂聰者非謂其聞彼也自聞而已所謂達者非謂其知彼也自知而已是故身者道之所託身德則道得矣道之得也以視則明以聽則聰以言則公以行則從故聖人之財制物也猶工匠之斲削鑿枘也宰庖之切割分別也曲得其宜而不折傷拙工則不然大則塞而不入小則窕而不周動於心枝於手而愈醜夫聖人之斲削物也剖之判之離之散之已淫已失復揆以一既出其根復歸其門已雕已琢還反於樸合而為道德離而為儀表其轉入玄冥其散應无形禮義節行又何以窮至治之本哉世之明事者多離道德之本曰禮義足以治天下此未可與言術也所謂禮義者五帝三王之法籍風俗一世之迹也譬若芻狗土龍之始成文以青黃絹以綺繡纏以朱絲尸祝袀袨大夫端冕以送迎之及其已用之後則壤土草薊而已夫有孰貴之故當舜之時有苗不服於是舜脩政偃兵執干戚而舞之禹之時天下大水禹令民聚土積薪擇丘陵而處之武王伐紂載尸而行海內未定故為三年之喪禹有鴻水之患陂塘之事故朝死而暮葬此皆聖人之所以應時耦變見形而施宜者也今知脩干戚而笑钁插知三年而非一日是從牛非馬以徵笑羽也以此應化無以異於彈一絃而會棘下夫以一世之變欲以耦化應時譬猶冬被葛而夏被裘夫一儀不可以百發一衣不可以出歲儀必應乎高下衣必適乎寒暑是故世異即事變時移即俗易故聖人論世而立法隨時而舉事尚古之王封於泰山禪於梁父七十餘聖法度不同非務相反也時世異也是故不法其以成之法而法其所以為法所以為法者與化推移者也夫能與化推移者至貴在焉爾故狐梁之歌可隨也其所以歌者不可為也聖人之法可觀也其所以作法不可原也辯士之言可聽也其所以言不可形也淳均之劍可愛也而歐冶之巧不可貴也今夫王喬赤誦子吹嘔呼吸吐故納新遺形去智抱素反真以遊玄眇上通雲天今欲學其道不得其養氣處神而放其一吐一吸時詘時伸其不能乘雲升假亦明矣五帝三王輕天下細萬物齊死生同變化抱大聖之心以鏡萬物之情上與神明為友下與造化為人今欲學其道不得其清明玄聖而守其法籍憲令不能為治亦明矣故曰得十利劍不若得歐冶之巧得百走馬不若得伯樂之數樸至大者無形狀道至眇者無度量故天之員也不中規地之方也不中矩往古來今謂之宙四方上下謂之宇道在其閒而莫知其所故其見不遠者不可與語大其智不閎者不可與論至昔者馮夷得道以潛大川欽負得道以處崑崙扁鵲以治病造父以御馬羿以之射倕以之斲所為者各異而所道者一也夫稟道以通物者無以相非也譬若同陂而溉田其受水鈞也今屠牛而烹其肉或以酸或以甘煎熬燎炙齊咊萬方其本一牛之體伐楩柟豫樟而剖梨之或為棺槨或為柱梁披斷撥遂所用萬方然一木之樸也故百家之言指奏相反其合道一也譬若絲竹金石之會其樂同也其曲家異而不失於體伯樂韓風秦牙筦青所相各異其知馬一也故三皇五帝法籍殊方其得民心鈞也故湯入夏而用其法武王入殷而行其禮桀紂之所以亡而湯武之所以為治故剞劂銷鋸陳非良工不能以制木鑪橐埵坊設非巧冶不能以治金屠牛坦一朝解九牛而刀可以剃毛庖丁用刀十九年而刃如新剖硎何則游乎眾虛之閒若夫規矩鉤繩者此巧之具也而非所以為巧也故瑟無絃雖師文不能以成曲徒絃則不能悲故絃悲之具也而非所以為悲也若夫工匠之為連鐖運開陰閉眩錯入於冥冥之眇神和之極游乎心手之閒而莫與物為際者父不能以教子瞽師之放意相物寫神愈舞而形乎絃者兄不能以喻弟今夫為平者準也為直者繩也若夫不在於繩準之中而可以平直者此不共之術也故叩宮而宮應彈角而角動此同音之相應者也其於五音無所比而二十五絃皆應此不傳之道也故蕭條者形之君而寂漠者音之主也天下是非無所定世各是其所是而非其所非所謂是與所謂非各異皆自是而非人由此觀之事有合於己者而未始有是也有忤於心者而未始有非也故求是者非求道理也求合於己者也去非者非批邪施也去忤於心者也忤於我未必不合於人也合於我未必不非於俗也至是之是無非至非之非無是此真是非也若夫是於此而非於彼非於此而是於彼者此之謂一是一非也此一是非隅曲也夫一是非宇宙也今吾欲擇是而居之擇非而去之不知世之所謂是非者孰是孰非老子曰治大國若烹小鮮為寬裕者曰勿數橈為刻削者曰致其鹹酸而已矣晉平公出言而不當師曠舉琴而撞之跌衽宮壁左右欲塗之平公曰舍之以此為寡人失孔子聞之曰平公非不痛其體也欲來諫者也韓子聞之曰群臣失禮而弗誅是縱過也有以也夫平公之不霸也故賓有見人於密子者賓出密子曰子之所見賓猶有三過望我而笑是攓也談語而不稱師是返也交淺而言深是亂也賓曰望君而笑是公也談語而不稱師是通也交淺而言深是忠也故賓之容一體也或以為君子或以為小人所自視之異也故趣合即言忠而益親身䟽即謀當而見疑親母為其子治扢禿而血流至耳見者以為其愛之至也使在於繼母則過者以為嫉也事之情一也所從觀者異也從城上視牛如羊視羊如豕所居高也闚面於盤水則員於杯水則隨面形不變其故有所員有所隨者所自闚之異也今吾雖欲正身而待物庸遽知世之所自窺我者乎若轉化而與世競走譬猶逃雨也無之而不濡常欲在於虛則有不能為虛矣若夫不為虛而自虛者此所慕而無不致也故通於道者如車軸不運於己而與轂致千里轉無窮之原也不通於道者若迷惑告以東西南北所居聆聆壹曲而辟忽然不得復迷惑也故終身隸於人辟若綄之見風也無須臾之間定矣故聖人體道反性不化以待化則幾於免矣治世之職易守也其事易為也其禮易行也其責易償也是以人不兼官官不兼事士農工商鄉別州異是故農與農言力士與士言行工與工言巧商與商言數是以士無遺行農無廢功工無苦事商無折貨各安其性不得相干故伊尹之興土功也修脛者使之跖鏵強脊者使之負土眇者使之準傴者使之塗各有所宜而人性齊矣胡人便於馬越人便於舟異形殊類易事而悖失處而賤得勢而貴聖人揔而用之其數一也夫先知遠見達視千里人才之隆也而治世不以責於民博聞強志口辯辭給人智之美也而明主不以求於下敖世輕物不污於俗士之伉行也而治世不以為民化神機陰閉剞劂無迹人巧之妙也而治世不以為民業故萇弘師曠先知禍福言無遺策而不可與眾同職也公孫龍折辯抗辭別同異離堅白不可與眾同道也北人无擇非舜而自投清泠之淵不可以為世儀也魯般墨子以木為鳶而飛之三日不集而不可使為工也故高不可及者不可以為人量行不可逮者不可以為國俗夫挈輕重不失銖兩聖人弗用而縣之乎銓衡視高下不差尺寸明主弗任而求之乎浣準何則人才不可專用而度量可世傳也故國治可與愚守也而軍制可與權用也夫待騕褭飛兔而駕之則世莫乘車待西施絡慕而為配則終身不家矣然不待古之英俊而人自足者因其所有而遂用之也夫騏驥千里一日而通駑馬十舍旬亦至之由是觀之人材不足專恃而道術可公行也亂世之法高為量而罪不及重為任而罰不勝危為難而誅不敢民困於三責則飾智而詐上犯邪而干免故雖峭法嚴刑不能禁其姦何者力不足也故諺曰鳥窮則噣獸窮則𧢻人窮則詐此之謂也道德之論譬猶日月也江南河北不能易其指馳騖千里不能改其處趨舍禮俗猶室宅之居也東家謂之西家西家謂之東家雖皋陶為之理不能定其處故趨舍同誹譽在俗意行鈞窮達在時湯武之累行積善可及也其遭桀紂之世天授也今有湯武之意而無桀紂之時而欲成霸王之業亦不幾矣昔武王執戈秉鉞以勝殷搢笏杖殳以臨朝武王既歿殷民叛之周公踐東宮履乘石攝天子之位負扆而朝諸侯放蔡叔誅管叔克殷殘商祀文王于明堂七年而致政成王夫武王先武而後文非意變也以應時也周公放兄誅弟非不仁也以匡亂也故事周於世則功成務合於時則名立昔齊桓公合諸侯以乘車退誅於國以斧鉞晉文公合諸侯以革車退行於國以禮義桓公前柔而後剛文公前剛而後柔然而令行乎天下權制諸侯鈞者審於勢之變也顏闔魯君欲相之而不肯使人以幣先焉鑿培而遁之為天下顯武使遇商鞅申不害刑及三族又況身乎世多稱古之人而高其行並世有與同者而弗知貴也非才下也時弗宜也故六騏驥駟駃騠以濟江河不若窾木便者處勢然也是故立功之人簡於行而謹於時今世俗之人以功成為賢以勝患為智以遭難為愚以死節為戇吾以為各致其所極而已王子比干非不知被髮佯狂以免其身也然而樂直行盡忠以死節故不為也伯夷叔齊非不能受祿任官以致其功也然而樂離世伉行以絕眾故不務也許由善卷非不能撫天下寧海內以德民也然而羞以物滑和故弗受也豫讓要離非不知樂家室安妻子以偷生也然而樂推誠行必以死主故不留也今從箕子視比干則愚矣從比干視箕子則卑矣從管晏視伯夷則戇矣從伯夷視管晏則貪矣趨舍相非嗜欲相反而各樂其務將誰使正之曾子曰擊舟水中鳥聞之而高翔魚聞之而淵藏故所趨各異而皆得所便故惠子從車百乘以過孟諸莊子見之棄其餘魚鵜胡飲水數斗而不足鱓鮪入口若露而死智伯有三晉而欲不贍林類榮啟期衣若縣衰而意不慊由此觀之則趣行各異何以相非也夫重生者不以利害己立節者見難不苟免貪祿者見利不顧身而好名者非義不苟得此相為論譬猶冰炭鉤繩也何時而合若以聖人為之中則兼覆而并有之未有可是非者也夫飛鳥主巢狐狸主穴巢者巢成而得棲焉穴者穴成而得宿焉趣舍行義亦人之所棲宿也各樂其所安致其所蹠謂之成人故以道論者揔而齊之治國之道上無苛令官無煩治士無偽行工無淫巧其事經而不擾其器完而不飾亂世則不然為行者相揭以高為禮者相矜以偽車輿極於雕琢器用遽於刻鏤求貨者爭難得以為寶詆文者處煩撓以為慧爭為佹辯久積而不決無益於治工為奇器歷歲而後成不周於用故神農之法曰丈夫丁壯而不耕天下有受其飢者婦人當年而不織天下有受其寒者故身自耕妻親織以為天下先其導民也不貴難得之貨不器無用之物是故其耕不強者無以養生其織不力者無以揜形有餘不足各歸其身衣食饒溢姦邪不生安樂無事而天下和平故孔丘曾參無所施其善孟賁成荊無所行其威衰世之俗以其知巧詐偽飾眾無用貴遠方之貨珍難得之財不積於養生之具澆天下之淳析天下之樸牿服馬牛以為牢滑萬民以清為濁性命飛揚皆亂以營貞信漫瀾人失其情性於是乃有翡翠犀象黼黻文章以亂其目芻豢黍粱荊吳芬馨以嚂其口鍾鼓筦簫絲竹金石以淫其耳趨舍行義禮節謗議以營其心於是百姓縻沸豪亂暮行逐利煩挐澆淺法與義相非行與利相反雖十管仲弗能治也且富人則車輿衣纂錦馬飾傅旄象帷幕茵席綺繡絛組青黃相錯不可為象貧人夏則被褐帶索唅菽飲水以充腸以支暑熱冬則羊裘解札短褐不揜形而煬竈口故其為編戶齊民無以異然貧富之相去也猶人君與僕虜不足以論之夫乘奇技為邪施者自足乎一世之閒守正循理不為苟得者不免乎飢寒之患而欲民之去末反本是由發其原而壅其流也且夫雕琢刻鏤傷農事者也錦繡纂組害女工者也農事廢女工傷則飢之本而寒之原也夫飢寒並至能不犯法干誅者古今未之聞也故仁鄙在時不在行利害在命不在智夫敗軍之卒勇武遁逃將不能止也勝軍之陳怯者死行懼不能走也故江河決流一鄉父子兄弟相遺而走爭升陵阪上高丘輕足者先不能相顧也世樂志平見鄰國之人溺尚猶哀之又況親戚乎故身安則恩及鄰國志為之滅身危則忘其親戚而仁不能解也游者不能拯溺手足有所急也灼者不能救火身體有所痛也夫民有餘即讓不足則爭讓則禮義生爭則暴亂起扣門求水火莫弗與者所饒足也林中不賣薪湖上不鬻魚所有餘也故物豐則欲省求贍則爭止秦王之時或人葅子利不足也劉氏持政獨夫收孤財有餘也故世治則小人守正而利不能誘也世亂則君子為姦而法弗能禁也
