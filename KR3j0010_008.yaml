body:
  text: 本經訓太清之治也和順以寂漠質真而素朴間靜而不躁推移而無故在內而合乎道出外而調于義發動而成于文行快而便于物其言略而循理其行侻而順情其心愈而不偽其事素而不飾是以不擇時日不占卦兆不謀所始不議所終安則止激則行通體于天地同精于陰陽一和于四時明照于日月與造化者相雌雄是以天覆以德地載以樂四時不失其敘風雨不降其虐日月淑清而揚光五星循軌而不失其行當此之時玄元至碭而運照鳳麟至蓍龜兆甘露下竹實盈流黃出而朱草生機械詐偽莫藏于心逮至衰世鐫山石鍥金玉擲蚌蜃消銅鐵而萬物不滋刳胎殺夭麒麟不遊覆巢毀卵鳳皇不翔鑽燧取火構木為臺焚林而田竭澤而漁則龜龍不往人械不足畜藏有餘而萬物之繁兆萌牙卵胎而不成者處之太半矣積壤而丘處糞田而種穀掘地而井飲疏川而為利築城而為固拘獸以為畜則陰陽繆戾四時失敘雷霆毀折雹霰降虐氛霧雪霜不霽而萬物燋夭災榛穢聚埒畝芟野莽長苗秀草木之句萌銜華戴實而死者不可勝數矣乃至夏屋宮架綿聯房植橑簷榱題雕琢刻鏤喬枝菱阿芙蓉芰荷五采爭勝流漫陸離修掞曲校夭矯曾橈芒繁紛拿以相交持公輸王爾無所錯其剞劂削鋸然猶未能贍人主之欲也是以松柏菌露宛而夏稿江河三川絶而不流夷羊在牧飛蛩滿野天旱地坼鳳皇不下句爪居牙戴角出距之獸於是鷙矣民之專室蓬廬無所歸宿凍餓飢寒死者相枕席也及至分山川溪谷使有壤界計人多少衆寡使有分數築城掘池設機械險阻以為備飾職事制服等異貴賤差賢不肖經誹譽行賞罰則兵革興而分爭生民之滅抑夭隱虐殺不辜而刑誅無罪於是生矣天地之合和陰陽之陶化萬物皆乘一氣者也是故上下離心氣乃上蒸君臣不和五穀不為距日冬至四十六日天含和而未降地懷氣而未揚陰陽儲與呼吸浸潭包裹風俗斟酌萬殊旁薄衆宜以相嘔咐醞釀而成育群生是故春肅秋榮冬雷夏霜皆賊氣之所生由此觀之天地宇宙一人之身也六合之內一人之刑也是故明於性者天地不能脅也審於符者怪物不能惑也故聖人者由近知遠而萬殊為一古之人同氣于天地與一世而優遊當此之時無慶賞之利刑罰之威禮義廉恥不設誹譽仁鄙不立而萬民莫相侵欺暴虐猶在于混冥之中逮至衰世人衆而財寡事力勞而養不足於是忿爭生是以貴仁仁鄙不齊比周朋黨設詐諝懷機械巧故之心而性失矣是以貴義陰陽之情莫不有血氣之感男女群居雜處而無別是以貴禮性命之情淫而相脅以不得已則不和是以貴樂是故仁義禮樂者所以救敗而非通治之至也夫仁者所以救爭也義者所以救失也禮者所以救淫也樂者所以救憂也神明定於天下而心反其初心反其初而民性善民性善而天地陰陽從而包之則財足財足而人贍矣貪鄙忿爭不得生焉由此觀之則仁義不用矣道德定於天下而民純朴則目不營於色耳不淫於聲坐俳而歌謠被髮而浮遊雖有毛嬙西施之色不知悅也掉羽武象不知樂也淫泆無別不得生焉由此觀之禮樂不用也是故德衰然後仁生行沮然後義立和失然後聲調禮淫然後容飾是故知神明然後知道德之不足為也知道德然後知仁義之不足行也知仁義然後知禮樂之不足修也今背其本而求之于末釋其要而索之于詳未可與言至也天地之大可以矩表識也星月之行可以歷推得也雷霆之聲可以鼓鐘寫也風雨之變可以音律知也是故大可覩者可得而量也明可見者可得而蔽也聲可聞者可得而調也色可察者可得而別也夫至大天地弗能含也至微神明弗能領也及至建律歷別五色異清濁味甘苦則朴散而為器矣立仁義修禮樂則德遷而為偽矣及偽之生也飾智以驚愚設詐以巧上天下有能持之者未有能治之者也昔者蒼頡作書而天雨粟鬼夜哭伯益作井而龍登玄雲神棲崑崙智能愈多而德愈薄矣故周鼎著倕使銜其指以明大巧之不可為也故至人之治也心與神處形與性調靜而體德動而理通隨自然之性而緣不得已之化洞然無為而天下自和憺然無欲而民自朴無禨祥而民不夭不忿爭而養足兼苞海內澤及後世不知為之者誰何是故生無號死無諡實不聚而名不立施者不德受者不讓德交歸焉而莫之充忍也故德之所總道弗能害也智之所不知辨弗能解也不言之辨不道之道若或通焉謂之天府取焉而不損酌焉而不竭莫知其所由出是謂瑤光瑤光者資糧萬物者也振困窮補不足則名生興利除害伐亂禁暴則功成世無災害雖神無所施其德上下和輯雖賢無所立其功昔容成氏之時道路鴈行列處託嬰兒於巢上置餘糧於畝首虎豹可尾虺蛇可蹍而不知其所由然逮至堯之時十日並出焦禾稼殺草木而民無所食猰貐九嬰大風封豨鑿齒修蛇皆為民害堯乃使羿誅鑿齒於疇華之澤殺九嬰於凶水之上繳大風於青丘之野上射十日而下殺猰貐斷修蛇於洞庭禽封狶於桑林萬民皆喜置堯以為天子於是天下廣陜險易遠近始有道里舜之時共工振滔洪水以薄空桑龍門未開呂梁未發江淮通流四海溟涬民皆上丘陵赴樹木舜乃使禹疏三江五湖闢伊闕導瀍澗平通溝陸流注東海鴻水漏九州乾萬民皆寧其性是以稱堯舜以為聖晚世之時帝有桀紂桀為琁室瑤臺象廊玉床紂為肉圃酒池燎焚天下之財罷苦萬民之力刳諫者剔孕婦攘天下虐百姓於是湯乃以革車三百乘伐桀于南巢放之夏臺武王甲卒三千破紂牧野殺之于宣室天下寧定百姓和集是以稱湯武之賢由此觀之有賢聖之名者必遭亂世之患也今至人生亂世之中含德懷道抱無窮之智鉗口寢説遂不言而死者衆矣然天下莫知貴其不言也故道可道非常道名可名非常名著於竹帛鏤於金石可傳於人者其粗也五帝三王殊事而同指異路而同歸晚世學者不知道之所一體德之所總要取成事之迹相與危坐而説之鼓歌而舞之故博學多聞而不免於惑詩云不敢暴虎不敢馮河人知其一莫知其他此之謂也帝者體太一王者法陰陽霸者則四時君者用六律太一者牢籠天地彈壓山川含吐陰陽伸曳四時紀綱八極經緯六合覆露照導普泛無私蠉飛蠕動莫不仰德而生陰陽者承天地之和形萬殊之體含氣化物以成埒類贏縮卷舒淪於不測終始虛滿轉於無原四時者春生夏長秋收冬藏取豫有節出入有量開闔張歙不失其敘喜怒剛柔不離其理六律者生之與殺也賞之與罰也豫之與奪也非此無道也故謹於權衡準繩審乎輕重足以治其境內矣是故體太一者明於天地之情通於道德之倫聰明耀於日月精神通於萬物動靜調於陰陽喜怒和于四時德澤施于方外名聲傳于後世法陰陽者德與天地參明與日月並精與鬼神總戴員履方抱表懷繩內能治身外得人心發號施令天下莫不從風則四時者柔而不脆剛而不鞼寬而不肆肅而不悖優柔委從以養群類其德含愚而容不肖無所私愛用六律者伐亂禁暴進賢而廢不肖扶撥以為正壞險以為平矯枉以為直明於禁舍開閉之道乘時因勢以服伇人心也帝者體陰陽則侵王者法四時則削霸者節六律則辱君者失準繩則廢故小而行大則滔窕而不親大而行小則狹隘而不容貴賤不失其體而天下治矣天愛其精墬愛其平人愛其情天之精日月星辰雷電風雨也地之平水火金木土也人之情思慮聰明喜怒也故閉四關止五遁則與道淪是故神明藏於無形精氣反於至真則目明而不以視耳聰而不以聽口當而不以言心條達而不以思慮委而弗為和而弗矜真性命之情而智故不得雜焉精泄於目則其視明在於耳則其聽聰留於口則其言當集於心則其慮通故閉四關則終身無患百節莫苑莫死莫生莫虛莫盈是謂真人凡亂之所由生者皆在流遁流遁之所生者五大構架興宮室延樓棧道雞棲井幹檦枺欂櫨以相支持木巧之飾盤紆刻儼嬴鏤雕琢詭文回波淌遊瀷淢菱杼紾抱芒繁亂澤巧偽紛拿以相摧錯此遁於木也鑿汙池之深肆畛崖之遠來溪谷之流飾曲岸之際積牒旋石以純修崎抑淢怒瀨以揚激波曲拂邅回以像湡浯益樹蓮菱以食鱉魚鴻鵠鷫鷞稻梁饒餘龍舟鷁首浮吹以娛此遁於水也高築城郭設樹險阻崇臺榭之隆侈苑囿之大以窮要妙之望魏闕之高上際青雲大廈曾加擬於崑崙修為牆垣甬道相連殘高增下積土為山接徑歷遠直道夷險終日馳騖而無蹪陷此遁於土也大鍾鼎美重器華蟲疏鏤以相繆紾寢兕伏虎蟠龍連組焜昱錯眩照耀輝煌偃蹇蓼糾曲成文章雕琢之飾鍛錫文鐃乍晦乍明抑微滅瑕霜文沈居若簟籧篨纏錦經冗似數而疏此遁於金也煎熬焚炙調齊和之適以窮荊吳甘酸之變焚林而獵燒燎大木鼓橐吹埵以銷銅鐵靡流堅鍛無厭足日山無峻幹林無柘櫱燎木以為炭燔草而為灰野莽白素不得其時上掩天光下殄地財此遁於火也此五者一足以亡天下矣是故古者明堂之制下之潤溼弗能及上之霧露弗能入四方之風弗能襲土事不文木工不斫金器不鏤衣無隅差之削冠無觚螺之理堂大足以周旋理文靜潔足以饗上帝禮鬼神以示民知儉節夫聲色五味遠國珍怪瓌異奇物足以變易心志搖蕩精神感動血氣者不可勝計也夫天地之生財也本不過五聖人節五行則治不荒凡人之性心和欲得則樂樂斯動動斯蹈蹈斯蕩蕩斯歌歌斯舞歌舞無節無節則禽獸跳矣人之性心有憂喪則悲悲則哀哀斯憤憤斯怒怒斯動動則手足不靜人之性有所侵犯則怒怒則血充血充則氣激氣激則發怒發怒則有所釋憾矣故鐘鼓管簫干鏚羽旄所以飾喜也衰絰苴杖哭踊有節所以飾哀也兵革羽旄金鼓斧鉞所以飾怒也必有其質乃為之文古者聖王在上政教平仁愛洽上下同心君臣輯睦衣食有餘家給人足父慈子孝兄良弟順生者不怨死者不恨天下和洽人得其願夫人相樂無所發貺故聖人為之作禮樂以和節之末世之政田漁重稅關市急征澤梁畢禁網罟無所布耒耨無所設民力竭於徭役財用殫於會賦居者無食行者無糧老者不養死者不葬贅妻鬻子以給上求猶弗能贍愚夫蠢婦皆有流連之心悽愴之志乃始為之撞大鍾擊鳴鼓吹竽笙彈琴瑟則失樂之本矣古者上求薄而民用給君施其德臣盡其忠父行其慈子竭其孝各致其愛而無憾恨其間夫三年之喪非強引而致之也聽樂不樂食旨不甘思慕之心未能絶也晚世風流俗敗嗜欲多禮義廢君臣相欺父子相疑怨尤充胸思心盡亡被衰戴絰戲笑其中雖致之三年失喪之本也古者天子一畿諸侯一同各守其分不得相侵有不行王道者暴虐萬民爭地侵壤亂政犯禁召之不至令之不行禁之不止誨之不變乃舉兵而伐之戮其君易其黨封其墓類其社卜其子孫以代之晚世務廣地侵壤并兼無已舉不義之兵而伐無罪之國殺不辜之民而絶先聖之後大國出攻小國城守驅人之牛馬傒人之子女毀人之宗廟遷人之重寶流血千里暴骸滿野以贍貪主之欲非兵之所為主也故兵者所以討暴也非所以為暴也樂者所以致和也非所以為淫也喪者所以盡哀也非所以為偽也故事親有道矣而愛為務朝廷有容矣而敬為上處喪有禮矣而哀為主用兵有術矣而義為本本立而道行本傷而道廢矣
