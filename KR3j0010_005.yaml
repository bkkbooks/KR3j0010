body:
  text: 時則訓孟春之月招搖指寅昏參中旦尾中其位東方其日甲乙盛德在木其蟲鱗其音角律中太蔟其數八其味酸其臭羶其祀戶祭先脾東風解凍蟄蟲始振穌魚上負冰獺祭魚候鴈北天子衣青衣乘蒼龍服蒼玉建青旗食麥與羊服八風水爨萁燧火東宮御女青色衣青采鼓琴瑟其兵矛其畜羊朝于青陽左個以出春令布德施惠行慶賞省徭賦立春之日天子親率三公九卿大夫以迎歲于東郊修除祠位幣禱鬼神犧牲用牡禁伐木毋覆巢毋殺胎夭毋麛毋卵毋聚衆毋置城郭掩骼薶胔孟春行夏令則風雨不時草木早落國乃有恐行秋令則其民大疫飄風暴雨總至黎莠蓬蒿並興行冬令則水潦為敗雨霜大雹首稼不入正月官司空其樹楊仲春之月招搖指卯昏弧中旦建星中其位東方其日甲乙其蟲鱗其音角律中夾鍾其數八其味酸其臭羶其祀戶祭先脾始雨水桃李始華蒼庚鳴鷹化為鳩天子衣青衣乘蒼龍服蒼玉建青旗食麥與羊服八風水爨萁燧火東宮御女青色衣青采鼓琴瑟其兵矛其畜羊朝于青陽太廟命有司省囹圄去桎梏毋笞掠止獄訟養幼小存孤獨以通句萌擇元日令民社是月也日夜分雷始發聲蟄蟲咸動穌先雷三日振鐸以令於兆民曰雷且發聲有不戒其容止者生子不備必有凶災令官市同度量鈞衡石角斗桶端權概毋竭川澤毋漉陂池毋焚山林毋作大事以妨農功祭不用犧牲用圭璧更皮幣仲春行秋令則其國大水寒氣總至寇戎來征行冬令則陽氣不勝麥乃不熟民多相殘行夏令則其國大旱暖氣早來蟲螟為害二月官倉其樹杏季春之月招搖指辰昏七星中旦牽牛中其位東方其日甲乙其蟲鱗其音角律中姑洗其數八其味酸其臭羶其祀戶祭先脾桐始華田鼠化為鴽虹始見萍始生天子衣青衣乘蒼龍服蒼玉建青旗食麥與羊服八風水爨萁燧火東宮御女青色衣青采鼓琴瑟其兵矛其畜羊朝于青陽右個命舟牧覆舟五覆五反乃言具于天子天子烏始乘舟薦鮪於寢廟乃為麥祈實是月也生氣方盛陽氣發泄句者畢出萌者盡達不可以內天子命有司發囷倉助貧窮振乏絶開府庫出幣帛使諸侯聘名士禮賢者命司空時雨將降下水上騰循行國邑周視原野修利隄防導通溝瀆達路除道從國始至境止田獵罼弋罝罘羅罔餧獸之藥毋出九門乃禁野虞毋伐桑柘鳴鳩奮其羽戴鵀降于桑具栚曲筥筐后妃齊戒東鄉親桑省婦使勸蠶事命五庫令百工審金鐵皮革筋角箭幹脂膠丹漆無有不良擇下旬吉日大合樂致歡欣乃合㹎牛騰馬游牝于牧令國儺九門磔攘以畢春氣行是月令甘雨至三旬季春行冬令則寒氣時發草木皆肅國有大恐行夏令則民多疾疫時雨不降山陵不登行秋令則天多沈陰淫雨早降兵革並起三月官鄉其樹李孟夏之月招搖指巳昏翼中旦婺女中其位南方其日丙丁盛德在火其蟲羽其音徵律中仲呂其數七其味苦其臭焦其祀竈祭先胏螻蟈鳴丘蚓出王瓜生苦菜秀天子衣赤衣乘赤騮服赤玉建赤旗食菽與雞服八風水爨柘燧火南宮御女赤色衣赤采吹竽笙其兵戟其畜雞朝于明堂左個以出夏令立夏之日天子親率三公九卿大夫以迎歲於南郊還乃行賞賜封諸侯修禮樂饗左右命太尉贊傑俊選賢良舉孝悌行爵出祿佐天長養繼修增高無有隳壞毋興土功毋伐大樹令野虞行田原勸農事驅獸畜勿令害穀天子以彘嘗麥先薦寢廟聚畜百藥靡草死麥秋至決小罪斷薄刑孟夏行秋令則苦雨數來五穀不滋四鄰入保行冬令則草木早枯後乃大水敗壞城郭行春令則螽蝗為敗暴風來格秀草不實四月官田其樹桃仲夏之月招搖指午昏亢中旦危中其位南方其日丙丁其蟲羽其音徵律中蕤賓其數七其味苦其臭焦其祀竈祭先胏小暑至螳蜋生鵙始鳴反舌無聲天子衣赤衣乘赤騮服赤玉建赤旗食菽與雞服八風水爨柘燧火南宮御女赤色衣赤采吹竽笙其兵戟其畜雞朝于明堂太廟命樂師修鞀鼙琴瑟管簫調竽箎飾鍾磬執干戚戈羽命有司為民祈祀山川百原大雩帝用盛樂天子以𩀋嘗黍羞以含桃先薦寢廟禁民無刈藍以染毋燒灰毋暴布門閭無閉關市無索挺重囚益其食存鰥寡振死事游牝別其群執騰駒班馬政日長至陰陽爭死生分君子齊戒處必掩身無躁節聲色薄滋味百官靜事無徑以定晏陰之所成鹿角解蟬始鳴半夏生木堇榮禁民無發火可以居高明遠眺望登丘陵處臺榭仲夏行冬令則雹霰傷穀道路不通暴兵來至行春令則五穀不熟百螣時起其國乃飢行秋令則草木零落果實蚤成民殃於疫五月官相其樹榆季夏之月招搖指未昏心中旦奎中其位中央其日戊己盛德在土其蟲螺其音宮律中百鍾其數五其味甘其臭香其祀中霤祭先心涼風始至蟋蟀居奧鷹乃學習腐草化為蚈天子衣苑黃乘黃騮服黃玉建黃旗食稷與牛服八風水爨柘燧火中宮御女黃色衣黃采其兵劍其畜牛朝于中宮是月也乃命漁人伐蛟取鼉登龜取黿令滂人入材葦命四監大夫合百縣之秩芻以養犧牲以共皇天上帝名山大川四方之神宗廟社稷為民祈福行惠令弔死問疾存視長老行稃鬻厚席蓐以送萬物歸也命婦官染采黼黻文章青黃白黑莫不質良以給宗廟之服必宣以明是月也樹木方盛勿敢斬伐不可以合諸侯起土功動衆興兵必有天殃土潤溽暑大雨時行利以殺草糞田疇以肥土疆季夏行春令則穀實解落多風咳民乃遷徙行秋令則丘隰水潦稼穡不熟乃多女災行冬令則風寒不時鷹隼蚤摯四鄙入保六月官少內其樹梓孟秋之月招搖指申昏斗中旦畢中其位西方其日庚辛盛德在金其蟲毛其音商律中夷則其數九其味辛其臭腥其祀門祭先肝涼風至白露降寒蟬鳴鷹乃祭鳥用始行戮天子衣白衣乘白駱服白玉建白旗食麻與犬服八風水爨柘燧火西宮御女白色衣白采撞白鐘其兵戉其畜狗朝于總章左個以出秋令求不孝不悌戮暴傲悍而罰之以助損氣立秋之日天子親率三公九卿大夫以迎歲于西郊還乃賞軍率武人於朝命將率選卒厲兵簡練桀俊專任有功以征不義詰誅暴慢順彼四方命有司修法制繕囹圄禁姦塞邪審決獄平詞訟天墬始肅不可以贏是月也農始升穀天子嘗新先薦寢廟命百官始收斂完隄防謹障塞以備水潦修城郭繕宮室毋以封侯立大官行重幣出大使行是月令涼風至三旬孟秋行冬令則陰氣大勝介蟲敗穀戎兵乃來行春令則其國乃旱陽氣復還五穀無實行夏令則冬多火災寒暑不節民多瘧疾七月官庫其樹楝仲秋之月招搖指酉昏牽牛中旦觜巂中其位西方其日庚辛其蟲毛其音商律中南呂其數九其味辛其臭腥其祀門祭先肝涼風至候鴈來玄鳥歸群鳥翔天子衣白衣乘白駱服白玉建白旗食麻與犬服八風水爨柘燧火西宮御女白色衣白采撞白鍾其兵戉其畜犬朝于總章大廟命有司申嚴百刑斬殺必當無或枉撓決獄不當反受其殃是月也養長老授几杖行稃鬻飲食乃命宰祝巡行犧牲案芻豢視肥𦡱全粹察物色課比類量小大視少長莫不中度天子乃儺以御秋氣以犬嘗麻先薦寢廟是月也可以築城郭建都邑穿竇窖修囷倉乃命有司趣民收斂務畜采多積聚勸種宿麥無或失時其有失時行罪無疑是月也雷乃始收蟄蟲陪戶殺氣浸盛陽氣日衰水始涸日夜分一度量平權衡正鈞石角斗桶理關市來商旅入貨財以便民事四方來集遠鄉皆至財物不匱上無乏用百事乃遂仲秋行春令則秋雨不降草木生榮國有大恐行夏令則其國乃旱蟄蟲不藏五穀皆復生行冬令則風災數起收雷先行草木早死八月官尉其樹柘季秋之月招搖指戌昏虛中旦柳中其位西方其日庚辛其蟲毛其音商律中無射其數九其味辛其臭腥其祀門祭先肝候鴈來賓雀入大水為蛤菊有黃華豺乃祭獸戮禽天子衣白衣乘白駱服白玉建白旗食麻與犬服八風水爨柘燧火西宮御女白色衣白采撞白鍾其兵戉其畜犬朝于總章右個命有司申嚴號令百官貴賤無不務入以會天墬之藏無有宣出乃命冢宰農事備收舉五穀之要藏帝籍之收於神倉是月也霜始降百工休乃命有司曰寒氣總至民力不堪其皆入室上丁入學習吹大饗帝嘗犧牲合諸侯制百縣為來歲受朔日與諸侯所稅於民輕重之法貢歲之數以遠近土墬所宜為度乃教於田獵以習五戎命太僕及七騶咸駕戴旌授車以級皆正設于屏外司徒搢朴北嚮以贊之天子乃厲服廣飾執弓操矢以獵命主祠祭禽四方是月也草木黃落乃伐薪為炭蟄蟲咸俯在穴乃趨獄刑無留有罪收祿秩之不當供養之不宜者通路除道從境始至國而已是月也天子乃以犬嘗麻先薦寢廟季秋行夏令則其國大水冬藏殃敗民多鼽窒行冬令則國多盜賊邊境不寧土墬分裂行春令則暖風來至民氣解隋師旅並興九月官候其樹槐孟冬之月招搖指亥昏危中旦七星中其位北方其日壬癸盛德在水其蟲介其音羽律中應鍾其數六其味鹹其臭腐其祀井祭先腎水始冰墬始凍雉入大水為蜃虹藏不見天子衣黑衣乘玄驪服玄玉建玄旗食黍與彘服八風水爨松燧火北宮御女黑色衣黑采擊磬石其兵鎩其畜彘朝于玄堂左個以出冬令命有司修群禁禁外徙閉門閭大搜客斷罰刑殺當罪阿上亂法者誅立冬之日天子親率三公九卿大夫以迎歲于北郊還乃賞死事存孤寡是月也命太祝禱祀神位占龜策審卦兆以察吉凶於是天子始裘命百官謹蓋藏命司徒行積聚修城郭警門閭修楗閉慎管籥固封璽修邊境完要塞絶蹊徑飭喪紀審棺椁衣衾之薄厚營丘壟之小大高庳使貴賤卑尊各有等級是月也工師效功陳祭器案度呈堅致為上工事苦慢作為淫巧必行其罪是月也大飲蒸天子祈來年於天宗大禱祭于公社畢饗先祖勞農夫以休息之命將率講武肄射御角力徑乃命水虞漁師收水泉池澤之賦毋或侵牟孟冬行春令則凍閉不密墬氣發泄民多流亡行夏令則國多暴風方冬不寒蟄蟲復出行秋令則雪霜不時小兵時起土墬侵削十月官司馬其樹檀仲冬之月招搖指子昏東壁中旦軫中其位北方其日壬癸其蟲介其音羽律中黃鍾其數六其味鹹其臭腐其祀井祭先腎冰益壯墬始坼鳱鴠不鳴虎始交天子衣黑衣乘鐵驪服玄玉建玄旗食黍與彘服八風水爨松燧火北宮御女黑色衣黑采擊磬石其兵鎩其畜彘朝于玄堂太廟命有司曰土事無作無發室屋及起大衆是謂發天墬之藏諸蟄則死民必疾疫有隨以喪急捕盜賊誅淫泆詐僞之人命曰畼月命奄尹申宮令審門閭謹房室必重閉省婦事乃命大酋秫稻必齊麴糱必時湛熹必潔水泉必香陶器必良火齊必得無有差忒天子乃命有司祀四海大川名澤是月也農有不收藏積聚牛馬畜獸有放失者取之不詰山林藪澤有能取疏食田獵禽獸者野虞教導之其有相侵奪者罪之不赦是月也日短至陰陽爭君子齊戒處必掩身欲靜去聲色禁嗜欲寧身體安形性是月也荔挺出藝始生丘蚓結麋角解水泉動日短至則伐樹木取竹箭罷官之無事者去器之無用者涂闕庭門閭築囹圄此所以助天墬之閉藏也仲冬行夏令則其國乃旱氛霧冥冥雷乃發聲行秋令則天時雨水瓜瓠不成國有大兵行春令則蟲螟為敗水泉咸竭民多疾癘十一月官都尉其樹棗季冬之月招搖指丑昏婁中旦氐中其位北方其日壬癸其蟲介其音羽律中大呂其數六其味鹹其臭腐其祀井祭先腎鴈北鄉鵲加巢雉雊雞呼卵天子衣黑衣乘鐵驪服玄玉建玄旗食黍與彘服八風水爨松燧火北宮御女黑色衣黑采擊磬石其兵鎩其畜彘朝于玄堂右個命有司大儺旁磔出土牛命漁師始漁天子親往射漁先薦寢廟令民出五種令農計耦耕事修耒耜具田器命樂師大合吹而罷乃命四監收秩薪以供寢廟及百祀之薪燎是月也日窮于次月窮于紀星周于天歲將更始令靜農民無有所使天子乃與公卿大夫飾國典論時令以待嗣歲之宜乃命太史次諸侯之列賦之犧牲以供皇天上帝社稷之享乃命同姓女國供寢廟之芻豢卿士大夫至于庶民供山林名川之祀季冬行秋令則白露早降介蟲為祅四鄙入保行春令則胎夭多傷國多固疾命之曰逆行夏令則水潦敗國時雪不降冰凍消釋十二月官獄其樹櫟五位東方之極自碣石過朝鮮貫大人之國東至日出之次榑木之地青丘樹木之野太皞句芒之所司者萬二千里其令曰挺群禁開閉闔通窮窒達障塞行優游棄怨惡解伇罪免憂患休罰刑開關梁宣出財和外怨撫四方行柔惠止剛強南方之極自北戶孫之外貫顓頊之國南至委火炎風之野赤帝祝融之所司者萬二千里其令曰爵有德賞有功惠賢良救飢渴舉力農振貧窮惠孤寡憂罷疾出大祿行大賞起毀宗立無後封建侯立賢輔中央之極自崑崙東絶兩恆山日月之所道江漢之所出衆民之野五穀之所宜龍門河濟相貫以息壤堙洪水之州東至於碣石黃帝后土之所司者萬二千里其令曰平而不阿明而不苛包裹覆露無不囊懷溥泛無私正靜以和行稃鬻養老衰弔死問疾以送萬物之所歸西方之極自崑崙絶流沙沈羽西至三危之國石城金室飲氣之民不死之野少皓蓐收之所司者萬二千里其令曰審用法誅必辜備盜賊禁姦邪飾群牧謹著聚修城郭補決竇塞蹊徑遏溝瀆止流水雍溪谷守門閭陳兵甲選百官誅不法北方之極自九澤窮夏晦之極北至令正之谷有凍寒積冰雪雹霜霰漂潤群水之野顓頊玄冥之所司者萬二千里其令曰申群禁固閉藏修障塞繕關梁禁外徙斷罰刑殺當罪閉門閭大搜客止交游禁夜樂蚤閉晏開以索姦人姦人已德執之必固天節已幾刑殺無赦雖有盛尊之親斷以法度毋行水毋發藏毋釋罪六合孟春與孟秋為合仲春與仲秋為合季春與季秋為合孟夏與孟冬為合仲夏與仲冬為合季夏與季冬為合孟春始贏孟秋始縮仲春始出仲秋始內季春大出季秋大內孟夏始緩孟冬始急仲夏至修仲冬至短季夏德畢季冬刑畢故正月失政七月涼風不至二月失政八月雷不藏三月失政九月不下霜四月失政十月不凍五月失政十一月蟄蟲冬出其鄉六月失政十二月草木不脫七月失政正月大寒不解八月失政二月雷不發九月失政三月春風不濟十月失政四月草木不實十一月失政五月下雹霜十二月失政六月五穀疾狂春行夏令泄行秋令水行冬令肅夏行春令風行秋令蕪行冬令格秋行夏令華行春令榮行冬令耗冬行春令泄行夏令旱行秋令霧製度陰陽大制有六度天為繩墬為準春為規夏為衡秋為矩冬為權繩者所以繩萬物也準者所以準萬物也規者所以員萬物也衡者所以平萬物也矩者所以方萬物也權者所以權萬物也繩之為度也直而不爭修而不窮久而不弊遠而不忘與天合德與神合明所欲則得所惡則亡自古及今不可移匡厥德孔密廣大以容衆是故上帝以為物宗準之為度也平而不險均而不阿廣大以容寬裕以和柔而不剛鋭而不挫流而不滯易而不穢發通而有紀周密而不泄準平而不失萬物皆平民無險謀怨惡不生是故上帝以為物平規之為度也轉而不復員而不垸優而不縱廣大以寬感動有理發通有紀優優簡簡百怨不起規度不失生氣乃理衡之為度也緩而不後平而不怨施而不德弔而不責常平民祿以繼不足㪍㪍陽陽唯德是行養長化育萬物蕃昌以成五穀以實封疆其政不失天墬乃明矩之為度也肅而不悖剛而不憒取而無怨內而無害威厲而不懾令行而不廢殺伐既得仇敵乃克矩正不失百誅乃服權之為度也急而不贏殺而不割充滿以實周密而不泄敗物而弗取罪殺而不赦誠信以必堅愨以固冀除苛慝不可以曲故冬正將行必弱以強必柔以剛權正不失萬物乃藏明堂之制靜而法準動而法繩春治以規秋治以矩冬治以權夏治以衡是故燥溼寒暑以節至甘雨膏露以時降
