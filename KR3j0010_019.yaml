body:
  text: 修務訓或曰無為者寂然無聲漠然不動引之不來推之不往如此者乃得道之像吾以為不然嘗試問之矣若夫神農堯舜禹湯可謂聖人乎有論者必不能廢以五聖觀之則莫得無為明矣古者民茹草飲水采樹木之實食螺蛖之肉時多疹病毒傷之害於是神農乃始教民播種五穀相土地之宜燥濕肥墝高下嘗百草之滋味水泉之甘苦令民知所避就當此之時一日而七十毒堯立孝慈仁愛使民如子弟西教沃民東至黑齒北撫幽都南道交趾放歡兜於崇山竄三苗於三危流共工於幽州殛鯀於羽山舜作室築牆茨屋辟地樹穀令民皆知去巖穴各有家室此其始也南征三苗道死蒼梧禹沐霪雨櫛扶風決江疏河鑿龍門闢伊闕修彭蠡之防乘四載隨山刊木平治水土定千八百國湯夙興夜寐以致聰明輕賦薄斂以寬民氓布德施惠以振困窮弔死問疾以養孤孀百姓親附政令流行乃整兵鳴條困夏南巢譙以其過放之歷山此五聖者天下之盛主勞形盡慮為民興利除害而不懈奉一爵酒不知於色挈一石之尊則白汗交流又況贏天下之憂而任海內之事者乎其重於尊亦遠矣且夫聖人者不恥身之賤而愧道之不行不憂命之短而憂百姓之窮是故禹為水以身解於陽盱之阿湯苦旱以身禱於桑林之際聖人憂民如此其明也而稱以無為豈不悖哉且古之立帝王者非以奉養其欲也聖人踐位者非以逸樂其身也為天下強掩弱衆暴寡詐欺愚勇侵怯懷知而不以相教積財而不以相分故立天子以齊一之為一人聰明而不足以遍燭海內故立三公九卿以輔翼之為絶國殊俗僻遠幽間之處不能被德承澤故立諸侯以教誨之是以地無不任時無不應官無隱事國無遺利所以衣寒食飢養老弱而息勞倦也若以布衣徒步之人觀之則伊尹負鼎而干湯呂望鼓刀而入周伯里奚轉鬻管仲束縛孔子無黔𥥍墨子無暖席是以聖人不高山不廣河蒙恥辱以干世主者非以貪祿慕位欲事起天下之利而除萬民之害也蓋聞傳書曰神農憔悴堯瘦臞舜黴黑禹胼胝由此觀之則聖人之憂勞百姓亦甚矣故自天子以下至于庶人四肢不勤思慮不用而事治求贍者未之聞也夫地勢水東流人必事焉然後水潦得谷行禾稼春生人必加功焉故五穀得遂長聽其自流待其自生則鯀禹之功不立而后稷之智不用若吾所謂無為者私志不得入公道嗜欲不得枉正術循理而舉事因資而立功推自然之勢而曲故不得容者故事成而身弗伐功立而名弗有非謂其感而不應敀而不動者若夫以火熯井以淮灌山此用己而背自然故謂之有為若夫水之用舟沙之用䦊泥之用輴山之用蔂夏瀆而冬陂因高為山因下為池此非吾所謂為之聖人之從事也殊體而合于理其所由異路而同歸其存危定傾若一志不忘于欲利人何以明之昔者楚欲攻宋墨子聞而悼之自魯趨而往十日十夜足重繭而不休息裂裳裹足至於郢見楚王曰臣聞大王舉兵將攻宋計必得宋而後攻之乎忘其苦衆勞民頓兵銼鋭負天下以不義之名而不得咫尺之地猶且攻之乎王曰必不得宋又且為不義則曷為攻之墨子曰甚善臣見大王之必傷義而不得宋王曰公輸般天下之巧士也作為雲梯之械設以攻宋曷為弗取墨子曰請令公輸般設攻臣請守之於是公輸般設攻宋之械墨子設守宋之備九攻而墨子九卻之弗能入於是乃偃兵輟不攻宋段干木辭祿而處家魏文侯過其閭而軾之其僕曰君何為軾文侯曰段干木在是以軾其僕曰段干木布衣之士君軾其閭不已甚乎文侯曰段干木不趨勢利懷君子之道隱處窮巷聲施千里寡人敢勿軾乎段干木光于德寡人光于勢段干木富于義寡人富于財勢不若德尊財不若義高段干木雖以己易寡人不為也吾日悠悠慚于影子何以輕之哉其後秦將起兵伐魏司馬庾諫曰段干木賢者其君禮之天下莫不知諸侯莫不聞舉兵伐之無乃妨於義乎於是秦乃偃兵輟不攻魏夫墨子趹蹄而趨千里以存楚宋段干木闔門不出以安秦魏夫行與止也其勢相反而皆可以存國此所謂異路而同歸者也今夫救火者汲水而趣之或以甕瓴或以盆盂其方員鋭橢不同盛水各異其於滅火鈞也故秦楚燕魏之歌也異轉而皆樂九夷八狄之哭也殊聲而皆悲一也夫歌者樂之徵也哭者悲之效也憤於中則應於外故在所以感之矣夫聖人之心日夜不忘于欲利人其澤之所及者效亦大矣世俗廢衰而非學者多人性各有所修短若魚之躍若鵲之駮此自然者不可損益吾以為不然夫魚者躍鵲者駮也猶人之為人馬之為馬筋骨形體所受於天不可變以此論之則不類矣夫馬之為草駒之時跳躍揚蹄翹尾而走人不能制齕咋足以噆肌碎骨蹶蹄足以破盧陷胸及至圉人擾之良御教之掩以衡扼連以轡銜則雖歷險超塹弗敢辭故其形之為馬馬不可化其可駕御教之所為也馬聾蟲也而可以通氣志猶待教而成又況人乎且夫身正性善發憤而成㥜憑而為義性命可説不待學問而合於道者堯舜文王也沉湎耽荒不可教以道不可喻以德嚴父弗能正賢師不能化者丹朱商均也曼頰皓齒形夸骨佳不待脂粉芳澤而性可説者西施陽文也啳𦝢哆噅籧蒢戚施雖粉白黛黑弗能為美者嫫母仳倠也夫上不及堯舜下不若商均美不及西施惡不若嫫母此教訓之所喻也而芳澤之所施且子有弒父者然而天下莫疏其子何也愛父者衆也儒有邪辟者而先王之道不廢何也其行之者多也今以為學者之有過而非學者則是以一䭇之故絶穀不食以一蹪之難輟足不行惑也今日良馬不待册錣而行駑馬雖册錣之不能進為此不用册錣而御則愚矣夫怯夫操利劍擊則不能斷刺則不能入及至勇武攘捲一搗則摺脅傷幹為此棄干將鏌邪而以手戰則悖矣所為言者齊於衆而同於俗今不稱九天之頂則言黃泉之底是兩末之端議何可以公論乎夫亭歷冬生而人曰冬死死者衆也薺麥夏死而人曰夏生生者衆也多江河之回曲亦時有南北者而人謂江河東流攝提鎮星日月東行而人謂星辰日月西移者以大氐為本胡人有知利者而人謂之駤越人有重遲者而人謂之訬以多者名之若夫堯眉八彩九竅通洞而公正無私一言而萬民齊舜二瞳子是謂重明作事成法出言成章禹耳參漏是謂大通興利除害疏河決江文王四乳是謂大仁天下所歸百姓所親皋陶馬喙是謂至信決獄明白察於人情契生於卵啓生於石史皇産而能書羿左臂修而善射若此九賢者千歲而一出猶繼踵而生今無五聖之天奉四俊之才難欲棄學而循性是謂猶釋船而欲蹍水也夫純鈞魚腸劍之始下型擊則不能斷刺則不能入及加之砥礪摩其鋒鍔則水斷龍舟陸剸犀甲明鏡之始下型矇然未見形容及其扢以玄錫摩以白旃則鬢眉微毫可得而察夫學亦人之砥錫也而謂學無益者所以論之過知者之所短不若愚者之所修賢者之所不足不若衆人之所有餘何以知其然夫宋畫吳冶刻刑鏤法亂修曲出其為微妙堯舜之聖不能及蔡之幼女衛之稚質梱纂組雜奇彩抑黑質揚赤文禹湯之智不能逮夫天之所覆地之所載包於六合之內託於宇宙之間陰陽之所生血氣之精含牙戴角前爪後距奮翼攫肆蚑行蟯動之蟲喜而合怒而鬭見利而就避害而去其情一也雖所好惡其與人無以異然其爪牙雖利筋骨雖強不免制於人者知不能相通才力不能相一也各有其自然之勢無稟力竭功沮夫鴈順風而飛以愛氣力銜蘆而翔以避矰弋蟻知為垤貛貉為曲穴虎豹有茂草野彘有艽莦槎櫛堀虛連比以像宮室陰以防雨晏以蔽日此亦鳥獸之所以知求合於其所利今使人生於辟陋之國長於窮櫩漏室之下長無兄弟少無父母目未嘗見禮節耳未嘗聞先古獨守專室而不出門戶使其性雖不愚然其知者必寡矣昔者倉頡作書容成造曆胡曹為衣后稷耕稼儀狄作酒奚仲為車此六人者皆有神明之道聖智之迹故人作一事而遺後世非能一人而獨兼有之各悉其知貴其所欲達遂為天下備今使六子者易事而明弗能見者何萬物至衆而知不足以奄之周室以後無六子之賢而皆修其業當世之人無一人之才而知六賢之道者何教順施續而知能流通由此觀之學不可以已明矣今夫盲者目不能別晝夜分白黑然而搏琴撫弦參彈復徽攫援摽拂手若薎蒙不失一弦使未嘗鼓琴者雖有離朱之明攫掇之捷猶不能屈伸其指何則服習積貫之所致故弓待檠而後能調劍待砥而後能利玉堅無敵鏤以為獸首尾成形礛諸之功木直中繩揉以為輪其曲中規隱栝之力唐碧堅忍之類猶可刻鏤以成器用又況心意乎且夫精神滒淖纖微倏忽變化與物推移雲蒸風行在所設施君子有能精搖摩監砥礪其才自試神明覽物之博通物之壅觀始卒之端見無外之境以逍遙乎無方之內仿佯於塵埃之外超然獨立卓然離世此聖人之所以遊心也然而晚世之人不能間居靜思鼓琴讀書追觀上古友賢大夫學問講辨日以自娛蘇援世事分別白黑籌策得失以觀禍福設儀立度可以為法則窮道本末究事之情立是廢非明示後人死有遺業生有榮名如此者人才之所能逮也然而莫能至焉者偷慢懈惰多暇日之故夫瘠地之民多有心者勞也沃地之民多不才者饒也由此觀之知人無務不若愚而好學自人君公卿至于庶人不自強而功成者天下未之有也詩云日就月將學有緝熙于光明此之謂也名可務立功可強成故君子積志委正以趣明師勵節亢高以絶世俗何以明之昔者南榮疇恥聖道之獨亡於己身淬霜露敕蹻趹步跋涉山川冒蒙荊棘百舍重趼不敢休息南見老聃受教一言精神曉泠鈍閔條達欣若七日不食如饗太牢是以明照四海名施後世達略天地察分秋毫稱譽華語至今不休此所謂名可務立者吳與楚戰莫囂大心撫其御之手曰今日距強敵犯白刃蒙矢石戰而身死卒勝民全我社稷可以庶幾乎遂入不返決腹斷頭不旋踵運軌而死申包胥曰吾竭筋力以赴嚴敵伏尸流血不過一卒之才不如約身卑辭求救於諸侯於是乃贏糧跣走跋涉谷行上峭山赴深溪遊川水犯津關躐蒙籠蹶沙石跖達膝曾繭重胝七日七夜至於秦庭鶴跱而不食晝吟宵哭面若死灰顏色黴黑涕液交集以見秦王曰吳為封豨修蛇蠶食上國虐始於楚寡君失社稷越在草茅百姓離散夫婦男女不遑啓處使下臣告急秦王乃發車千乘步卒七萬屬之子虎踰塞而東擊吳濁水之上果大破之以存楚國烈藏廟堂著於憲法此功之可強成者也夫七尺之形心致憂愁勞苦膚之知痛疾寒暑人情一也聖人知時之難得務之可趣也苦身勞形焦心怖肝不避煩難不違危殆蓋聞子發之戰進如激矢合如雷電解如風雨員之中規方之中矩破敵陷陳莫能壅御澤戰必克攻城必下彼非輕身而樂死務在於前遺利於後故名立而不墮此自強而成功者也是故田者不強囷倉不盈官御不厲心意不精將相不強功烈不成侯王懈惰後世無名詩云我馬唯騏六轡如絲載馳載驅周爰咨謨以言人之有所務也通於物者不可驚以怪喻於道者不可動以奇察於辭者不可耀以名審於形者不可遁以狀世俗之人多尊古而賤今故為道者必託之于神農黃帝而後能入説亂世暗主高遠其所從來因而貴之為學者蔽於論而尊其所聞相與危坐而稱之正領而誦之此見是非之分不明夫無規矩雖奚仲不能以定方圓無準繩雖魯班不能以定曲直是故鍾子期死而伯牙絶絃破琴知世莫賞也惠施死而莊子寢説言見世莫可為語者也夫項託七歲為孔子師孔子有以聽其言也以年之少為閭丈人説救敲不給何道之能明也昔者謝子見於秦惠王惠王説之以問唐姑梁唐姑梁曰謝子山東辨士固奮説以取少主惠王因藏怒而待之後日復見逆而弗聽也非其説異也所以聽者易也夫以徵為羽非絃之罪以甘為苦非味之過楚人有烹猴而召其鄰人鄰人以為狗羹也而甘之後聞其猴也據地而吐之盡寫其所食此未始知味者也邯鄲師有出新曲者託之李奇諸人皆爭學之後知其非也而皆棄其曲此未始知音者也鄙人有得玉璞者喜其狀以為寶而藏之以示人人以為石也因而棄之此未始知玉者也故有符於中則貴是而同今古無以聽其説則所從來者遠而貴之耳此和氏之所以泣血於荊山之下今劍或絶側羸文齧缺卷銋而稱以頃襄之劍則貴人爭帶之琴或撥剌枉橈闊解漏越而稱以楚莊之琴側室爭鼓之苗山之鋌羊頭之銷雖水斷龍舟陸剸兕甲莫之服帶山桐之琴澗梓之腹雖鳴廉隅修營唐牙莫之鼓也通人則不然服劍者期於銛利而不期於墨陽莫邪乘馬者期於千里而不期於驊騮緑耳鼓琴者期於鳴廉修營而不期於濫脅號鍾誦詩書者期於通道略物而不期於洪範商頌聖人見是非若白黑之於目辨清濁之於耳聽衆人則不然中無主以受之譬若遺腹子之上隴以禮哭泣之而無所歸心故夫孿子之相似者唯其母能知之玉石之相類者唯良工能識之書傳之微者唯聖人能論之今取新聖人書名之孔墨則弟子句指而受者必衆矣故美人者非必西施之種通士者不必孔墨之類曉然意有所通於物故作書以喻事以為知者施也誠得清明之士執玄鑑於心照物明白不為古今易意攄書明指以示之雖闔棺亦不恨矣昔晉平公令官為鐘鐘成而示師曠師曠曰鐘音不調平公曰寡人以示工工皆以為調而以為不調何也師曠曰使後世無知音者則已若有知音者必知鐘之不調也故師曠之欲善調鍾也以為後之知音者也三代與我同行五伯與我齊智彼獨有聖知之實我曾無有閭里之聞窮巷之知者何彼并身而立節我誕謾而悠忽今夫毛牆西施天下之美人若使之銜腐鼠蒙蝟皮衣豹裘帶死蛇則布衣韋帶之人過者莫不左右睥睨而掩鼻嘗試使之施芳澤正娥眉設笄珥衣阿錫曳齊紈粉白黛黑佩玉環揄步雜芷若籠蒙目冶由笑目流眺口曾撓奇牙出靨䩉搖則雖王公大人有嚴志頡頏之行者無不憛悇癢心而悅其色矣今以中人之才蒙愚惑之智被污辱之行無本業所修方術所務焉得無有睥睨掩鼻之容哉今鼓舞者繞身若環曾撓摩地扶於猗那動容轉曲便娟擬神身若秋藥被風髮若結旌騁馳若驚木熙者舉梧檟據句枉猿自縱好茂葉龍夭矯燕枝拘援豐條舞扶疏龍從鳥集搏援攫肆薎蒙踊躍則夫觀者莫不為之損心酸足彼乃始徐行微笑被衣修擢夫鼓舞者非柔縱而木熙者非眇徑淹浸漸靡使然也是故生木之長莫見其益有時而修砥礪磨堅莫見其損有時而薄藜藋之生蠕蠕然日加數寸不可以為廬棟楩柟豫章之生也七年而後知故可以為棺舟夫事有易成者名小難成者功大君子修美雖未有利福將在後至故詩云日就月將學有緝熙于光明此之謂也
