body:
  text: 泰族訓天設日月列星辰調陰陽張四時日以暴之夜以息之風以乾之雨露以濡之其生物也莫見其所養而物長其殺物也莫見其所喪而物亡此之謂神明聖人象之故其起福也不見其所由而福起其除禍也不見其所以而禍除遠之則邇近之則踈稽之弗得察之不虛日計無算歲計有餘夫濕之至也莫見其形而炭已重矣風之至也莫見其象而木已動矣日之行也不見其移也騏驥倍日而馳草木為之靡縣熢未轉而日在其前矣故天之且風草木未動而鳥已翔矣其且雨也陰曀未集而魚已噞矣以陰陽之氣相動也故寒暑燥濕以類相從聲響疾徐以音相應也故易曰鳴鶴在陰其子和之高宗諒暗三年不言四海之內寂然無聲一言聲然大動天下是以天心呿吟者也故一動其本而百枝皆應若春雨之灌萬物也渾然而流沛然而施無地而不澍無物而不生故聖人者懷天心聲然能動化天下者也故精誠感於內形氣動於天則景星見黃龍下祥鳳至醴泉出嘉穀生河不滿溢海不溶波故詩云懷柔百神及河嶠嶽逆天暴物則日月薄蝕五星失行四時干乖晝冥宵光山崩川涸冬雷夏霜詩曰正月繁霜我心憂傷天之與人有以相通也故國危亡而天文變世惑亂而虹霓見萬物有以相連精祲有以相蕩也故神明之事不可以智巧為也不可以䈥力致也天地所包陰陽所嘔雨露所濡以生萬殊翡翠玳瑁瑤碧玉珠文彩明朗潤澤若濡摩而不玩久而不渝奚仲不能旅魯般不能造此之謂大巧宋人有以象為其君為楮葉者三年而成莖柯豪芒鋒殺顏澤亂之楮葉之中而不可知也列子聞之曰使天地三年而成一葉則萬物之有葉者寡矣夫天地之施化也嘔之而生吹之而落豈此契契哉故凡可度者小也可數者少也至大非度之所能及也至衆非數之所能領也故九州不可頃畝也八極不可道里也太山不可丈尺也江海不可斗斛也故大人者與天地合德與日月合明與鬼神合靈與四時合信故聖人懷天氣抱天心執中含和不下廟堂而行於四海變習易俗民化而遷善若性諸己能以神化也詩云神之聽之終和且平夫鬼神視之無形聽之無聲然而郊天望山川禱祠而求福雩兌而請雨卜筮而決事詩曰神之格思不可度思矧可射思此之謂也天致其高地致其厚月照其夜日照其晝列星朗陰陽化非有為焉正其道而物自然故陰陽四時非生萬物也雨露時降非養草木也神明接陰陽和而萬物生矣故高山深林非為虎豹也大木茂枝非為飛鳥也源流千里深淵百仞非為蛟龍也致其高崇成其廣大山居木棲巢枝穴藏水潛陸行各得其所寧焉夫大生小多生少天之道也故丘阜不能生雲雨滎水不能生魚鱉者小也牛馬之氣蒸生蟣虱蟣虱之氣蒸不能生牛馬故化生於外非生於內也夫蛟龍伏寢於淵而卵剖於陵螣蛇雄鳴於上風雌鳴於下風而化成形精之至也故聖人養心莫善於誠至誠而能動化矣今夫有道者藏精於內棲神於心靜漠恬淡說繆胸中邪氣無所留滯四枝節族毛蒸理泄則機樞調利百脈九竅莫不順比其所居神者得其位也豈節拊而毛循之哉聖主在上位廓然無形寂然無聲官府若無事朝廷若無人無隱士無軼民無勞役無冤刑四海之內莫不仰上之德象主之指夷狄之國重譯而至非戶辨而家說之也推其誠心施之天下而已矣詩曰惠此中國以綏四方內順而外寧矣大王亶父處邠狄人攻之杖策而去百姓攜幼扶老負釜甑踰梁山而國乎岐周非令之所能召也秦穆公為野人食駿馬肉之傷也飲之美酒韓之戰以其死力報非券之所能責也密子治亶父巫馬期往觀化焉見夜漁者得小即釋之非刑之所能禁也孔子為魯司寇道不拾遺市不豫賈田漁皆讓長而斑白不戴負非法之所能致也夫矢之所以射遠貫堅者弩力也其所以中的剖微者人心也賞善罰暴者政令也其所以能行者精誠也故弩雖強不能獨中令雖明不能獨行必自精氣所以與之施道故攄道以被民而民弗從者誠心弗施也天地四時非生萬物也神明接陰陽和而萬物生之聖人之治天下非易民性也拊循其所有而滌蕩之故因則大作則細矣禹鑿龍門闢伊闕決江濬河東注之海因水之流也后稷墾草發菑糞土樹穀使五種各得其宜因地之勢也湯武革車三百乘甲卒三千人討暴亂制夏商因民之欲也故能因則無敵於天下矣夫物有以自然而後人事有治也故良匠不能斫金巧冶不能鑠木金之勢不可斫而木之性不可鑠也埏埴而為器窬木而為舟鑠鐵而為刃鑄金而為鍾因其可也駕馬服牛令雞司夜令狗守門因其然也民有好色之性故有大婚之禮有飲食之性故有大饗之誼有喜樂之性故有鍾鼓管絃之音有悲哀之性故有衰絰哭踊之節故先王之制法也因民之所好而為之節文者也因其好色而制婚姻之禮故男女有別因其喜音而正雅頌之聲故風俗不流因其寧家室樂妻子教之以順故父子有親因其喜朋友而教之以悌故長幼有序然後修朝聘以明貴賤鄉飲習射以明長幼時搜振旅以習用兵也入學庠序以修人倫此皆人之所有於性而聖人之所匠成也故無其性不可教訓有其性無其養不能遵道繭之性為絲然非得工女煮以熱湯而抽其統紀則不能成絲卵之化為雛非得慈雌嘔暖覆伏纍日積久則不能成為雛人之性有仁義之資非得聖王為之法度而教導之則不可使鄉方故先王之教也因其所喜以勸善因其所惡以禁奸故刑罰不用而威行如流政令約省而化耀如神故因其性則天下聽從拂其性則法縣而不用昔者五帝三王之蒞政施教必用參五何謂參五仰取象於天俯取度於地中取法於人乃立明堂之朝行明堂之令以調陰陽之氣而和四時之節以辟疾疹之菑俯視地理以制度量察陵陸水澤肥墽高下之宜立事生財以除飢寒之患中考乎人德以制禮樂行仁義之道以治人倫而除暴亂之禍乃澄列金水木火土之性以立父子之親而成家別五音清濁六律相生之數以立君臣之義而成國察四時季孟之序以立長幼之禮而成官此之謂參制君臣之義父子之親夫婦之辨長幼之序朋友之際此之謂五乃裂地而州之分職而治之築城而居之割宅而異之分財而衣食之立大學而教誨之夙興夜寐而勞力之此治之紀綱已然得其人則舉失其人則廢堯治天下政教平德潤洽在位七十載乃求所屬天下之統令四嶽揚側陋四嶽舉舜而薦之堯堯乃妻以二女以觀其內任以百官以觀其外既入大麓烈風雷雨而不迷乃屬以九子贈以昭華之玉而傳天下焉以為雖有法度而朱弗能統也夫物未嘗有張而不弛成而不毀者也唯聖人能盛而不衰盈而不虧神農之初作琴也以歸神杜淫反其天心及其衰也流而不反淫而好色至於亡國夔之初作樂也皆合六律而調五音以通八風及至其衰也以沉湎淫康不顧政治至於滅亡蒼頡之初作書以辨治百官領理萬事愚者得以不忘智者得以志事及至其衰也為奸刻僞書以解有罪以殺不辜湯之初作囿也以奉宗廟鮮犞之具簡士卒習射御以戒不虞及至其衰也馳騁獵射以奪民時以罷民力堯之舉禹契后稷皋陶政教平奸宄息獄訟止而衣食足賢者勸善而不肖者懷其德及至其末朋黨比周各推其與廢公趨私外內相舉奸人在朝而賢者隱處春秋之失也刺天地之道極則反盈則損五色雖朗有時而渝茂木豐草有時而落物有隆殺不得自若故聖人事窮而更為法弊而改制非樂變古易常也將以救敗扶衰黜淫濟非以調天地之氣順萬物之宜也聖人天覆地載日月照陰陽和四時化萬物不同無故無新無疏無親故能法天天不一時地不一利人不一事是以緒業不得不多端趨行不得不殊方五行異氣而皆和六藝異科而皆通溫惠柔良者詩之風也淳厖敦厚者書之教也清明條達者易之義也恭儉尊讓者禮之為也寬裕簡易者樂之化也刺幾辨義者春秋之靡也故易之失鬼樂之失淫詩之失愚書之失拘禮之失忮春秋之失訾六者聖人兼用而財制之失本則亂得本則治其美在和其失在權水火金木土穀異物而皆任規矩權衡準繩異形而皆施丹青膠漆不同而皆用各有所適物各有宜輪員輿方轅從衡橫勢施便也驂欲馳服欲步帶不猒新鉤不猒故處地宜也關雎興於鳥而君子美之為其雌雄之不乘居也鹿鳴興於獸而君子大之取其見食而相呼也泓之戰軍敗君獲而春秋大之取其不鼓不成列也宋伯姬坐燒而死而春秋大之取其不踰禮而行也成功立事豈足多哉方指所言而取一概焉爾王喬赤松去塵埃之間離群慝之紛吸陰陽之和食天地之精呼而出故吸而入新蹀虛輕舉乘雲遊霧可謂養性矣而未可謂孝子也周公誅管叔蔡叔以平國弭亂可謂忠臣矣而未可謂弟弟也湯放桀武王誅紂以為天下去殘除賊可謂惠君矣而未可謂忠臣也樂羊攻中山未能下中山烹其子而食之以示威可謂良將矣而未可謂慈父也故可乎可而不可乎不可不可乎不可而可乎可舜許由異行而皆聖伊尹伯夷異道而皆仁箕子比干異趨而皆賢故用兵者或輕或重或貪或廉此四者相反而不可一無也輕者欲發重者欲止貪者欲取廉者不利非其有故勇者可令進鬭而不可令持堅重者可令埴固而不可令凌敵貪者可令進取而不可令守職廉者可令守分而不可令進取信者可令持約而不可令應變四者相反聖人兼用而財使之夫天地不包一物陰陽不生一類海不讓水潦以成其大山不讓土石以成其高夫守一隅而遺萬方取一物而棄其餘則其所得者鮮而所治者淺矣治大者道不可以小地廣者制不可以狹位高者事不可以煩民衆者教不可以苛夫事碎難治也法煩難行也求多難贍也寸而度之至丈必差銖而稱之至石必過石稱丈量徑而寡失簡絲數米煩而不察故大較易為智曲辨難為慧故無益於治而有益於煩者聖人不為無益於用而有益於費者智者弗行也故功不猒約事不猒省求不猒寡功約易成也事省易治也求寡易贍也衆易之於以任人易矣孔子曰小辨破言小利破義小義破道道小則不達達必簡河以逶蛇故能遠山以陵遲故能高道以優游故能化夫徹於一事察於一辭審於一技可以曲說而未可以廣應也蓼菜成行甂甌有𦳚稱薪而爨數米而炊可以治小而未可以治大也員中規方中矩動成獸止成文可以愈舞而不可以陳軍也滌杯而食洗爵而飲盥而後饋可以養少而不可以饗衆也今夫祭者屠割烹殺剝狗燒豕調平五味者庖也陳簠簋列樽俎設籩豆者祝也齊明盛服淵默而不言神之所依者尸也宰祝雖不能尸不越樽俎而代之故張瑟者小絃緪而大絃緩立事者賤者勞而貴者逸舜為天子彈五絃之琴歌南風之詩而天下治周公肴臑不收於前鍾鼓不解於懸而四夷服趙政晝決獄夜理書御史冠蓋接於郡縣覆稽趨留戍五嶺以備越築修城以守胡然奸邪萌生盜賊群居事愈煩而亂愈生故法者治之具也而非所以為治也亦猶弓矢中之具也而非所以中也黃帝曰芒芒昧昧因天之威與元同氣故同氣者帝同義者王同力者霸無一焉者亡故人主有伐國之志邑犬群嘷雄雞夜鳴庫兵動而戎馬驚今日解怨偃兵家老甘臥巷無聚人妖菑不生非法之應也精氣之動也故不言而信不施而仁不怒而威是以天心動化者也施而仁言而信怒而威是以精誠感之者也施而不仁言而不信怒而不威是以外貌為之者也故有道以統之法雖少足以化矣無道以行之法雖衆足以亂矣治身太上養神其次養形治國太上養化其次正法神清志平百節皆寧養性之本也肥肌膚充腸腹供嗜欲養生之末也民交讓爭處卑委利爭受寡力事爭就勞日化上遷善而不知其所以然此治之本也利賞而勸善畏刑而不為非法令正於上而百姓服於下此治之末也上世養本而下世事末此太平之所以不起也夫欲治之主不世出而可與興治之臣不萬一以不萬一求不世出此所以千歲不一會也水之性淖以清窮谷之污生以青苔不治其性也掘其所流而深之茨其所決而高之使得循勢而行乘邪而流雖有腐髊流澌弗能污也其性非異也通之與不通也風俗猶此也誠決其善志防其邪心啓其善道塞其奸路與同出一道則民性可善而風俗可美也所以貴扁鵲者非貴其隨病而調藥也貴其擪息脈血知疾之所從生也所以貴聖人者非貴其隨罪而鑒刑也貴其知亂之所由起也若不修其風俗而縱之淫辟乃隨之以刑繩之以法雖殘賊天下弗能禁也禹以夏王桀以夏亡湯以殷王紂以殷亡非法度不存也紀綱不張而風俗壞也三代之法不亡而世不治者無三代之智也六律具存而莫能聽者無師曠之耳也故法雖在必待聖而後治律雖具必待耳而後聽故國之所以存者非以有法也以有賢人也其所以亡者非以無法也以無聖人也晉獻公欲伐虞宮之奇存焉為之寢不安席食不甘味而不敢加兵焉賂以寶玉駿馬宮之奇諫而不聽言而不用越疆而去荀息伐之兵不血刃抱寶牽馬而至故守不待渠塹而固攻不待衝降而拔得賢之與失賢也故臧武仲以其智存魯而天下莫能亡也璩伯玉以其仁寧衛而天下莫能危也易曰豐其屋蔀其家窺其戶闃其無人無人者非無衆庶也言無聖人以統理之也民無廉恥不可治也非修禮義廉恥不立民不知禮義法弗能正也非崇善廢醜不向禮義無法不可以為治也不知禮義不可以行法也法能殺不孝者而不能使人為孔曾之行法能刑竊盜者而不能使人為伯夷之廉孔子弟子七十養徒三千人皆入孝出悌言為文章行為儀表教之所成也墨子服役者百八十人皆可使赴火蹈刃死不還踵化之所致也夫刻肌膚鑱皮革被創流血至難也然越人為之以求榮也聖王在上明好憎以示人經誹譽以導之親賢而進之賤不肖而退之無被創流血之苦而有高世尊顯之名民孰不從古者法設而不犯刑錯而不用非可刑而不刑也百工維時庶績咸熙禮義修而任賢得也故舉天下之高以為三公一國之高以為九卿一縣之高以為二十七大夫一鄉之高以為八十一元士故知過萬人者謂之英千人者謂之俊百人者謂之豪十人者謂之傑明於天道察於地理通於人情大足以容衆德足以懷遠信足以一異知足以知權者人之英也德足以教化行足以隱義仁足以得衆明足以照下者人之俊也行足以為儀表知足以決嫌疑廉可以分財信可使守約作事可法出言可道者人之豪也守職而不廢處義而不比見難不苟免見利不苟得者人之傑也英俊豪傑各以小大之材處其位得其宜由本流末以重制輕上唱而民和上動而下隨四海之內一心同歸背貪鄙而向仁義其於以化民也若風之搖草木無之而不靡今使愚教知使不肖臨賢雖嚴刑罰民弗從者小不能制大弱不能使強也故聖主者舉賢以立功不肖主舉其所與同文王舉太公望召公奭而王桓公任管仲隰朋而霸此舉賢以立功也夫差用太宰嚭而滅秦任李斯趙高而亡此舉所與同故觀其所舉而治亂可見也察其黨與而賢不肖可論也夫聖人之屈者以求伸也枉者以求直也故雖出邪辟之道行幽昧之塗將欲以興大道成大功猶出林之中不得直道拯溺之人不得不濡足也伊尹憂天下之不治調和五味負鼎俎而行五就桀五就湯將欲以濁為清以危為寧也周公股肱周室輔翼成王管叔蔡叔奉公子祿父而欲為亂周公誅之以定天下緣不得已也管子憂周室之卑諸侯之力征夷狄伐中國民不得寧處故蒙恥辱而不死將欲以憂夷狄之患平夷狄之亂也孔子欲行王道東西南北七十說而無所偶故因衛夫人彌子瑕而欲通其道此皆欲平險除穢由冥冥至照照動於權而統於善者也夫觀逐者於其反也而觀行者於其終也故舜放弟周公殺兄猶之為仁也文公樹米曾子架羊猶之為知也當今之世醜必託善以自為解邪必蒙正以自為辭游不論國仕不擇官行不辟污曰伊尹之道也分別爭財親戚兄弟搆怨骨肉相賊曰周公之義也行無廉恥辱而不死曰管子之趨也行貨賂趣勢門立私廢公比周而取容曰孔子之術也此使君子小人紛然殽亂莫知其是非者也故百川並流不注海者不為川谷趨行踳馳不歸善者不為君子故善言歸乎可行善行歸乎仁義田子方段干木輕爵祿而重其身不以欲傷生不以利纍形李克竭股肱之力領理百官輯穆萬民使其君生無廢事死無遺憂此異行而歸於善者張儀蘇秦家無常居身無定君約從衡之事為傾覆之謀濁亂天下撓滑諸侯使百姓不遑啓居或從或橫或合衆弱或輔富強此異行而歸於醜者也故君子之過也猶日月之蝕也何害於明小人之可也猶狗之晝吠鴟之夜見也何益於善夫知者不妄為勇者不妄發擇善而為之計義而行之故事成而功足賴也身死而名足稱也雖有知能必以仁義為之本然后可立也知能踳馳百事並行聖人一以仁義為之準繩中之者謂之君子弗中者謂之小人君子雖死亡其名不滅小人雖得勢其罪不除使人左據天下之圖而右刎喉愚者不為也身貴於天下也死君親之難視死若歸義重於身也天下大利也比之身則小身所重也比之義則輕義所全也詩曰愷悌君子求福不回言以信義為準繩也能成霸王之業者必得勝者也能得勝者必強者也能強者必用人力者也能用人力者必得人心者也能得人心者必自得者也故心者身之本也身者國之本也未有得己而失人者也未有失己而得人者也故為治之本務在寧民寧民之本在於足用足用之本在於勿奪時勿奪時之本在於省事省事之本在於節欲節欲之本在於反性未有能搖其本而靜其末濁其源而清其流者也故知性之情者不務性之所無以為知命之情者不憂命之所無奈何故不高宮室者非愛木也不大鍾鼎者非愛金也直行性命之情而制度可以為萬民儀今目悅五色口嚼滋味耳淫五聲七竅交爭以害其性日引邪欲而澆其天和身弗能治奈天下何故自養得其節則養民得其心矣所謂有天下者非謂其履勢位受傳籍稱尊號也言運天下之力而得天下之心也紂之地左東海右流沙前交址後幽都師起容關至浦水士億有餘萬然皆倒矢而射傍戟而戰武王左操黃鉞右執白旄以麾之則瓦解而走遂土崩而下紂有南面之名而無一人之譽此失天下也故桀紂不為王湯武不為放周處酆鎬地方不過百里而誓紂牧之野入據殷國朝成湯之廟表商容之閭封比干之墓解箕子之囚乃折枹毀鼓偃五兵縱牛馬捷曶而朝天下百姓歌謳而樂之諸侯執禽而朝之得民心也闔閭伐楚五戰入郢燒高府之粟破九龍之鍾鞭荊平之墓舍昭王之宮昭王奔隨百姓父兄攜幼扶老而隨之乃相率為勇而致之寇皆方面奮臂而為之鬭當此之時無將率以行列之各致其死卻吳兵復楚地靈王作章華之臺發乾溪之役外內搔動百姓罷弊棄疾乘民之怨而立公子比百姓放臂而去之餓於乾溪食莽飲水枕塊而死楚國山川不變土地不易民性不殊昭王則相率而殉之靈王則倍畔而去之得民之與失民也故天子得道守在四夷天子失道守在諸侯諸侯得道守在四鄰諸侯失道守在四境故湯處亳七十里文王處酆百里皆令行禁止於天下周之衰也戎伐凡伯于楚丘以歸故得道則以百里之地令於諸侯失道則以天下之大畏於冀州故曰無恃其不吾奪也恃吾不可奪行可奪之道而非篡弒之行無益於持天下矣凡人之所以生者衣與食也今囚之冥室之中雖養之以芻豢衣之以綺繡不能樂也以目之無見耳之無聞穿隙穴見雨零則快然而笑況開戶發牖從冥冥見照照乎從冥冥見照照猶尚肆然而喜又況出室坐堂見日月光見日月光曠然而樂又況登太山履石封以望八荒視天都若蓋江河若帶萬物在其閒者乎其為樂豈不大哉且聾者耳形具而無能聞也盲者目形存而無能見也夫言者所以通己於人也聞者所以通人於己也瘖者不言聾者不聞既瘖且聾人道不通故有瘖聾之病者雖破家求醫不顧其費豈獨形骸有瘖聾哉心志亦有之夫指之拘也莫不事申也心之塞也莫知務通也不明於類也夫觀六藝之廣崇窮道德之淵深達乎無上至乎無下運乎無極翔乎無形廣於四海崇於太山富於江河曠然而通昭然而明天地之閒無所擊戾其所以監觀豈不大哉人之所知者淺而物變無窮曩不知而今知之非知益多也問學之所加也夫物常見則識之嘗為則能之故因其患則造其備犯其難則得其便夫以一世之壽而觀千歲之知今古之論雖未嘗更也其道理素具可不謂有術乎人欲知高下而不能教之用管準則說欲知輕重而無以豫之以權衡則喜欲知遠近而不能教之以金目則快又況知應無方而不窮哉犯大難而不攝見煩繆而不惑晏然自得其為樂也豈直一說之快哉夫道有形者皆生焉其為親也亦戚矣享穀食氣者皆受焉其為君亦惠矣諸有智者皆學焉其為師亦博矣射者數發不中人教之以儀則喜矣又況生儀者乎人莫不知學之有益於己也然而不能者嬉戲害之也人皆多以無用害有用故知不博而日不足以鑿觀池之力耕則田野必辟矣以積土山之高修隄防則水用必足矣以食狗馬鴻鴈之費養士則名譽必榮矣以弋獵博奕之日誦詩讀書則聞識必博矣故不學之與學也猶瘖聾之比於人也凡學者能明於天人之分通於治亂之本澄心清意以存之見其終始可謂知略矣天之所為禽獸草木人之所為禮節制度構而為宮室制而為舟輿是也治之所以為本者仁義也所以為末者法度也凡人之所以事生者本也其所以事死者末也本末一體也其兩愛之性也先本後末謂之君子以末害本謂之小人君子與小人之性非異也在所先後而已矣草木洪者為本而殺者為末禽獸之性大者為首而小者為尾末大於本則折尾大於要則不掉矣故食其口而百節肥灌其本而枝葉美天地之性物也有本末其養物也有先後人之於治也豈得無終始哉故仁義者治之本也今不知事修其本而務治其末是釋其根而灌其枝也且法之生也以輔仁義今重法而棄仁義是貴其冠履而忘其頭足也故仁義者為厚基者也不益其厚而張其廣者毀不廣其基而增其高者覆趙政不增其德而纍其高故滅知伯不行仁義而務廣地故亡國語曰不大其棟不能任重重莫若國棟莫若德國主之有民也猶城之有基木之有根根深即木固基美則上寧五帝三王之道天下之綱紀治之儀表也今商鞅之啓塞申子之三符韓非之孤憤張儀蘇秦之從衡皆掇取之權一切之術也非治之大本事之恆常可博內而世傳者也子囊北而全楚北不可以為庸弦高誕而存鄭誕不可以為常今夫雅頌之聲皆發於詞本於情故君臣以睦父子以親故韶夏之樂也聲浸乎金石潤乎草木今取怨思之聲施之於絃管聞其音者不淫則悲淫則亂男女之辨悲則感怨思之氣豈所謂樂哉趙王遷流於房陵思故鄉作為山木之嘔聞者莫不殞涕荊軻西刺秦王高漸離宋意為擊筑而歌於易水之上聞者莫不瞋目裂眥髮植穿冠因以此聲為樂而入宗廟豈古之所謂樂哉故辨冕輅輿可服而不可好也大羹之和可食而不可嗜也朱絃漏越一唱而三歎可聽而不可快也故無聲者正其可聽者也其無味者正其足味者也㕭聲清於耳兼味快於口非其貴也故事不本於道德者不可以為儀言不合乎先王者不可以為道音不調乎雅頌者不可以為樂故五子之言所以便說掇取也非天下之通義也聖王之設政施教也必察其終始其縣法立儀也必原其本末不苟以一事備一物而已矣見其造而思其功觀其源而知其流故博施而不竭彌久而不垢夫水出於山而入於海稼生於田而藏於倉聖人見其所生則知其所歸矣故舜深藏黃金於嶄巖之山所以塞貪鄙之心也儀狄為酒禹飲而甘之遂疏儀狄而絶嗜酒所以遏流湎之行也師延為平公鼓朝歌北鄙之音師曠曰此亡國之樂也大息撫而止之所以防淫辟之風也故民知書而德衰知數而厚衰知券契而信衰知械機而空衰也巧詐藏於胸中則純白不備而神德不全矣瑟不鳴而二十五絃各以其聲應軸不運而三十輻各以其力疾絃有緩急小大然后能成曲車有勞軼動靜而后能致遠使有聲者乃無聲者也能致千里者乃不動者也故上下異道則治同道則亂位高而道大者從事大而道小者凶故小快害義小慧害道小辨害治苛削傷德大政不險故民易道至治寬裕故下不賊至中復素故民無匿商鞅為秦立相坐之法而百姓怨吳起為楚張減爵之令而功臣畔商鞅之立法也吳起之用兵也天下之善者也然商鞅以法亡秦察於刀筆之跡而不知治亂之本也吳起以兵弱楚習於行陳之事而不知廟戰之權也晉獻公之伐驪得其女非不善也然而史蘇嘆之見其四世之被禍也吳王夫差破齊艾陵勝晉黃池非不捷也而子胥憂之見其必擒於越也小白奔莒重耳奔曹非不困也而鮑叔咎犯隨而輔之知其可與至於霸也句踐棲於會稽修政不殆謨慮不休知禍之為福也襄子再勝而有憂色畏福之為禍也故齊桓公亡汶陽之田而霸知伯兼三晉之地而亡聖人見福於重閉之內而慮患於九拂之外者也螈蠶一歲再登非不利也然而王法禁之者為其殘桑也離先稻熟而農夫耨之不以小利傷大穫也家老異飯而食殊器而享子婦跣而上堂跪而斟羹非不費也然而不可省者為其害義也得媒而結言聘納而取婦袀絻而親迎非不煩也然而不可易者所以防淫也使民居處相司有罪相覺於以舉奸非不掇也然而不可行者為其傷和睦之心而構仇讎之怨也故事有鑿一孔而開百隙樹一物而生萬葉者所鑿不足以為便而所開足以為敗所樹不足以為利而所生足以為濊愚者惑於小利而忘其大害不可以為法也昌羊去蚤蝨而人弗席者為其來蛉窮也貍執鼠而不可脫於庭者為其搏雞也故事有利於小而害於大得於此而亡於彼者故行棊者或食兩而路窮或豫踦而取勝偷利不可以為行而知術可以為法故仁知人材之美者也所謂仁者愛人也所謂知者知人也愛人則無虐刑矣知人則無亂政矣治由文理則無悖謬之事矣刑不侵濫則無暴虐之行矣上無煩亂之治下無怨望之心則百殘除而中和作矣此三代之所以昌也故書曰能哲且惠黎民懷之何憂歡兜何遷有苗知伯有五過人之材而不免於身死人手者不愛人也齊王建有三過人之巧而身虜於秦者不知賢也故仁莫大於愛人知莫大於知人二者不立雖察慧捷巧劬祿疾力不免於亂矣
