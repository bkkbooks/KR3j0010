body:
  text: 説林訓以一世之度制治天下譬猶客之乘舟中流遺其劍遽契其舟𣔶暮薄而求之其不知物類亦甚矣夫隨一隅之迹而不知因天地以遊惑莫大焉雖時有所合然而不足貴也譬若旱歲之土龍疾疫之芻靈是時為帝者也曹氏之裂布蛷者貴之然非夏后氏之璜無古無今無始無終未有天地而生天地至深微廣大矣足所蹍者淺矣然待所不蹍而後行智所知者褊矣然待所不知而後明遊者以足蹶以手㧊不得其數愈蹶愈敗及其能遊者非手足者矣鳥飛反鄉兔走歸窟狐死首丘寒將翔水各依其所生也毋貽盲者鏡毋豫躄者履毋賞越人章甫非其用也椎固百柄不能自椓目見百步之外不能自見其眥狗彘不擇甂甌而食偷肥其體而顧近其死鳳皇高翔千仞之上故莫之能致月照天下而蝕於詹諸騰蛇遊霧而殆於蝍蛆烏力勝日而服於隼札能有修短也莫壽於殤子而彭祖為夭矣綆短不可以汲深器小不可以盛大非其任也怒出於不怒為出於不為視於無形則得其所見矣聽於無聲則得其所聞矣至味不慊至言不文至樂不笑至音不叫大匠不斫大庖不豆大勇不鬭得道而德從之矣譬若黃鍾之比宮太簇之比商無更調焉以瓦鉒者全以金鉒者跋以玉鉒者發是故所重者在外則內為之掘逐獸者目不見太山嗜欲在外則明有所蔽矣聽有音之音者聾聽無音之音者聰不聾不聰與神明通卜者操龜筮者端策以問於數安所問之哉舞者舉節坐者不期而拚皆如一所極同也日出湯谷入于虞淵莫知其動須臾之間俯人之頸人莫欲學御龍而皆欲學御馬莫欲學治鬼而皆欲學治人急所用也解門以為薪塞井以為臼人之從事或時相似水火相憎䵻在其間五味以和骨肉相愛讒賊間之而父子相危夫所以養而害所養譬猶削足而適履殺頭而便冠昌羊去蚤蝨而來蚙窮除小害而致大賊故小快而害大利牆之壞也不若無也然逾屋之覆璧瑗成器礛諸之功鏌邪斷割砥厲之力狡兔得而獵犬烹高鳥盡而強弩藏虻與驥致千里而不飛無糗糧之資而不飢失火而遇雨失火則不幸也遇雨則幸也故禍中有福也鬻棺者欲民之疾疫也畜粟者欲歲之荒飢也水靜則平平則清清則見物之形弗能匿也故可以為正川竭而谷虛丘夷而淵塞脣竭而齒寒河水之深其壤在山鈞之縞也一端以為冠一端以為𥿉冠則戴攱之𥿉則蹍履之知己者不可誘以物明於死生者不可劫以危故善遊者不可懼以涉親莫親於骨肉節族之屬連也心失其制乃反自害況疏遠乎聖人之於道猶葵之與日也雖不能與終始哉其鄉之誠也官池涔則溢旱則涸江水之原淵不能竭蓋非橑不能蔽日輪非輻不能追疾然而橑輻未足恃也金勝木者非以一刀殘林也土勝水者非以一墣塞江也躄者見虎而不走非勇也勢不便也傾者易覆也倚者易軵也幾易助也溼易雨也設鼠者機動釣魚者泛杭任動者車鳴也芻狗能立而不能行蛇床似麋蕪而不能芳謂許由無德烏獲無力莫不醜於色人莫不奮于其所不足以兔之走使大如馬則逮日歸風及其為馬則又不能走矣冬有雷電夏有霜雪然而寒暑之勢不易小變不足以防大節黃帝生陰陽上駢生耳目桑林生臂手此女媧所以七十化也終日言必有聖之事百發之中必有羿逢蒙之巧然而世不與也其守節非也牛蹄彘顱亦骨也而世弗灼必問吉凶於龜者以其歷歲久矣近敖倉者不為之多飯臨江河者不為之多飲期滿腹而已蘭芷以芳未嘗見霜鼓造辟兵壽盡五月之望舌之與齒孰先礲也錞之與刃孰先弊也繩之與矢孰先折也今鱓之與蛇蠶之與蠋狀相類而愛憎異晉以垂棘之璧得虞虢驪戎以美女亡晉國聾者不歌無以自樂盲者不觀無以接物觀射者遺其藝觀書者忘其愛意有所在則忘其所守古之所為不可更則椎車至今無蟬匷使伹吹竽使工厭竅雖中節而不可聽無其君形者也與死者同病難為良醫與亡國同道難與為謀為客治飯而自食藜藿名尊於實乳狗之噬虎也伏雞之搏狸也恩之所加不量其力使景曲者形也使響濁者聲也情泄者中易測華不時者不可食也跖越者或以舟或以車雖異路所極一也佳人不同體美人不同面而皆説於目梨橘棗栗不同味而皆調於口人有盜而富者富者未必盜有廉而貧者貧者未必廉藡苖類絮而不可以為絮黂不類布而可以為布出林者不得直道行險者不得履繩羿之所以射遠中微者非弓矢也造父之所以追速致遠者非轡銜也海內其所出故能大輪復其所過故能遠羊肉不慕蟻蟻慕於羊肉羊肉羶也醯不慕蚋蚋慕於醯醯酸也嘗一臠肉而知一鑊之味懸羽與炭而知燥溼之氣以小見大以近喻遠十頃之陂可以灌四十頃而一頃之陂不可以灌四頃大小之衰然明月之光可以遠望而不可以細書甚霧之朝可以細書而不可以望尋常之外畫者謹毛而失貌射者儀小而遺大治鼠穴而壞里閭潰小皰而發痤疽若珠之有纇玉之有瑕置之而全去之而虧榛巢者處林茂者安也窟穴者託埵防者便也王子慶忌足躡麋鹿手搏兕虎置之冥室之中不能搏龜鱉勢不便也湯放其主而有榮名崔杼弒其君而被大謗所以為之則同其所以為之則異呂望使老者奮項託使嬰兒矜以類相慕使葉落者風搖之使水濁者魚撓之虎豹之文來射猿狖之捷來乍行一棊不足以見智彈一弦不足以見悲三寸之管而無當天下弗能滿十石而有塞百斗而足矣以篙測江篙終而以水為測惑矣漁者走淵采者走山所急者存也朝之市則走夕過市則步所求者亡也貂裘而雜不若狐裘之粹白璧有考不得為寶言至純之難也兵死之鬼憎神巫盜賊之輩醜吠狗無鄉之社易為黍肉無國之稷易為求福鱉無耳而目不可以弊精於明也瞽無目而耳不可以塞精於聰也遺腹子不思其父無貌於心也不夢見像無形於目也蝮蛇不可為足虎豹不可使緣木馬不食脂桑扈不啄粟非廉也秦通崤塞而魏築城也飢馬在廄寂然無聲投芻其傍爭心乃生引弓而射非弦不能發矢弦之為射百分之一也道德可常權不可常故遁關不可復亡犴不可再環可以喻員不必以輪絛可以為繶不必以紃日月不並出狐不二雄神龍不匹猛獸不群鷙鳥不雙循繩而斫則不過懸衡而量則不差植表而望則不惑損年則嫌於弟益年則疑於兄不如循其理若其當人不見龍之飛舉而能高者風雨奉之蠹衆則木折隙大則牆壞懸垂之類有時而隧枝格之屬有時而弛當凍而不死者不失其適當暑而不暍者不亡其適未嘗不適亡適湯沐具而蟣蝨相弔大廈成而燕雀相賀憂樂別也柳下惠見飴曰可以養老盜跖見飴曰可以黏牡見物同而用之異也蠶食而不飲三十二日而化蟬飲而不食三十日而蛻蜉蝣不食不飲三日而死人食礜石而死蠶食之而不飢魚食巴菽而死鼠食之而肥類不可必推瓦以火成不可以得火竹以水生不可以得水揚堁而欲弭塵披裘而以翣翼豈若適衣而已哉稿竹有火弗鑽不㸐土中有水弗掘不出蛖象之病人之寶也人之病將有誰寶之者乎為酒人之利而不酤則竭為車人之利而不僦則不達握火提人反先之熱鄰之母死往哭之妻死而不泣有所劫以然也西方之倮國鳥獸弗辟與為一也一膊炭熯掇之則爛指萬石俱熯去之十步而不死同氣異積也大勇小勇有似於此今有六尺之席臥而越之下材弗難植而踰之上材弗易勢施異也百梅足以為百人酸一梅不足以為一人和有以噎死者而禁天下之食有以車為敗者而禁天下之乘則悖矣釣者靜之罧者扣舟罩者抑之罾者舉之為之異得魚一也見象牙乃知其大於牛見虎尾而知其大於貍一節見而百節知也小國不鬭於大國之間兩鹿不鬭於伏兕之旁佐祭者得嘗救鬭者得傷蔭不祥之木為雷電所撲或謂冢或謂隴或謂笠或謂簦名異實同也頭蝨與空木之瑟名同實異也日月欲明而浮雲蓋之蘭芷欲修而秋風敗之虎有子不能搏攫者輒殺之為墮武也龜紐之璽賢者以為佩土壤布在田能者以為富豫溺者金玉不若尋常之纆視書上有酒者下必有肉上有年者下必有月以類而取之蒙塵而眯固其理也為其不出戶而堁之非其道也屠者藿羹車者步行陶人用缺盆匠人處狹廬為者不得用用者弗肯為轂立三十輻各盡其力不得相害使一輻獨入衆輻皆棄豈能致千里哉夜行者掩目而前其手涉水者解其馬載之舟事有所宜而有所不施橘柚有鄉雚葦有叢獸同足者相從遊鳥同翼者相從翔田中之潦流入於海附耳之言聞於千里蘇秦步曰何步趨曰何趨馳曰何馳有為則議多事固苛皮將弗覩毛將何顧畏首畏尾身凡有幾欲觀九州之土足無千里之行心無政教之原而欲為萬民之上也則難的的者獲提提者射故大白若辱大德若不足未嘗稼穡粟滿倉未嘗桑蠶絲滿囊得之不以道用之必橫海不受流胔太山不上小人旁光不升俎駵駮不入牲中夏用箑快之至冬而不知去褰衣涉水至陸而不知下未可以應變有山無林有谷無風有石無金滿堂之坐視鉤各異於環帶一也獻公之賢欺於驪姬叔孫之知欺於豎牛故鄭詹入魯春秋曰佞人來佞人來君子有酒鄙人鼓缶雖不可好亦不見醜人性便衣絲帛或射之則被鎧甲為其所不便以得所便輻之入轂各值其鑿不得相通猶人臣各守其職不得相干嘗被甲而免射者被而入水嘗抱壺而度水者抱而蒙火可謂不知類矣君子之居民上若以腐索御奔馬若蹍薄冰蛟在其下若入林而遇乳虎善用人者若蚈之足衆而不相害若脣之與齒堅柔相摩而不相敗清醠之美始於耒耜黼黻之美在於杼柚布之新不如紵紵之弊不如布或善為新或善為故靨䩉在頰則好在顙則醜繡以為裳則宜以為冠則議馬齒非牛蹄檀根非椅枝故見其一本而萬物知石生而堅蘭生而芳少有其質長而愈明扶之與提謝之與讓得之與失諾之與已也相去千里汙準而粉其顙腐鼠在壇燒薰於宮入水而憎濡懷臭而求芳雖善者弗能為工再生者不穫華大早者不胥時而落毋曰不幸甑終不墮井抽簪招磷有何為驚使人無度河可中河使無度不可見虎一文不知其武見驥一毛不知善走水蠆為蟌孑孓為蚊兔齧為螚物之所為出於不意弗知者驚知者不怪銅英青金英黃玉英白黂燭捔膏燭澤也以微知明以外知內象肉之味不知於口鬼神之貌不著於目捕景之説不形於心冬冰可折夏木可結時難得而易失木方茂盛終日采而不知秋風下霜一夕而殫病熱而強之餐救暍而飲之寒救經而引其索拯溺而授之石欲救之反為惡雖欲謹亡馬不發戶轔雖欲豫就酒不懷蓐孟賁探鼠穴鼠無時死必噬其指失其勢山雲蒸柱礎潤茯苓掘兔絲死一家失熛百家皆燒讒夫陰謀百姓暴骸粟得水而熱甑得火而液水中有火火中有水疾雷破石陰陽相薄自然之勢湯沐之於河有益不多流潦注海雖不能益猶愈於已一目之羅不可以得鳥無餌之釣不可以得魚遇士無禮不可以得賢兔絲無根而生蛇無足而行魚無耳而聽蟬無口而鳴有然之者也鶴壽千歲以極其遊蜉䖻朝生而暮死而盡其樂紂醢梅伯文王與諸侯構之桀辜諫者湯使人哭之狂馬不觸木猘狗不自投於河雖聾蟲而不自陷又況人乎愛熊而食之鹽愛獺而飲之酒雖欲養之非其道心所説毀舟為杕心所欲毀鍾為鐸管子以小辱成大榮蘇秦以百誕成一誠質的張而弓矢集林木茂而斧斤入非或召之形勢所致者也待利而後拯溺人亦必利溺人矣舟能沉能浮愚者不加足騏驥驅之不進引之不止人君不以取道里刺我行者欲與我交訾我貨者欲與我市以水和水不可食一絃之瑟不可聽駿馬以抑死直士以正窮賢者擯於朝美女擯於宮行者思於道而居者夢於床慈母吟於燕適子懷於荊精相往來也赤肉縣則烏鵲集鷹隼鷙則衆鳥散物之散聚交感以然食其食者不毀其器食其實者不折其枝塞其源者竭背其本者枯交畫不暢連環不解其解之以不解臨河而羡魚不若歸家織網明月之珠蛖之病而我之利虎爪象牙禽獸之利而我之害易道良馬使人欲馳飲酒而樂使人欲歌是而行之固謂之斷非而行之必謂之亂矢之疾不過二里也步之遲百舍不休千里可致聖人處於陰衆人處於陽聖人行於水無迹也衆人行於霜有迹也異音者不可聽以一律異形者不可合於一體農夫勞而君子養焉愚者言而知者擇焉捨茂木而集於枯不弋鵠而弋烏難與有圖夤丘無壑泉源不溥尋常之溪灌十頃之澤見之明白處之如玉石見之暗晦必留其謀以天下之大託於一人之才譬若懸千鈞之重於木之一枝負子而登牆謂之不祥為其一人隕而兩人殤善舉事者若乘舟而悲歌一人唱而千人和不能耕而欲黍粱不能織而喜采裳無事而求其功難矣有榮華者必有憔悴有羅紈者必有麻蒯鳥有沸波者河伯為之不潮畏其誠也故一夫出死千乘不輕蝮蛇螫人傅以和堇則愈物固有重而害反為利者聖人之處亂世若夏暴而待暮桑榆之間逾易忍也水雖平必有波衡雖正必有差尺寸雖齊必有詭非規矩不能定方圓非準繩不能正曲直用規矩準繩者亦有規矩準繩焉舟覆乃見善遊馬奔乃見良御嚼而無味者弗能內於喉視而無形者不能思於心兕虎在於後隨侯之珠在於前弗及掇者先避患而後就利逐鹿者不顧兔決千金之貨者不爭銖兩之價弓先調而後求徑馬先馴而後求良人先信而後求能陶人棄索車人掇之屠者棄銷而鍛者拾之所緩急異也百星之明不如一月之光十牖畢開不若一戶之明矢之於十步貫兕甲及其極不能入魯縞太山之高背而弗見秋毫之末視之可察山生金反自刻木生蠹反自食人生事反自賊巧冶不能鑄木工匠不能斫金者形性然也白玉不雕美珠不文質有餘也故跬步不休跛鱉千里纍積不輟可成丘阜城成於土木直於下非有事焉所緣使然凡用人之道若以燧取火疏之則弗得數之則弗中正在疏數之間從朝視夕者移從枉準直者虧聖人之偶物也若以鏡視形曲得其情楊子見逵路而哭之為其可以南可以北墨子見練絲而泣之為其可以黃可以黑趍舍之相合猶金石之一調相去千歲合一音也鳥不干防者雖近弗射其當道雖遠弗釋酤酒而酸買肉而臭然酤酒買肉不離屠沽之家故求物必於近之者以詐應詐以譎應譎若被蓑而救火鑿瀆而止水乃愈益多西施毛嬙狀貌不可同世稱其好美鈞也堯舜禹湯法籍殊類得民心一也聖人者隨時而舉事因資而立功涔則具擢對旱則修土龍臨災之女織紈而思行者為之悖戾室有美容繒為之纂繹徵羽之操不入鄙人之耳抮和切適舉坐而善過府而負手者希不有盜心故侮人之鬼者過社而搖其枝晉陽處父伐楚以救江故解捽者不在於捌格在於批抌木大者根攫山高者基扶跖巨者走遠體大者節疏狂者傷人莫之怨也嬰兒詈老莫之疾也賊心亡也尾生之信不如隨牛之誕而又況一不信者乎憂父之疾者子治之者醫進獻者祝治祭者庖
