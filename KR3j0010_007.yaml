body:
  text: 精神訓古未有天地之時惟像無形窈窈冥冥芒芠漠閔澒濛鴻洞莫知其門有二神混生經天營地孔乎莫知其所終極滔乎莫知其所止息於是乃別為陰陽離為八極剛柔相成萬物乃形煩氣為蟲精氣為人是故精神者天之有也而骨骸者地之有也精神入其門而骨骸反其根我尚何存是故聖人法天順情不拘於俗不誘於人以天為父以地為母陰陽為綱四時為紀天靜以清地定以寧萬物失之者死法之者生夫靜漠者神明之宅也虛無者道之所居也是故或求之於外者失之於內有守之於內者得之於外譬猶本與末也從本引之千枝萬葉莫得不隨也夫精神者所受於天也而形體者所稟於地也故曰一生二二生三三生萬物萬物背陰而抱陽沖氣以為和故曰一月而膏二月而胅三月而胎四月而肌五月而筋六月而骨七月而成八月而動九月而躁十月而生形體以成五藏乃形是故胏主目腎主鼻膽主口肝主耳外為表而內為裏開閉張歙各有經紀故頭之圓也象天足之方也象地天有四時五行九解三百六十日人亦有四支五藏九竅三百六十節天有風雨寒暑人亦有取與喜怒故膽為雲胏為氣脾為風腎為雨肝為雷以與天地相參也而心為之主是故耳目者日月也血氣者風雨也日中有踆烏而月中有蟾蜍日月失其行薄蝕無光風雨非其時毀折生災五星失其行州國受殃夫天地之道至紘以大尚猶節其章光愛其神明人之耳目曷能久熏勤勞而不息乎精神何能久馳騁而不既乎是故血氣者人之華也而五藏者人之精也夫血氣能專于五藏而不外越則胸腹充而嗜欲省矣胸腹充而嗜欲省則耳目清聽視達矣耳目清聽視達謂之明五藏能屬於心而無乖則勃志勝而行不僻矣勃志勝而行不僻則精神盛而氣不散矣精神盛而氣不散則理理則均均則通通則神神則以視無不見也以聽無不聞也以為無不成也是故憂患不能入而邪氣不能襲也故事有求之於四海之外而不能遇或守之於形骸之內而不見也故所求多者所得少所見大者所知小夫孔竅者精神之戶牖也而血氣者五藏之使候也耳目淫於聲色之樂則五藏搖動而不定矣五藏搖動而不定則血氣滔蕩而不休矣血氣滔蕩而不休則精神馳騁於外而不守矣精神馳騁於外而不守則禍福之至雖如丘山無由識之矣使耳目精明玄達而無誘慕氣志虛靜恬愈而省嗜欲五藏定寧充盈而不泄精神內守形骸而不外越則望於往世之前而視於來事之後猶未足為也豈直禍福之間哉故曰其出彌遠者其知彌少以言夫精神之不可使外淫也是故五色亂目使目不明五聲譁耳使耳不聰五味亂口使口厲爽趣舍滑心使性飛揚此四者天下之所養性也然皆人纍也故曰嗜欲者使人之氣越而好憎者使人之心勞弗疾去則志氣日耗夫人之所以不能終其壽命而中道夭於刑戮者何也以其生生之厚夫惟能無以生為者則所以修得生也夫天地運而相通萬物揔而為一能知一則無一之不知也不能知一則無一之能知也譬吾處於天下也亦為一物矣不識天下之以我備其物與且惟無我而物無不備者乎然則我亦物也物亦物也物之與物也有何以相物也雖然其生我也將以何益其殺我也將以何損夫造化者既以我為坯矣將無所違之矣吾安知夫刺灸而欲生者之非或也又安知夫絞經而求死者之非福也或者生乃徭役也而死乃休息也天下茫茫孰知其生我也不強求已其殺我也不強求止欲生而不事憎死而不辭賤之而弗憎貴之而弗喜隨其天資而安之不極吾生也有七尺之形吾死也有一棺之土吾生之比於有形之類猶吾死之淪於無形之中也然則吾生也物不以益衆吾死也土不以加厚吾又安知所喜憎利害其間者乎夫造化者之攫援物也譬猶陶人之埏埴也其取之地而已為盆盎也與其未離於地也無以異其已成器而破碎漫瀾而復歸其故也與其為盆盎亦無以異矣夫臨江之鄉居人汲水以浸其園江水弗憎也苦汙之家決汙而注之江汙水弗樂也是故其在江也無以異其浸園也其在汙也亦無以異其在江也是故聖人因時以安其位當世而樂其業夫悲樂者德之邪也而喜怒者道之過也好憎者心之纍也故曰其生也天行其死也物化靜則與陰合德動則與陽同波精神淡然無極不與物殽而天下自服故心者形之主也而神者心之寶也形勞而不休則蹶精用而不已則竭是故聖人貴而尊之不敢越也夫有夏后氏之璜者匣匱而藏之寶之至也夫精神之可寶也非直夏后氏之璜也是故聖人以無應有必究其理以虛受實必窮其節恬愈虛靜以終其命是故無所甚疏而無所甚親抱德煬和以順于天與道為際與德為鄰不為福始不為禍先魂魄處其宅而精神守其根死生無變於己故曰至神所謂真人者性合于道也故有而若無實而若虛處其一不知其二治其內不識其外明白太素無為復朴體本抱神以遊于天地之樊芒然仿佯于塵垢之外而消搖于無事之業浩浩蕩蕩乎機械知巧弗載於心是故死生亦大矣而不為變雖天地覆育亦不與之抮抱矣審乎無瑕而不與物殽見事之亂而能守其宗若然者亡肝膽遺耳目心志專于內通達耦于一居不知所為行不知所之渾然而往逯然而來形若稿木心若死灰忘其五藏捐其形骸不學而知不視而見不為而成不治而辨感而應迫而動不得已而往如光之耀如景之放以道為紃有待而然抱其太清之本而無所容與而物無能營廓惝而虛清靖而無思慮大澤焚而不能熱河漢涸而不能寒也大雷毀山而不能驚也大風晦日而不能傷也是故視珍寶珠玉猶礫石也視至尊窮寵猶行客也視毛嬙西施猶倛魄也以死生為一化以萬物為一方同精於太清之本而遊於忽區之旁有精而不使者有神而不用契大渾之朴而立至清之中是故其寢不夢其智不萌其魄不抑其魂不騰反覆終始不知其端緒甘瞑于大宵之宅而覺視于昭昭之宇休息于無委曲之隅而遊敖于無形埒之野居而無容處而無所其動無形其靜無體存而若亡生而若死出入無間役使鬼神淪於不測入於無間以不同形相嬗也終始若環莫得其倫此精神之所以能登假于道也是故真人之遊也若吹詬呼吸吐故內新熊經鳥伸鳧浴猿躩鴟視虎顧是養形之人也不以滑心使神滔蕩而不失其充日夜無傷而與物為春則是合而生時于心者也且人有戒形而無損心有綴宅而無耗精夫癩者趨不變狂者形不虧神將有所遠徙孰暇知其所為故形有摩而神未嘗化者以不化應化千變萬抮而未始有極化者復歸於無形也不化者與天地俱生也夫木之死也青青去之也夫使木生者豈木也猶充形者之非形也故生生者未嘗死也其所生則死矣化物者未嘗化也其所化則化矣輕天下則神無纍矣細萬物則心不惑矣齊死生則志不懾矣同變化則明不眩矣衆人以為虛言吾將舉類而實之人之所以樂為人主者以其窮耳目之欲而適躬體之便也今高臺層榭人之所麗也而堯樣桷不斫素題不枅珍怪奇味人之所美也而堯糲秶之飯藜藿之羹文繡狐白人之所好也而堯布衣掩形鹿裘御寒養性之具不加厚而增之以任重之憂故舉天下而傳之于舜若解重負然非直辭讓誠無以為也此輕天下之具也禹南省方濟于江黃龍負舟舟中之人五色無主禹乃熙笑而稱曰我受命於天竭力而勞萬民生寄也死歸也何足以滑和視龍猶蝘蜓顏色不變龍乃弭耳掉尾而逃禹之視物亦細矣鄭之神巫相壺子林見其徵告列子列子行泣報壺子壺子持以天壤名實不入機發於踵壺子之視死生亦齊子求行年五十有四而病傴僂脊管高于頂𣎅下迫頤兩髀在上燭營指天匍匐自窺於井曰偉哉造化者其以我為此拘拘邪此其視變化亦同矣故覩堯之道乃知天下之輕也觀禹之志乃知萬物之細也原壺子之論乃知死生之齊也見子求之行乃知變化之同也夫至人倚不拔之柱行不關之塗稟不竭之府學不死之師無往而不遂無之而不通生不足以挂志死不足以幽神屈伸俯仰抱命而婉轉禍福利害千變萬紾孰足以患心若此人者抱素守精蟬蛻蛇解遊於太清輕舉獨往忽然入冥鳳皇不能與之儷而況斥鷃乎勢位爵祿何足以概志也晏子與崔杼盟臨死地而不易其義殖華將戰而死莒君厚賂而止之不改其行故晏子可迫以仁不可劫以兵殖華可止以義而不可縣以利君子義死而不可以富貴留也義為而不可以死亡恐也彼則直為義耳而尚猶不拘於物又況無為者矣堯不以有天下為貴故授舜公子札不以有國為尊故讓位子罕不以玉為富故不受寶務光不以生害義故自投於淵由此觀之至貴不待爵至富不待財天下至大矣而以與他人身至親矣而棄之淵外此其餘無足利矣此之謂無纍之人無纍之人不以天下為貴矣上觀至人之論深原道德之意以下考世俗之行乃足羞也故通許由之意金縢豹韜廢矣延陵季子不受吳國而訟間田者慚矣子罕不利寶玉而爭券契者愧矣務光不污於世而貪利偷生者悶矣故不觀大義者不知生之不足貪也不聞大言者不知天下之不足利也今夫窮鄙之社也叩盆拊瓴相和而歌自以為樂矣嘗試為之擊建鼓撞巨鐘乃始仍仍然知其盆瓴之足羞也藏詩書修文學而不知至論之旨則拊盆叩瓴之徒也夫無以天下為者學之建鼓矣尊勢厚利人之所貪也使之左手據天下圖而右手刎其喉愚夫不為也由此觀之生貴于天下也聖人食足以接氣衣足以蓋形適情不求餘無天下不虧其性有天下不羡其和有天下無天下一實也今贛人敖倉豫人河水飢而飱之渴而飲之其入腹者不過簞食瓢漿則身飽而敖倉不為之減也腹滿而河水不為之竭也有之不加飽無之不為之飢與守其篅囤有其井一實人大怒破陰大喜墜陽大憂內崩大怖生狂除穢去纍漠若未始出其宗乃為大通清目而不以視靜耳而不以聽鉗口而不以言委心而不以慮棄聰明而反太素休精神而棄知故覺而若眯生而若死終則反本未生之時而與化為一體死之與生一體也今夫繇者揭钁臿負籠土鹽汗交流喘息薄喉當此之時得茠越下則脫然而喜矣巖穴之間非直越下之休也病疵瘕者捧心抑腹膝上叩頭踡局而諦通夕不寐當此之時噲然得臥則親戚兄弟歡然而喜夫修夜之寧非直一噲之樂也故知宇宙之大則不可劫以死生知養生之和則不可縣以天下知未生之樂則不可畏以死知許由之貴于舜則不貪物牆之立不若其偃也又況不為牆乎冰之凝不若其釋也又況不為冰乎自無跖有自有跖無終始無端莫知其所萌非通于外內孰能無好憎無外之外至大也無內之內至貴也能知大貴何往而不遂衰世湊學不知原心反本直雕琢其性矯拂其情以與世交故目雖欲之禁之以度心雖樂之節之以禮趨翔周旋詘節卑拜肉凝而不食酒澄而不飲外束其形內愁其德錯陰陽之和而迫性命之情故終身為悲人達至道者則不然理情性治心術養以和持以適樂道而忘賤安德而忘貧性有不欲無欲而不得心有不樂無樂而弗為無益於情者不以纍德不便於性者不以滑和故縱體肆意而度制可以為天下儀今夫儒者不本其所以欲而禁其所欲不原其所以樂而閉其所樂是猶決江河之源而障之以手也夫牧民者猶畜禽獸也不塞其囿垣使有野心系絆其足以禁其動而欲修生壽終豈可得乎夫顏回季路子夏冉伯牛孔子之通學也然顏淵夭死季路葅於衛子夏失明冉伯牛為厲此皆迫性拂情而不得其和也故子夏見曾子一臞一肥曾子問其故曰出見富貴之樂而欲之入見先王之道又説之兩者心戰故臞先王之道勝故肥推此志非能不貪富貴之位不便侈靡之樂直迫性閉欲以義自防也雖情心鬱殪形性屈竭猶不得已自強也故莫能終其天年若夫至人量腹而食度形而衣容身而遊適情而行餘天下而不貪委萬物而不利處大廓之宇遊無極之野登太皇馮太一玩天地于掌握之中夫豈為貧富肥臞哉故儒者非能使人弗欲也欲而能止之非能使人勿樂也樂而能禁之夫使天下畏刑而不敢盜豈若能使無有盜心哉越人得髯蛇以為上肴中國得而棄之無所用故知其無所用貪者能辭之不知其無所用廉者不能讓也夫人主之所以殘亡其國家捐棄其社稷身死於人手為天下笑未嘗非為非欲也夫仇由貪大鍾之賂而亡其國虞君利垂棘之璧而擒其身獻公豔驪姬之美而亂四世桓公甘易牙之和而不以時葬胡王淫女樂之娛而亡上地使此五君者適情辭餘以己為度不隨物而動豈有此大患哉故射者非矢不中也學射者不治矢也御者非轡不行學御者不為轡也知冬日之箑夏日之裘無用於己則萬物之變為塵埃矣故以湯止沸沸乃不止誠知其本則去火而已矣
