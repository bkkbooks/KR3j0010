  - {type: variant, offset: 29, length: 0, content: '', WYG: 太皥之神治東方甲乙木日盛徳在木木王東方其蟲鱗其音角東方少陽物去大隂甲散散為鱗鱗蟲龍為之長角木也位在東方律中太蔟其數八律管音也隂衰陽發萬物太蔟地而生故曰太蔟其數八五行數五木第三故曰八也其味酸其臭羶木味酸酸者鑚也萬物應陽鑚地而生羶木香羶也其祀户祭先脾蟄伏之類始動生出由户故祀戸脾屬土陳設俎豆脾在前也春木勝土言常食所勝也一日脾屬木自用其蔵也東風解凍蟄蟲始振蘇東方木木火母也氣温故東風解水凍也振動蘇生也魚上負氷獺祭魚魚鯉鮒之屬内應陽而動上負氷也獺獱水禽也取鯉魚於水邊四面陳之世謂之祭魚候鴈北候時之鴈從彭蠡来北過周雒至漢中孕卵􅑹也天子衣青衣乗蒼龍周禮馬七尺以上曰龍服蒼玊建青旗服佩也熊虎曰旗食麥與羊麥金榖也羊土畜也金土以老食所勝也先食麥以麥為主也服八風水㸑萁該燧火取銅槃中露水服之八方風所吹也取萁木燧之火炊之東宫御女青色衣青采鼓琴瑟春王東方故處東宫琴瑟木也春木王故鼓之其兵矛矛有鋒鋭似萬物鑚地生其畜羊羊土木之母故畜之朝于青陽左个以出春令青陽者明堂也中方外圜通達四出各有左右房謂之个猶隔也東出謂之青陽南出謂之明堂𤣥堂是月天子朝日告朔行出謂之總章北出謂之於左个之房東向堂北頭室也布徳施惠行慶賞省徭賦布陽德施柔惠也慶善賞賜予也省减徭役之勞輕其賦歛也立春之日天子親率三公九卿大夫以迎歲于東郊率使也迎歲春也東郊郭外八里之郊修除祠位幣禱鬼神犧牲用牡祠位壇塲屛攝之位也幣圭璧也禱鬼神求福祥也人神曰鬼天神曰神犧牲用牡尚蠲潔也禁伐木春木王當長養故禁之毋覆巢殺胎夭毋麛毋卵胎獸胎懐姙未育者也麋子曰夭鹿子曰麛卵未驚者皆禁民不得取蕃庶物也毋聚衆置城郭掩骼薶骴毋聚合大衆建置城郭以防害農功也骼骨有肉掩覆薶蔵之慎生氣也骴音慈孟春行夏令則風雨不時草木早落國乃有恐孟春木徳用事法當寛仁而用火氣動於上故草木早落國惶恐也行秋令則其民大疫飄風暴雨總至黎莠蓬蒿並興孟春溫仁而秋正金鐵之令氣不和故民疫疾風雨隈至故黎莠蓬蒿䟽穢之草並興盛也行冬令則水潦為敗雨霜大雹首稼不入冬隂也水泉湧起而春行之故為敗氣不和故雨霜大雹百穀惟稷先種故曰首稼不入不熟也正月官司空其樹楊司空主土春土受嘉穡故官司空也楊蒲栁也楊木春光故其樹楊仲春之月招摇指卯昬弧中旦建星中弧星在輿鬼南昬時中於南方建星在斗上平旦時中於南方其位東方其日甲乙}
