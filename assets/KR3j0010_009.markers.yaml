  - {type: variant, offset: 7045, length: 0, content: '', WYG: 荘王楚穆王商臣之子旅也使申舟問聘於齊不假道於宋無畏曰宋必襲殺我王曰殺汝伐宋見犀而行不假道於宋華元曰過我而不假道鄙我也鄙我亡也以兵殺其使者亦亡也遂殺之荘王聞之怒故投袂而起成軍亡宋城故曰權柄重也}
