  - {type: variant, offset: 839, length: 1, content: 鞼, WYG: 冝遼姓名熊勇士居楚市南楚平王太子建為費無極所逐奔鄭鄭人殺之其子勝在吴令尹子西召之以為白公請伐鄭以報讎子西許之而未出師晉人伐鄭以報讎子西救之勝怒曰鄭人在此讎不逺矣欲殺子西其臣石乞曰市南熊宜遼得之可以當五百人乃往視之告其故不從舉之以劍不動而弄丸不輟心志不懼曰不能從子為亂亦不泄子之事白公遂殺子西故兩家雖有難不怨宜遼故曰無所闗其辭也鞅}
