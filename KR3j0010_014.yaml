body:
  text: 詮言訓洞同天地渾沌為朴未造而成物謂之太一同出於一所為各異有鳥有魚有獸謂之分物方以類別物以群分性命不同皆形於有隔而不通分而為萬殊莫能反宗故動而為之生死而為之窮皆為物矣非不物而物物者也物物者亡乎萬物之中稽古太初人生於無形於有有形而制於物能反其所生若未有形謂之真人真人者未始分於太一者也聖人不為名尸不為謀府不為事任不為智主藏無形行無迹遊無朕不為福先不為禍始保於虛無動於不得已欲福者或為禍欲利者或離害故無為而寧者失其所以寧則危無事而治者失其所以治則亂星列於天而明故人指之義列於德而見故人視之人之所指動則有章人之所視行則有迹動有章則訶行有迹則議故聖人掩明於不形藏迹於無為王子慶忌死於劍羿死於桃棓子路葅於衛蘇秦死於口人莫不貴其所修而賤其所短然而皆溺其所貴而極其所賤所貴者有形所賤者無朕也故虎豹之強來射猿貁之捷來措人能貴其所賤賤其所貴可與言至論矣自信者不可以誹譽遷也知足者不可以勢利誘也故通性之情者不務性之所無以為通命之情者不憂命之所無奈何通於道者物莫足以滑其和詹何曰未嘗聞身治而國亂者也未嘗聞身亂而國治者也矩不正不可以為方規不正不可以為員身者事之規矩也未聞枉己而能正人者也原天命治心術理好憎適情性則治道通矣原天命則不惑禍福治心術則不妄喜怒理好憎則不貪無用適情性則欲不過節不惑禍福則動靜循理不妄喜怒則賞罰不阿不貪無用則不以欲害性欲不過節則養性知足凡此四者弗求於外弗假於人反己而得矣天下不可以智為也不可以慧識也不可以事治也不可以仁附也不可以強勝也五者皆人才也德不盛不能成一焉德立則五無殆五見則德無位矣故得道則愚者有餘失道則智者不足度水而無遊數雖強必沉有遊數雖羸必遂又況託於舟航之上乎為治之本務在於安民安民之本在於足用足用之本在於勿奪時勿奪時之本在於省事省事之本在於節欲節欲之本在於反性反性之本在於去載去載則虛虛則平平者道之素也虛者道之舍也能有天下者必不失其國能有其國者必不喪其家能治其家者必不遺其身能修其身者必不忘其心能原其心者必不虧其性能全其性者必不惑於道故廣成子曰慎守而內周閉而外多知為敗毋視毋聽抱神以靜形將自正不得之己而能知彼者未之有也故易曰括囊無咎無譽能成霸王者必得勝者也能勝敵者必強者也能強者必用人力者也能用人力者必得人心者也能得人心者必自得者也能自得者必柔弱者也強勝不若己者至於與同則格柔勝出於己者其力不可度故能以衆不勝成大勝者唯聖人能之善遊者不學刺舟而便用之徑筋者不學騎馬而便居之輕天下者身不纍於物故能處之泰王亶父處邠狄人攻之事之以皮幣珠玉而不聽乃謝耆老而徙岐周百姓攜幼扶老而從之遂成國焉推此意四世而有天下不亦宜乎無以天下為者必能治天下者霜雪雨露生殺萬物天無為焉猶之貴天也厭文搔法治官理民者有司也君無事焉猶之尊君也辟地墾草者后稷也決河濬江者禹也聽獄制中者皋陶也然而有聖名者堯也故得道以御者身雖無能必使能者為己用不得其道伎藝雖多未有益也方船濟乎江有虛船從一方來觸而覆之雖有忮心必無怨色有一人在其中一謂張之一謂歙之再三呼而不應必以醜聲隨其後嚮不怒而今怒嚮虛而今實也人能虛己以遊於世孰能訾之釋道而任智者必危棄數而用才者必困有以欲多而亡者未有以無欲而危者也有以欲治而亂者未有以守常而失者也故智不足免患愚不足以至於失寧守其分循其理失之不憂得之不喜故成者非所為也得者非所求也入者有受而無取出者有授而無豫因春而生因秋而殺所生者弗德所殺者非怨則幾於道矣聖人不為可非之行不憎人之非己也修足譽之德不求人之譽己也不能使禍不至信己之不迎也不能使福必來信己之不攘也禍之至也非其求所生故窮而不憂福之至非其求所成故通而弗矜知禍福之制不在於己也故間居而樂無為而治聖人守其所以有不求其所未得求其所未得則所有者亡矣修其所已有則所欲者至故用兵者先為不可勝以待敵之可勝也治國者先為不可奪以待敵之可奪也舜修之歷山而海內從化文王修之岐周而天下移風使舜趨天下之利而忘修己之道身猶弗能保何尺地之有乎故治未固於不亂而事為治者必危行未固於無非而急求名者必銼也福莫大無禍利莫美不喪動之為物不損則益不成則毀不利則病皆險也道之者危故秦勝乎戎而敗乎殽楚勝乎諸夏而敗乎柏莒故道不可以勸就利者而可以寧避害者故常無禍不常有福常無罪不常有功聖人無思慮無設儲來者弗迎去者弗將人雖東西南北獨立中央故處衆枉之中不失其直天下皆流獨不離其壇域故不為好不避醜遵天之道不為始不專己循天之理不豫謀不棄時與天為期不求得不辭福從天之則不求所無不失所得內無奇禍外無奇福禍福不生安有人賊為善則觀為不善則議觀則生責議則生患故道術不可以進而求名而可以退而修身不可以得利而可以離害故聖人不以行求名不以智見譽法循自然己無所與慮不勝數行不勝德事不勝道為者有不成求者有不得人有窮而道無不通與道爭則凶故詩曰弗識弗知順帝之則有智而無為與無智者同道有能而無事與無能者同德其智也告之者至然後覺其動也其能也使之者至然後覺其為也有智若無智有能若無能道理為正也故功蓋天下不施其美澤及後世不有其名道理通而人為滅也名與道不兩明人愛名則道不用道勝人則名息矣道與人競長章人者息道者也人章道息則危不遠矣故世有聖名則道諛日至矣欲尸名者必為善欲為善者必生事事生則釋公而就私背數而任己欲見譽於為善而立名於為賢則治不循故而事不順時治不循故則多責事不順時則無功責多功鮮無以塞之則妄發而邀當妄為而要中功之成也不足以更責事之敗也足以弊身故重為善若重為非而幾於道矣天下非無信士也臨貨分財必探籌而定分以為有心者之於平不若無心者也天下非無廉士也然而守重寶者必關戶而全封以為有欲者之於廉不若無欲者也人舉其疵則怨人鑑見其醜則善鑑人能接物而不與己焉則免於纍矣公孫龍粲於辭而貿名鄧析巧辨而亂法蘇秦善説而亡身由其道則善無章循其理則巧無名故以巧鬭力者始於陽常卒於陰以慧治國者始於治常卒於亂使水流下孰弗能治激而上之非巧不能故文勝則質掩邪巧則正塞也德可以自修而不可以使人暴道可以自治而不可以使人亂雖有賢聖之寶不遇暴亂之世可以全身而未可以霸王也湯武之王也遇桀紂之暴也桀紂非以湯武之賢暴也湯武遭桀紂之暴而王也故雖賢王必待遇遇者能遭於時而得之也非知能所求而成也君子修行而使善無名布施而使仁無章故士行善而不知善之所由來民贍利而不知利之所由出故無為而自治善有章則士爭名利有本則民爭功二爭者生雖有賢者弗能治故聖人掩迹於為善而息名於為仁也外交而為援事大而為安不若內治而待時凡事人者非以寶幣必以卑辭事以玉帛則貨殫而欲不饜卑體婉辭則諭説而交不結約束誓盟則約定而反無日雖割國之錙錘以事人而無自恃之道不足以為全若誠釋外交之策而慎修其境內之事盡其地力以多其積厲其民死以堅其城上下一心君臣同志與之守社稷斆死而民弗離則為名者不伐無罪而為利者不攻難勝此必全之道也民有道所同道有法所同守為義之不能相固威之不能相必也故立君以一民君執一則治無常則亂君道者非所以有為也所以無為也何謂無為智者不以位為事勇者不以位為暴仁者不以位為惠可謂無為矣夫無為則得於一也一也者萬物之本也無敵之道也凡人之性少則昌狂壯則暴強老則好利一人之身既數變矣又況君數易法國數易君人以其位通其好憎下之徑衢不可勝理故君失一則亂甚於無君之時故詩曰不愆不忘率由舊章此之謂也君好智則倍時而任己棄數而用慮天下之物博而智淺以淺贍博未有能者也獨任其智失必多矣故好智窮術也好勇則輕敵而簡備自偩而辭助一人之力以圉強敵不杖衆多而專用身才必不堪也故好勇危術也好與則無定分上之分不定則下之望無止若多賦斂實府庫則與民為讎少取多與數未之有也故好與來怨之道也仁智勇力人之美才也而莫足以治天下由此觀之賢能之不足任也而道術之可循明矣聖人勝心衆人勝欲君子行正氣小人行邪氣內便於性外合於義循理而動不繫於物者正氣也推於滋味淫於聲色發於喜怒不顧後患者邪氣也邪與正相傷欲與性相害不可兩立一植一廢故聖人損欲而從性目好色耳好聲口好味接而説之不知利害者欲也食之不寧於體聽之不合於道視之不便於性三關交爭以義為制者心也割痤疽非不痛也飲毒藥非不苦也然而為之者便於身也渴而飲水非不快也飢而大飱非不贍也然而弗為者害於性也此四者耳目鼻口不知所取去心為之制各得其所由是觀之欲之不可勝明矣凡治身養性節寢處適飲食和喜怒便動靜使在己者得而邪氣自不生豈若憂瘕疵之興痤疽之發而豫備之哉夫函牛之鼎沸而蠅蚋弗敢入崑山之玉瑱而塵垢弗能污也聖人無去之心而心無醜無取之美而美不失故祭祀思親不求福饗賓修敬不思德唯弗求者為能有之處尊位者以有公道而無私説故稱尊焉不稱賢也有大地者以有常術而無鈐謀故稱平焉不稱智也內無暴事以離怨於百姓外無賢行以見忌於諸侯上下之禮襲而不離而為論者莫然不見所觀焉此所謂藏無形者非藏無形孰能形三代之所道者因也故禹決江河因水也后稷播種樹穀因地也湯武平暴亂因時也故天下可得而不可取也霸王可受而不可求也任智則人與之訟任力則人與之爭未有使人無智者有使人不能用其智於己者也未有使人無力者有使人不能施其力於己者也此兩者常在久見故君賢不見諸侯不備不肖不見則百姓不怨百姓不怨則民用可得諸侯弗備則天下之時可承事所與衆同也功所與時成也聖人無焉故老子曰虎無所措其爪兕無所措其角蓋謂此也鼓不臧於聲故能有聲鏡不設於形故能有形金石有聲弗叩弗鳴管簫有音弗吹弗聲聖人內藏不為物倡事來而制物至而應飾其外者傷其內扶其情者害其神見其文者蔽其質無須臾忘其為賢者必困於性百步之中不忘其為容者必纍其形故羽翼美者傷骨骸枝葉美者害根荄能兩美者天下無之也天有明不憂民之晦也百姓穿戶鑿牖自取照焉地有財不憂民之貧也百姓伐木芟草自取富焉至德道者若邱山嵬然不動行者以為期也直己而足物不為人贛用之者亦不受其德故寧而能久天地無豫也故無奪也日月無德也故無怨也喜得者必多怨喜豫者必善奪唯滅迹於無為而隨天地之自然者為能勝理而無愛名名興則道不行道行則人無位矣故譽生則毀隨之善見則惡從之利則為害始福則為禍先唯不求利者為無害唯不求福者為無禍侯而求霸者必失其侯霸而求王者必喪其霸故國以全為常霸王其寄也身以生為常富貴其寄也能不以天下傷其國而不以國害其身者為可以託天下也不知道者釋其所已有而求其所未得也苦心愁慮以行曲故福至則喜禍至則怖神勞於謀智遽於事禍福萌生終身不悔己之所生乃反愁人不喜則憂中未嘗平持無所監謂之狂生人主好仁則無功者賞有罪者釋好刑則有功者廢無罪者誅及無好者誅而無怨施而不德放準循繩身無與事若天若地何不覆載故合而和之者君也制而誅之者法也民已受誅無所怨憾謂之道道勝則人無事矣聖人無屈奇之服無瑰異之行服不視行不觀言不議通而不華窮而不懾榮而不顯隱而不窮異而不見怪容而與衆同無以名之此之謂大通升降揖讓趨翔周旋不得已而為也非性所有於身情無符檢行所不得已之事而不解構耳豈加故為哉故不得已而歌者不事為悲不得已而舞者不矜為麗歌舞而不事為悲麗者皆無有根心者善博者不欲牟不恐不勝平心定意投得其齊行由其理雖不必勝得籌必多何則勝在於數而不在於欲也駎者不貪最先不恐獨後緩急調乎手御心調乎馬雖不能必先哉馬力必盡矣何則先在於數而不在於欲也是故滅欲則數勝棄智則道立矣賈多端則貧工多技則窮心不一也故木之大者害其條水之大者害其深有智而無術雖鑽之不達有百技而無一道雖得之弗能守故詩曰淑人君子其儀一也其儀一也心如結也君子其結於一乎舜彈五絃之琴而歌南風之詩以治天下周公殽腝不收於前鍾鼓不解於縣以輔成王而海內平匹夫百畝一守不遑啓處無所移之也以一人兼聽天下日有餘而治不足者使人為之也處尊位者如尸守官者如祝宰尸剝狗燒彘雖能弗為也弗能無虧也俎豆之列次黍稷之先後雖知弗教也弗能無害也不能祝者不可以為祝無害於為尸不能御者不可以為僕無害於為佐故位愈尊而身愈佚官愈大而事愈少譬如張琴小絃雖緪大絃必緩無為者道之體也執後者道之容也無為制有為術也執後之制先數也放於術則強審於數則寧今與人卞氏之璧未受者先也求而致之雖怨不逆者後也三人同舍二人相爭爭者各自以為直不能相聽一人雖愚必從旁而決之非以智也以不爭也兩人相鬭一羸在側助一人則勝救一人則免鬭者雖強必制一羸非以勇也以不鬭也由是觀之後之制先靜之勝躁數也倍道棄數以求苟遇變常易故以知要遮過則自非中則以為候暗行繆改終身不寤此之謂狂有禍則詘有福則盈有過則悔有功則矜遂不知反此之謂狂員之中規方之中矩行成獸止成文可以將少而不可以將衆蓼菜成行瓶甌有堤量粟而舂數米而炊可以治家而不可以治國滌杯而食洗爵而飲浣而後饋可以養家老而不可以饗三軍非易不可以治大非簡不可以合衆大樂必易大禮必簡易故能天簡故能地大樂無怨大禮不責四海之內莫不繫統故能帝也心有憂者匡床衽席弗能安也菰飯犓牛弗能甘也琴瑟鳴竽弗能樂也患解憂除然後食甘寢寧居安遊樂由是觀之性有以樂也死有以哀也今務益性之所不能樂而以害性之所以樂故雖富有天下貴為天子而不免為哀之人凡人之性樂恬而憎憫樂佚而憎勞心常無欲可謂恬矣形常無事可謂佚矣遊心於恬舍形放佚以俟天命自樂於內無急於外雖天下之大不足以易其一概日月廋而無溉於志故雖賤如貴雖貧如富大道無形大仁無親大辨無聲大廉不嗛大勇不矜五者無棄而幾鄉方矣軍多令則亂酒多約則辨亂則降北辨則相賊故始於都者常卒於鄙始於樂者常卒於悲其作始簡者其終卒必調今有美酒嘉肴以相賓饗卑體婉辭以接之欲以合歡爭盈爵之間乃反生鬭鬭而相傷三族結怨反其所憎此酒之敗也詩之失僻樂之失刺禮之失責徵音非無羽聲也羽音非無徵聲也五音莫不有聲而以徵羽定名者以勝者也故仁義智勇聖人之所備有也然而皆立一名者言其大者也陽氣起於東北盡於西南陰氣起於西南盡於東北陰陽之始皆調適相似日長其類以侵相遠或熱焦沙或寒凝水故聖人謹慎其所積水出於山而入於海稼生於野而藏於廩聖人見所始則知所終矣席之上先𦼉簟樽之上先玄酒俎之上先生魚豆之上先泰羹此皆不快於耳目不適於口腹而先王貴之先本而後末聖人之接物千變萬軫必有不化而應化者夫寒之與暖相反大寒地坼水凝火弗為衰其熱大暑鑠石流金火弗為益其烈寒暑之變無損益於己質有定也聖人常後而不先常應而不唱不進而求不退而讓隨時三年時去我走去時三年時在我後無去無就中立其所天道無親唯德是與有道者不失時與人無道者失於時而取人直己而待命時之至不可迎而反也要遮而求合時之去不可追而援也故不曰我無以為而天下遠不曰我不欲而天下不至古之存己者樂德而忘賤故名不動志樂道而忘貧故利不動心名利充天下不足以概志故兼而能樂靜而能淡故其身治者可與言道矣自身以上至於荒芒亦遠矣自死而天地無窮亦滔矣以數雜之壽憂天下之亂猶憂河水之少泣而益之也龜三千歲浮遊不過三日以浮遊而為龜憂養生之具人必笑之矣故不憂天下之亂而樂其身之治者可與言道矣君子為善不能使福必來不為非而不能使禍無至福之至也非其所求故不伐其功禍之來也非其所生故不悔其行內修極而橫禍至者皆天也非人也故中心常恬漠不纍其德狗吠而不驚自信其情故知道者不惑知命者不憂萬乘之主卒葬其骸於曠野之中祀其鬼神於明堂之上神貴於形也故神制則形從形勝則神窮聰明雖用必反諸神謂之太沖
