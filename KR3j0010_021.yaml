body:
  text: 要略夫作為書論者所以紀綱道德經緯人事上考之天下揆之地中通諸理雖未能抽引玄妙之中哉繁然足以觀終始矣揔要舉凡而語不剖判純朴靡散大宗則為人之惛惛然弗能知也故多為之辭博為之說又恐人之離本就末也故言道而不言事則無以與世浮沉言事而不言道則無以與化游息故著二十篇有原道有俶真有天文有地形有時則有覽冥有精神有本經有主術有繆稱有齊俗有道應有泛論有詮言有兵略有說山有說林有人閒有修務有泰族也原道者盧牟六合混沌萬物象太一之容測窈冥之深以翔虛無之軫託小以苞大守約以治廣使人知先後之禍福動靜之利害誠通其志浩然可以大觀矣欲一言而寤則尊天而保真欲再言而通則賤物而貴身欲參言而究則外欲而反情執其大指以內洽五藏瀸漬肌膚被服法則而與之終身所以應待萬方覽耦百變也若轉丸掌中足以自樂也俶真者窮逐終始之化嬴垀有無之精離別萬物之變合同死生之形使人知遺物反己審仁義之閒通同異之理觀至德之統知變化之紀說符玄妙之中通迵造化之母也天文者所以和陰陽之氣理日月之光節開塞之時列星辰之行知逆順之變避忌諱之殃順時運之應法五神之常使人有以仰天承順而不亂其常者也地形者所以窮南北之長極東西之廣經山陵之形區川谷之居明萬物之主知生類之衆列山淵之數規遠近之路使人通迵周備不可動以物不可驚以怪者也時則者所以上因天時下盡地力據度行當合諸人則刑十二節以為法式終而復始轉於無極因循倣依以知禍福操舍開塞各有龍忌發號施令以時教惎使君人者知所以從事覽冥者所以言至精之通九天也至微之淪無形也純粹之入至清也昭昭之通冥冥也乃始攬物引類覽取嬌掇浸想宵類物之可以喻意象形者乃以穿通窘滯決瀆壅塞引人之意繫之無極乃以明物類之感同氣之應陰陽之合形埒之朕所以令人遠觀博見者也精神者所以原本人之所由生而曉寤其形骸九竅取象於天合同其血氣與雷霆風雨比類其喜怒於晝宵寒暑審死生之分別同異之跡節動靜之機以反其性命之宗所以使人愛養其精神撫靜其魂魄不以物易己而堅守虛無之宅者也本經者所以明大聖之德通維初之道埒略衰世古今之變以褒先聖之隆盛而貶末世之曲政也所以使人黜耳目之聰明靜精神之感動樽流遁之觀節養性之和分帝王之操列小大之差者也主術者君人之事也所以因任督責使群臣各盡其能也明攝權操柄以制群下提名責實考之參伍所以使人主秉數持要不妄喜怒也其數直施而正邪外私而立公使百官條通而輻湊各務其業人致其功此主術之明也繆稱者破碎道德之論差次仁義之分略雜人間之事揔同乎神明之德假象取耦以相譬喻斷短為節以應小具所以曲說攻論應感而不匱者也齊俗者所以一群生之短修同九夷之風采通古今之論貫萬物之理財制禮義之宜擘畫人事之終始者也道應者攬掇遂事之蹤追觀往古之跡察禍福利害之反考驗乎老莊之術而以合得失之勢者也泛論者所以針縷縩𦃏之間櫼楔唲齵之郤也接徑直施以推本朴而兆見得失之變利病之反所以使人不妄沒於勢利不誘惑於事態有符曮晲兼稽時世之變而與化推移者也詮言者所以譬類人事之指解喻治亂之體也差擇微言之眇詮以至理之文而補縫過失之闕者也兵略者所以明戰勝攻取之數形機之勢詐譎之變體因循之道操持後之論也所以知戰陳分爭之非道不行也知攻取堅守之非德不強也誠明其意進退左右無所擊危乘勢以為資清靜以為常避實就虛若驅群羊此所以言兵也說山說林者所以竅窕穿鑿百事之壅遏而通行貫扃萬物之窒塞者也假譬取象異類殊形以領理人之意懈墮結紐說擇摶囷而以明事埒者也人間者所以觀禍福之變察利害之反鑽脈得失之跡標舉終始之壇也分別百事之微敷陳存亡之機使人知禍之為福亡之為得成之為敗利之為害也誠喻至意則有以傾側偃仰世俗之間而無傷乎讒賊螫毒者也修務者所以為人之於道未淹味論未深見其文辭反之以清淨為常恬淡為本則懈墮分學縱欲適情欲以偷自佚而塞於大道也今夫狂者無憂聖人亦無憂聖人無憂和以德也狂者無憂不知禍福也故通而無為也與塞而無為也其無為則同其所以無為則異故為之浮稱流說其所以能聽所以使學者孳孳以自幾也泰族者橫八極致高崇上明三光下和水土經古今之道治倫理之序揔萬方之指而歸之一本以經緯治道紀綱王事乃原心術理情性以館清平之靈澄徹神明之精以與天和相嬰薄所以覽五帝三王懷天氣抱天心執中含和德形於內以莙凝天地發起陰陽序四時正流方綏之斯寧推之斯行乃以陶冶萬物游化群生唱而和動而隨四海之內一心同歸故景星見祥風至黃龍下鳳巢列樹麟止郊野德不內形而行其法藉專用制度神祇弗應福祥不歸四海弗賓兆民弗化故德形於內治之大本此鴻烈之泰族也凡屬書者所以窺道開塞庶後世使知舉錯取捨之宜適外與物接而不眩內有以處神養氣宴煬至和而己自樂所受乎天地者也故言道而不明終始則不知所倣依言終始而不明天地四時則不知所避諱言天地四時而不引譬援類則不識精微言至精而不原人之神氣則不知養生之機原人情而不言大聖之德則不知五行之差言帝道而不言君事則不知小大之衰言君事而不為稱喻則不知動靜之宜言稱喻而不言俗變則不知合同大指已言俗變而不言往事則不知道德之應知道德而不知世曲則無以耦萬方知泛論而不知詮言則無以從容通書文而不知兵指則無以應卒已知大略而不知譬諭則無以推明事知公道而不知人間則無以應禍福知人間而不知修務則無以使學者勸力欲強省其辭覽揔其要弗曲行區入則不足以窮道德之意故著書二十篇則天地之理究矣人間之事接矣帝王之道備矣其言有小有巨有微有粗指奏卷異各有為語今專言道則無不在焉然而能得本知末者其唯聖人也今學者無聖人之才而不為詳說則終身顛頓乎混溟之中而不知覺寤乎昭明之術矣今易之乾坤足以窮道通意也八卦可以識吉凶知禍福矣然而伏戲為之六十四變周室增以六爻所以原測淑清之道而捃逐萬物之祖也夫五音之數不過宮商角徵羽然而五絃之琴不可鼓也必有細大駕和而後可以成曲今畫龍首觀者不知其何獸也具其形則不疑矣今謂之道則多謂之物則少謂之術則博謂之事則淺推之以論則無可言者所以為學者固欲致之不言而已也夫道論至深故多為之辭以抒其情萬物至衆故博為之說以通其意辭雖壇卷連漫絞紛遠緩所以洮汰滌蕩至意使之無凝竭底滯捲握而不散也夫江河之腐胔不可勝數然祭者汲焉大也一杯酒甘蠅漬其中匹夫弗嘗者小也誠通乎二十篇之論睹凡得要以通九野徑十門外天地捭山川其於逍遙一世之間宰匠萬物之形亦優游矣若然者挾日月而不烑潤萬物而不耗曼兮洮兮足以覽矣藐兮浩浩曠曠兮可以游矣文王之時紂為天子賦斂無度戮殺無止康梁沉湎宮中成市作為炮格之刑刳諫者剔孕婦天下同心而苦之文王四世纍善修德行義處岐周之間地方不過百里天下二垂歸之文王欲以卑弱制強暴以為天下去殘除賊而成王道故太公之謀生焉文王業之而不卒武王繼文王之業用太公之謀悉索薄賦躬擐甲胄以伐無道而討不義誓師牧野以踐天子之位天下未定海內未輯武王欲昭文王之令德使夷狄各以其賄來貢遼遠未能至故治三年之喪殯文王於兩楹之間以俟遠方武王立三年而崩成王在褓繈之中未能用事蔡叔管叔輔公子祿父而欲為亂周公繼文王之業持天子之政以股肱周室輔翼成王懼爭道之不塞臣下之危上也故縱馬華山放牛桃林敗鼓折枹搢笏而朝以寧靜王室鎮撫諸侯成王既壯能從政事周公受封於魯以此移風易俗孔子修成康之道述周公之訓以教七十子使服其衣冠修其篇籍故儒者之學生焉墨子學儒者之業受孔子之術以為其禮煩擾而不侻厚葬靡財而貧民久服傷生而害事故背周道而用夏政禹之時天下大水禹身執虆臿以為民先剔河而道九歧鑿江而通九路辟五湖而定東海當此之時燒不暇撌濡不給扢死陵者葬陵死澤者葬澤故節財薄葬閒服生焉齊桓公之時天子卑弱諸侯力征南夷北狄交伐中國中國之不絶如線齊國之地東負海而北鄣河地狹田少而民多智巧桓公憂中國之患苦夷狄之亂欲以存亡繼絶崇天子之位廣文武之業故管子之書生焉齊景公內好聲色外好狗馬獵射忘歸好色無辨作為路寢之臺族鑄大鍾撞之庭下郊雉皆詬一朝用三千鍾贛梁丘據子家噲導於左右故晏子之諫生焉晚世之時六國諸侯溪異谷別水絶山隔各自治其境內守其分地握其權柄擅其政令下無方伯上無天子力征爭權勝者為右恃連與約重致剖信符結遠援以守其國家持其社稷故縱橫修短生焉申子者韓昭釐之佐韓晉別國也地墽民險而介於大國之間晉國之故禮未滅韓國之新法重出先君之令未收後君之令又下新故相反前後相繆百官背亂不知所用故刑名之書生焉秦國之俗貪狼強力寡義而趨利可威以刑而不可化以善可勸以賞而不可厲以名被險而帶河四塞以為固地利形便畜積殷富孝公欲以虎狼之勢而吞諸侯故商鞅之法生焉若劉氏之書觀天地之象通古今之論權事而立制度形而施宜原道德之心合三王之風以儲與扈冶玄眇之中精搖靡覽棄其畛挈斟其淑靜以統天下理萬物應變化通殊類非循一跡之路守一隅之指拘繫牽連於物而不與世推移也故置之尋常而不塞布之天下而不窕
