body:
  text: 原道訓夫道者覆天載地廓四方柝八極高不可際深不可測包裹天地稟授無形源流泉浡沖而徐盈混混汩汩濁而徐清故植之而塞于天地橫之而彌于四海施之無窮而無所朝夕舒之幎於六合卷之不盈於一握約而能張幽而能明弱而能強柔而能剛橫四維而含陰陽紘宇宙而章三光甚淖而滒甚纖而微山以之高淵以之深獸以之走鳥以之飛日月以之明星歷以之行麟以之游鳳以之翔泰古二皇得道之柄立於中央神與化游以撫四方是故能天運地滯輪轉而無廢水流而不止與萬物終始風興雲蒸事無不應雷聲雨降並應無窮鬼出神入龍興鸞集鈞旋轂轉周而復匝已雕已琢還反於朴無為為之而合于道無為言之而通乎德恬愈無矜而得于和有萬不同而便于性神託于秋毫之末而大與宇宙之總其德優天地而和陰陽節四時而調五行詬諭覆育萬物群生潤于草木浸于金石禽獸碩大毫毛潤澤羽翼奮也角觡生也獸胎不贕鳥卵不毈父無喪子之憂兄無哭弟之哀童子不孤婦人不孀虹霓不出賊星不行含德之所致夫太上之道生萬物而不有成化像而弗宰跂行喙息蠉飛蠕動待而後生莫之知德待之後死莫之能怨得以利者不能譽用而敗者不能非收聚畜積而不加富布施稟授而不益貧旋綿而不可究纖微而不可勤纍之而不高墮之而不下益之而不衆損之而不寡斫之而不薄殺之而不殘鑿之而不深填之而不淺忽兮恍兮不可為象兮恍兮忽兮用不屈兮幽兮冥兮應無形兮遂兮洞兮不虛動兮與剛柔卷舒兮與陰陽俯仰兮昔者馮夷大丙之御也乘雷車六雲霓游微霧騖忽恍歷遠彌高以極往經霜雪而無迹照日光而無景扶搖抮抱羊角而上經紀山川蹈騰崑崙排閶闔淪天門末世之御雖有輕車良馬徑策利錣不能與之爭先是故大丈夫恬然無思淡然無慮以天為蓋以地為輿四時為馬陰陽為御乘雲陵霄與造化者俱縱志舒節以馳大區可以步而步可以驟而驟令雨師灑道使風伯掃塵電以為鞭策雷以為車輪上游于霄雿之野下出于無垠鄂之門劉覽遍照復守以全經營四隅還反於樞故以天為蓋則無不覆也以地為輿則無不載也四時為馬則無不使也陰陽為御則無不備也是故疾而不搖遠而不勞四支不勤聰明不損而知八紘九野之形埒者何也執道之柄而游於無窮之地也是故天下之事不可為也因其自然而推之萬物之變不可究也秉其要趣而歸之夫鏡水之與形接也不設智故而方圓曲直弗能逃也是故響不肆應而景不一設叫呼仿佛默然自得人生而靜天之性也感而後動性之害也物至而神應知之動也知與物接而好憎生焉好憎成形而知誘於外不能反己而天理滅矣故達於道者不以人易天外與物化而內不失其情至無而供其求時騁而要其宿小大修短各有其具萬物之至騰踴肴亂而不失其數是以處上而民弗重也居前而衆弗害也天下歸之姦邪畏之以其無爭於萬物也故莫能與之爭夫臨江而釣曠日而不能盈羅雖有鉤針芒距微綸芳餌加之以詹何娟嬛之數猶不能與網罟爭得也射者扞烏號之弓彎綦衛之箭重之以羿逢蒙子之巧以要飛鳥猶不能與羅者競多何則以所持之小也張天下以為之籠因江海以為罛又何亡魚失鳥之有乎故矢不若繳繳不若網網不若無形之像夫釋大道而任小數無以異於使蟹捕鼠蟾蜍捕蚤不足以禁姦塞邪亂乃逾滋昔者夏鯀作九仞之城諸侯背之海外有狡心禹知天下之叛也乃壞城平池散財物焚甲兵施之以德海外賓服四夷納職合諸侯於塗山執玉帛者萬國故機械之心藏於胸中則純白不粹神德不全在身者不知何遠之所能懷是故革堅則兵利城成則衝生若以湯沃沸亂乃逾甚是故鞭噬狗策𨂜馬而欲教之雖伊尹造父弗能化欲𡧢之心亡於中則飢虎可尾何況狗馬之類乎故體道者逸而不窮任數者勞而無功夫峭法刻誅者非霸王之業也箠策繁用者非致遠之御也離朱之明察針末於百步之外而不能見淵中之魚師曠之聰合八風之調而不能聽十里之外故任一人之能不足以治三畝之宅也循道理之數因天地之自然則六合不足均也是故禹之決瀆也因水以為師神農之播穀也因苗以為教夫蘋樹根於水木樹根於土鳥排虛而飛獸跖實而走蛟龍水居虎豹山處天地之性也兩木相摩而然金火相守而流員者常轉窾者主浮自然之勢也是故春風至則甘雨降生育萬物羽者嫗伏毛者孕育草木榮華鳥獸卵胎莫見其為者而功既成矣秋風下霜到生挫傷鷹鵰搏鷙昆蟲蟄藏草木注根魚鱉湊淵莫見其為者滅而無形木處榛巢水居窟穴禽獸有艽人民有室陸處宜牛馬舟行宜多水胸奴出穢裘干越生葛絺各生所急以備燥溼各因所處以御寒暑並得其宜物便其所由此觀之萬物固以自然聖人又何事焉九疑之南陸事寡而水事衆於是民人劗髮文身以像鱗蟲短綣不褲以便涉游短袂攘卷以便刺舟因之也鴈門之北狄不穀食賤長貴壯俗上氣力人不弛弓馬不解勒便之也故禹之裸國解衣而入衣帶而出因之也今夫徙樹者失其陰陽之性則莫不枯槁故橘樹之江北則化而為橙鴝鵒不過濟貈度汶而死形性不可易勢居不可移也是故達於道者反於清靜究於物者終於無為以恬養性以漠處神則入于天門所謂天者純粹朴素質直皓白未始有與雜糅者也所謂人者偶䁟智故曲巧僞詐所以俯仰於世人而與俗交者也故牛歧蹄而戴角馬被髦而全足者天也絡馬之口穿牛之鼻者人也循天者與道游者也隨人者與俗交者也夫井魚不可與語大拘於隘也夏蟲不可與語寒篤於時也曲士不可與語至道拘於俗束於教也故聖人不以人滑天不以欲亂情不謀而當不言而信不慮而得不為而成精通于靈府與造化者為人夫善游者溺善騎者墮各以其所好反自為禍是故好事者未嘗不中爭利者未嘗不窮也昔共工之力觸不周之山使地東南傾與高辛爭為帝遂潛于淵宗族殘滅繼嗣絶祀越王翳逃山穴越人熏而出之遂不得已由此觀之得在時不在爭治在道不在聖土處下不爭高故安而不危水下流不爭先故疾而不遲昔舜耕於歷山朞年而田者爭處墝埆以封畔肥饒相讓釣於河濱朞年而漁者爭處湍瀨以曲隈深潭相豫當此之時口不設言手不指麾執玄德於心而化馳若神使舜無其志雖口辨而戶說之不能化一人是故不道之道莽乎大哉夫能理三苗朝羽民徙祼國納肅慎未發號施令而移風易俗者其唯心行者乎法度刑罰何足以致之也是故聖人內修其本而不外飾其末保其精神偃其智故漠然無為而無不為也淡然無治而無不治也所謂無為者不先物為也所謂無不為者因物之所為也所謂無治者不易自然也所謂無不治者因物之相然也萬物有所生而獨知守其根百事有所出而獨知守其門故窮無窮極無極照物而不眩響應而不乏此之謂天解故得道者志弱而事強心虛而應當所謂志弱者柔毳安靜藏於不敢行於不能恬然無慮動不失時與萬物回周旋轉不為先唱感而應之是故貴者必以賤為號而高者必以下為基託小以包大在中以制外行柔而剛用弱而強轉化推移得一之道而以少正多所謂其事強者遭變應卒排患扞難力無不勝敵無不凌應化揆時莫能害之是故欲剛者必以柔守之欲強者必以弱保之積於柔則剛積於弱則強觀其所積以知禍福之鄉強勝不若己者至於若己者而同柔勝出於己者其力不可量故兵強則滅木強則折革堅則裂齒堅於舌而先之弊是故柔弱者生之幹也而堅強者死之徒也先唱者窮之路也後動者達之原也何以知其然也凡人中壽七十歲然而趨舍指湊日以月悔也以至於死故蘧伯玉年五十而有四十九年非何者先者難為知而後者易為攻也先者上高則後者攀之先者踰下則後者蹍之先者隤陷則後者以謀先者敗績則後者違之由此觀之先者則後者之弓矢質的也猶錞之與刃刃犯難而錞無患者何也以其託於後位有所屏蔽也此俗世庸民之所公見也而賢知者弗能避也所謂後者非謂其底滯而不發凝竭而不流貴其周於數而合於時也夫執道理以耦變先亦制後後亦制先是何則不失其所以制人人不能制也時之反側閒不容息先之則大過後之則不逮夫日回而月周時不與人游故聖人不貴尺之璧而重寸之陰時難得而易失也禹之趨時也履遺而弗取冠挂而弗顧非爭其先也而爭其得時也是故聖人守清道而抱雌節因循應變常後而不先柔弱以靜舒安以定攻大䃺堅莫能與之爭天下之物莫柔弱於水然而大不可極深不可測修極於無窮遠淪於無崖息耗減益通於不訾上天則為雨露下地則為潤澤萬物弗得不生百事不得不成大包群生而無私好澤及蚑蟯而不求報富贍天下而不既德施百姓而不費行不可得而窮極也微不可得而把握也擊之無創刺之不傷斬之不斷焚之不然淖溺流遁錯繆相紛而不可靡散利貫金石強濟天下動溶無形之域而翱翔忽區之上邅回川谷之閒而滔騰大荒之野有餘不足與天地取與授萬物而無所前後是故無所私而無所公靡濫振蕩與天地鴻洞無所左而無所右蟠委錯紾與萬物終始是謂至德夫水所以能成其至德於天下者以其淖溺潤滑也故老聃之言曰天下至柔馳騁於天下之至堅出於無有入於無閒吾是以知無為之有益夫無形者物之大祖也無音者聲之大宗也其子為光其孫為水皆生於無形乎夫光可見而不可握水可循而不可毀故有像之類莫尊於水出生入死自無跖有自有跖無而以衰賤矣是故清靜者德之至也而柔弱者道之要也虛無恬愈者萬物之用也肅然應感殷然反本則淪於無形矣所謂無形者一之謂也所謂一者無匹合於天下者也卓然獨立塊然獨處上通九天下貫九野員不中規方不中矩大渾而為一葉纍而無根懷囊天地為道關門穆忞隱閔純德獨存布施而不既用之而不勤是故視之不見其形聽之不聞其聲循之不得其身無形而有形生焉無聲而五音鳴焉無味而五味形焉無色而五色成焉是故有生於無實出於虛天下為之圈則名實同居音之數不過五而五音之變不可勝聽也味之和不過五而五味之化不可勝嘗也色之數不過五而五色之變不可勝觀也故音者宮立而五音形矣味者甘立而五味亭矣色者白立而五色成矣道者一立而萬物生矣是故一之理施四海一之解際天地其全也純兮若朴其散也混兮若濁濁而徐清沖而徐盈淡兮其若深淵泛兮其若浮雲若無而有若亡而存萬物之總皆閲一孔百事之根皆出一門其動無形變化若神其行無迹常後而先是故至人之治也掩其聰明滅其文章依道廢智與民同出于公去其誘慕除其嗜欲捐其思慮約其所守則察寡其所求則得夫任耳目以聽視者勞形而不明以知慮為治者苦心而無功是故聖人一度循軌不變其宜不易其常放準循繩曲因其當夫喜怒者道之邪也憂悲者德之失也好憎者心之過也嗜欲者性之纍也人大怒破陰大喜墜陽薄氣發瘖驚怖為狂憂悲多恚病乃成積好憎繁多禍乃相隨故心不憂樂德之至也通而不變靜之至也嗜欲不載虛之至也無所好憎平之至也不與物殽粹之至也能此五者則通於神明通於神明者得其內者也是故以中制外百事不廢中能得之則外能牧之中之得則五藏寧思慮平筋力徑強耳目聰明疏達而不悖堅強而不鞼無所大過而無所不逮處小而不逼處大而不窕其魂不躁其神不嬈湫漻寂漠為天下梟大道坦坦去身不遠求之近者往而復反感則能應迫則能動物穆無窮變無形像優游委縱如響之與景登高臨下無失所秉履危行險無忘玄仗大道坦坦去身不遠求之近者往而復反能存之此其德不虧萬物紛糅與之轉化以聽天下若背風而馳是謂至德至德則樂矣古之人有居巖穴而神不遺者末世有勢為萬乘而日憂悲者由此觀之聖亡乎治人而在于得道樂亡于富貴而在于德和知大己而小天下則幾於道矣所謂樂者豈必處京臺章華游雲夢沙丘耳聽九韶六瑩口味煎熬芬芳馳騁夷道釣射鷫鷞之謂樂乎吾所謂樂者人得其得者夫得其得者不以奢為樂不以廉為悲與陰俱閉與陽俱開故子夏心戰而臞道勝而肥聖人不以身役物不以欲滑和是故其為樂不欣欣其為悲不惙惙萬方百變消搖而無所定吾獨慷慨遺物而與道同出是故有以自得也喬木之下空穴之中足以適情無以自得也雖以天下為家萬民為臣妾不足以養生也能至于無樂者則無不樂無不樂則至樂極矣夫建鍾鼓列管弦席旃茵傅旄象耳聽朝歌北鄙靡靡之樂齊靡曼之色陳酒行𨢩夜以繼日強弩干高鳥走犬逐狡兔此其為樂也炎炎赫赫怵然若有所誘慕解車休馬罷酒徹樂而心忽然若有所喪悵然若有所亡也是何則不以內樂外而以外樂內樂作而喜曲終而悲悲喜轉而相生精神亂營不得須臾平察其所以不得其形而日以傷生失其得者也是故內不得於中稟授於外而以自飾也不浸于肌膚不浹于骨髓不留于心志不滯于五藏故從外入者無主於中不止從中出者無應於外不行故聽善言便計雖愚者知說之稱至德高行雖不肖者知慕之說之者衆而用之者鮮慕之者多而行之者寡所以然者何也不能反諸性也夫內不開於中而強學問者入於耳而不著於心此何以異於聾者之歌也效人為之而無以自樂也聲出於口則越而散矣夫心者五藏之主也所以制使四支流行血氣馳騁于是非之境而出入于百事之門戶者也是故不得於心而有經天下之氣是猶無耳而欲調鍾鼓無目而欲喜文章也亦必不勝其任矣故天下神器不可為也為者敗之執者失之夫許由小天下而不以己易堯者志遺于天下所以然者何也因天下而為天下也天下之要不在於彼而在於我不在於人而在於身身得則萬物備矣徹於心術之論則嗜欲好憎外矣是故無所喜而無所怒無所樂而無所苦萬物玄同無非無是化育玄耀生而如死夫天下者亦吾有也吾亦天下之有也天下之與我豈有間哉夫有天下者豈必攝權持勢操殺生之柄而以行其號令邪吾所謂有天下者非謂此也自得而已自得則天下亦得我矣吾與天下相得則常相有已又焉有不得容其閒者乎所謂自得者全其身者也全其身則與道為一矣故雖游於江潯海裔馳要裊建翠蓋目觀掉羽武象之樂耳聽滔朗奇麗激抮之音揚鄭衛之浩樂結激楚之遺風射沼濱之高鳥逐苑囿之走獸此齊民之所以淫泆流湎聖人處之不足以營其精神亂其氣志使心怵然失其情性處窮僻之鄉側溪谷之間隱于榛薄之中環堵之室茨之以生茅蓬戶甕牖揉桑以為樞上漏下溼潤浸北房雪霜滖灖浸潭苽蔣逍遙于廣澤之中而仿洋于山岬之旁此齊民之所為形植黎黑憂悲而不得志也聖人處之不為愁悴怨慰而失其所以自樂也是何則內有以通于天機而不以貴賤貧富勞逸失其志德者也故夫烏之啞啞鵲之唶唶豈嘗為寒暑燥溼變其聲哉是故夫得道已定而不待萬物之推移也非以一時之變化而定吾所以自得也吾所謂得者性命之情處其所安也夫性命者與形俱出其宗形備而性命成性命成而好憎生矣故士有一定之論女有不易之行規矩不能方圓鉤繩不能曲直天地之永登丘不可為修居卑不可為短是故得道者窮而不懾達而不榮處高而不機持盈而不傾新而不朗久而不渝入火不焦入水不濡是故不待勢而尊不待財而富不待力而強平虛下流與化翱翔若然者藏金於山藏珠於淵不利貨財不貪勢名是故不以康為樂不以慊為悲不以貴為安不以賤為危形神氣志各居其宜以隨天地之所為夫形者生之舍也氣者生之充也神者生之制也一失其位則二者傷矣是故聖人使各處其位守其職而不得相干也故夫形者非其所安也而處之則廢氣不當其所充也而用之則泄神非其所宜也而行之則昧此三者不可不慎守也夫舉天下萬物蚑蟯貞蟲蠕動蚑作皆知其所喜憎利害者何也以其性之在焉而不離也忽去之則骨肉無倫矣今人之所以眭然能視䁝然能聽形體能抗而百節可屈伸察能分白黑視醜美而知能別同異明是非者何也氣為之充而神為之使也何以知其然也凡人志各有所在而神有所繫者其行也足蹪趎坎頭抵植木而不自知也招之而不能見也呼之而不能聞也耳目非去之也然而不能應者何也神失其守也故在於小則忘於大在於中則忘於外在於上則忘於下在於左則忘於右無所不充則無所不在是故貴虛者以毫末為宅也今夫狂者之不能避水火之難而越溝瀆之嶮者豈無形神氣志哉然而用之異也失其所守之位而離其外內之舍是故舉錯不能當動靜不能中終身運枯形于連嶁列埒之門而蹪蹈于污壑穽陷之中雖生俱與人鈞然而不免為人戮笑者何也形神相失也故以神為主者形從而利以形為制者神從而害貪叨多欲之人漠㬆於勢利誘慕於名位冀以過人之智植高于世則精神日以耗而彌遠久淫而不還形閉中距則神無由入矣是以天下時有盲妄自失之患此膏燭之類也火逾然而消逾亟夫精神氣志者靜而充者日以壯躁而耗者日以老是故聖人將養其神和弱其氣平夷其形而與道沉浮俯仰恬然則縱之迫則用之其縱之也若委衣其用之也若發機如是則萬物之化無不遇而百事之變無不應
