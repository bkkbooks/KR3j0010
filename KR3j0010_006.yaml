body:
  text: 覽冥訓昔者師曠奏白雪之音而神物為之下降風雨暴至平公癃病晉國赤墬庶女叫天雷電下擊景公臺隕支體傷折海水大出夫瞽師庶女位賤尚葈權輕飛羽然而專精厲意委務積神上通九天激厲至精由此觀之上天之誅也雖在壙虛幽閒遼遠隱匿重襲石室界障險阻其無所逃之亦明矣武王伐紂渡于孟津陽侯之波逆流而擊疾風晦冥人馬不相見於是武王左操黃鉞右執白旄瞋目而撝之曰余在天下誰敢害吾志者於是風濟而波罷魯陽公與韓構難戰酣日暮援戈而撝之日為之反三舍夫全性保真不虧其身遭急迫難精通于天若乃未始出其宗者何為而不成夫死生同域不可脅凌勇武一人為三軍雄彼直求名耳而能自要者尚猶若此又況夫官天墬懷萬物而友造化含至和直偶于人形觀九鑽一一知之所不知而心未嘗死者乎昔雍門子以哭見於孟嘗君已而陳辭通意撫心發聲孟嘗君為之增欷歍唈流涕狼戾不可止精誠形於內而外諭哀於人心此不傳之道也使俗人不得其君形者而效其容必為人笑故蒲且子之連鳥於百仞之上而詹何之騖魚於大淵之中此皆得清淨之道太浩之和也夫物類之相應玄妙深微知不能論辨不能解故東風至而酒湛溢蠶咡絲而商弦絶或感之也畫隨灰而月運闕鯨魚死而彗星出或動之也故聖人在位懷道而不言澤及萬民君臣乖心則背譎見於天神氣相應徵矣故山雲草莽水雲魚鱗旱雲煙火涔雲波水各像其形類所以感之夫燧取火於日方諸取露於月天墬之閒巧歷不能舉其數手徵忽恍不能覽其光然以掌握之中引類於太極之上而水火可立致者陰陽同氣相動也此傅說之所以騎辰尾也故至陰飂飂至陽赫赫兩者交接成和而萬物生焉衆雄而無雌又何化之所能造乎所謂不言之辨不道之道也故召遠者使無為焉親近者言無事焉惟夜行者為能有之故卻走馬以糞而車軌不接於遠方之外是謂坐馳陸沈晝冥宵明以冬鑠膠以夏造冰夫天道者無私就也無私去也能者有餘拙者不足順之者利逆之者凶譬如隋侯之珠和氏之璧得之者富失之者貧得失之度深微窈冥難以知論不可以辨說也何以知其然今夫墬黃主屬骨而甘草主生肉之藥也以其屬骨責其生肉以其生肉論其屬骨是猶王孫綽之欲倍偏枯之藥而以生殊死之人亦可謂失論矣若夫以火能焦木也因使銷金則道行矣若以磁石之能連鐵也而求其引瓦則難矣物固不可以輕重論也夫燧之取火於日磁石之引鐵解之敗漆葵之鄉日雖有明智弗能然也故耳目之察不足以分物理心意之論不足以定是非故以智為治者難以持國唯通于太和而持自然之應者為能有之故嶢山崩而薄落之水涸區冶生而淳鈞之劍成紂為無道左強在側太公並世故武王之功立由是觀之利害之路禍福之門不可求而得也夫道之與德若韋之與革遠之則邇近之則疏不得其道若觀鯈魚故聖人若鏡不將不迎應而不藏故萬化而無傷其得之乃失之其失之非乃得之也今夫調弦者叩宮宮應彈角角動此同聲相和者也夫有改調一弦其於五音無所比鼓之而二十五弦皆應此未始異於聲而音之君已形也故通於太和者惛若純醉而甘臥以游其中而不知其所由至也純溫以淪鈍悶以終若未始出其宗是謂大通今夫赤螭青虬之游冀州也天清墬定毒獸不作飛鳥不駭入榛薄食薦梅噆味含甘步不出頃畝之區而蛇鱓輕之以為不能與之爭於江海之中若乃至於玄雲素朝陰陽交爭降扶風雜涷雨扶搖而登之威動天墬聲震海內蚖鱓著泥百仞之中熊羆匍匐丘山之巖虎豹襲穴而不敢咆猿狖顛蹶而失木枝又況直蛇鱓之類乎鳳皇之翔至德也雷霆不作風雨不興川谷不淡草木不搖而燕雀佼之以為不能與之爭於宇宙之間還至其曾逝萬仞之上翱翔四海之外過崑崙之疏圃飲砥柱之湍瀨邅回蒙汜之渚尚佯冀州之際徑躡都廣入日抑節濯羽弱水暮宿風穴當此之時鴻鵠鶬鶴莫不憚驚伏竄注喙江裔又況直燕雀之類乎此明於小動之迹而不知大節之所由者也昔者王良造父之御也上車攝轡馬為整齊而斂諧投足調均勞逸若一心怡氣和體便輕畢安勞樂進馳騖若滅左右若鞭周旋若環世皆以為巧然未見其貴者也若夫鉗且大丙之御也除轡銜去鞭棄策車莫動而自舉馬莫使而自走也日行月動星耀而玄運電奔而鬼騰進退屈伸不見朕垠故不招指不咄叱過歸鴈於碣石軼鶤雞於姑餘騁若飛騖若絶蹤矢躡風追猋歸忽朝發榑桑入日落棠此假弗用而能以成其用者也非慮思之察手爪之巧也嗜欲形於胸中而精神喻於六馬此以弗御御之者也昔者黃帝治天下而力牧太山稽輔之以治日月之行律陰陽之氣節四時之度正律歷之數別男女異雌雄明上下等貴賤使強不掩弱衆不暴寡人民保命而不夭歲時熟而不凶百官正而無私上下調而無尤法令明而不暗輔佐公而不阿田者不侵畔漁者不爭隈道不拾遺市不豫賈城郭不關邑無盜賊鄙旅之人相讓以財狗彘吐菽粟於路而無忿爭之心於是日月精明星辰不失其行風雨時節五穀登熟虎狼不妄噬鷙鳥不妄搏鳳皇翔於庭麒麟游於郊青龍進駕飛黃伏皂諸北儋耳之國莫不獻其貢職然猶未及虙戲氏之道也往古之時四極廢九州裂天不兼覆墬不周載火爁焱而不滅水浩溔而不息猛獸食顓民鷙鳥攫老弱於是女媧鍊五色石以補蒼天斷鼇足以立四極殺黑龍以濟冀州積蘆灰以止淫水蒼天補四極正淫水涸冀州平狡蟲死顓民生背方州抱員天和春陽夏殺秋約冬枕方寢繩陰陽所壅沈滯不通者竅理之逆氣戾物傷民厚積者絶止之當此之時臥倨倨興盱盱一自以為馬一自以為牛其行蹎蹎其視瞋瞋侗然皆得其和莫知其所由生浮游不知所求魍魎不知所往當此之時禽獸蟲蛇無不匿其爪牙藏其螫毒無有攫噬之心考其功烈上際九天下契黃壚名聲被後世光暉重萬物乘雷車服應龍驂青虬援絶瑞席蘿圖黃雲絡前白螭後奔蛇浮游消搖道鬼神登九天朝帝於靈門宓穆休于太祖之下然而不彰其功不揚其聲隱真人之道以從天墬之固然何則道德上通而智故消滅也逮至夏桀之時主暗晦而不明道瀾漫而不修棄捐五帝之恩刑推蹶三王之法籍是以至德滅而不揚帝道掩而不興舉事戾蒼天發號逆四時春秋縮其和天地除其德人君處位而不安大夫隱道而不言群臣準上意而懷當疏骨肉而自容邪人參耦比周而陰謀居君臣父子之間而競載驕主而像其意亂人以成其事是故君臣乖而不親骨肉疏而不附植社槁而㙤裂容臺振而掩覆犬群嘷而入淵豕銜蓐而席澳美人拿首墨面而不容曼聲吞炭內閉而不歌喪不盡其哀獵不聽其樂西老折勝黃神嘯吟飛鳥鎩翼走獸廢腳山無峻幹澤無窪水狐狸首穴馬牛放失田無立禾路無薠莎金積折廉璧襲無螺磬龜無腹蓍策日施晚世之時七國異族諸侯制法各殊習俗從橫間之舉兵而相角攻城濫殺覆高危安掘墳墓揚人骸大衝車高重壘除戰道便死路犯嚴敵殘不義百往一反名聲苟盛也是故質壯輕足者為甲卒千里之外家老羸弱悽愴於內廝徒馬圉軵車奉餉道路遼遠霜雪亟集短褐不完人羸車弊泥塗至膝相攜於道奮首於路身枕格而死所謂兼國有墬者伏尸數十萬破車以千百數傷弓弩矛戟矢石之創者扶舉於路故世至於枕人頭食人肉葅人肝飲人血甘之於芻豢故自三代以後者天下未嘗得安其情性而樂其習俗保其修命而不夭於人虐也所以然者何也諸侯力征天下不合而為一家逮至當今之時天子在上位持以道德輔以仁義近者獻其智遠者懷其德拱揖指麾而四海賓服春秋冬夏皆獻其貢職天下混而為一子孫相代此五帝之所以迎天德也夫聖人者不能生時時至而弗失也輔佐有能黜讒佞之端息巧辨之說除刻削之法去煩苛之事屏流言之迹塞朋黨之門消知能修太常隳枝體絀聰明大通混冥解意釋神漠然若無魂魄使萬物各復歸其根則是所修伏犧氏之迹而反五帝之道也夫鉗且大丙不施轡銜而以善御聞於天下伏戲女媧不設法度而以至德遺於後世何則至虛無純一而不𡁕喋苛事也周書曰掩雉不得更順其風今若夫申韓商鞅之為治也挬拔其根蕪棄其本而不窮究其所由生何以至此也鑿五刑為刻削乃背道德之本而爭於錐刀之末斬艾百姓殫盡太半而欣欣然常自以為治是猶抱薪而救火鑿竇而止水夫井植生㮆而不容甕溝植生條而不容舟不過三月必死所以然者何也皆狂生而無其本者也河九折注於海而流不絶者崑崙之輸也潦水不泄瀇漾極望旬月不雨則涸而枯澤受瀷而無源也譬若羿請不死之藥於西王母恆娥竊以奔月悵然有喪無以續之何則不知不死之藥所由生也是故乞火不若取燧寄汲不若鑿井
