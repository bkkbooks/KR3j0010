body:
  text: 兵略訓古之用兵非利土壤之廣而貪金玉之略將以存亡繼絶平天下之亂而除萬民之害也凡有血氣之蟲含牙戴角前爪後距有角者觸有齒者噬有毒者螫有蹄者趹喜而相戲怒而相害天之性也人有衣食之情而物弗能足也故群居雜處分不均求不贍則爭爭則強脅弱而勇侵怯人無筋骨之強爪牙之利故割革而為甲鑠鐵而為刃貪昧叨餮之人殘賊天下萬民搔動莫寧其所有聖人勃然而起乃討強暴平亂世夷險除穢以濁為清以危為寧故人得不中絶兵之所由來者遠矣黃帝嘗與炎帝戰矣顓頊嘗與共工爭矣故黃帝戰於涿鹿之野堯戰於丹水之浦舜伐有苗啓攻有扈自五帝而弗能偃也又況衰世乎夫兵者所以禁暴討亂也炎帝為火災故黃帝擒之共工為水害故顓頊誅之教之以道導之以德而不聽則臨之以威武臨之以威武而不從則制之以兵革故聖人之用兵也若櫛髮耨苗所去者少而所利者多殺無罪之民而養無義之君害莫大焉殫天下之財而贍一人之欲禍莫深焉使夏桀殷紂有害於民而立被其患不至於為炮格晉厲宋康行一不義而身死國亡不至於侵奪為暴此四君者皆有小過而莫之討也故至於攘天下害百姓肆一人之邪而長海內之禍此天論之所不取也所為立君者以禁暴討亂也今乘萬民之力而反為殘賊是為虎傅翼也曷為弗除夫畜池魚者必去猵獺養禽獸者也必去豺狼又況治人乎故霸王之兵以論慮之以策圖之以義扶之非以亡存也將以存亡也故聞敵國之君有加虐於其民者則舉兵而臨其境責之以不義刺之以過行兵至其郊乃命軍師曰無伐樹木毋抇墳墓毋爇五穀毋焚積聚毋捕民虜毋收六畜乃發號施令曰某國之君傲天侮鬼決獄不辜殺戮無罪此天之所誅也民之所仇也兵之來也以廢不義而復有德也有逆天之道帥民之賊者身死族滅以家聽者祿以家以里聽者賞以里以鄉聽者封以鄉以縣聽者侯以縣剋國不及其民廢其君而易其政尊其秀士而顯其賢良振其孤寡而恤其貧窮出其囹圄賞其有功百姓開門而待之淅米而儲之唯恐其不來也此湯武之所以致王而齊桓晉文之所以成霸也故君為無道民之思兵也苦旱而望雨渴而求飲夫有誰與交兵接刃乎故義兵之至也至於不戰而止晚世之兵君雖無道莫不設渠塹傅堞而守攻者非以禁暴除害也欲以侵地廣壤也是故至於伏尸流血相支以日而霸王之功不世出者自為之故也夫為地戰者不能成其王為身戰者不能立其功舉事以為人者衆助之舉事以自為者衆去之衆之所助雖弱必強衆之所去雖大必亡兵失道而弱得道而強將失道而拙得道而工國得道而存失道而亡所謂道者體員而法方背陰而抱陽左柔而右剛履幽而戴明變化無常得一之原以應無方是謂神明夫員者天也方者地也天員而無端故不得觀其形地方而無垠故莫能窺其門天化育而無形象地生長而無計量渾渾沆沆孰知其藏凡物有朕唯道無朕所以無朕者以其無常形勢也輪轉而無窮象日月之行若春秋有代謝若日月有晝夜終而復始明而復晦莫能得其紀制刑而無刑故功可成物物而不物故勝而不屈刑兵之極也至於無刑可謂極之極矣是故大兵無創與鬼神通五兵不厲天下莫之敢當建鼓不出庫諸侯莫不懾㥄沮膽其處故廟戰者帝神化者王所謂廟戰者法天道也神化者法四時也修政於境內而遠方慕其德制勝於未戰而諸侯服其威內政治也古得道者靜而法天地動而順日月喜怒而合四時叫呼而比雷霆音氣不戾八風詘伸不獲五度下至介鱗上及毛羽條循葉貫萬物百族由本至末莫不有序是故入小而不逼處大而不窕浸乎金石潤乎草木宇中六合振豪之末莫不順比道之浸洽滒淖纖微無所不在是以勝權多也夫射儀度不得則格的不中驥一節不用而千里不至夫戰而不勝者非鼓之之日也素行無刑久矣故得道之兵車不發軔騎不被鞍鼓不振塵旗不解卷甲不離矢刃不嘗血朝不易位賈不去肆農不離野招義而責之大國必朝小城必下因民之欲乘民之力而為之去殘除賊也故同利相死同情相成同欲相趨同惡相助順道而動天下為嚮因民而慮天下為鬭獵者逐禽車馳人趨各盡其力無刑罰之威而相為斥闉要遮者同所利也同舟而濟於江卒而遇風波百族之子捷捽招杼船若左右手不以相得其憂同也故明王之用兵也為天下除害而與萬民共享其利民之為用猶子之為父弟之為兄威之所加若崩山決塘敵孰敢當故善用兵者用其自為用也不能用兵者用其為己用也用其自為用則天下莫不可用也用其為己用則其所得者鮮矣兵有三詆治國家理境內行仁義布德惠立正法塞邪道群臣親附百姓和輯上下一心君臣同力諸侯服其威而四方懷其德修政廟堂之上而折衝千里之外拱揖指撝而天下響應此用兵之上也地廣民衆主賢將忠國富兵強約束信號令明兩軍相當鼓錞相望未至交兵接刃而敵人奔亡此用兵之次也知土地之宜習險隘之利明奇正之變察行陳解贖之數綰枹而鼓之白刃合流矢接涉血履腸輿死扶傷流血千里暴骸盈場乃以決勝此用兵之下也今夫天下皆知事治其末而莫知務修其本釋其根而樹其枝也夫兵之所以佐勝者衆而所以必勝者寡甲堅兵利車固馬良畜積給足士卒殷軫此軍之大資也而勝亡焉明於星辰日月之運刑德奇賌之數背鄉左右之便此戰之助也而全亡焉良將之所以必勝者恆有不原之智不道之道難與衆同也夫論除謹動靜時吏卒辨兵甲治正行五連行伯明鼓旗此大尉之官也營軍辨賦地極錯軍處此司馬之官也前後知險易見敵知難易發斥不忘遺此候之官也隧路亟行輜治賦丈均處軍輯井竈通此司空之官也收藏於後遷舍不離無淫輿無遺輜此輿之官也凡此五官之於將也猶身之有股肱手足也必擇其人技其才使官勝其任人能其事告之以政申之以令使之若虎豹之有爪牙飛鳥之有六翮莫得不為用然皆佐勝之具也非所以必勝也兵之勝敗本在於政政勝其民下附其上則兵強矣民勝其政下畔其上則兵弱矣故德義足以懷天下之民事業足以當天下之急選舉足以得賢士之心謀慮足以知強弱之權此必勝之本也地廣人衆不足以為強堅甲利兵不足以為勝高城深池不足以為固嚴令繁刑不足以為威為存政者雖小必存為亡政者雖大必亡昔者楚人地南卷沅湘北繞潁泗西包巴蜀東裹郯邳潁汝以為洫江漢以為池垣之以鄧林綿之以方城山高尋雲溪肆無景地利形便卒民勇敢蛟革犀兕以為甲胄修鎩短鏦齊為前行積弩陪後錯車衛旁疾如鍭矢合如雷電解如風雨然而兵殆於垂沙衆破於柏舉楚國之強度地計衆中分天下然懷王北畏孟嘗君背社稷之守而委身強秦兵挫地削身死不還二世皇帝勢為天子富有天下人迹所至舟楫所通莫不為郡縣然縱耳目之欲窮侈靡之變不顧百姓之飢寒窮匱也興萬乘之駕而作阿房之宮發閭左之戍收太半之賦百姓之隨逮肆刑挽輅首路死者一旦不知千萬之數天下敖然若焦熱傾然若苦烈上下不相寧吏民不相憀戍卒陳勝興於大澤攘臂袒右稱為大楚而天下響應當此之時非有堅甲利兵徑弩強衝也伐橪棗而為矜周錐鑿而為刃剡摲筡奮儋钁以當修戟強弩攻城略地莫不降下天下為之糜沸蟻動雲徹席卷方數千里勢位至賤而器械甚不利然一人唱而天下和之者積怨在於民也武王伐紂東面而迎歲至汜而水至共頭而墜彗星出而授殷人其柄當戰之時十日亂於上風雨擊於中然而前無蹈難之賞而後無遁北之刑白刃不畢拔而天下傅矣是故善守者無與御而善戰者無與鬭明於禁舍開塞之道乘時勢因民欲而取天下故善為政者積其德善用兵者畜其怒德積而民可用怒畜而威可立也故文之所加者淺則權之所服者小德之所施者博則威之所制者廣威之所制者廣則我強而敵弱矣故善用兵者先弱敵而後戰者也故費不半而功自倍也湯之地方七十里而王者修德也智伯有千里之地而亡者窮武也故千乘之國行文德者王萬乘之國好用兵者亡故全兵先勝而後求戰敗兵先戰而後求勝德均則衆者勝寡力敵則智者勝愚智侔則有數者禽無數凡用兵者必先自廟戰主孰賢將孰能民孰附國孰治蓄積孰多士卒孰精甲兵孰利器備孰便故運籌於廟堂之上而決勝乎千里之外矣夫有形埒者天下訟見之有篇籍者世人傳學之此皆以形相勝者也善形者弗法也所貴道者貴其無形也無形則不可制迫也不可量度也不可巧詐也不可規慮也智見者人為之謀形見者人為之功衆見者人為之伏器見者人為之備動作周還倨句詘伸可巧詐者皆非善者也善者之動也神出而鬼行星耀而玄運進退詘伸不見朕垠鸞舉麟振鳳飛龍騰發如猋風疾如駭電以生擊死以盛乘衰以疾掩遲以飽制飢若以水滅火若以湯沃雪何往而不遂何之而不達在中虛神在外漠志運於無形出於不意與飄飄往與忽忽來莫知其所之與條出與間入莫知其所集卒如雷霆疾如風雨若從地出若從天下獨出獨入莫能應圉疾如鍭矢何可勝偶一晦一明孰知其端緒未見其發固已至矣故善用兵者見敵之虛乘而勿假也追而勿舍也迫而勿去也擊其猶猶陵其與與疾雷不及塞耳疾霆不暇掩目善用兵者若聲之與響若鏜之與鞈眯不給撫呼不給吸當此之時仰不見天俯不見地手不麾戈兵不盡拔擊之若雷薄之若風炎之若火陵之若波敵人靜不知其所守動不知其所為故鼓鳴旗麾當者莫不廢滯崩阤天下孰敢厲威抗節而當其前者故淩人者勝待人者敗為人杓者死兵靜則固專一則威分決則勇心疑則北力分則弱故能分人之兵疑人之心則錙銖有餘不能分人之兵疑人之心則數倍不足故紂之卒百萬而有百萬之心武王之卒三千皆專而為一故千人同心則得千人之力萬人異心則無一人之用將卒吏民動靜如身乃可以應敵合戰故計定而發分決而動將無疑謀卒無二心動無墮容口無虛言事無嘗試應敵必敏發動必亟故將以民為體而民以將為心心誠則肢體親䵒心疑則肢體撓北心不專一則體不節動將不誠必則卒不勇敢故良將之卒若虎之牙若兕之角若鳥之羽若蚈之足可以行可以舉可以噬可以觸強而不相敗衆而不相害一心以使之也故民誠從令雖少無畏民不從令雖衆為寡故下不親上其心不用卒不畏將其刑不戰守有必固而攻有必勝不待交兵接刃而存亡之機固以形矣兵有三勢有二權有氣勢有地勢有因勢將充勇而輕敵卒果敢而樂戰三軍之衆百萬之師志厲青雲氣如飄風聲如雷霆誠積踰而威加敵人此謂氣勢硤路津關大山名塞龍蛇蟠簦笠居羊腸道魚笱門一人守隘而千人弗敢過也此謂地勢因其勞倦怠亂飢渴凍暍推其搖搖擠其揭揭此謂因勢善用間諜審錯規慮設施蔚伏隱匿其形出於不意使敵人之兵無所適備此謂知權陳卒正前行選進退俱什伍摶前後不相撚左右不相干受刃者少傷敵者衆此謂事權權勢必形吏卒專精選良用才官得其人計定謀決明於死生舉錯得時莫不振驚故攻不待衝隆雲梯而城拔戰不至交兵接刃而敵破明於必勝之數也故兵不必勝不苟接刃攻不必取不為苟發故勝定而後戰鈐縣而後動故衆聚而不虛散兵出而不徒歸唯無一動動則淩天振地抗泰山蕩四海鬼神移徙鳥獸驚駭如此則野無校兵國無守城矣靜以合躁治以待亂無形而制有形無為而應變雖未能得勝於敵敵不可得勝之道也敵先我動則是見其形也彼躁我靜則是罷其力也形見則勝可制也力罷則威可立也視其所為因與之化觀其邪正以制其命餌之以所欲以罷其足彼若有間急填其隙極其變而束之盡其節而朴之敵若反靜為之出奇彼不吾應獨盡其和若動而應有見所為彼持後節與之推移彼有所積必有所虧精若轉左陷其右陂敵潰而走後必可移敵迫而不動名之曰奄遲擊之如雷霆斬之若草木耀之若火電欲疾以遬人不及步趨車不及轉轂兵如植木弩如羊角人雖衆多勢莫敢格諸有象者莫不可勝也諸有形者莫不可應也是以聖人藏形於無而遊心於虛風雨可障蔽而寒暑不可關閉以其無形故也夫能滒淖精微貫金石窮至遠放乎九天之上蟠乎黃盧之下唯無形者也善用兵者當擊其亂不攻其治不襲堂堂之寇不擊填填之旗容未可見以數相持彼有死形因而制之敵人執數動則就陰以虛應實必為之禽虎豹不動不入陷阱麋鹿不動不離罝罘飛鳥不動不絓罔羅魚鱉不動不擐脣喙物未有不以動而制者也是故聖人貴靜靜則能應躁後則能應先數則能勝疏博則能禽缺故良將之用卒也同其心一其力勇者不得獨進怯者不得獨退止如丘山發如風雨所淩必破靡不毀沮動如一體莫之應圉是故傷敵者衆而手戰者寡矣夫五指之更彈不若捲手之一挃萬人之更進不如百人之俱至也今夫虎豹便捷熊羆多力然而人食其肉而席其革者不能通其知而一其力也夫水勢勝火章華之臺燒以斗勺沃而救之雖涸井而竭池無奈之何也舉壺榼盆盎而以灌之其滅可立而待也今人之與人非有水火之勝也而欲以少耦衆不能成其功亦明矣兵家或言曰少可以耦衆此言所將非言所戰也或將衆而用寡者勢不齊也將寡而用衆者用力諧也若乃人盡其才悉用其力以少勝衆者自古及今未嘗聞也神莫貴於天勢莫便於地動莫急於時用莫利於人凡此四者兵之幹植也然必待道而後行可一用也夫地利勝天時巧舉勝地利勢勝人故任天者可迷也任地者可束也任時者可迫也任人者可惑也夫仁勇信廉人之美才也然勇者可誘也仁者可奪也信者易欺也廉者易謀也將衆者有一見焉則為人禽矣由此觀之則兵以道理制勝而不以人才之賢亦自明矣是故為麋鹿者則可以罝罘設也為魚鱉者則可以罔罟取也為鴻鵠者則可以矰繳加也唯無形者無可奈也是故聖人藏於無原故其情不可得而觀運於無形故其陳不可得而經無法無儀來而為之宜無名無狀變而為之象深哉睭睭遠哉悠悠且冬且夏且春且秋上窮至高之末下測至深之底變化消息無所疑滯建心乎窈冥之野而藏志乎九旋之淵雖有明目孰能窺其情兵之所隱議者天道也所圖畫者地形也所明言者人事也所以決勝者鈐勢也故上將之用兵也上得天道下得地利中得人心乃行之以機發之以勢是以無破軍敗兵及至中將上不知天道下不知地利專用人與勢雖未必能萬全勝鈐必多矣下將之用兵也博聞而自亂多知而自疑居則恐懼發則猶豫是以動為人禽矣今使兩人接刃巧拙不異而勇士必勝者何也其行之誠也夫以巨斧擊桐薪不待利時良日而後破之加巨斧於桐薪之上而無人力之奉雖順招搖挾刑德而弗能破者以其無勢也故水激則悍矢激則遠夫栝淇衛箘簬載以銀錫雖有薄縞之幨腐荷之櫓然猶不能獨穿也若假之筋角之力弓弩之勢則貫兕甲而徑於革盾矣夫風之疾至於飛屋折木虛舉之下大達自上高丘人之有所推也是故善用兵者勢如決積水於千仞之隄若轉員石於萬丈之溪天下見吾兵之必用也則孰敢與我戰者故百人之必死也賢於萬人之必北也況以三軍之衆赴水火而不還踵乎雖誂合刃於天下誰敢在於上者所謂天數者左青龍右白虎前朱鳥後玄武所謂地利者後生而前死左牡而右牝所謂人事者慶賞信而刑罰必動靜時舉錯疾此世傳之所以為儀表者因也然而非所以生儀表者因時而變化者也是故處於堂上之陰而知日月之次序見瓶中之冰而知天下之寒暑夫物之所以相形者微唯聖人達其至故鼓不與於五音而為五音主水不與於五味而為五味調將軍不與於五官之事而為五官督故能調五音者不與五音者也能調五味者不與五味者也能治五官之事者不可揆度者也是故將軍之心滔滔如春曠曠如夏湫漻如秋典凝如冬因形而與之化隨時而與之移夫景不為曲物直響不為清音濁觀彼之所以來各以其勝應之是故扶義而動推理而行掩節而斷割因資而成功使彼知吾所出而不知吾所入知吾所舉而不知吾所集始如狐狸彼故輕來合如兕虎敵故奔走夫飛鳥之摯也俯其首猛獸之攫也匿其爪虎豹不外其牙而噬犬不見其齒故用兵之道示之以柔而迎之以剛示之以弱而乘之以強為之以歙而應之以張將欲西而示之以東先忤而後合前冥而後明若鬼之無迹若水之無創故所鄉非所之也所見非所謀也舉措動靜莫能識也若雷之擊不可為備所用不復故勝可百全與玄明通莫知其門是謂至神兵之所以強者必死也民之所以必死者義也義之所以能行者威也是故合之以文齊之以武是謂必取威義並行是謂至強夫人之所樂者生也而所憎者死也然而高城深池矢石若雨平原廣澤白刃交接而卒爭先合者彼非輕死而樂傷也為其賞信而罰明也是故上視下如子則下視上如父上視下如弟則下視上如兄上視下如子則必王四海下視上如父則必正天下上親下如弟則不難為之死下事上如兄則不難為之亡是故父子兄弟之寇不可與鬭者積恩先施也故四馬不調造父不能以致遠弓矢不調羿不能以必中君臣乖心則孫子不能以應敵是故內修其政以積其德外塞其醜以服其威察其勞佚以知其飽飢故戰日有期視死若歸故將必與卒同甘苦侔飢寒故其死可得而盡也故古之善將者必以其身先之暑不張蓋寒不被裘所以程寒暑也險隘不乘士陵必下所以齊勞佚也軍食熟然後敢食軍井通而後敢飲所以同飢渴也合戰必立矢石之所及所以共安危也故良將之用兵也常以積德擊積怨以積愛擊積憎何故而不勝主之所求於民者二求民為之勞也欲民為之死也民之所望於主者三飢者能食之勞者能息之有功者能德之民以償其二責而上失其三望國雖大人雖衆兵猶且弱也若苦者必得其樂勞者必得其利斬首之功必全死事之後必賞四者既信於民矣主雖射雲中之鳥而釣深淵之魚彈琴瑟聲鍾竽敦六博投高壺兵猶且強令猶且行也是故上足仰則下可用也德足慕則威可立也將者必有三隧四義五行十守所謂三隧者上知天道下習地形中察人情所謂四義者便國不員兵為主不顧身見難不畏死決疑不辟罪所謂五行者柔而不可卷也剛而不可折也仁而不可犯也信而不可欺也勇而不可陵也所謂十守者神清而不可濁也謀遠而不可慕也操固而不可遷也知明而不可蔽也不食於貨不淫於物不嚂於辨不推於方不可喜也不可怒也是謂至旍窈窈冥冥孰知其情發必中詮言必合數動必順時解必中揍通動靜之機明開塞之節審舉措之利害若合符節疾如彍弩勢如發矢一龍一蛇動無常體莫見其所中莫知其所窮攻則不可守守則不可攻蓋聞善用兵者必先修諸己而後求諸人先為不可勝而後求勝修己於人求勝於敵己未能治也而攻人之亂是猶以火救火以水應水也何所能制今使陶人化而為埴則不能成盆盎工女化而為絲則不能織文錦同莫足以相治也故以異為奇兩爵相與鬭未有死者也鸇鷹至則為之解以其異類也故靜為躁奇治為亂奇飽為飢奇佚為勞奇奇正之相應若水火金木之代為雌雄也善用兵者持五殺以應故能全其勝拙者處五死以貪故動而為人擒兵貴謀之不測也形之隱匿也出於不意不可以設備也謀見則窮形見則制故善用兵者上隱之天下隱之地中隱之人隱之天者無不制也何謂隱之天大寒甚暑疾風暴雨大霧冥晦因此而為變者也何謂隱之地山陵丘阜林叢險阻可以伏匿而不見形者也何謂隱之人蔽之於前望之於後出奇行陳之間發如雷霆疾如風雨搴巨旗止鳴鼓而出入無形莫知其端緒者也故前後正齊四方如繩出入解贖不相越淩翼輕邊利或前或後離合散聚不失行伍此善修行陳者也明於奇賌陰陽刑德五行望氣候星龜策禨祥此善為天道者也設規慮施蔚伏見用水火出珍怪鼓譟軍所以營其耳也曳梢肆柴揚塵起堨所以營其目者此善為詐佯者也錞鉞牢重固植而難恐勢利不能誘死亡不能動此善為充幹者也剽疾輕悍勇敢輕敵疾若滅沒此善用輕出奇者也相地形處次舍治壁壘審煙斥居高陵舍出處此善為地形者也因其飢渴凍暍勞倦怠亂恐懼窘步乘之以選卒擊之以宵夜此善因時應變者也易則用車險則用騎涉水多弓隘則用弩晝則多旌夜則多火晦冥多鼓此善為設施者也凡此八者不可一無也然而非兵之貴者也夫將者必獨見獨知獨見者見人所不見也獨知者知人所不知也見人所不見謂之明知人所不知謂之神神明者先勝者也先勝者守不可攻戰不可勝者攻不可守虛實是也上下有隙將吏不相得所持不直卒心積不服所謂虛也主明將良上下同心氣意俱起所謂實也若以水投火所當者陷所薄者移牢柔不相通而勝相奇者虛實之謂也故善戰者不在少善守者不在小勝在得威敗在失氣夫實則鬭虛則走盛則強衰則北吳王夫差地方二千里帶甲七十萬南與越戰棲之會稽北與齊戰破之艾陵西遇晉公擒之黃池此用民氣之實也其後驕溢縱欲距諫喜諛憢悍遂過不可正喻大臣怨懟百姓不附越王選卒三千人擒之干隧因制其虛也夫氣之有虛實也若明之必晦也故勝兵者非常實也敗兵者非常虛也善者能實其民氣以待人之虛也不能者虛其民氣以待人之實也故虛實之氣兵之貴者也凡國有難君自宮召將而詔之曰社稷之命在將軍身今國有難願子將而應之將軍受命乃令祝史太卜齊宿三日之太廟鑽靈龜卜吉日以受鼓旗君入廟門西面而立將入廟門趨至堂下北面而立主親操鉞持頭授將軍其柄曰從此上至天者將軍制之復操斧持頭授將軍其柄曰從此下至淵者將軍制之將已受斧鉞答曰國不可從外治也軍不可從中御也二心不可以事君疑志不可以應敵臣既以受制於前矣專鼓旗斧鉞之威臣無還請願君亦無垂一言之命於臣也君若不許臣不敢將君若許之臣辭而行乃爪鬋設明衣也鑿凶門而出乘將軍車載旌旗斧鉞纍若不勝其臨敵決戰不顧必死無有二心是故無天於上無地於下無敵於前無主於後進不求名退不避罪唯民是保利合於主國之寶也上將之道也如此則智者為之慮勇者為之鬭氣厲青雲疾如馳騖是故兵未交接而敵人恐懼若戰勝敵奔畢受功賞吏遷官益爵祿割地而為和決於封外卒論斷於軍中顧反於國放旗以入斧鉞報畢於君曰軍無後治乃縞素辟舍請罪於君君曰赦之退齋服大勝三年反舍中勝二年下勝期年兵之所加者必無道之國也故能戰勝而不報取地而不反民不疾疫將不夭死五穀豐昌風雨時節戰勝於外福生於內是故名必成而後無餘害矣
