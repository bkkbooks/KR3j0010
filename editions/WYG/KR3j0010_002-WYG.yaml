body:
  text: 淮南鴻烈解卷二漢髙誘注俶真訓俶始也真實也説道之實始於無化育于有故曰俶真俶音出有始者有未始有有始者有未始有夫未始有有始者有有者有無者有未始有有無者有未始有夫未始有有無者所謂有始者繁憤未發萌兆牙蘖未有形埒垠寅堮􅀈無無蝡軟蝡將欲生興而未成物類繁憤衆積之貌發憤也有未始有有始者天氣始下地氣始上隂陽錯合相與優游競暢于宇宙之間被徳含和繽紛蘢蓯欲與物接而未成兆朕競逐暢達和氣繽紛雜揉也蘢蓯聚會也兆朕形怪也蘢音龍蓯音聰有未始有夫未始有有始者天含和而未降地懐氣而未揚虚無寂寞蕭條霄雿翟無有仿彿彿氣遂而大通㝠㝠者也有有者言萬物摻參落根莖枝葉青葱苓蘢萑委蔰户炫煌蠉飛蝡動蚑行喙息可切循把握而有數量摻纖也萑蔰炫煌采色貌切嚤循順也有無者視之不見其形聽之不聞其聲捫門之不可得也望之不可極也儲與扈冶儲與扈冶褒大意也浩浩瀚汗瀚不可隠儀揆度而通光耀者浩浩瀚瀚廣大貌光耀無形也有未始有有無者包裹天地陶冶萬物大通混㝠深閎廣大不可為外析毫剖芒不可為内無環堵之宇而生有無之根混㝠大㝠之中謂道也有未始有夫未始有有無者天地未剖隂陽未判四時未分萬物未生汪然平靜寂然清澄莫見其形若光燿之間於無有退而自失也曰予能有無而未能無無也能有無為也未能本性自無為也及其為無無至妙何從及此哉夫大塊載我以形勞我以生逸我以老休我以死大塊天地之間休息也善我生者乃所以善我死也欲人同死生也夫藏舟於壑藏山於澤人謂之固矣雖然夜半有力者負而趨寐者不知猶有所遁若藏天下於天下則無所遁其形矣大丈夫以天下為室以藏萬物物豈可謂無大揚攉鎬乎揚攉無慮大數名也一範人之形而猶喜範猶遇也遭也言物一法效人形尚由善也若人者千變萬化而未始有極也言死生變化也弊而復新其為樂也可勝計邪譬若㝱夢為鳥而飛於天㝱為魚而沒於淵方其㝱也不知其㝱也覺而後知其㝱也今將有大覺然後知今此之為大㝱也始吾未生之時焉知生之樂也今吾未死又焉知死之不樂也昔公牛哀轉病也七日化為虎公牛氏韓人轉病易病也江淮之間公牛氏有易病化為虎若中國有狂疾者疾作有時也其為虎者便還食人食人者因作真虎不食人者更復化為人其兄掩户而入覘詀之則虎搏而殺之覘視也是故文章成獸爪牙移易移易人爪牙為虎爪牙志與心變神與形化志心皆變神形皆化方其為虎也不知其嘗為人也方其為人不知其且為虎也二者代謝舛喘馳各樂其成形代更謝敘也舛牙也形謂成虎形人狡猾鈍惽是非無端孰知其所萌夫水嚮冬則凝而為氷氷迎春則泮而為水氷水移易于前後若周員而趨孰暇知其所苦樂乎泮釋也趨歸也是故形傷于寒暑燥濕之虐者形苑而神壯苑枯病也壯傷也神傷乎喜怒思慮之患者神盡而形有餘故罷皮馬之死也剥之若槁狡狗之死也割之有濡狡少也濡濡濕氣力未盡是故傷死者其鬼嬈嬈煩嬈善行病祟人嬈音遶時既者其神漠既盡也時既當老者則神寂漠漠定也是皆不得形神俱沒也道家養形養神皆以壽終形神俱沒不但漠而已也夫聖人用心杖性依神相扶而得終始是故其寐不㝱其覺不憂精神無所思慮故不㝱志存仁義患不得至故不憂古之人有處混㝠之中神氣不蕩于外萬物恬漠以愉靜攙讒搶撑衡杓之氣莫不彌靡攙搶彗孛也杓北斗柄第七星而不能為害當此之時萬民猖狂不知東西含哺而游鼓腹而熙鼓擊熙戲也交被天和食于地徳交俱和氣也地徳五穀也不以曲故是非相尤茫茫沈沈是謂大治曲故曲巧也尤過也茫茫沈沈盛貌於是在上位者左右而使之毋淫其性鎮撫而有之毋遷其徳是故仁義不布而萬物蕃殖古者抱盛徳上質是不待仁義而萬物蕃殖賞罰不施而天下賔服其道可以大美興而難以算計舉也言天性萬物但可以大美興而育之難以算計具也是故日計之不足而嵗計之有餘以限計之故有餘也譬若梅矣百梅足以為百人酸一梅不足為百人酸也夫魚相忘於江湖人相忘於道術言各得其志故相忘古之真人立於天地之本中至優游抱徳煬養和而萬物雜累焉煬炙也抱其志徳而炙於和氣故萬物雜累言成熟也孰肯解構人間之事以物煩其性命乎解構猶合會也煩辱也夫道有經紀條貫得一之道連千枝萬葉一者道之本也得其根本故能連理千枝萬葉是故貴有以行令賤有以忘卑貧有以樂業困有以處危夫大寒至霜雪降然後知松柏之茂也據難履危利害陳于前然後知聖人之不失道也是故能戴大員者履大方言能戴天履地之道鏡太清者視大明立太平者處大堂太平天下之平也大堂明堂所以告朔行令也能游㝠㝠者與日月同光光明也諭得道者能與日月竝明也是故以道為竿以徳為綸禮樂為鉤仁義為餌投之於江浮之於海萬物紛紛孰非其有夫挾依於跂躍之術跂躍猶齟齬不正之道也提挈人間之際撢潭掞善挻延挏同世之風俗撢引掞利也挻挏猶上下也以求利便也以摸蘇牽連物之微妙摸蘇猶摸索微妙猶細小也猶得肆其志充其欲何況懐環瑋之道忘肝膽遺耳目獨浮游無方之外不與物相弊跋摋弊摋猶雜揉也摋音殺中徙倚無形之域而和以天地者乎若然者偃其聰明而抱其太素以利害為塵垢以死生為晝夜是故目觀玉輅琬象之狀耳聽白雪清角之聲不能以亂其神玉輅王者所乘有琬琰象牙之飾白雪師曠所奏太一五絃之琴登千仞之谿臨蝯元眩之岸不足以滑汨其和蝯臨其岸而目眩也滑亂和適也譬若鍾山之玉炊以罏炭三日三夜而色澤不變則至徳天地之精也鍾山崑崙也是故生不足以使之利何足以動之死不足以禁之害何足以恐之明於死生之分達於利害之變雖以天下之大易骭閈之一毛無所槩於志也骭自膝以下脛以上也夫貴賤之於身也猶條風之時麗也條風鳴條言其迅也麗過也毁譽之於己猶蚊䖟之一過也夫秉皓白而不黑行純粹而不糅處𤣥㝠而不闇休于天鈞而不䃣䃣敗也天鈞北極之地積寒之野休之輒敗唯體道者為能不敗也䃣音為孟門終隆之山不能禁孟門山名太行之隘也終隆終南山在扶風皆險塞也唯體道能不敗湍瀨旋淵吕梁之深不能留也湍瀨急流也旋淵深淵也吕梁水名水險也留滯也太行石澗飛狐胡句望之險不能難也太行石澗飛狐句望皆隘險也是故身處江海之上而神游魏闕之下魏闕王者門外闕也所以縣教象之書於象魏也巍巍髙大故曰魏闕言真人雖在逺方心存王也非得一原孰能至於此哉一原道之原是故與至人居使家忘貧使王公簡其富貴而樂卑賤勇者衰其氣貪者消其欲坐而不教立而不議虚而往者實而歸故不言而能飲人以和是故至道無為一龍一蛇龍能化蛇能解蛻故道以為譬盈縮卷舒與時變化外從其風内守其性耳目不燿思慮不營其所居神者臺簡以游太清臺持簡大也引楯允萬物羣美萌生引楯拔擢也是故事其神者神去之事治也休其神者神居之不動擾道出一原通九門九門天之門散六衢散布於六合之衢設於無垓該坫玷之宇設施也垓坫垠堮也寂漠以虚無非有為於物也物以有為於己也非有為於物者不為之也物以有為於己者物巳為也是故舉事而順于道者非道之所為也道之所施也夫天之所覆地之所載六合所包隂陽所呴吁雨露所濡道徳所扶此皆生一父母而閱一和也父母天地閱總也和氣道所貴也是故槐榆與橘柚右合而為兄弟柚小橘也同異物有苗與三危通為一家三危國名夫目視鴻鵠之飛耳聽琴瑟之聲而心在鴈門之間一身之中神之分離剖判六合之内一舉而千萬里是故自其異者視之肝膽胡越肝膽諭近胡越諭逺自其同者視之萬物一圏也圏陬也百家異説各有所出若夫墨楊申商之於治道墨墨翟之術兼愛楊朱之術全性保真申者申不害也尚刻削商者鞅也尚嚴猛猶葢之無一橑遼而輪之無一輻有之可以備數無之未有害於用也已自以為獨擅之不通之于天地之情也今夫冶工之鑄器鑄讀作祝金踊躍于罏中必有波溢而播棄者其中地而凝滯亦有以象於物者矣其形雖有所小用哉然未可以保於周室之九鼎也保猶葆也寳也又況比於規形者乎其與道相去亦逺矣今夫萬物之疏躍枝舉百事之莖葉條㮆遏皆本於一根而條循千萬也疏躍布散也㮆讀作蘖旁生萌芽也若此則有所受之矣而非所授者所受者無授也而無不受也無不受也者譬若周雲之蘢蓯遼巢彭濞譬而為雨周雲宻雲雨也蘢蓯聚合也遼巢彭濞藴積貌沈溺萬物而不與為溼焉不與萬物俱溼今夫善射者有儀表之度如工匠有規矩之數此皆所得以至於妙然而奚仲不能為逄蒙奚仲巧為車逄蒙善於射言未能相兼也造父不能為伯樂者造父善御馬事周穆王伯樂善相馬事秦繆公是曰諭於一曲而不通于萬方之際也今以湼染緇則黑於湼以藍染青則青於藍湼非緇也青非藍也兹雖遇其母而無能復化已藍染草湼礬石也母本也是何則以諭其轉而益薄也何況夫未始有湼藍造化之者乎其為化也雖鏤金石書竹帛何足以舉其數由此觀之物莫不生於有也小大優游矣言饒多也夫秋毫之末淪於無間而復歸於大矣蘆苻之厚通於無整垠而復反於敦龐秋毫微妙故能入於無間間孔言道無形以毫末比道猶復為大也厚猶薄也蘆葦也苻蘆之中白苻言其薄柯則歸於葦故曰反於敦龐也若夫無秋毫之微蘆苻䴸之厚四達無境通于無圻道貴無形秋毫蘆苻已有形故曰無秋毫之微蘆苻之厚而四達無境通於無圻圻音寅垠也而莫之要御夭遏者其襲微重妙挺挏萬物揣丸變化天地之間何足以論之夫疾風㪍渤木而不能拔毛髮雲臺之髙墮者折脊碎腦而蟁民蝱蒙適足以翺翔㪍亦拔也臺髙際於雲故曰雲臺也翺翔無傷毁之患道所貴也夫與蚑蟯同乘天機蚑行蟯動諭微細也天機神馬夫受形於一圏飛輕微細者猶足以脱其命又況未有類也類形象也未有形象道所尚也由此觀之無形而生有形亦明矣是故聖人託其神於靈府而歸於萬物之初視於㝠㝠聽於無聲㝠㝠之中獨見曉焉曉明也寂漠之中獨有照焉其用之也以不用其不用也而後能用之其知也乃不知其不知也而後能知之也夫天不定日月無所載地不定草木無所植所立於身者不寧是非無所形形見也是故有真人然後有真知其所持者不明庸詎知吾所謂知之非不知歟今夫積惠重厚累愛襲恩以聲華嘔苻嫗掩萬民百姓使知之訢訢然人樂其性者仁也舉大功立顯名體君臣正上下明親疏等貴賤存危國繼絶世決挐治煩興毁宗立無後者義也閉九竅藏心志棄聰明反無識芒然仿佯于塵埃之外而消搖于無事之業含隂吐陽而萬物和同者徳也是故道散而為徳徳溢而為仁義仁義立而道徳廢矣百圍之木斬而為犧尊犧尊酒器畫犧牛之象以飾尊也鏤之以剞技􅕻厥雜之以青黄華藻鎛鮮龍蛇虎豹曲成文章剞巧工鈎刀也􅕻者規度刺畫墨邊箋也所以刻鏤之具也青黄采色之飾也華藻華文也鎛今之金尊也鮮明好也龍蛇虎豹者刻尊彞為蟠龍伏虎之狀故曰曲成文章然其斷在溝中一比犧尊溝中之斷則醜美有間矣間逺也然而失木性鈞也是故神越者其言華徳蕩者其行偽越散也蕩逸偽不誠也至精亡於中而言行觀於外此不免以身役物矣夫趨舍行偽者為精求于外也精有湫盡而行無窮極則滑心濁神而惑亂其本矣其所守者不定而外淫於世俗之風所斷差跌者而内以濁其清明是故躊躇以終而不得須臾恬澹矣是故聖人内修道術而不外飾仁義不知耳目之宣而游于精神之和若然者下揆三泉上尋九天横廓六合揲設貫萬物此聖人之游也若夫真人則動溶于至虚而游于滅亡之野騎蜚廉而從敦圄蜚廉獸名長毛有翼敦圄似虎而小圄音語馳於方外休乎宇内燭十日而使風雨臣雷公役夸誇父雷公夸父皆仙人也妾宓妃妻織女宓妃神女也天地之間何足以留其志是故虚無者道之舍平易者道之素素性也夫人之事其神而嬈其精營慧然而有求於外此皆失其神明而離其宅也事治也嬈煩也營慧求索名利者也離宅離精神之宅也是故凍者假兼衣于春而暍謁者望冷風于秋夫有病於内者必有色於外矣夫梣尋木色青翳而蠃裸瘉與蝸𤓰睆梣木青皮蠃蜾蟲蝸牛郎䗂蝓也螺也睆音喚此皆治目之藥也人無故求此物者必有蔽其明者聖人之所以駭天下者真人未嘗過焉賢人之所以矯世俗者聖人未嘗觀焉夫牛蹏之涔岑無尺之鯉涔潦水也謂水澇之年大道上之積水塊阜之山無丈之材塊阜小山也所以然者何也皆其營宇狹小而不能容巨大也又況乎以無裹之者邪無裹無形也此其為山淵之勢亦逺矣夫人之拘於世也必形繫而神泄故不免於虚形繫者身形疾而精神越泄不處其守虚疾也使我可係羇者必其有命在於外也至徳之世甘暝于溷混澖閑之域而徙倚于汗漫之宇溷澖無垠虚之貌汗漫無生形形生元氣之本神也宇居也提挈天地而委萬物以鴻濛為景柱而浮揚乎無畛軫崖之際一手曰提挈舉也委棄也言不以身役物鴻濛東方之野日所出者故以為影柱浮揚猶遨翔也無畛崖畔界因以為名也是故聖人呼吸隂陽之氣而羣生莫不顒顒然仰其徳以和順當此之時莫之領理決離隠宻而自成渾渾蒼蒼純樸未散旁薄為一而萬物大優渾渾蒼蒼混沌大貌優饒也是故雖有羿之知而無所用之羿堯時羿也善射能一日落九烏繳大風殺窫窳斬九嬰射河伯故曰知也及世之衰也至伏羲氏其道昧昧芒芒然吟徳懐和昧昧純厚也芒芒廣大貌吟咏其徳含懐其和氣未大宣布也被施頗烈被其徳澤頗烈施於民而知乃始昧昧晽林晽皆欲離其童蒙之心昧昧欲明而未也晽晽欲所知之貌離去也而覺視於天地之間是故其徳煩而不能一煩多一齊也乃至神農黄帝剖判大宗竅領天地襲九窽重九􅀢竅通領理襲因窽法􅀢音整形也言因九天九地之形法以通理也提挈隂陽嫥專捖桓剛柔枝解葉貫萬物百族嫥捖和調也族類也使各有經紀條貫於此萬民睢揮睢盱于盱然莫不竦身而載聽視睢盱聽視之貌是故治而不能和下棲遲至于昆吾夏后之世昆吾夏之伯夏后桀世也嗜欲連於物聰明誘於外而性命失其得施讀作易及周室之衰澆淳散樸雜道以偽儉徳以行而巧故萌生周室衰而王道廢儒墨乃始列道而議分徒而訟徒黨也訟爭是非也於是博學以疑聖華誣以脅衆弦歌鼓舞縁飾詩書以買名譽於天下繁登降之禮飾紱冕之服聚衆不足以極其變積財不足以贍其費於是萬民乃始慲滿觟化離跂觟徯徑之徯也各欲行其知偽以求鑿枘芮於世而錯擇名利鑿孔也枘筍也工人刻木以入鑿鑿即受之諭人施其巧偽索榮顯之名利也是故百姓曼衍於淫荒之陂而失其大宗之本夫世之所以喪性命有衰漸以然所由來者久矣是故聖人之學也欲以反性於初而游心於虚也性無不善而情欲害之故聖人能返其性於初游心於虚言無欲也達人之學也欲以通性於遼廓而覺於寂漠也若夫俗世之學也則不然擢徳􅠡騫性内愁五藏外勞耳目擢取􅠡縮也皆不循其理故愁其思慮也耳妄聽目妄視淫故勞也乃始招蟯振繾物之毫芒搖消掉弔捎梢仁義禮樂㬥行越智於天下以招號名聲於世搖消掉捎言未能行仁義禮樂也越揚㬥卒也越揚其詐譎之智以取聲名也此我所羞而不為也是故與其有天下也不若有說也説樂也不若有人説樂之也與其有説也不若尚徜羊徉物之終始也而條達有無之際是故舉世而譽之不加勸舉世而非之不加沮定于死生之境而通于榮辱之理雖有炎火洪水彌靡於天下神無虧缺於胷臆之中矣若然者視天下之間猶飛羽浮芥也孰肯分分然以物為事也分分猶意念之貌水之性真清而土汨之人性安靜而嗜欲亂之夫人之所受於天者耳目之於聲色也口鼻之於芳臭也肌膚之於寒燠其情一也或通於神明或不免於癡狂者何也其所為制者異也是故神者智之淵也淵清則智明矣智者心之府也智公則心平矣人莫鑑於流沫㑹而鑑於止水者以其靜也沫雨潦上沫起覆甌也言其濁擾不見人形也莫窺形於生鐵而窺於明鏡者以覩其易也夫唯易且靜形物之性也易平也形見也由此觀之用也必假之於弗用也是故虚室生白吉祥止止虚心也室身也白道也能虚其心以生於道道性無欲吉祥來止舍也夫鑑明者塵垢弗能薶薶音倭汚也神清者嗜欲弗能亂神清者精神内守也精神已越於外而事復返之越散也事治也是失之於本而求之於末也外内無符而欲與物接弊其𤣥光而求知之于耳目𤣥光内明也一曰𤣥天也是釋其炤炤而道其㝠㝠也是之謂失道心有所至而神喟然在之反之於虚則消鑠滅息此聖人之游也反之於虚則情欲之性消鑠滅息故曰聖人之游游行也故古之治天下也必達乎性命之情其舉錯未必同也其合於道一也夫夏日之不被裘者非愛之也燠有餘於身也冬日之不用翣殺者非簡之也清有餘於適也翣扇也簡賤也夫聖人量腹而食度形而衣節於己而已貪汚之心奚由生哉故能有天下者必無以天下為也能有名譽者必無以趨行求者也以用也聖人有所于達達則嗜欲之心外矣外棄也孔墨之弟子皆以仁義之術教導於世然而不免於儡雷身猶不能行也又況所教乎儡身身不見用儡儡然也是何則其道外也夫以末求返于本許由不能行也又況齊民乎誠達于性命之情而仁義固附矣趨捨何足以滑心若夫神無所掩心無所載通洞條達恬漠無事無所凝滯虚寂以待勢利不能誘也辯者不能説也聲色不能淫也美者不能濫也説釋也濫覦也知者不能動也勇者不能恐也此真人之道也若然者陶冶萬物與造化者為人為治也天地之間宇宙之内莫能夭遏夫化生者不死而化物者不化化生者天也化物者徳也神經於驪山太行而不能難入於四海九江而不能濡處小隘而不塞横扃天地之間而不窕扃猶閉也不通此者雖目數千羊之羣耳分八風之調足蹀牒陽阿之舞而手㑹緑水之趨陽阿古名倡也緑水舞曲趨投節也智終天地明照日月辯解連環始皇遺齊襄王后玉連環曰齊多智解此環后椎破之謝曰已解矣澤潤玉石猶無益於治天下也靜漠恬澹所以養性也和愉虚無所以養徳也外不滑内則性得其宜性不動和則徳安其位養生以經世抱徳以終年可謂能體道矣若然者血脉無鬱滯五藏無蔚氣蔚病也禍福弗能撓滑非譽弗能塵垢故能致其極非有其世孰能濟焉有其人不遇其時身猶不能脱又況無道乎且人之情耳目應感動心志知憂樂手足之㩌費疾􅽿養辟寒暑所以與物接也蜂蠆瘥螫指而神不能憺憺音詹定也蚉蝱􅏐雜膚而知不能平􅏐噬也夫憂患之來攖人心也非直蜂蠆之螫毒而蚉蝱之慘怛也而欲靜漠虚無奈之何哉夫目察秋毫之末耳不聞雷霆之聲耳調玉石之聲目不見太山之髙何則小有所志而大有所忘也今萬物之來擢拔吾性攓牽取吾情有若泉源雖欲勿稟其可得邪稟猶動用也今夫樹木者灌以瀿繁水瀿波也㬥溢也疇以肥壤一人養之十人拔之則必無餘㮆㮆櫱也又況與一國同伐之哉雖欲久生豈可得乎今盆水在庭清之終日未能見眉睫濁之不過一撓而不察方員人神易濁而難清猶盆水之類也況一世而撓滑之曷得須臾平乎古者至徳之世賈便其肆農樂其業大夫安其職而處士修其道當此之時風雨不毁折草木不夭九鼎重味珠玉潤澤九鼎九州貢金所鑄也重厚也潤澤有光也洛出丹書河出緑圖丹書黄帝游于洛見鯉魚長三丈青身無鱗赤文成字故曰丹書緑圖黄帝云夢見兩龍挺白圖即帝以授于河之都天老曰天其授帝圖乎黄帝乃齊河洛之間至于翠媯泉大盧魚折溜而至汎白圗蘭菜朱文以授黄帝舒受之故曰緑圖故許由方回善卷披衣得達其道許由方回善卷披衣皆堯時隠士何則世之主有欲利天下之心是以人得自樂其間四子之才非能盡善葢今之世也然莫能與之同光者遇唐虞之時逮至夏桀殷紂燔生人辜諌者為炮烙鑄金柱鑄金柱然火其下以人置其上墮陊火中剖賢人之心析才士之脛賢人比干也析解也剥解有才士脚觀其有奇異脛脚也醢鬼侯之女葅梅伯之骸鬼侯梅伯紂時諸侯梅伯説鬼侯之女美好令紂妻之女至紂以為不好故醢鬼侯之女葅梅伯之骸也當此之時嶢堯山崩三川涸嶢山葢在南陽三川涇渭汧也飛鳥鎩翼走獸擠脚言紂田獵禽荒故獸無不被害也當此之時豈獨無聖人哉然而不能通其道者不遇其世夫鳥飛千仞之上獸走叢薄之中禍猶及之又況編户齊民乎聚木曰叢深草曰薄由此觀之體道者不專在於我亦有繫於世矣夫歴陽之都一夕反而為湖勇力聖知與罷怯不肖者同命歴陽淮南國縣名昔有老嫗常行仁義有二諸生過之謂曰此國當沒為湖謂嫗視東城門閫有血便走上北山勿顧也自此嫗便往視門閫閽者問之嫗對曰如是其暮門吏故殺雞血涂門閫明旦老嫗早往視門見血便上北山國没為湖與門吏言其事適一宿耳一夕旦而為湖也勇怯同命無遺脱也巫山之上順風縱火膏夏紫芝與蕭艾俱死巫山在南郡膏夏大木也其理宻白如膏故曰膏夏紫芝皆諭賢智也蕭艾賤草皆諭不肖故河魚不得明目穉稼不得育時其所生者然也河水濁故不得明目穉稼為霜所凋故不得待其自熟時故曰其所生然也故世治則愚者不得獨亂世亂則智者不能獨治身蹈于濁世之中而責道之不行也是猶兩絆騏驥而求其致千里也置猨檻中則與豚同非不巧捷也無所肆其能也舜之耕陶也不能利其里南面王則徳施乎四海仁非能益也處便而勢利也古之聖人其和愉寧靜性也其志得道行命也是故性遭命而後能行命得性而後能明得其本清靜之性故能明烏號之弓谿子之弩不能無絃而射谿蠻夷也以柘桑為弩因曰谿子之弩越舲蜀艇不能無水而浮舲小船也蜀艇一板之舟若無水不能獨浮也今矰繳機而在上􅘩網􅅈張而在下雖欲翺翔其勢焉得矰弋射身短矢也機發也翺翔鳥之髙飛翼上下曰翺直刺不動曰翔故詩曰采采卷耳不盈傾筐嗟我懐人寘彼周行以言慕逺世也詩周南卷耳篇也言采采易得之菜不滿易盈之器以言君子為國執心不精不能以成其道采易得之菜不能盈易滿之器也嗟我懐人寘彼周行言我思古君子官賢人置之列位也誠古之賢人各得其行列故曰慕逺也淮南鴻烈解卷二
