body:
  text: 淮南鴻烈解卷十九漢髙誘註修務訓修勉務趍聖人趍時冠㩻弗顧履遺不取必用仁義之道以濟萬民故曰修務或曰無為者寂然無聲漠然不動引之不來推之不往如此者乃得道之像或人以為先為術如此乃可謂為得道之法也吾以為不然嘗試問之矣若夫神農堯舜禹湯可謂聖人乎有論者必不能廢以五聖觀之則莫得無為明矣古者民茹草飲水采樹木之實食蠃蠬之肉時多疾病毒傷之害於是神農乃始教民播種五穀相土地宜燥濕肥墝髙下嘗百草之滋味水泉之甘苦令民知所避就當此之時一日而遇七十毒堯立孝慈仁愛使民如子弟西教沃民東至黒齒北撫幽都南道交趾沃民西方之國黑齒東方之國隂氣所聚故曰幽都今鴈門以北是交趾南方之國四者逺裔不覩聖人之化故親往行教導撫之以仁義也放讙兠於崇山竄三苖於三危放棄也讙兠堯佞臣崇南極之山三苖蓋謂帝鴻氏之裔子渾敦少昊氏之裔子窮竒縉雲氏之裔子饕餮三族之苗裔故謂之三苗三危西極之山名一曰放三苖國民於三危也流共工於幽州殛鯀於羽山羽山東極之山舜作室築牆茨屋辟地樹榖令民皆知去巖穴各有家室南征三苗道死蒼梧三苖之國在彭蠡舜時不服故往征之舜死蒼梧𦵏於九嶷之山在蒼梧馮乗縣東北零陵之南禹沐浴霪淫雨櫛節扶風禹勞力天下不避風雨以乆雨為沐浴扶風疾風以疾風為梳㮰也决江疏河鑿龍門闢伊闕龍門本有水門游魚於其中上行得上過者便為龍故曰龍門禹闢而大之故言鑿伊闕山名禹開截山體令伊水得北過入雒水故言闢也修彭蠡之防乗四載隨山栞刋木平治水土定千八百國修治也彭蠡澤名在豫章彭澤縣西防隄也四載山行用蔂水行用舟陸行用車澤行用蕝隨循也栞石刋識之四海之内凡萬國禹定千八百國是禹之所為也湯夙興夜寐以致聰明輕賦薄歛以寛民氓早起夜寐以思萬事能得其精故曰以致聰明寛猶富也野民曰氓布德施惠以振困窮弔死問疾以養孤孀幼無父曰孤孀寡婦也百姓親附政令流行乃整兵鳴條困夏南巢譙以其過放之厯山鳴條地名南巢今廬江居巢譙責也讓夏桀之罪過也厯山蓋厯陽之山是湯為之也此五聖者天下之盛主勞形盡慮為民興利除害而不懈懈惰也奉一爵酒不知於色言其輕也挈一石之尊則白汗交流言其重也又况贏天下之憂而海内之事者乎其重於尊亦逺也逺猶多也且夫聖人者不耻身之賤而愧道之不行不憂命之短而憂百姓之窮是故禹之為水以身解於陽眄之河為治水觧禱以身為質陽眄河在秦地湯旱以身禱於桑山之林桑山之林能興雲致雨故禱之聖人憂民如此其明也而稱以無為豈不悖哉悖繆也且古之立帝王者非以奉養其欲也聖人踐位者非以逸樂其身也逸安也為天下強掩弱衆㬥寡詐欺愚勇侵怯懐知而不以相教積財而不以相分故立天子以齊之齊等也為一人聰明而不足以遍照海内故立三公九卿以輔翼之輔正也翼佐也絶國殊俗僻逺幽閒之處不能被德承澤故立諸侯以教誨之絶逺殊異能猶及也立置以為逺國君是以地無不任時無不應官無隱事國無遺利言官無隱病失職之事以利民故無所遺亡也所以衣寒食饑養老弱而息勞倦也若以布衣徒歩之人觀之則伊尹負鼎而干湯吕望鼔刀而入周伯里奚轉鬻管仲束縳孔子無黔突墨子無煖席黔黑也突竈不至於黒坐席不至於温厯行諸國汲汲於行道也是以聖人不髙山不廣河蒙耻辱以干世主非以貪祿慕位欲事起天下利而除萬民之害聖人蓋謂禹稷不以山為髙不以河為廣言必踰渡之事治也蓋聞傳書曰神農憔悴堯瘦􅋯舜黴黑禹胼胝由此觀之則聖人之憂勞百姓甚矣故自天子以下至於庶人四胑肢不動思慮不用事治求贍者未之聞也夫地勢水東流人必事焉然後水潦得谷行水勢東流人必事而通之使得循谷而行也禾稼春生人必加功焉故五榖得遂長遂成也聽其自流待其自生則鯀禹之功不立而后稷之智不用若吾所謂無為者私志不得入公道嗜欲不得枉正術循理而舉事因資而立權自然之勢而曲故不得容者曲故巧詐也事成而身弗伐功立而名弗有不名有其功也非謂其感而不應攻而不動者若夫以火熯井以淮灌山此用已而背自然故謂之有為火不可以熯井淮不可以灌山而以用之非其道故謂之冇為也若夫水之用舟沙之用鳩泥之用輴山之用蔂夏瀆而冬陂因髙為田因下為池此非吾所謂為之此皆因其宜用之故曰非吾所謂為言無為聖人之從事也殊體而合于理殊異也體行也理道也其所由異路而同歸其存危定傾若一志不忘於欲利人何以明之昔者楚欲攻宋墨子聞而悼之墨子名翟宋大夫悼傷也自魯趍而十日十夜足重繭而不休息裂衣裳裹足至於郢見楚王郢楚都今南郡江陵北里郢是也曰臣聞大王舉兵將攻宋計必得宋而後攻之乎忘其苦衆勞民頓兵剉鋭負天下以不義之名而不得咫尺之地猶且攻之乎王曰必不得宋又且為不義曷為攻之墨子曰臣見大王之必傷義而不得宋王曰公輸天下之巧士作雲梯之械設以攻宋曷為弗取公輸魯般號時在楚雲梯攻城具髙長上與雲齊故曰雲梯械器設施也墨子曰令公輸設攻臣請守之於是公輸般設攻宋之械墨子設守宋之備九攻而墨子九却之弗能入入猶下也於是乃偃兵輟不攻宋輟止也段干木辭祿而處家魏文侯過其閭而軾之閭里周禮二十五家為閭軾伏軾也其僕曰君何為軾文侯曰叚干木在是以軾其僕曰叚干木布衣之士君軾其閭不已甚乎文侯曰叚干木不趍勢利懐君子之道隱處窮巷聲施千里聲名也施行也寡人敢勿軾乎段干木光於德寡人光於勢段干木富於義寡人富於財勢不若德尊財不若義髙干木雖以己易寡人不為使干木之己賢易寡人之尊不肯為之也吾曰悠悠慙於影影形影也子何以輕之哉其後秦將起兵伐魏司馬庾諌曰段干木賢者庾秦大夫也或作唐其君禮之天下莫不知諸侯莫不聞舉兵伐之無乃妨於義乎於是秦乃偃兵輟不攻魏夫墨子跌牒蹏而趍千里以存楚宋跌疾行也蹏趍走也段干木闔門不出以安秦魏夫行與止也其勢相反而皆可以存國此所謂異路而同歸者也異路謂行與止也同歸謂歸於存國也今夫救火者汲水而趍之或以甕瓴或以盆盂其方員鋭橢妥不同盛水各異其於㓕火鈞也故秦楚燕魏之謌也異轉而皆樂轉音聲也九夷八狄之哭也殊聲而皆悲一也東方之夷九種北方之夷八類夫謌者樂之徴也哭者悲之效也憤於中則應於外憤發也故在所以感夫聖人之心日夜不忘於欲利人其澤之所及者效亦大矣世俗衰廢而非學者多非者不善之辭故曰非人性各有所脩短若魚之躍若鵲之駮此自然者不可損益吾以為不然夫魚者躍鵲者駮也猶人馬之為人馬筋骨形體所受於天不可變以此論之則不類矣言人自為人馬自為馬不相類也夫馬之為草駒之時跳躍揚蹏翹尾而走人不能制馬五尺以下為駒放在草中故曰草駒翹舉也制禁也齕劾咋翟足以􅏐雜肌碎骨蹶蹏足以破盧陷匈咋齧也􅏐穿也及至圉人擾之良御教之圉養馬官擾順也掩以衡扼連以轡衘則雖厯險超壍弗敢辭故其形之為馬馬不可化其可駕御教之所為也馬聾蟲也蟲喻無知也而可以通氣志猶待教而成又况人乎且夫身正性善發憤而成仁帽慿而為義帽慿盈滿積思之貌性命可説不待學問而合於道者堯舜文王也沉䤄耽荒不可教以道不可喻於德嚴父弗能正賢師不能化者丹朱商均也曼頰皓齒形夸誇骨佳不待脂粉芳澤而性可説者西施陽文也曼頰細理也夸弱也佳好也性猶姿也西施陽文古之好女啳權􅢦葵哆夸􅀈麾籧瞿蒢除戚施雖粉白黛黒弗能為美者嫫模母仳靡倠虺也籧篨偃也戚施僂也皆醜貌嫫母仳倠古之醜女仳倠一説讀曰荘維也夫上不及堯舜下不及商均美不及西施惡不若嫫母此教訓之所喻也而芳澤之所施且子有弑父者然而天下莫疏其子何也愛父者衆也儒有邪辟者而先王之道不廢何也其行之者多也今以為學者之有過而非學者則是以一飽之故絶榖不食以一蹪之難輟足不行惑也今日良馬不待策錣而行駑馬雖策錣之不能進為此不用策錣而御則愚矣為良馬能自走不復用策得駑馬無以行之故曰愚也夫怯夫操利劒擊則不能斷刺則不能入及至勇武攘捲一擣則摺浙脇傷幹武士也楚人謂士為武摺折也為此棄干將鏌邪而以手戰則悖矣所為言者齊於衆而同於俗今不稱九天之頂則言黄泉之底頂極髙底極卑也是兩末之端議何可以公論乎夫橘柚冬生而人曰冬死死者衆薺麥夏死人曰夏生生者衆江河之回曲亦時有南北者而人謂江河東流攝提鎮星日月東行而人謂星辰日月西移者以大氐為本歲星在寅曰攝提鎮星中央土星鎮四方故曰鎮氐猶更言其餘星辰皆西行故曰大氐為本也胡人有知利者而人謂之駤駤忿戾惡理不通達胡人性皆然駤音至越人有重遲者而人謂之訬訬輕利急亦以多者言操善趍者謂之訬同也訬音抄以多者名之若夫堯眉八彩九竅通同而公正無私堯母慶都蓋天帝之女寄伊長孺家年二十無夫出觀於河有赤龍負圖而至曰赤龍受天下之圖有人赤衣光靣八彩鬢髯長赤帝起成元寳奄然隂雲赤龍與慶都合而生堯視如圖故眉有八彩之色洞達聖道也無私無所愛憎也一言而萬民齊一言仁言也齊無倦舜二瞳子是謂重明言能知人舉十六相作事成法出言成章禹耳參漏是謂大通參三也漏穴也大通天下摧下滯之物興利除害疏河决江文王四乳是謂大仁天下所歸百姓所親臯陶馬喙是謂至信喙若馬口出言皆不虚故曰至信决獄明白察於人情禹生於石禹母脩已感石而生禹折胸而出契生於卵契母有娀氏之女簡翟也吞燕卵而生契愊背而出史皇産而能書史皇蒼頡生而見鳥跡知著書故曰史皇或曰頡皇羿左臂脩而善射若此九賢者千歲而一出猶繼踵而生今無五聖之天奉奉助也四俊之才難才過千人為俊欲棄學而循性是謂猶釋船而欲􅡮水也􅡮履也夫純鈎魚腸劒之始下型擊則不能斷刺則不能入純鈎利劒名魚腸文理屈辟若魚腸者良劒也型或作盧及加之砥礪摩其鋒㓵則水斷龍舟龍舟大舟也陸剸團犀甲明鏡之始下型矇然未見形容及其粉以元錫摩以白旃鬢眉㣲毫可得而察夫學亦人之砥錫也而謂學無益者所以論之過知者之所短不若愚者之所脩短缺脩長也明有所不足愚有所不逮也賢者之所不足不若衆人之有餘何以知其然夫宋畫吳治刻刑鏤法亂脩曲出宋人之畫吳人之治刻鏤刑法亂理之文脩飾之巧曲出於不意也其為㣲妙堯舜之聖不能及蔡之㓜女衞之稚質稚質少女也梱閫纂組雜竒彩抑黒質揚赤文捆叩核纂織組邪文如今之短没黒耳亦言其巧也禹湯之智不能逮言不能及二國之女巧也夫天之所覆地之所載包於六合之内託於宇宙之間隂陽之所生血氣之精含牙戴角前爪後距奮翼攫肆蚑行蟯動之蟲喜而合怒而鬭攫摶也肆極也見利而就避害而去其情一也雖所好惡其與人無以異然其爪牙雖利䈥骨雖疆不免制於人者知不能相通才力不能相一也各有其自然之勢勢力也無禀受於外無有學問受謀慮於外以益其思也故力竭功沮竭盡也沮敗也夫鴈順風以愛氣力衘蘆而翔以備矰弋未秀曰蘆已秀曰葦矰矢弋繳衘蘆所以令繳不得截其翼也螘知為垤貛歡貉為曲穴虎豹有茂草野彘有艽仇莦梢槎櫛堀虚連比以像宫室隂以防雨防衛也景以蔽日蔽擁也此亦鳥獸之所以知求合於其所利今使人生於辟陋之國辟逺陋鄙小也長於窮櫩檐漏室之下長無兄弟少無父母目未嘗見禮節耳未嘗聞先古先古謂聖賢之道也獨守專室而不出門專室小室也使其性雖不愚然其知者必寡矣昔者蒼頡作書容成造厯容成黄帝臣造作厯知日月星辰之行度胡曹為衣易曰黄帝垂衣裳胡曹亦黄帝臣也后稷耕稼儀狄作酒奚仲為車傳曰奚仲為夏車正封於薛此六人者皆有神明之道聖智之迹故人作一事而遺後世非能一人而獨兼有之各悉其知貴其所欲達達通也遂為天下備備猶用也今使六子者易事而明弗能見者何見猶知也言人各有所不能萬物至衆而知不足以奄之奄蓋之也周室以後無六子之賢而皆修其業當世之人無一人之才而知其六賢之道者何教順施續而知能流通施設續猶傳也由此觀之學不可已明矣今夫盲者目不能别晝夜分白黒然而搏琴撫弦參彈復徽攫句援摽標拂手若蔑㓕􅂪不失一弦參彈撫弦復徽上下手也攫援掇也摽拂敷也蔑蒙言其疾也使未嘗鼓瑟者雖有離朱之明攫掇之㨗猶不能屈伸其指攫掇黄帝時㨗疾者也何則服習積貫之所致故弓待㯳敬而後能調劒待砥而後能利㯳矯弓之材砥礪石也玉堅無敵鏤以為獸首尾成形磕諸之功木直中繩揉以為輪其曲中規櫽括之力唐碧堅忍之類猶可刻鏤揉以成器用唐碧石似玉皆堅鑚之物又况心意乎且夫精神滑淖纎㣲倐忽變化與物推移推移猶轉易也雲蒸風行在所設施君子有能精搖摩監砥礪其才自試神明覽物之􅀶通物之壅觀始卒之端見無外之境以逍遙仿佯於塵埃之外超然獨立卓然離世此聖人之所以游心若此而不能閒居静思鼓琴讀書追觀上古及賢大夫學問講辯曰以自娱蘇援世事分白黒利害蘇援猶索也籌策得失以觀禍福設儀立度可以為法則窮道本末究事之情窮盡也究極也立是廢非明示後人是善也非惡也死有遺業生有榮名如此者人才之所能逮然而莫能至焉者偷慢懈惰多不暇日之故偷薄慢易也不暇日不學也夫瘠地之民多有心者勞也心向義之心也沃地之民多不才者饒也饒逸也由此觀之知人無務不若愚而好學自人君公卿至於庶人不自彊而功成者天下未之有也詩云日就月將學有緝熈于光明此之謂也名可務立功可彊成故君子積志委正以趣明師勵節亢髙以絶世俗不羣於衆也何以明之昔者南策疇耻聖道之獨亡於己身淬翠霜露欶朔蹻趹决䟦渉山川冐蒙荆棘淬浴欶猶箸也蹻履趹趣也不從蹊遂曰䟦涉故觸犯荆棘南姓策疇字魯人百舍重跰迸不敢休息百里一舍跰足胝生南見老聃受教一言精神曉泠鈍聞條達曉明泠猶了也鈍聞猶鈍惛也欣然七日不食如饗太牢丈夫七日不食則斃故以七日為極三牲具曰太牢是以明照四海名施後世達畧天地達通也畧猶數也察分秋毫稱譽葉語至今不休葉世也言策疇見稱譽世傳相語至今不止此所謂名可彊立者吳與楚戰吳王闔閭與楚昭王戰於栢舉莫囂大心撫其御之手曰今日距彊敵犯白刃􅂪矢石戰而身死卒勝民治全我社稷可以庶幾乎遂入不返决腹斷頭不旋踵運軌而死言入吳不旋踵因􅁤而死申包胥竭筋力以赴嚴敵伏尸流血不過一卒之才在車曰士歩曰卒不如約身卑辭求救於諸侯申包胥楚大夫與伍子胥友者子胥之亡謂申包胥曰我必覆楚國申包胥曰子能覆之我必興之及昭王敗於栢舉奔隨中包胥如秦乞師於是乃贏糧跣癬走䟦渉谷行贏裏也一日囊跣足不及著履也上峭山赴深谿游川水峭山髙山深谿大壑游渡也犯津闗獵􅂪籠蹷沙石蹠達膝曾繭重胝七日七夜至於秦庭犯觸觸津闗則捲獵䝉籠之山一曰葛蔂所􅂪籠言非人所由蹷僵蹠足達穿也幽通賦曰申重繭以存荆是也鶴跱致而不食晝吟宵哭靣若死灰顔色黴梅黒鶴跱峙立貌言不動不食黴黒其面色欲速求秦救也涕液交集以見秦王曰吳為封豨脩蛇蠶食上國虐始於楚封脩皆大也豨蛇喻貪也蠶食盡無餘上國中國虐害也始先也言將以次至秦也寡君失社稷越在草茅越逺也百姓離散夫婦男女不遑啓處遑暇啓跪處安也使下臣告急秦王乃發車千乘歩卒七萬屬之子虎秦大夫子車鍼虎傳曰率車五百乘以救楚凡三萬七千五百人此曰千乘歩卒七萬不合也踰塞而東塞函谷一日武闗塞也擊吳濁水之上果大破之以存楚國濁水蓋江水傳曰敗吳於公壻之谿公壻之谿楚地烈藏廟堂著於憲法此功之可彊成者也烈功憲法也夫七尺之形心致憂愁勞苦膚知痛疾寒暑人情一也聖人知時之難得務可趣也苦身勞形焦心怖悑肝不避煩難不違危殆蓋聞子發之戰子發楚威王之將進如激矢合如雷電解如風雨員之中規方之中矩破敵陷陳莫能壅御澤戰必克攻城必下彼非輕身而樂死務在於前遺利於後故名立而不墮名武中寜國之名墮廢也此自強而成功者也是故田者不強囷倉不盈強力也官御不厲心意不精精專也將相不強功烈不成侯王懈惰後世無名詩云我馬維騏六轡如絲載馳載驅周爰諮謀以言人之有所務也通於物者不可驚以怪通達也言怪物不能驚也喻以道者不可動以竒喻明也非常曰竒察於辭者不可燿以名燿炫也名虚實之名審於形者不可遯以狀遯敗也狀貌也世俗之人多尊古而賤今故為道者必託之於神農黄帝而後能入説説言也言為二聖所作乃能入其説於人人乃用之亂世闇主髙逺其所從來因而貴之為學者蔽於論而尊其所聞相與危坐而稱之正領而誦之此見是非之分不明夫無規矩雖奚仲不能以定方圓無凖繩雖魯般不能以定曲直是故鍾子期死而伯牙絶弦破琴知世莫賞也鍾官氏子通稱期名也達於音律伯牙楚人覩世無有知音若子期者絶弦破其琴也惠施死而莊子寢説言見世莫可為語者也惠施宋人仕於梁為惠王相莊子名周宋䝉縣人作書三十三篇為道家之言夫項託七歲為孔子師孔子有以聽其言也以年之少為閭丈人説救敲不給何道之能明也閭里也敲横也丈人長老之稱年少為之説事老人敲其頭自救不暇何能明道也昔者謝子見於秦惠王惠王説之以問唐始梁唐姑梁曰謝子山東辯士固權説以取少主謝姓也子通稱唐姑梁秦大夫言謝子辯士也常發其巧説以取少主之權少主謝子之君一曰謂惠王惠王秦孝公之子也惠王因藏怒而待之後日復見逆而弗聼也非其説異也所以聼者易易革也夫以徵為羽非弦之罪罪在聼也以甘為苦非味之過過在嘗也楚人有烹猴而召其隣人以為狗羮也而甘之後聞其猴也據地而吐之盡㵼其食此未始知味者也喻以惠王初説謝子唐姑梁問之因藏怒也邯鄲師有出新曲者託之李竒師樂師出猶作也李竒古之名倡也諸人皆争學之後知其非也而皆棄其曲此未始知音者也鄙人有得玉璞者喜其狀以為寳而藏之以示人人以為石也因而棄之此未始知玉者也故有符於中則貴是而同今古符驗驗者有明也是實也言中心能明實是者則貴之古今一也故曰同也無以聼其説則所從來者逺而貴之耳言無中心明驗無以聼人説之是否但見其言逺古之事便珍貴之耳近世之事有可貴者亦有不貴之也此和氏之所以泣血於荆山之下今劒或絶側羸文齧缺卷銋而稱以頃襄之劒則貴人争帶之絶無側羸無文齧齒卷銋鈍弊無刃託之為楚頃襄王所服劒故貴人慕而争帶之琴或撥剌枉橈濶解漏越而稱以楚荘之琴側室争鼓之撥剌不正也枉橈曲弱也濶觧壊漏也越音聲散也託之為楚荘王琴則側室之寵人争鼓之也側室或作廟堂也苖山之鋋羊頭之銷雖水斷龍舟陸剸兕甲莫之服帶苖山楚山利金所出羊頭之銷白羊子刀雖有利用無所稱託故無人服帶也山桐之琴澗梓之腹雖鳴亷隅修營唐牙莫之鼓也伐山桐以為琴谿澗之梓以為腹言其嗚音聲有亷隅修營音清涼聲和調唐猶堂通人則不然腹劒者期於銛利而不期於墨陽莫邪墨陽莫邪美劒名乗馬者期於千里而不期於驊騮緑耳鼓琴者期於鳴亷脩營而不期於濫脇號鐘濫脇音不和號鐘髙聲非耳所及也誦詩書者期於通道畧物而不期於洪範商頌聖人見是非若白黒之於目辯辯别也清濁之於耳聼清商也濁宫也衆人則不然中無主以受之譬若遺腹子之上隴以禮哭泣之而無所歸心自不識父之顔心不哀也故夫㝈杳子之相似者唯其母能知之知獨别也玉石之相類者唯良工能識之書傳之㣲者唯聖人能論之㣲妙論叙也今取新聖人書名之孔墨則弟子句指而受者必衆矣故美人者非必西施之種通士者不必孔墨之類曉然意有所通於物故作書以喻意以為知者也喻明也作書者以明古今傳代之事以為知者施也誠得清明之士執元鑑於心照物明白不為古今易意元水也鑑鏡也皆以自見能自易故能見物言反易也攄書明指以示之攄舒也指書也雖闔棺亦不恨矣朝聞道夕死可矣何恨之有昔晉平公令官為鍾鍾成而示師曠師曠曰鍾音不調平公晉悼公之子彪師曠識音故知其不調平公曰寡人以示工工皆以為調而以為不調何也而汝也師曠曰使後世無知音者則已若有知音者必知鍾之不調故師曠之欲善調鍾也以為後之有知音者也喻上句作書為知音施也三代與我同行五伯與我齊智我謂作書者也彼獨有聖智之實我曾無有閭里之聞窮巷之知者何彼并身而立節我誕謾而悠忽彼謂三代五伯并身同行也立節謂成功業也誕謾倨傲也悠忽謂遊蕩輕物也今夫毛嬙西施天下之美人若使人銜腐䑕􅂪蝟胃皮衣豹裘帶死蛇則布衣韋帶之人過者莫不左右睥睨而掩鼻嘗試使之施芳澤正娥眉設笄珥衣阿鍚曵齊紈笄婦人首飾珥瑱也阿細縠錫細布紈素齊所出粉白黛黒佩玉環揄歩雜芝若籠䝉目視雜佩芝若香草籠䝉猶眇也睧目視也冶由笑目流眺冶猶笑巧笑流眺睛盻也詩云美目盻兮口曾撓竒牙出􅩷業䩉付搖曾則也撓弱也口則弱撓冐若將笑故好齒出詩云齒如瓠犀是也􅩷䩉頰邊丈婦人之媚也則雖王公大人有志嚴頡頏之行者無不憚探悇豫癢心而悦其色矣憚悇貪欲也癢心煩悶也今以中人之才􅂪愚惑之智被汙辱之行無本業所修方術所務焉得無有睥靣掩鼻之容哉今鼔舞者鼓舞或作鄭舞鄭者鄭袖楚懐王之幸姬善謌攻舞因名鄭舞一説鄭重攻舞也繞身若環車輪倒也曾撓摩地扶旋猗那動容轉曲曾撓摩地鼓車平解扶轉周旋更曲意更為之便媚擬神擬象也身若秋葯被風葯白芷香草也被風言其弱也髮若結旌屈而復舒也騁馳若騖馳騁言其疾也木熈者舉梧檟據句枉熈戯也舉援也梧桐檟梓皆大木句枉曲枝見枉或作掘也蝯自縱好茂葉言舞者若蝯不復踐地好上茂木之枝葉龍夭矯燕枝拘言纉藴若蟠龍燕枝拘言其著樹如燕附枝也援豐條舞扶䟽援持也持大條以木舞扶疏槃跚貌龍從鳥集搏援攫肆薎蒙踊躍言其舞體如龍附雲如鳥集山㨗大極其巧薎䝉踊躍明其疾也且夫觀身莫不為之損心酸足觀身見其㣲妙危險皆為之損動中心酸酢其足也彼乃始徐行微笑被衣修擢彼舞者更復徐行小笑被倡衣修擢舞為後曲也夫鼓舞者非柔縱言非其人生自柔弱屈句委縱也而木熈者非眇勁眇絶也言其非能自有絶眇之強力也淹浸漬漸靡使然也淹乆也浸漬漸於教乆使之柔縱眇勁靡教化使之然也是故生木之長莫見其益有時而脩砥礪䃺監莫見其損有時而薄有時積時言非一日教化亦然也藜藿之生蝡蝡然日加數寸不可以為櫨棟楩柟豫章之生也七年而後知故可以為棺舟知覺其大夫事有易成者名小難成者功大君子脩美雖未有利福將在後至美善也故詩云日就月將學有緝熈於光明此之謂也淮南鴻烈解卷十九
