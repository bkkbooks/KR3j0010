body:
  text: 淮南鴻烈解卷十六漢髙誘注説山訓山為道本仁者所處説道之㫖委積若山故曰説山魄問於魂曰道何以為體魄人隂神也䰟人陽神也隂道祖於陽故魄問䰟道以何等形體也曰以無有為體道無形以無有為體也魄曰無有有形乎䰟曰無有何得而聞也䰟曰吾直有所遇之耳言適遭遇知之也視之無形聽之無聲謂之幽㝠幽㝠者所以喻道而非道也喻似也魄曰吾聞得之矣乃内視而自反也䰟曰凡得道者形不可得而見名不可得而揚揚猶稱也揚或作象今汝已有形名矣何道之所能乎魄曰言者獨何為者魄謂魂曰子尚無形何故有言吾將反吾宗矣宗本也魄言將反於無有魄反顧䰟忽然不見反而自存亦以淪於無形矣魄反而自存亦以入於無形之中矣形或作有人不小學不大迷小學不博不能通道故大迷也不小慧不大愚小慧不能通物故大愚也人莫鑑於沬雨而鑑於澄水者以其休止不蕩也沬雨雨潦上覆瓮也澄止水也蕩動也沬雨或作流潦詹公之釣千歳之鯉不能避詹公詹何也古得道善釣者有精術故能得千歳之鯉也曾子攀柩車引輴春者為之止也曾子至孝送親喪悲哀攀援柩車而挽者感之為之止輴棺下輪也老母行歌而動申喜精之至也申喜楚人也少亡其母聞乞人行歌聲感而出視之則其母也瓠巴鼓瑟而淫魚出聽瓠巴楚人也善鼓瑟淫魚喜音出頭於水而聽之淫魚長頭身相半長丈餘鼻正白身正黒口在頷下似鬲獄魚而身無鱗出江中也伯牙鼓琴駟馬仰秣仰秣仰頭吹吐謂馬笑也介子歌龍蛇而文君垂泣介子介推也從晉文公重耳出奔翟遭難絶糧介子推割肌啗之公子復國賞從亡者子推獨不及故歌曰有龍矯矯而失其所有蛇從之而啖其口龍既升雲蛇獨泥處龍以喻文公也蛇以自喻也於是文公覺悟求介子推不得而號泣之故玉在山而草木潤玉陽中之隂也故能潤澤草木淵生珠而岸不枯珠隂中之陽也有光明故岸不枯螾無筋骨之强爪牙之利螾一名蜷􅀈也上食晞堁下飲黃泉用心一也晞乾也堁土塵也楚人謂之堁一情專也清之為明杯水見眸子濁之為闇河水不見太山視日者眩聽雷者聾人無為則治有為則傷道貴無為也故治有為者則傷傷猶病也無為而治者載無也言無為而能致治者常載行其無為為者不能有也為者有為也有謂好憎情欲不能恬澹静漠故曰不能無為也不能無為者不能有為也不能行清静無為者不能大有所致其治立其功也人無言而神無道者道不言也道能化故神有言者則傷道不貴言故言有傷無言而神者載無道貴無言能致於神載行也常行其無言也有言則傷其神之神者道賤有言而多反有言故自傷其神鼻之所以息耳之所以聽終以其無用者為用矣無用者謂鼻耳中空處也物莫不因其所有而用其所無以其所無用為用也以為不信視籟與竽籟三孔籥也以其管孔空處以成音也故曰視籟與竽也念慮者不得卧詩曰耿耿不寐如有隠憂又曰展轉伏枕寤寐永歎是也止念慮則有為其所止矣止猶去也强自抑去念慮非真無念慮則與物所止矣兩者俱亡則至徳純矣兩者念慮與强不念慮也忘二者則神内守故至德純一聖人終身言治所用者非其言也用所以言也非其言非其所常言也用所以言者用當所治之言歌者有詩然使人善之者非其詩也善之者善其音之清和也不善其詩鸚鵡能言而不可使長鸚鵡鳥名出於蜀郡赤喙者是其色縹綠能效人言長主也是何則得其所言而不得其所以言得其言者知効人言也不知所以長言教令之言也故循迹者非能生迹者也循隨也隨人故迹不能創基造制自為新迹如鸚鵡知効人言不能自為長主之言也神蛇能㫁而復續而不能使人勿㫁也神龜能見夢元王而不能自出漁者之籠宋元王夜夢見得神龜而未獲也漁者豫且捕魚得龜以獻元王元王剥以卜四方皆道之門户牖嚮也在所從闚之故釣可以教騎騎可以教御御可以教刺舟此四術者皆謹敬加順其道故可以相教越人學逺射㕘天而發適在五步之内不易儀也越人習水便舟而不知射射逺反直仰向天而發矢勢盡而還故近在五步之内㕘猶望也儀射法言不曉射故不知易去㕘天之法也世已變矣而守其故譬猶越人之射也月望日奪其光隂不可以乘陽也月十五日與日相望東西中繩則月食故奪月光也差則虧至晦則盡日出星不見不能與之爭光也星隂也不能奪日之光也故末不可以强於本指不可以大於臂下輕上重其覆必易一淵不兩鮫水定則清正動則失平故惟不動則所以無不動也江河所以能長百谷者能下之也夫惟能下之是以能上之上大也天下莫相憎於膠漆膠漆相持不解故曰相憎一説膠入漆中則敗漆入膠亦敗以多少推之故曰相憎而莫相愛於冰炭冰得炭則解歸水復其性炭得冰則保其炭故曰相愛膠漆相賊冰炭相息也牆之壊愈其立也壊反本還為土冰之泮愈其凝也以其反宗泮釋也反水也宗本也泰山之容巍巍然髙容形也去之千里不見埵堁逺之故也埵堁猶席翳也埵讀似望作江淮間人言能得之也秋毫之末淪於不測是故小不可以為内者大不可以為外矣小不可為内復小於秋毫之末謂無有也無有無形者至大不可為外也蘭生幽宫不為莫服而不芳舟在江海不為莫乗而不浮君子行義不為莫知而止休夫玉潤澤而有光其聲舒揚舒緩也揚和也渙乎其有似也似君子也無内無外不匿瑕穢無内無外表裏通也匿藏也近之而濡望之而隧夫照鏡見眸子微察秋毫明照晦㝠故和氏之璧隨侯之珠出於山淵之精君子服之順祥以安寧服佩也君子佩而象之無有情欲能順善以安其身侯王寶之為天下正寳重也侯王重其天性若凡民之重珠玉故以為天下正無所阿私也陳成子恒之劫子淵捷也陳成子將弑齊簡公使勇士十六人脅其大夫子淵捷欲與分國捷不欲故曰劫之子罕之辭其所不欲而得其所欲所欲不貪為寶孔子之見黏拈蟬者白公勝之倒杖䇿也倒杖䇿傷其頥血流及屨而不覺言精有所在也衛姬之論罪於桓公衛姬衛女齊桓公夫人桓公有伐衛之志衛姬望見桓公色而知之故請公殺贖衛之罪子見子夏曰何肥也魏文侯見之反被裘而負芻也知其皮盡則毛無所傅也兒説之為宋王解閉結也結不可解者而能解之解之以不解此皆微眇可以觀論者微眇為見始知終也人有嫁其子而敎之曰爾行矣慎無為善曰不為善將為不善邪應之曰善且由弗為況不善乎此全其天器者器猶性也孟子曰人性善故曰全其天性拘囹圄者以日為修當死市者以日為短日之脩短有度也有所在而短有所在而脩也則中不平也中心也故以不平為平者其平不平也嫁女於病消者夫死則後難復處也以女為妨夫後人不敢娶故難復嫁處也一説女以天下人皆消不肻復嫁之也故沮舍之下不可以坐沮舍壊也倚墻之傍不可以立為踣壓也執獄牢者無病執主也厲鬼畏之故不病罪當死者肥澤計決心之無外思一説治當死者罪已定無憂故肥澤也刑者多夀心無累也刑者宮人也無情欲之累精神不耗故多夀也良醫者常治無病之病故無病聖人者常治無患之患故無患也夫至巧不用劒巧在心手故不用劒也善閉者不用關楗善閉其心故不關楗也淳于髠之告失火者此其類淳于髠齊人也告其隣穾將失火使曲穾徙薪隣人不從後竟失火言者不為功救火者焦頭爛額為上客刺不備預喻凡人不知豫閉其情欲而思得人救其禍以清入濁必困辱以濁入清必覆傾君子之於善也猶采薪者見一介掇之見青葱則㧞之言無所舍也君子行善亦如之天二氣則成虹地二氣則泄藏隂陽相干二氣也人二氣則成病邪氣干正氣故成病隂陽不能且冬且夏隂不能陽陽不能隂冬自為冬夏自為夏也月不知晝日不知夜言不能相兼也善射者發不失的善於射矣而不善所射所射者死故曰不善善釣者無所失善於釣矣而不善所釣所釣者魚也於魚不善也故有所善則不善矣鍾之與磬也近之則鍾音充充大也逺之則磬音章磬石也音清明逺聞而章著也物固有近不若逺逺不如近者今曰稻生於水而不能生於湍瀨之流湍流水也紫芝生於山而不能生於盤石之上根無所植也慈石能引鐵及其於銅則不行也行猶使也不能使隨也水廣者魚大山髙者木脩廣其地而薄其徳譬猶陶人為器也揲挺其土而不益厚破乃愈疾愈益也疾速也聖人不先風吹不先雷毁不得已而動故無累月盛衰於上則蠃蠬應於下同氣相動不可以為逺月盛則蠃蠬内減故曰蠃蠬應於下月隂精也蠃蠬亦隂也故曰同氣也類能相感故曰不可為逺執彈而招鳥揮棁而呼狗欲致之顧反走故魚不可以無餌釣也獸不可以虛器召也召猶致也剥牛皮鞟以為鼔正三軍之衆然為牛計者不若服於軛也狐白之裘天子被之而坐廟堂然為狐計者不若走於澤亡羊而得牛則莫不利失也㫁指而免頭則莫不利為也故人之情於利之中則爭取大焉於害之中則爭取小焉將軍不敢騎白馬為見者識一説白㐫服故不敢騎也傳曰晉襄公與姜戎子墨衰敗秦師於殽言其變㓙服也故不敢騎白馬也亡者不敢夜揭炬亡迯亡也保者不敢畜噬狗保城郭居也保饒人也不敢畜噬人狗也雞知將旦鶴知夜半而不免於鼎俎鶴夜半而鳴也以無知謀不能免於鼎俎以喻將軍當兼五材不可以無權譎山有猛獸林木為之不斬園有螫蟲藜藿為之不采言人畏也為儒而踞里閭儒尚禮義踞里閭非也為墨而朝吹竽墨道尚儉不好樂縣名朝歌墨子不入吹竽非也欲滅迹而走雪中拯溺者而欲無濡是非所行而行所非今夫闇飲者非嘗不遺飲也使之自以平則雖愚無失矣是故不同於和而可以成事者天下無之矣和猶適也求美則不得美不求美則美矣心自求美名則不得美名也而自損則有美名矣故老子曰致數輿無輿也求醜則不得醜求不醜則有醜矣不求美又不求醜則無美無醜矣是謂𤣥同𤣥天也天無所求也人能無所求故以之同申徒狄負石自沉於淵而溺者不可以為抗申徒狄殷末人也不忍見紂亂故自沉於淵抗髙也弦髙誕而存鄭誕者不可以為常事有一應而不可循行人有多言者猶百舌之聲百舌鳥名能易其舌効百鳥之聲故曰百舌以喻人雖事多言無益於事人有少言者猶不脂之户也言其不鳴故不脂之喻無聲也一説不脂之户難開閉亦喻人少言語也六畜生多耳目者不詳䜟書著之詳善也多耳目者以為妖災也喻人有多言而少誠實比之於不詳也百人抗浮不若一人挈而趨抗舉也浮瓠也百人共舉不如一人持之走便也物固有衆而不若少者引車者二六而後之轅三人兩轅六人故謂二六一説十二人事固有相待而成者兩人俱溺不能相拯一人處陸則可矣故同不可相治必待異而後成同謂君所謂可臣亦曰可君所謂否臣亦曰否猶以水濟水誰能食之是謂同故不可以相治異謂濟君之可替君之否引之當道是謂異也故可以成事也千年之松下有茯苓上有兔絲茯苓千歳松脂也兔絲生其上而無根一名女蘿也上有叢蓍下有伏龜聖人從外知内以見知隱也喜武非俠也俠輕也喜文非儒也好方非醫也好馬非騶也知音非瞽也知味非庖也此有一槩而未得主名也此六術者皆善之而未純無所適名被甲者非為十步之内也百步之外則爭深淺深則達五藏淺則至膚而止矣死生相去不可為道里言相逺也楚王亡其猨而林木為之殘楚王莊王旅也猿捷躁依木而處故殘林以求之宋君亡其珠池中魚為之殫殫盡也故澤失火而林憂上求材臣殘木上求魚臣乾谷上求楫而下致船上言若絲下言若綸綸大繳也上有一善下有二譽上有三衰下有九殺衰殺皆喻踰也傳曰上之所好下尤甚焉故有九殺也大夫種知所以强越而不知所以存身萇𢎞知周之所存而不知身所以亡知逺而不知近逺謂强越存周也近謂其身也畏馬之辟也不敢騎辟旁也懼車之覆也不敢乗是以虛禍距公利也虛空也不孝弟者或詈父母生子者所不能任其必孝也然猶養而長之任保也范氏之敗有竊其鍾負而走者范氏范吉射范㑹之𤣥孫范鞅獻子之子昭子也敗者趙簡子伐之故人竊其鍾也一曰知伯滅范氏也鎗然有聲懼人聞之遽掩其耳憎人聞之可也自掩其耳悖矣悖惑也升之不能大於石也升在石之中夜之不能脩其歳也夜在歳之中仁義之不能大於道徳也仁義在道徳之包仁義小道徳大也在道徳包裹猶升在斛之中夜在歳之内也先針而後縷可以成帷先縷而後針不可以成衣針成幕蔂羅成城事之成敗必由小生言有漸也幕帷也上曰幕旁曰帷縷非針無以通故宜先也蔂土籠也始一匱以上於城故曰事之成敗必由小生染者先青而後黑則可先黑而後青則不可工人下漆而上丹則可下丹而上漆則不可萬事猶此所先後上下不可不審審知也水濁而魚噞魚短氣黄噞出口於水上形勞則神亂形亂神不治也故國有賢君折衝萬里衡兵車也所以衝突敵城也言賢君徳不可伐故能折於逺敵之衝車於千里之外使敵不敢至也魏文侯禮下段干木而秦兵不敢至此之謂也因媒而嫁而不因媒而成媒人以禮成為室家也因人而交不因人而親以徳親也行合趨同千里相從趨不合行不同對門不通海水雖大不受胔慈芥日月不應非其氣陽燧取火方諸取水氣相應也非此不得故曰不應非其氣也君子不容非其類也人不愛倕之手而愛己之指倕堯之巧工也雖倕巧人不能以倕巧故愛其手也謂倕手無益於己故自愛其指也不愛江漢之珠而愛己之鉤江漢雖有美珠不為己用故不愛也鉤鈎也可以得魚故愛之以束薪為鬼以火煙為氣以束薪為鬼朅而走夜行見束薪以為鬼故去而走以火煙為氣殺豚烹狗以火煙為吉㓙之氣殺牲以攘之惑也先事如此不如其後此先事之人也如此不如徐徐出其後者也巧者善度知者善豫豫備也羿死桃部不給射慶忌死劒鋒不給摶桃部地名羿夏之諸侯有窮君也為弟子逢蒙所殺不及攝己而射也摶捷也慶忌呉王僚之子也要離為闔閭刺之故死劒不及設其捷疾之力滅非者户告之曰我實不與我䛕亂謗乃愈起止言以言止事以事譬猶揚堁而弭塵抱薪而救火止言當以嘿止事當以卜今以言止言以事止事猶揚堁止塵塵愈起抱薪救火火愈熾也流言雪汙譬猶以湼拭素也流放雪除也湼黑素白也矢之於十步貫兕甲於三百步不能入魯縞騏驥一日千里其出致釋駕而僵釋税僵仆也猶矢於三百歩不能穿魯縞言矢竭勢盡也大家攻小家則為暴大國并小國則為賢夏世不能尚徳茍任勞力而以辟土折境并兼人國為賢也小馬非大馬之類也小知非大知之類也小馬不可以進道致千里故不得與大馬同類小知不可以治世長民故不得與大知同類被羊裘而賃固其事也貂裘而負籠甚可怪也籠土籠也以潔白為污辱譬猶沐浴而抒溷薫燧而負彘燒薫自香也楚人謂之薫燧治疽不擇善惡醜肉而并割之農夫不察苗莠而并耘之豈不虛哉壞塘以取龜發屋而求狸掘室而求鼠割唇而治齲區桀跖之徒君子不與殺戎馬而求狐狸援兩鼈而失靈龜㫁右臂而爭一毛折鏌邪而爭錐刀用智如此豈足髙乎髙猶貴也寧百刺以針無一刺一刀寧一引重無久持輕寧一月饑無一旬餓飢食不足餓困乏也萬人之蹪愈於一人之隧隧陷也有譽人之力儉者舂至旦不中員呈猶讁之察之乃其母也讁責怒也稱譽人力儉呈作不中科員而責怒也君子視之乃自呈作其母以為力挾以此譽人孰如毁之故諺曰問誰毁之小人譽之此之謂也故小人之譽人反為損損毁也東家母死其子哭之不哀西家子見之歸謂其母曰社何愛速死吾必悲哭社江淮謂母為社夫欲其母之死者雖死亦不能悲哭矣謂學不暇者雖暇亦不能學矣言有事務不暇學如此曹之人雖閒暇無務亦不能學也見窽木浮而知為舟見飛蓬轉而知為車見鳥迹而知著書以類取之窽穴讀曰科也以非義為義以非禮為禮譬猶倮走而追狂人盜財而與乞者竊簡而寫法律蹲踞而誦詩書割而舍之鏌邪不㫁肉執而不釋馬氂截玉􅈊馬尾也聖人無止無以歳賢昔日俞昨也賢俞猶勝也言今歳勝於昔歳今日勝於昨日喻聖人自修進也馬之似鹿者千金天下無千金之鹿玉待礛藍諸而成器礛諸攻玉之石言物有待賤而貴者也礛廉或直言藍也有千金之璧而無錙錘之礛諸六銖曰錙八銖曰錘言其賤也受光於隙照一隅受光於牖照北壁受光於户照室中無遺物況受光於宇宙乎天下莫不藉明於其前矣由此觀之所受者小則所見者淺所受者大則所照者博江出岷山河出崑崙濟出王屋潁出少室漢出嶓冢分流斘馳注於東海所行則異所歸則一通於學者若車軸轉轂之中不運於己與之致千里終而復始轉無窮之源不通於學者若迷惑告之以東西南北所居聆聆聆聆猶了了言迷解也背而不得不知凡要寒不能生寒熱不能生熱不寒不熱能生寒熱故有形出於無形未有天地能生天地者也至深微廣大矣未有天地生天地故無形生有形也雨之集無能霑待其止而能有濡集下也此其至未能有所霑止者所至故能有濡也矢之發無能貫待其止而能有穿唯止能止衆止止喻天止乃能穿物一曰止己情欲乃能止歸衆物令不得已乎因髙而為臺就下而為池各就其勢不敢更為聖人用物若用朱絲約芻狗若為土龍以求雨芻狗待之而求福求猶得也待芻狗之靈而得福也土龍待之而得食土龍致雨雨而成穀故得待土龍之神而得穀食一説土龍待請雨之所得食酒肉者也魯人身善制冠妻善織履往徙於越而大困窮以其所修而遊不用之鄉譬若樹荷山上荷水菜芙渠也其莖曰茄其本曰宻其根曰藕其華曰芙蓉其秀曰菡蓞其寔曰蓮蓮之茂者花花之中心曰薏而畜火井中操釣上山掲斧入淵欲得所求難也方車而蹠越乗桴而入胡方出蹠至桴筏一曰瓠言非其所宜也欲無窮不可也無求之處也楚王有白蝯猨王自射之則摶矢而熈熈戲也使養由基射之始調弓矯矢未發而蝯擁柱號矣由基楚王之臣養姓調張矯直擁抱號呼也有先中中者也有先未中必中之徵精相動也咼和氏之璧夏后之璜揖讓而進之以合歡夜以投人則為怨時與不時不時謂夜也畫西施之面美而不可説規孟賁之目大而不可畏君形者亡焉生氣者人形之君規畫人形無有生氣故曰君形亡人有昆弟相分者無量多不可計而衆稱義焉夫唯無量故不可得而量也登髙使人欲望臨深使人欲闚處使然也射者使人端釣者使人恭事使然也端然後中恭然後得故曰事使然也曰殺罷牛可以贖良馬之死莫之為也殺牛必亡之數牛者所以植穀者民之命是以王法禁殺牛民犯禁殺之者誅故曰必亡之數以必亡贖不必死未能行之者矣季孫氏劫公家魯大夫季桓子斯一曰康子肥脅定公而專其政孔子説之先順其所為而後與之入政曰舉枉與直如何不得舉直與枉勿與遂往此所謂同汚而異塗者衆曲不容直衆枉不容正故人衆則食狼狼衆則食人欲為邪者必相明正欲為曲者必相達直公道不立私欲得容者自古及今未嘗聞也此以善託其醜託寄也若麗姬欲殺太子申生先稱之於獻公然後得行其害此其類也衆議成林無翼而飛衆人皆議平地生林無翼之禽能飛凡人信之以為實然三人成市虎三人從市中來皆言市中有虎市非虎處而人信以為有虎故曰三人成市虎一里撓椎撓弱一里之人皆言有屈椎者人則信之也夫游没者不求沐浴己自足其中矣故食草之獸不疾易藪疾患也水居之蟲不疾易水行小變而不失常小變易水易草也草食期得草水居期得水故變而不失其常也信有非禮而失禮尾生死其梁柱之下此信之非也孔氏不喪出母此禮之失者禮庶子喪出母子上之母死不喪門人問諸子思曰子先君其喪出母乎曰然子不使白喪何也曰昔吾先君無所失道道隆從而隆道汚從而汚伋則安能及乎是不為伋妻是不為白也母孔氏之不喪出母自子思始故曰孔氏之失也曾子立孝不過勝母之閭墨子非樂不入朝歌之邑曾子立廉不飲盜泉所謂養志者也紂為象箸而箕子唏唏驚號啼也魯以偶人塟而孔子嘆故聖人見霜而知冰見微霜降大寒至必堅冰有鳥將來張羅而待之得鳥者羅之一目也今為一目之羅則無時得鳥矣今被甲者以備矢之至若使人必知所集則懸一札而已矣事或不可前規物或不可慮卒然不戒而至故聖人畜道以待時道能均化無不稟受故聖人畜養以待時時至而應若武王伐紂也􅀈坤屯犁牛既􅀈科以􅀈脩決鼻而羈􅀈屯醜牛貌犁牛不純色􅀈無角􅀈無尾決鼻羈頭而牽生子而犧尸祝齊戒以沉諸河犧者牲也尸祭神之主祝祈福祥之辭祀河曰沉河伯豈羞其所從出辭而不享哉得萬人之兵不如聞一言當當謂明天時地利知人之言可以不戰屈人之兵也得隋侯之珠不若得事之所由得和氏之璧不若得事之所適由用適宜適也撰良馬者非以逐狐狸將以射麋鹿砥利劒者非以斬縞衣將以㫁兕犀故髙山仰止景行行止鄉者其人言有髙山我仰而止之人有大行我則而行之故曰鄉者其人也見彈而求鴞炙彈可以彈鴞鳥而我因求其炙也見卵而求晨夜鷄知將旦鶴知夜半見其卵因望其夜鳴故曰求晨夜見黂焚而求成布雖其理哉亦不病暮黂麻之有實者可以為布因求其成故曰雖其理哉亦不病暮言其早也象解其牙不憎人之利之也利猶取也死而棄其招蔶績不怨人取之招蔶稱死者浴牀上之栭也怨亦憎也人能以所不利利人則可所不利若子罕不利玉人之寳利於玉人自得玉以為寶狂者東走逐者亦東走東走則同所以東走則異溺者入水拯之者亦入水入水則同所以入水者則異故聖人同死生愚人亦同死生聖人之同死生通於分理愚人之同死生不知利害所在徐偃王以仁義亡國國亡者非必仁義比干以忠靡其體被誅者非必忠也故寒顫戰懼者亦顫此同名而異實同名於顫異者寒與懼明月之珠出於蠬娠周之簡圭生於垢石珠有夜光明月生於蠬中簡圭大圭美玉出於石中故曰生垢石大蔡神龜出於溝壑大蔡元龜之所出地名因名其龜為大蔡臧文仲所居蔡是也萬乗之主冠錙錘之冠履百金之車牛皮為賤正三軍之衆鼔聲氣故可以齊三軍之衆也欲學歌謳者必先徵羽樂風徵南方火羽北方水五音正樂夫理性情動天地感鬼神莫近於詩樂風者上以風化下下以風刺上故曰風也欲美和者必先始於陽阿采菱陽阿采菱樂曲之和聲有陽阿古之名俳善和也此皆學其所不學而欲至其所欲學者燿蟬者務在明其火釣魚者務在芳其餌明其火者所以燿而致之也芳其餌者所以誘而利之也燿明芳香也明火香餌則蟬魚至以言治國明其徳美其政天下之人如蟬魚之歸明火香餌也欲致魚者先通水欲致鳥者先樹木水積而魚聚木茂而鳥集好弋者先具繳與矰好魚者先具罟與罘未有無其具而得其利言未見君無道而能得民心也遺人馬而解其羈遺人車而稅其轙轙所以縳衡也轙音倚所愛者少而所亡者多故里人諺曰烹牛而不鹽敗所為也烹羮不與鹽不成羮故曰敗所為也桀有得事謂若作瓦以蓋屋遺後世也堯有遺道遺失謂不能放四㓙用十六相是也一説不傳丹朱而禪舜天下有不慈之名故曰有遺道也嫫母有所美嫫母古之醜女而行貞正故曰有所美也西施有所醜西施古之好女雖容儀光艷未必貞正故曰有所醜也故亡國之法有可隨者治國之俗有可非者有可隨猶嫫母有所美也有可非猶西施有所醜也琬逺琰演之玉在洿池之中雖廉者弗釋琬琰美玉釋舎也弊箄避甑瓾黽在袇然茵之上雖貪者不搏瓾甑帯搏取也美之所在雖汚辱世不能賤惡之所在雖髙隆世不能貴世不能賤者喻賢者在下位卑汚之處世不能貴者喻小人在上位髙顯之處春貸秋賦民皆欣春飢而予秋豐而收故民欣也春賦秋貸衆皆怨得失同喜怒為别其時異也為魚徳者非挈而入淵為蝯賜者非負而縁木縱之其所而已喻為政官方定物能文者居文官能武者居武官故曰縱之其利而已也貂裘而雜不若狐裘而粹故人莫惡於無常行無常行猶論語人而無恒不可作為巫醫故曰恶也有相馬而失馬者失猶不知也然良馬猶在相之中良馬有夭夀骨法非能相不知故曰在相之中今人放燒或操火往益之或接水往救之兩者皆未有功而怨徳相去亦逺矣郢人有買屋棟者求大三圍之木而人予車轂跪而度之巨雖可而長不足巨大也蘧伯玉以德化趙簡子將伐衛使史黙往視之曰蘧伯玉為政未可以加兵故曰以徳化公孫鞅以刑罪所極一也病者寢席寢卧席蓐也醫之用針石巫之用糈胥藉所救鈞也醫師在男曰覡在女曰巫石針所砥殫人雍座出其惡血糈米所以享神藉菅米皆所以療病求福祚故曰救鈞狸頭愈鼠雞頭己瘻鼠齧人創狸愈之瘻頸腫疾雞頭水中芡幽州謂之鴈頭亦愈之也䖟散積血斵木愈齲此類之推者也膏之殺鼈鵲矢中蝟中亦殺也爛灰生繩漆見蠏而不乾此類之不推者也推與不推若非而是若是而非孰能通其微天下無粹白狐而有粹白之裘掇之衆白也善學者若齊王之食雞必食其蹠數十而後足蹠雞足踵也喻學取道衆多然後優刀便剃毛至伐大木非斧不尅物固有以尅適成不逮者視方寸於牛不知其大於羊總視其體乃知其大相去之逺孕婦見兔而子缺脣見麋而子四目小馬大目不可謂大馬大馬之目眇所謂之眇馬物固有似然而似不然者故決指而身死決傷也或㫁臂而顧活類不可必推厲利劒者必以柔砥擊鍾磬者必以濡木轂强必以弱輻兩望不能相和兩强不能相服故梧桐㫁角馬氂截玉言柔勝剛也媒但者非學謾也但成而生不信但猶詐也立慬勤者非學鬬爭也慬立而生不讓故君子不入獄為其傷恩也不入市為其侳廉也侳辱也積不可不慎者也走不以手縛手走不能疾飛不以尾屈尾飛不能逺物之用者必待不用者故所以見者乃不見者也使鼓鳴者乃不鳴者也不鳴乃無聲也嘗一臠肉知一鑊之味有足曰鼎無足曰鑊懸羽與炭而知燥濕之氣燥故炭輕也濕故炭重也以小明大見一葉落而知歳之將暮睹瓶中之冰而知天下之寒以近論逺三人比肩不能外出户户不容故也一人相隨可以通天下言不並也足􅡮蹍地而為迹暴行而為影此易而難􅡮履也履地迹自成行日中影自生是其易使迹正影直是其難也莊王誅里史孫叔敖制冠浣衣里史佞臣惡人死叔敖自知當見用故制冠浣衣也文公棄荏席從黴梅黒咎犯辭歸晉文棄其卧席之下黴黒者咎犯感其捐舊物因曰臣從君周旋臣之罪多矣臣猶自知之況君乎請從此亡故曰辭歸故桑葉落而長年悲也桑葉時既茹落長年懼命盡故感而悲也鼎錯日用而不足貴錯小鼎雖日見用不能和五味故不足貴周鼎不㸑而不可賤周家大鼎不日炊而能和味故曰不可賤物固有以不用而為有用者不用謂鼎不㸑也為用謂調五味也地平則水不流重鈞則衡不傾流行傾邪也物之尤必有所感尤過也輕重則衡低卬故曰必有所感感動也物固有以不用為大用者衡行物物所不用然用之乃知物之輕重故曰以不用為大用也先倮而浴則可以浴而倮則不可先祭而後饗則可先饗而後祭則不可物之先後各有所宜也祭之日而言狗生取婦夕而言衰麻置酒之日而言上冢渡江河而言陽侯之波陽陵侯能為大波為人作害舟人所不欲言也或曰知其且赦也而多殺人或曰知其且赦也而多活人其望赦同所利害異故或吹火而然或吹火而滅所以吹者異也烹牛以饗其里而罵其東家母徳不報而身見殆文王汚膺鮑申傴背以成楚國之治文王楚武王之子熊庛污膺陷􅎍也鮑申楚相傴背僂成治言賢也裨諶出郭而知以成子産之事裨諶鄭大夫謀於野則獲謀於國則否鄭國有難子産載如野與議四國之事故曰成子産之事也朱儒問徑天髙於脩人脩人不知曰子雖不知猶近之於我故凡問事必於近者脩人長人也冦難至躄者告盲者盲者負而走兩人皆活得其所能也故使盲者語使躄者走失其所也郢人有鬻其母為請於買者曰此母老矣幸善食之而勿苦此行大不義而欲為小義者介蟲之動以固介甲龜鼈之屬動行也貞蟲之動以毒螫貞蟲無牡牝之合而有毒故能螫熊羆之動以攫摶攫撥也熊羆多力故能撥攫有所摶也兕牛之動以觝觸兕有角牛犁牛也物莫措其所脩而用其短也措置也治國者若鎒田去害苗者而已今沐者墮髪而猶為之不止以所去者少所利者多砥石不利而可以利金金刀劒之屬擏檠不正而可以正弓擏弓之掩牀也物固有不正而可以正不利而可以利不正者擏正者弓也不利者砥利者金也力貴齊薺知貴捷得之同遫為上齊捷皆疾也勝之同遲為下所以貴鏌邪者以其應物而㫁割也􅲣幾靡勿釋牛車絶轔􅲣切楚人謂門切之轔車行其上則㫁之也為孔子之窮於陳蔡而廢六藝則惑為醫之不能自治其病病而不就藥則悖矣淮南鴻烈解卷十六
