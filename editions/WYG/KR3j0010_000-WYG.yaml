body:
  text: 淮南鴻烈解雜家類一雜學之屬提要臣等謹案淮南鴻烈解二十一卷漢淮南王劉安撰安事蹟具漢書本傳漢書藝文志雜家淮南内二十一篇外三十三篇顔師古注曰内篇論道外篇雜説今所存者二十一篇盖内篇也晁公武讀書志稱崇文總目亡三篇李淑邯鄲圖書志亡二篇其家本惟存十七篇亡其四篇髙似孫子畧稱讀淮南二十篇是在宋已鮮完本惟洪邁容齋隨筆稱今所存者二十一卷與今本同然白居易六帖引烏鵲填河事云出淮南子而今本無之則尚有脱文也其註或題許慎或題高誘隋志唐志宋志皆二注並列陸徳明莊子釋文引淮南子註稱許慎李善文選注殷敬順列子釋文引淮南子註或稱髙誘或稱許慎是原有二註之明證後慎注散佚傳刻者誤以誘注題慎名致岐誤耳觀書中稱景古影字而慎説文無影字其不出于慎審矣今故訂正題誘名焉誘涿郡人盧植之弟子建安中辟司宫掾厯官東都濮陽令遷河東監並見于自序云乾隆四十六年閏五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀淮南鴻烈解序淮南王名安厲王長子也長髙皇帝之子也其母趙氏女為趙王張敖美人髙皇帝七年討韓信於銅鞮信亡走匈奴上逐北至樓煩還過趙不禮趙王趙王獻美女趙氏女得幸有身趙王不敢内之於宫為築舍於外及貫髙等謀反發覺并逮治王盡收王家及美人趙氏女亦與焉吏以其得幸有身聞上上方怒趙王未理也趙美人弟兼因辟陽侯審食其言之吕后吕后不肯白辟陽侯亦不强爭及趙美人生男恚而自殺吏奉男詣上上命吕后母之封為淮南王暨孝文皇帝即位長弟上書願相見詔至長安日從游宴驕蹇如家人兄弟怨辟陽侯不爭其母於吕后因椎殺之上非之肉袒北闕謝罪奪四縣還歸國為黄屋左纛稱東帝坐徙蜀嚴道死於雍上閔之封其四子為列侯時民歌之曰一尺繒好童童一升粟飽蓬蓬兄弟二人不能相容上聞之曰以我貪其地耶乃召四侯而封之其一人病薨長子安襲封淮南王次為衡山王次為廬江王太傅賈誼諫曰怨讎之人不可貴也後淮南衡山卒反如賈誼言初安為辯達善屬文時武帝方好藝文以安屬為諸父甚尊重之詔使為離騷傳自旦受詔日早食已上愛而祕之天下方術之士多往歸焉於是遂與蘇飛李尚左吳田由雷被毛技伍被晉昌等八人及諸儒大山小山之徒共講論道徳總統仁義而著此書其㫖近老子淡泊無為蹈虚守靜出入經道言其大也則燾天載地説其細也則淪於無垠及古今治亂存亡禍福世間詭異瓌奇之事其義著其文富物事之類無所不載然其大較歸之於道號曰鴻烈鴻大也烈明也以為大明道之言也故夫學者不論淮南則不知大道之深也是以先賢通儒述作之士莫不援采以驗經傳以父諱長故其所著諸長字皆曰脩光禄大夫劉向校定撰具名之淮南又有十九篇者謂之淮南外篇自誘之少從故侍中同縣盧君受其句讀誦舉大義會遭兵災天下棊峙亡失書傳廢不尋修二十餘載建安十年辟司空掾除東郡濮陽令覩時人少為淮南者懼遂陵遲於是以朝餔事畢之間乃深思先師之訓參以經傳道家之言比方其事為之注解悉載本文并舉音讀典農中郎將弁揖借八卷刺之會揖身喪遂亡不得至十七年遷監河東復更補足淺學寡見未能備悉其所不達注以未聞唯博物君子覽而詳之以勸後學者云爾河東髙誘撰御製讀淮南子智過萬人謂之英智過千人謂之俊設於林林蠢蠢流縱過億萬非哲濬使遇其智相敵者一人已難無過分英俊惟名智亦殊刻舟求劒失銛刃譬之披圗閱超光不求之馬終無駿
