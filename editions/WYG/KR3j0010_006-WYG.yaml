body:
  text: 淮南鴻烈解卷六漢髙誘注覽㝠訓覽觀幽㝠變化之端至精感天通逹無極故曰覽㝠昔者師曠奏白雪之音而神物為之下降風雨㬥至平公癃隆病晉國赤地白雪太一五十弦琴瑟樂名也神物即神化之物謂𤣥鶴之屬来至無頭鬼類操戈以舞也平公晉悼公之子彪也癃病篤疾赤地旱也唯聖君能御此異使無災耳平公徳薄不能堪故篤病而大旱庶女呌天雷電下擊景公臺隕支體傷折海水大出庶賤之女齊之寡婦無子不嫁事姑謹敬姑無男有女女利母財令母嫁婦婦益不肯女殺母以誣寡婦婦不能自明寃結呌天天為作雷電下擊景公之臺隕壊也毁景公之支體海水為之大溢出也夫瞽師庶女位賤尚葈洗權輕飛羽尚主也葈者葈耳菜名也主是官者至㣲賤也瞽師庶女之位復賤於主葈之官然而專精厲意委務積神上通九天激厲至精由此觀之上天之誅也雖在壙虚幽閒遼逺隠匿重襲石室界障險阻其無所逃之亦明矣上天上帝也上帝神明言人有罪惡雖自隠蔽竄蔵猶見誅害也武王伐紂渡于孟津陽侯之波逆流而擊疾風晦㝠人馬不相見陽侯陵陽國侯也其國近水溺死於水其神能為大波有所傷害因謂之陽侯之波於是武王左操黄鉞右秉白旄瞋目而撝揮之曰余任天下誰敢害吾意者於是風濟而波罷魯陽公與韓搆難戰酣日暮援戈而撝之日為之反三舍魯陽楚之縣公也楚僣號稱王其守縣大夫皆稱公酣對戰合樂時也撝揮也揮日令反却行三舍舍次宿也夫全性保真不虧其身遭急迫難精通于天若乃未始出其宗者何為而不成精通于天者謂聖人質成上通為天所助宗者道之本也謂性不外逸生與道同也夫死生同域不可脅陵勇武一人為三軍雄武士也江淮間謂士曰武彼直求名耳而能自要者尚猶若此又況夫宫天地懐萬物以天地為宫室懐猶囊也而友造化造化隂陽也與之相朋友含至和直偶于人形外直偶與人同形而内有大道也觀九鑽一知之所不知九謂九天一龜也觀九天之變鑽龜占兆所不知事亦云然也而心未嘗死者乎昔雍門子以哭見於孟嘗君雍門子名固善彈琴又善哭雍門齊西門也居近之因以為氏哭猶歌也見猶感也孟嘗君齊相田文已而陳辭通意撫心發聲孟嘗君為之增欷歍鴦唈遏流涕狼戾不可止增重也歍唈失聲也狼戾猶交撗也精神形於内而外諭哀於人心此不傳之道言能以精誠哀悲感傷人心不可學而得之使俗人不得其君形者而效其容必為人笑君形者言至精為形也故蒲且子之連鳥於百仞之上蒲且子楚人善弋射者而詹何之鶩魚於大淵之中此皆得清淨之道太浩之和也詹何楚人知道術者也言其善釣令魚馳鶩来趨鉤餌夫物類之相應𤣥妙深㣲知不能論辯不能故東風至而酒湛溢東風木風也酒湛清酒也米物下湛故曰湛木味酸酸風入酒故酒醉而湛者沸溢物類相感也蠶咡絲而商弦絶或感之也老蠶上下絲於口故曰咡絲新絲出故絲脆商於五音最細而急故絶也咡作珥蠶老時絲在身中正黄逹見于外如珥也商西方金音也蠶午火也火壯金囚應商而已或有新故相感者也畫隨灰而月運圓闕鯨魚死而彗星出或動之也運者軍也将有軍事相圍守則月運出也以蘆草灰隨牖下月光中令圜畫缺其一面則月運亦缺於上也鯨魚大魚長數里死於海邉魚之身賤也彗星為變異人之害也類相動也故聖人在位懐道而不言澤及萬民君臣乖心則背譎見於天神氣相應徴矣日㫄五色氣在兩邊外出為背外向為譎内向為珥在上外出為冠故山雲草莽水雲魚鱗山中氣出雲似草莽水氣出雲似魚鱗旱雲煙火涔雲波水各像其形類所以感之旱雲亢陽氣似煙火涔滀水也雲出於涔似波水夫陽燧取火於日方諸取露於月天地之間巧厯不能舉其數巧工也天地之間物類相感者衆多雖工為厯術者不能悉舉其數也手徴忽怳不能覽其光言手雖覽得㣲物不能得其光然以掌握之中引類於太極之上太極天地始形之時也上猶初也而水火可立致者隂陽同氣相動也動猶化也此傅説之所以騎辰尾也言殷王武丁夢得賢人使工寫其象㫄求之得傅説於傳巖遂以為相為髙宗成八十一符致中興也死託精於辰尾星一名天䇿故至隂飂留飂至陽赫赫兩者交接成和而萬物生焉衆雄而無雌又何化之所能造乎所謂不言之辯不道之道也故召逺者使無為焉逺者四夷也欲致化四夷者當以無為無為則夷荒自至也親近者使無事焉近者諸夏也欲親近者當以無事無事則近人自親附之惟夜行者為能有之夜行諭隂行也隂行神化故能有天下也故却走馬以糞而車軌不接於逺方之外却走馬以糞老子辭也上馬不以走但以糞糞田也行至徳之効也一説國君無道則戎馬生於郊無事止走馬以糞田也故兵車之軌不接逺方之外兩輪之間為軌是謂坐馳陸沈晝㝠宵明言坐行神化疾於馳傳沈浮㝠明與道合也以冬鑠膠以夏造氷夫道者無私就也無私去也能者有餘拙者不足言以非時鑠膠造氷難成之也天道無私就去能行道功有餘也順之者利逆之者㐫譬如隋侯之珠和氏之璧得之者富失之者貧隋侯漢東之國姬姓諸侯也隋侯見大蛇傷斷以藥傅之後蛇於江中啣大珠以報之因曰隋侯之珠葢明月荆山之下以獻武王王以也楚人卞和得美玉璞於玉人玉人以為石刖其左足文王即位復獻之以為石刖其右足抱璞不釋而泣血及成王即位又獻之成王曰先君輕刖而重剖石遂剖視之果得美玉以為璧葢純白夜光也得失之度深㣲窈㝠難以知論不可以辯説也何以知其然今夫地黄主屬骨而甘草主生肉之藥也以其屬骨責其生肉以其生肉論其屬骨是猶王孫綽之欲倍偏枯之藥而欲以主殊死之人亦可謂失論矣王孫綽周人言一劑藥愈偏枯之病欲倍其劑以生已死之人若夫以火能焦木也因使銷金則道行矣若以磁石之能連鐵也而求其引瓦則難矣物固不可以輕重論也夫燧之取火於日磁石之引鐵蟹之敗漆以蟹置漆中則敗壊不燥不任用也葵之鄉日雖有明智弗能然也然猶明也故耳目之察不足以分物理心意之論不足以定是非故以智為治者難以持國唯通于太和而持自然之應者為能有之能有持國之術故嶢山崩而薄落水之涸薄落涇水區謳冶生而淳鈞之劒成區越人善冶劒工也淳鈞古大鋭劒也紂為無道左强在側左强紂之䛕臣太公並世故武王之功立由是觀之利害之路禍福之門不可求而得也言其門户不可豫求而得知忽然来至無形逃也夫道之與徳若韋之與革逺之則邇近之則逺革之質象道韋之質象徳欲去逺之道反在人側欲以事求之去人已逺也無事者近人有事者逺人不得其道若觀儵魚儵魚小魚也在水中可觀見見而不可得道亦如之故聖若鏡不將不迎將送也應而不蔵應猶隨也謂境随人形好醜不有蔵匿者也故萬化而無傷其得之乃失之其失之非乃得之也自謂得是乃失道者也自謂失道未必不得道也今夫調弦者叩宫宫應彈角角動此同聲相和者也叩大宫則少宫應彈大角則少角動夫有改調一弦其於五音無所比鼓之而二十五弦皆應此未始異於聲而音之君已形也一弦宫音也音之君也故二十五弦皆和也一説改調一弦不比五音謂一聲宫音也故曰未始異於聲也五主於一聲故曰音之君已形君主形見也故通於太和者惽若純醉而甘卧以游其中而不知其所由也太和謂等死生之和齊窮逹之端其中道之中也不自知所至此也純温以淪鈍悶以終若未始出其宗純一也温和也淪没也諭潛伏也鈍悶無情也欲終始於道宗本也若未有其形是謂大通今夫赤螭青虬之游冀州也赤螭青虬皆龍屬天清地定毒獸不作飛鳥不駭入榛薄食薦梅薦梅草實也状如桑椹其色赤生江濵􅏐味含甘歩不出頃畝之區而蛇鱓輕之以為不能與之爭於江海之中替味長美也蛇鱓自以為能勝赤螭青虬若乃至於𤣥雲之素朝𤣥黒素白也黒雲升合於明朝也隂陽交爭降扶風雜凍雨扶揺而登之降下也扶風疾風也凍雨􅍊雨也扶揺發動也登上也上風雨而去威動天地聲震海内蛇鱓著泥百仞之中熊羆匍匐邱山磛巖虎豹襲穴而不敢咆襲入咆嘷也猨􅎜顛蹶而失木枝􅎜猨屬長尾而昻鼻又況直蛇鱓之類乎鳯凰之翔至徳也雄曰鳳雌曰凰為至徳之君而来翔也雷霆不作風雨不興川谷不澹澹溢也草木不揺而燕雀佼交之以為不能與之爭於宇宙之間燕雀自以為能佼徤於鳯凰也佼或作詨宇屋簷也宙棟梁也易曰上棟下宇還至其曾逝萬仞之上翺翔四海曾猶髙也逝猶飛也一曰囘也翼一上一下曰翺不揺曰翔過崑崙之疏圃飲砥柱之湍瀨疏圃在崑崙之上砥柱河之隘也在河東太陽之東湍􅗭水至疾瀨清皆激􅗭急流邅囘䝉汜之渚邅囘猶倘佯也蒙汜日所出之地也決復入為渚渚小淵也尚佯冀州之際徑躡都廣入日抑節躡至也都廣東南之山名衆帝所自上下也言鳯凰過廣都之野送日入於抑節之地言其翔之廣也躡或作絶徑過絶歴也羽翼弱水暮㝛風穴濯羽翼於弱水之上風穴北方寒風從地出也當此之時鴻鵠鶬鸖莫不憚驚伏竄注喙江裔注喙喙注地不敢動也裔邊也又況直燕雀之類乎此明於小動之迹而不知大節之所由者也昔者王良造父之御也王良晉大夫御無恤子良也所謂御良也一名孫無政為趙簡子御死而託精於天駟星天文有王良星是也造父嬴姓伯翳之後飛亷之子為周穆王御上車攝轡馬為整齊而歛諧整齊不差也歛諧馬容體足調諧也投足調均勞逸若一一同心也心怡氣和體便輕畢畢疾也安勞樂進馳鶩若滅滅没也言疾也左右若鞭周旋若環左右謂騑驂也歩趨之力若被鞭矣世皆以為巧然未見其貴者也若夫鉗且大丙之御此二人太一之御也除轡銜去鞭棄䇿車莫動而自舉馬莫使而自走也日行月動星燿而𤣥運燿有𤣥天也運行也電奔而鬼騰進退屈伸不見朕垠垠形狀也故不招指不咄叱過歸鴈於碣石言其御疾到自息止乃使北歸於碣石之山而比歸鴈其疾過之也軼鶤鷄於姑餘自後過前曰軼姑餘山名在吳鶤鷄鳳凰之别名言其御疾自碣石過歸鴈便復東南䡍過鶤鷄於姑餘山也騁若飛騖若絶縱矢躡風追猋標歸忽矢在後不能及故言縱其行疾能及矢言躡追猋及之猋光中有影者忽然便歸皆極言疾也朝發榑扶桑日入落棠榑桑即扶桑神木也落棠山名此假弗用而能以成其用者也非慮思之察手爪之巧也嗜欲形於胷中而精神踰於六馬此以弗御御之者也以弗御御之以道術御也昔者黄帝治天下而力牧太山稽輔之力牧太山稽黄帝師以治日月之行律律度也治隂陽之氣節四時之度正律厯之數别男女異雌雄明上下等貴賤使强不掩弱衆不㬥寡人民保命而不天歲時熟而不凶百官正而無私上下調而無尤法令明而不闇輔佐公而不阿田者不侵畔漁者不争隈隈曲深處魚所聚也道不拾遺市不豫賈城郭不闗邑無盗賊鄙旅之人相讓以財狗彘吐菽粟於路而無忿爭之心於是日月精明星辰不失其行風雨時節五榖登熟虎狼不妄噬鷙鳥不妄摶鳳凰翔於庭麒麟游於郊青龍進駕飛黄伏皁飛黄乗黄也出西方状如狐背上有角夀千歲皁櫪也諸北儋耳之國莫不獻其貢職然猶未及虙戲氏之道也往古之時四極廢九州裂天不兼覆地不周載火爁炎而不滅水浩洋而不息猛獸食顓民顓善也鷙鳥攫老弱攫撮也於是女媧錬五色石以補蒼天女媧隂帝佐虙戲治者也三皇時天不足西北故補之鼇足以立四極鼇大龜天廢頓以鼇足柱之楚詞曰鼇載山下其何以安之是也殺黑龍以濟冀州黑龍水精也力牧太稽殺之以止雨濟朝也冀九州中謂今四海之内積蘆灰以止淫水蘆葦也生於水故積聚其灰以止淫水平地出水為淫水蒼天補四極正淫水涸冀州平狡蟲蟲狩也死顓民生背方州抱圎天方州地也和春陽夏殺秋約冬枕方寢繩方榘四寸也寢繩直身而卧也隂陽之所壅沈不通者竅理之逆氣戾物傷民厚積者絶止之逆氣亂氣也傷害民物之積財故絶止之當此之時卧倨虚倨興眄眄倨倨卧無思慮也眄眄視無智巧貌一自以為馬一自以為牛其行蹎嗔蹎其視瞑瞑侗然皆得其和莫知所由生浮㳺不知所求魍魎不知所往當此之時禽獸蝮蛇無不匿其爪牙藏其螫毒無有攫噬之心考其功烈上際九天下契黄壚黄壚黄泉下有壚土也名聲被後世光暉重萬物乗雷車服駕應龍驂青虬駕應徳之龍在中為服在㫄為驂有角為龍無角為虬一説應龍有翼之龍也援絶瑞席蘿圗殊絶之瑞應援而致之也羅列圗籍以為席蓐一説羅圗車上席也黄雲絡前白螭後奔蛇絡謂車之垂絡也黄雲之氣絡其車白螭導在於前奔蛇騰蛇從在於後皆瑞應也浮㳺消揺道鬼神登九天朝帝於靈門在朝於上帝靈門也宓穆休于太祖之下宓寜穆和休息也太祖道之大宗然而不彰其功不揚其聲彰揚皆明也隠真人之道以從天地之固然隠藏也真人真徳之人固自然也何則道徳上通而智故消滅也逮至夏桀之時主闇晦而不明道瀾漫而不修仁義道不復修設故曰瀾漫棄捐五帝之恩刑推蹶三王之法籍是以至徳滅而不揚帝道揜而不興興舉也舉事戾蒼天發號逆四時戾反也春秋縮其和天地除其徳縮蔵也言和氣不復行也言其所施曰惡不自知也仁君處位而不安大夫隠道而不言不為民所安隠仁義之道不正諌直言也羣臣凖上意而懐當凖望懐思當合也取合主意不復以道正諌也疎骨肉而自容邪人參耦比周而隂謀隂謀私謀也居君臣父子之間而競載驕主而像其意像猶隨也亂人以成其事是故君臣乖而不親骨肉疏而不附植社槁而􅀈裂言不禋於神也容臺振而掩覆容臺行禮容之臺言不能行禮故天文振動而敗也犬羣嘷豪而入淵言將滅壞犬失其主故嘷而入淵也一説言犬禍也豕銜蓐而席澳豕銜其蓐席入之澳言豕禍也一説銜蓐自蔵美人挐袽首墨面而不容挐首亂頭也草與髪并編為挐首不修容飭也曼聲吞炭内閉而不歌曼聲善歌也見世亂衰将滅故吞炭自敗音聲閉氣不復動也喪不盡其哀獵不聽其樂言時亂禮壞不盡在哀樂崩故不復聽田獵之樂西老折勝黄神嘯吟西王母折其頭上所戴勝為時無法度黄帝之神傷道之衰故嘯吟而長嘆也飛鳥鎩翼走獸廢脚鎩冀縱翼也廢脚跛蹇也言桀無道田獵煩數鳥獸悉被創夷也山無峻榦澤無洼水峻榦美材也洼水渟水言山澤不以時也狐狸首穴馬牛放失田無立禾路無莎薠莎草名薠音蟠金積折亷璧辟襲無理金氣積聚折其鋒亷也璧文襲重言用之煩數皆鈍無復文理也磬龜無腹磬空也象磬數鑚以卜故空盡無腹也言桀為無道不修仁徳但數占龜莫得吉兆也蓍䇿日施晩世之時七國異族諸侯制法各殊習俗晩世春秋之後戰國之末七國齊楚燕趙韓魏秦也齊姓田楚姓芈燕姓姚趙姓趙韓姓韓魏姓魏秦姓嬴故異族也從横間之舉兵而相角蘇秦約從張儀連横南與北合為從西與東合為横攻城濫殺覆髙危安掘墳墓揚人骸大衝車髙重京衝車大鐵著其轅端馬被甲車被兵所以衝于敵城也古者伐不敬取其鯨鯢收其骸尸聚土而瘞之以為京觀除戰道便死路犯嚴敵殘不義百往一反名聲茍盛也言百人行戰皆死一人得還反也是故質壮輕足者為甲卒甲鎧也在車曰士步曰卒千里之外家老嬴弱悽愴於内厮徒馬圉軵拊車奉饟厮役徒衆也曰收馬曰圉軵推也饟音餉資糧也道馬遼逺霜雪亟集裋褐不完裋褐處器物之人也褐毛布如今之馬衣也不完言民窮也人羸車弊泥塗至膝相攜於道奮首於路攜引也奮首民疲於役頓仆於路僅能揺頭耳言疲困也故曰奮首身􅚴尤格而死格搒楚也言收民役賦不畢者搒之於格上不得下􅚴格而死所謂兼國有地者伏尸數十萬破車以千百數傷弓弩矛㦸矢石之創者扶舉於路故世至於枕人頭食人肉葅人肝飲人血甘之芻豢故自三代以後者天下未嘗得安其情性而樂其習俗保其修命天而不夭於人虐也所以然者何也諸侯力征天下合而為一家逮至當今之時天子在上位天子漢孝武皇帝持以道徳輔以仁義近者獻其智逺者懐其徳拱揖指麾而四海賔服春秋冬夏皆獻其貢職天下混而為一子孫相代此五帝之所以迎天徳也夫聖人者不能生時時至而弗失也輔佐有能黜䜛佞之端息巧辯之説除刻削之法去煩苛之事屛流言之迹塞朋黨之門消知能消除知巧之能修太常隳肢體絀聰明去其小聰明幷大利欲者也大通混㝠解意釋神漠然若無䰟􅅎使萬物各復歸其根則是所修伏犧氏之迹而反五帝之道也夫鉗且大丙不施轡銜而以善御聞於天下伏戲女媧不設法度而以至徳遺於後世何則至虚無純一而不􅭵雜喋牒苛事也􅭵喋猶深算也言不采取煩苛之事周書曰掩雉不得更順其風言掩雉雖不得當更從其上風順其道理也言可行與不猶當以道徳為本諭申商之法失之也今若夫申韓商鞅之為治也三子之術皆為削刻之法挬孛拔其根蕪棄其本而不窮究其所由生何以至此也鑿五刑為刻削乃背道徳之本而爭於錐刀之末錐刀之末諭小利言盡爭之也斬艾百姓殫盡太半殫病也而忻忻然常自以為治是猶抱薪而救火鑿竇而出水夫井植生梓而不容甕溝植生條而不容舟不過三月必死植謂材也椽杙於溝邊因生為條木也所以然者何也皆狂生而無其本者也河九折注於海而流不絶者崑崙之輸也潦水不泄瀇曠瀁養極望旬月不雨則涸而枯澤受瀷敕而無源者瀷雨濆疾流者故曰無源譬若羿請不死之藥於西王母恒娥竊以奔月恒娥羿妻羿請不死之藥於西王母未及服之恒娥盜食之得仙奔入月中為月精奔月或作坌肉藥坌肉以為死畜之肉復可生也悵然有喪無以續之言羿悵然失志若有所喪亡不能復得不死藥以續之何則不知不死之藥所由生也羿不知不死之藥所由生也申韓商鞅之等不得治之根本如乞藥矣一説羿謂命在藥不知命自在天也故或欲得知不死藥之所由出生也是故乞火不若取燧寄汲不若鑿井淮南鴻烈解卷六
