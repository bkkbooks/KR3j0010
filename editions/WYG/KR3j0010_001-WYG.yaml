body:
  text: 淮南鴻烈解卷一漢髙誘注原道訓原本也本道根真包裹天地以歴萬物故曰原道因以題篇夫道者覆天載地廓四方柝托八極廓張也柝開也八極八方之極髙不可際深不可測際至也包裹天地稟授無形萬物之未形者皆生於道故曰稟授無形也源流泉浡沖而徐盈混混汨骨汨濁而徐清浡涌也沖虚也源泉始出虚徐流不止能漸盈滿以喻於道亦然也故植之而塞于天地横之而彌于四海施之無窮而無所朝夕植立塞滿彌絡施用也用之無窮竭無朝夕盛衰舒之幎於六合卷之不盈於一握舒散也幎覆六合言滿天地間也四方上下為六合不盈一握言微妙也約而能張幽而能明言道之性能小能大能昧能明弱而能强柔而能剛横四維而含隂陽紘宏宇宙而章三光紘剛也四方上下曰宇古往今來曰宙章明也三光日月星甚淖潮而滒歌甚纖而微滒亦淖也饘粥多瀋者曰滒山以之髙淵以之深獸以之走鳥以之飛日月以之明星歴以之行麟以之游鳳以之翔大飛不動曰翔泰古二皇得道之柄立於中央二皇伏犧神農也指説隂陽故不言三也神與化游以撫四方撫安也是故能天運地滯輪轉而無廢水流而不止與萬物終始風興雲蒸事無不應雷聲雨降竝應無窮鬼出電入龍興鸞集鬼出言無蹤迹也電入言其疾也鈞旋轂轉周而復匝鈞陶人作瓦器法下轉旋者已彫已琢還反於樸無為為之而合于道無為言之而通乎徳言二三之化無為為之也而自合於遒無為言之也而自通於徳恬愉無矜而得于和恬愉無所好憎也無矜不自大也有萬不同而便于性萬事不同能便於性者性不欲也神託于秋毫之末而大與宇宙之總總合也其徳優天地而和隂陽優柔和調也節四時而調五行呴虚嫗預覆育萬物羣生呴温恤也潤于草木浸于金石禽獸碩大毫毛潤澤羽翼奮也角觡格生也奮壯也角觡猶言骨骼也獸胎不贕鳥卵不毈胎不成獸曰贕卵不成鳥曰毈贕音凟毈音段父無喪子之憂兄無哭弟之哀童子不孤婦人不孀虹蜺不出賊星不行賊星妖星含徳之所致也含懐也夫太上之道生萬物而不有不以為已有成化像而弗宰宰主也跂吉行喙卉息蠉宣飛蟲行貌蝡軟動麕鹿之類行也待而後生莫之知徳待而後死莫之能怨得以利者不能譽用而敗者不能非收聚畜積而不加富收斂畜積國有常賦也不加富者為百姓不以為已有也布施稟授而不益貧布施稟授匡困乏予不足也以公家之資故不益貧旋縣而不可究纖微而不可勤縣猶小也勤猶盡也累之而不髙墮之而不下益之而不衆損之而不寡斵之而不薄殺之而不殘鑿之而不深塡之而不淺忽兮怳況兮不可為象兮怳兮忽兮用不屈兮忽怳無形貌故曰不可為象屈竭也幽兮㝠兮應無形兮遂兮洞兮不虚動兮洞達也道動有所應故曰不虚動與剛柔卷舒兮與隂陽俛仰兮卷舒屈伸也俛仰升降也昔者馮夷大丙之御也馮夷大丙二人名古之得道能御隂陽者乘雲車入雲蜺游微霧以雲蜺為馬游行也微霧天之微氣騖怳忽歴逺彌髙以極往騖馳怳忽無之象往行也經霜雪而無迹照日光而無景古影字扶搖抮軫抱羊角而上扶攀搖動抮抱引戾也扶搖如羊角轉如曲縈行而上也經紀山川蹈騰崑崙排閶闔鑰天門經行紀通蹈躡騰上也崑崙山名在西北其髙萬九千里河之所出排斥鑰入也閶闔始升天之門也天門上帝所居紫微宫門馮夷大丙之御其能如此也末世之御雖有輕車良馬勁策利鍛段不能與之爭先勁强策箠也末世之御不能與馮夷大丙爭在前是故大丈夫恬然無思澹然無慮以天為葢以地為輿四時為馬隂陽為御騶御也乘雲陵霄與造化者俱大丈夫諭體道者也造化道也縱志舒節以馳大區區宅大宅謂天也可以步而步可以驟而驟令雨師灑道使風伯掃塵雨師畢星風伯箕星電以為鞭策電激氣故以為鞭策雷以為車輪雷轉氣故以為車輪上游于霄雿翟之野下出于無垠之門霄雿髙峻貌無垠無形狀之貌劉覽偏照復守以全劉猶留連之留劉覽回觀也經營四隅還反於樞隅方樞本也故以天為葢則無不覆也以地為輿則無不載也四時為馬則無不使也隂陽為御則無不備也隂陽次敘以成萬物無所缺也是故疾而不搖逺而不勞四支不動聰明不損而知八紘九野之形埒劣者何也八紘天之八維九野八方中央也執道要之柄而游於無窮之地是故天下之事不可為也為治也因其自然而推之萬物之變不可究也秉其要歸之趣夫鏡水之與形接也不設智故而方圓曲直弗能逃也智故巧飾也是故響不肆應而景不一設叫訆呼仿彿黙然自得叫呼仿彿之聲狀人生而靜天之性也感而後動性之害也物至而神應知之動也物事也知與物接而好憎生焉好憎成形而知誘於外不能反已而天理滅矣故達於道者不以人易天天性也不以人事易其天性外與物化而内不失其情言通道之人雖外貌與物化内不失其無欲之本情至無而供其求時騁而要其宿言天時自騁道要其宿㑹小大修短各有其具萬物之至騰踴肴亂而不失其數數度也是以處上而民弗重居前而衆弗害天下歸之姦邪畏之以其無爭於萬物也故莫敢與之爭夫臨江而釣曠日而不能盈羅雖有鈎箴芒距距𤓰也微綸芳餌加之以詹何娟嬛之數猶不能與網罟爭得也詹何娟嬛古善釣人名數術也射者扞烏號之弓彎綦衛之箭扞張也彎引也綦美箭所出地名衛利也黄帝鑄鼎於荆山鼎湖得道而仙乘龍而上其臣援弓射龍欲下黄帝不能也於是抱弓而號因名其弓為烏號之弓重之羿逄蒙子之巧以要飛鳥猶不能與羅者競多要取競逐也何則以所持之小也張天下以為之籠因江海以為罟又何亡魚失鳥之有乎故矢不若繳繳不若無形之像言其大也夫釋大道而任小數無以異於使蟹捕䑕蟾蠩除捕蚤不足以禁姦塞邪亂乃逾滋以艾灼蟹匡上内置穴中迺熱走窮穴也蟾蠩䗐也跳行舒遲捕蚤亦不能悉得故曰不足以禁姦昔者夏鯀作三仞之城諸侯背之海外有狡心狡猾也禹知天下之叛也乃壊城平池散財物焚甲兵施之以徳海外賔伏四夷納職職貢也合諸侯於塗山執玉帛者萬國玉圭帛𤣥纁也故機械之心藏於胷中則純白不粹神徳不全機械巧詐也純白之道不粹精神專一之徳不全也在身者不知何逺之所能懐是故革堅則兵利城成則衝生若以湯沃沸亂乃逾甚是故鞭噬狗策蹏馬而欲教之雖伊尹造父弗能化欲害之心亡於中則饑虎可尾何況狗馬之類乎故體道者逸而不窮任數者勞而無功夫峭法刻誅者非霸王之業也箠策繁用者非致逺之術也繁數也離朱之明察箴末於百步之外離朱黄帝臣明目人也不能見淵中之魚師曠之聰合八風之調而不能聽十里之外師曠晉平公樂師八風八方之風也東方谷風東南方清明風南方凱風西南方凉風西方閶闔風西北方不周風北方廣莫風東北方融風以八音之器宣播八方之風一本以八風配八卦之風聲故任一人之能不足以治三畝之宅也修道理之數因天地之自然則六合不足均也是故禹之決瀆也因水以為師神農之播穀也因苗以為教夫萍樹根於水木樹根於土鳥排虚而飛獸蹠實而走蹠足也實地也蛟龍水居虎豹山處天地之性也兩木相摩而然金火相守而流然焚也員者常轉窽科者主浮自然之勢也員輪丸之屬窽空也舟船之屬是故春風至則甘雨降生育萬物羽者嫗伏毛者孕育嫗伏以氣剖卵也孕者懐胎育生也草木榮華鳥獸卵胎莫見其為者而功既成矣秋風下霜倒生挫傷草木首地而生故曰倒生挫傷者彫落也鷹鵰搏鷙昆蟲蟄什藏草木注根魚鼈湊淵莫見其為者滅而無形滅沒形見也木處榛巢水居窟穴聚木曰榛禽獸有芄芄蓐也人民有室陸處宜牛馬舟行宜多水匈奴出穢裘於越生葛絺於發聲於越夷言也越產細葛各生所急以備燥濕各因所處以御寒暑竝得其宜物便其所由此觀之萬物固以自然聖人又何事焉九疑之南陸事寡而水事衆九疑山名在蒼梧虞舜所葬地於是民人被髮文身以像鱗蟲被翦也文身刻畫其體為蛟龍之狀以入水蛟龍不害也故曰以像鱗蟲短綣不絝褲以便涉游短袂攘卷以便刺舟因之也卷卷臂也因之因水之宜也鴈門之北狄不穀食賤長貴壯俗尚氣力人不弛弓馬不解勒便之也不穀食食肉酪而已北狄鮮卑也弛舍便習也故禹之裸國解衣而入衣帶而出因之也裸國在南方聖人治禮不求變俗故曰因之也今夫徙樹者失其隂陽之性則莫不枯槁故橘樹之江北則化而為枳鴝鵒不過濟貈涸渡汶而死形性不可易勢居不可移也是故達於道者反於清淨反本也天本授人清靜之性故曰反究於物者終於無為無為者不為物為也以恬養性以漠處神則入于天門所謂天者純粹樸素質直皓白未始有與雜糅者也所謂人者偶䁟槎智故曲巧偽詐所以俛仰於世人而與俗交者故牛歧蹏蹄而戴角馬被髦而全足者天也絡馬之口穿牛之鼻者人也循天者與道游者也循隨游行也隨人者與俗交者也夫井魚不可與語大拘於隘也夏蟲不可與語寒篤於時也曲士不可與語至道拘於俗束於敎也故聖人不以人滑天不以欲亂情天理也不以人事滑亂其理不以欲亂其清浄之性也不謀而當不言而信不慮而得不為而成精通于靈府與造化者為人為治也夫善游者溺善騎者墮各以其所好反自為禍是故好事者未嘗不中中傷也爭利者未嘗不窮也昔共工之力觸不周之山使地東南傾共工以水行霸於伏犧神農間不周山崑崙西北傾猶下也與髙辛爭為帝髙辛帝嚳遂潛于淵宗族殘滅繼嗣絶祀越王翳逃山穴越人熏而出之遂不得巳巳止也翳越太子也賢不欲為王逃於山穴之中越人以火熏出而立之由此觀之得在時不在爭治在道不在聖孔子是也土處下不爭髙故安而不危水下流不爭先故疾而不遲昔舜耕於歴山朞年而田者爭處墝毳埆殼以封壤肥饒相讓釣於河濱朞年而漁者爭處湍瀨以曲隈深潭相予湍瀨水淺流急少魚之處曲隈崖岸委曲深潭回流饒魚之處當此之時口不設言手不指麾口不設不信之言手不妄有所規擬執𤣥徳於心而化馳若神𤣥天也馳行也使舜無其志雖口辯而户説之不能化一人是故不道之道莽乎大哉道不可道故曰不道之道夫能理三苗朝羽民三苗堯時所放渾敦窮奇饕餮之屬羽民南方羽國之民徙裸國納肅慎未發號施令而移風易俗者其唯心行者乎徙化也納受其朝也肅慎在北方法度刑罰何足以致之也是故聖人内修其本而不外飾其末保其精神偃其才智故漠然無為而無不為也能無為故物無不為之化澹然無治而無不治也所謂無為者不先物為也所謂無不為者因物之所為順物之性所謂無治者不易自然也所謂無不治者因物之相然也然猶宜也萬物有所生而獨知守其根百事有所出而獨知守其門根本也門禁要也故窮無窮極無極照物而不眩響應而不乏此之謂天解眩惑也天解言能明天意也故得道者志弱而事强弱柔也强無不勝也心虚而應當當合也所謂志弱而事强者柔毳安靜藏於不敢行於不能恬然無慮動不失時與萬物回周旋轉不為先唱感而應之是故貴者必以賤為號公王侯伯稱孤寡不穀故曰以賤為號而髙者必以下為基託小以包大在中以制外行柔而剛用弱而强轉化推移得一之道而以少正多而能也能以寡統衆所謂其事强者遭變應卒排患扞難力無不勝敵無不凌應化揆時莫能害之是故欲剛者必以柔守之欲强者必以弱保之積於柔則剛積於弱則强觀其所積以知禍福之鄉强勝不若己者至於若己者而同言强之為小柔勝出於己者其力不可量言柔之為大故兵强則滅木强則折革固則裂齒堅於舌而先之敝兵猶火也强則盛盛則衰故曰則滅以火諭也是故柔弱者生之榦也而强者死之徒也榦質徒衆也先唱者窮之路也後動者達之原也先者隤陷故曰窮後者以謀故曰達何以知其然也凡人中壽七十嵗然而趨舍指湊指所之也湊所合也指湊猶言行止也日以月悔也積日而至於月則必悔前之非以至於死故蘧伯玉年五十而知四十九年非何者先者難為知而後者易為攻也先者上髙則後者攀之先者踰下則後者蹷之蹷履也先者隤陷則後者以謀先者敗績則後者違之由此觀之先者則後者之弓矢質的也質的射之凖執猶錞頓之與刃刃犯難而錞無患者何也以其託於後位也錞矛戈之錞刃矛戈之刃刃在前故犯難錞在後故無患此俗世庸民之所公見也而賢知者弗能避也所謂後者非謂其底滯而不發凝竭而不流發動凝如脂凝也貴其周於數而合於時也周調數術也合於時時行則行時止則止夫執道理以耦變先亦制後後亦制先道當隨事為變不必待於先人事當在後趨時當居先是何則不失其所以制人人不能制也時之反側間不容息言時反側之間不容氣息促之甚也先之則大過後之則不逮夫日回而月周時不與人游故聖人不貴尺之璧而重寸之隂時難得而易失也禹之趨時也履遺而弗取冠挂而弗顧非爭其先也而爭其得時也是故聖人守清道而抱雌節清和淨也雌柔弱也因循應變常後而不先柔弱以靜舒安以定舒詳也攻大䃺磨堅莫能與之爭䃺磑也攻大䃺堅諭難也天下之物莫柔弱於水然而大不可極深不可測脩極於無窮逺渝於無涯息耗減益通於不訾訾量也上天則為雨露下地則為潤澤萬物弗得不生百事不得不成大包羣生而無好憎澤及蚑岐蟯音饒蚑蚑行蟯小蟲而不求報富贍天下而不既贍足也既盡也徳施百姓而不費行而不可得窮極也微而不可得把握也擊之無創刺之不傷斬之不斷焚之不然淖溺流遁錯繆相紛而不可靡散遁逸也錯繆相紛彼此相糺也利貫金石强濟天下水流缺石利也舟船所載無有重强也動溶無形之域而翺翔忽區之上邅回川谷之間而滔騰大荒之野忽怳之區上言其飛為雲無所不上也邅回猶委曲也有餘不足與天地取與授萬物而無所前後是故無所私而無所公靡濫振蕩與天地鴻洞鴻大也洞通也無所左而無所右蟠委錯紾軫與萬物始終紾轉也是謂至徳言水之為徳最大故曰至徳也夫水所以能成其至徳於天下者以其淖溺潤滑也故老􅆅之言曰天下至柔馳騁天下之至堅出於無有入於無間吾是以知無為之有益夫無形者物之大祖也無音者聲之大宗也無形生有形故為物大祖也無音生有音故為聲大宗祖宗皆本也其子為光其孫為水皆生於無形乎夫光可見而不可握水可循而不可毁故有像之類莫尊於水出生入死自無蹠有自有蹠無而以衰賤矣出生出生道謂去清淨也入死入死道謂匿情欲也蹠適也自無形適有形離其本也自有形適無形不能復得道家所棄故曰以衰賤也是故清靜者徳之至也而柔弱者道之要也虚無恬愉者萬物之用也肅然應感殷然反本則淪於無形矣所謂無形者一之謂也一者道之本所謂一者無匹合於天下者也卓然獨立塊然獨處上通九天下貫九野九天八方中央也九野亦如之員不中規方不中矩大渾而為一葉累而無根無根言微妙也懐囊天地懐囊猶言囊括宇宙之謂為道關門穆忞民隠閔純徳獨存穆忞隠閔皆無形之類純不雜也布施而不既用之而不勤既盡也勤勞也是故視之不見其形聽之不聞其聲循之不得其身無形而有形生焉無形道也有形萬物也無聲而五音鳴焉無味而五味形焉無色而五色成焉是故有生於無實出於虚天下為之圏則名實同居圏陬也音之數不過五宫商角徵羽而五音之變不可勝聽也味之和不過五甘酸鹹辛苦而五味之化不可勝嘗也色之數不過五青赤白黑黄而五色之變不可勝觀也故音者宫立而五音形矣宫在中央聲之主也形正也味者甘立而五味亭矣亭平也甘中央味也色者白立而五色成矣白者所在以染之故五色可成也道者一立而萬物生矣是故一之理施四海一之解際天地解達也際機也其全也純兮若璞璞玉在石而未剖者其散也混兮若濁濁而徐清沖而徐盈澹兮其若深淵沖虚也盈滿也澹定不動之貌汎兮其若浮雲若無而有若亡而存萬物之總皆閲一孔總衆聚也百事之根皆出一門道之門也其動無形變化若神其行無迹常後而先道之先也是故至人之治也掩其聰明滅其文章依道廢智與民同于公去其誘慕除其嗜欲誘慕諭貪榮勢也嗜欲情欲也損其思慮約其所守則察不煩擾也寡其所求則得易供故得夫任耳目以聽視者勞形而不明以知慮為治者苦心而無功是故聖人一度循軌一齊也軌法也不變其宜不易其常放凖修繩曲因其當夫喜怒者道之邪也道貴平和故喜怒為邪也憂悲者徳之失也徳尚恬和故以憂悲為失也好憎者心之過也嗜欲者性之累也心當專一中扃外閉反有所好憎故曰過性當清靜以奉天素而反嗜欲故為之累人大怒破隂大喜墜陽怒者隂氣也積隂相薄故破隂喜者陽氣也積陽相薄故墜陽薄氣發瘖驚怖為狂憂悲多恚病乃成積好憎繁多禍乃相隨故心不憂樂徳之至也通而不變靜之至也變更也嗜欲不載虚之至也不載於性無所好憎平之至也不與物散粹之至也散亂粹純也能此五者則通於神明通於神明者得其内者也是故以中制外百事不廢中心也外情欲中能得之則外能收之中之得則五藏寧思慮平五藏寧者各得其所思慮平者不妄喜怒筋力勁强耳目聰明疏達而不悖堅强而不鞼鞼音貴折也無所大過而無所不逮處小而不逼處大而不窕在小能小在大能大其魂不躁皂其神不嬈躁狡嬈煩嬈也言精神定也湫秋漻遼寂寞為天下梟湫漻清靜寂寞恬淡也梟雄也大道坦坦去身不逺求之近者往而復反近謂身也迫則能應感則能動沕穆無窮穆美也變無形像言能化也優游委縱如響之與景響應聲影應形登髙臨下無失所秉履危行險無忘𤣥仗𤣥仗道也能存之此其徳不虧萬物紛糅與之轉化以聽天下若背風而馳疾而易也是謂至徳至徳則樂矣古之人有居巖穴而神不遺者遺失也末世有勢為萬乘而日憂悲者由此觀之聖亡乎治人而在于得道樂亡乎富貴而在于得和知大已而小天下則幾於道矣幾近也許由務光是也所謂樂者豈必處京臺章華京臺章華皆楚之大臺游雲夢沙邱雲夢楚澤華容也沙邱紂臺名耳聽九韶六瑩九韶舜樂六瑩顓頊樂口味煎熬芬芳馳騁夷道夷平也釣射鷫肅鷞霜之謂樂乎鷫鷞鳥名長脛緑身其形似鴈吾所謂樂者人得其得者也夫得其得者不以奢為樂不以廉為悲與隂俱閉與陽俱開故子夏心戰而臞得道而肥入見先王之道而説之又出見富貴之樂而欲之二者交爭故戰而臞也先王之道勝無所復思故肥聖人不以身役物不以欲滑和滑汨也不以身為物役不以情欲亂中和之道也是故其為懽不忻忻忻忻為過制也其為悲不惙陟惙惙傷性也萬方百變消搖而無所定吾獨慷慨遺物而與道同出是故有以自得之也喬木之下空穴之中足以適情喬木上竦少隂之木空穴巖穴也無以自得也雖以天下為家萬民為臣妾不足以養生也言無以自得之人猶以此為不足也能至于無樂者則無不樂無不樂則至極樂矣至樂至徳之樂極亦至也夫建鍾鼓列管絃席旃茵傅旄象傅著旄旌也象以象牙為飾也耳聽朝歌北鄙靡靡之樂朝歌紂都鄙邑紂使師㳙作鄙邑靡靡之樂齊靡曼之色齊列也靡曼美色陳酒行觴夜以繼日强弩弋髙鳥走犬逐狡兔此其為樂也炎炎赫赫怵然若有所誘慕解車休馬罷酒徹樂而心忽然若有所喪悵然若有所亡也是何則不以内樂外而以外樂内樂作而喜曲終而悲悲喜轉而相生精神亂營營惑也不得須臾平察其所以不得其形不得樂之形也而日以傷生失其得者也是故内不得於中稟授於外而以自飾也不浸于肌膚不浹於骨髓不留于心志不滯于五藏故從外入者無主於中不止從中出者無應於外不行故聽善言便計雖愚者知説之稱至徳髙行雖不肖者知慕之説之者衆而用之者鮮慕之者多而行之者寡所以然者何也不能反諸性也夫内不開於中而强學問者不入於耳而不著於心此何以異於聾者之歌也效人為之而無以自樂也聲出於口則越而散矣散去耳不聞也夫心者五藏之主也所以制使四支流行血氣馳騁于是非之境而出入于百事之門户者也是故不得於心而有經天下之氣經理也是猶無耳而欲調鐘鼓無目而欲喜文章也亦必不勝其任矣故天下神器不可為也為者敗之執者失之夫許由小天下而不以已易堯者志遺於天下也許由陽城人箕山之隠士也堯以其賢聘之欲禪天下不肯就所以然者何也因天下而為天下也天下之要不在於彼而在於我不在於人而在於身我身得則萬物備矣徹於心術之論則嗜欲好憎外矣是故無所喜而無所怒無所樂而無所苦萬物𤣥同也無非無是化育𤣥燿生而如死𤣥天也𤣥同言萬物皆受氣於天也燿明也生而如死言無所欲也夫天下者亦吾有也吾亦天下之有也天下之與我豈有間哉夫有天下者豈必攝權持勢操殺生之柄而以行其號令邪吾所謂有天下者非謂此也自得而已自得其天性也自得則天下亦得我矣吾與天下相得則常相有已又焉有不得容其間者乎所謂自得者全其身者也全其身則與道為一矣故雖游於江潯海裔潯涯也裔邊也馳要褭建翠葢要褭馬名日行萬里翠葢以翠鳥羽飾葢也褭音裊目觀掉羽武象之樂掉羽武象周武王之樂耳聽滔㓪朗奇麗激抮之音樂有激揚抮轉皆曲名也揚鄭衛之浩樂結激楚之遺風射沼濵之髙鳥逐苑囿之走獸此齊民之所以淫泆流湎齊於凡民故曰齊民聖人處之不足以營其精神亂其氣志使心怵然失其情性處窮僻之鄉側谿谷之間側仗也隠于榛薄之中藂木曰榛深草曰薄環堵之室茨之以生茅蓬户甕牖揉桑為樞堵長一丈髙一丈面環一堵為方一丈故曰環堵言其小也編蓬為户以破甕蔽牖揉桑條以為户樞上漏下溼潤浸北房浸漬也北房隂堂雪霜瀼徜灖校浸潭苽觚蔣瀼灖雪霜貌浸潭之潤以生苽蔣實苽者蔣實其米曰􅀢胡蔣音漿逍遙于廣澤之中而仿洋于山峽之旁兩山之間為峽此齊民之所為形植黎累憂悲而不得志也聖人處之不為愁悴怨懟而不失其所以自樂也是何也則内有以通于天機而不以貴賤貧富勞逸失其志徳者也故夫烏之啞雅啞鵲之唶惜唶豈嘗為寒暑燥濕變其聲哉言體道者不為貴賤貧富勞逸易其志如烏鵲之不為寒暑易其聲是故夫得道已定而不待萬物之推移也非以一時之變化而定吾所以自得也吾所謂得者性命之情處其所安也夫性命者與形俱出其宗形備而性命成性命成而好憎生矣故士有一定之論女有不易之行士與同志交接有一㑹而交定故曰有一定之論也貞女專一亦無二心故曰有不易之行也規矩不能方圓鉤繩不能曲直雖規矩鉤繩無以施於此天地之永登丘不可為脩居卑不可為短是故得道者窮而不懾達而不榮處髙而不機持盈而不傾機危也傾覆也新而不㓪久而不渝㓪明也渝變也入火不焦入水不濡是故不待勢而尊不待財而富不待力而强平虚不流與化翺翔翺翔猶傾仰也若然者藏金於山藏珠於淵舜藏金於􅀢巖之山藏珠於五湖之淵以塞貪淫之欲不利貨財不貪勢名是故不以康為樂不以慊為悲康安慊約也不以貴為安不以賤為危形神氣志各居其宜以隨天地之所為夫形者生之舍也氣者生之充也神者生之制也一失位則三者傷矣是故聖人使人各處其位守其職而不得相干也故夫形者非其所安也而處之則廢氣不當其所充而用之則泄神非其所宜而行之則昧昧不明也此三者不可不慎守也夫舉天下萬物蚑蟯貞蟲蚑行也蟯蟯動之蟲也貞蟲即細腰之屬也蝡動蚑作皆知其所喜憎利害者何也以其性之在焉而不離也忽去之則骨肉無倫矣去之去道也則骨肉靡滅無倫匹也今人之所以眭攜然能視䁝憂然能聽形體能抗而百節可屈伸察能分白黑視醜美而知能别同異明是非者何也氣為之充而神為之使也何以知其然也凡人之志各有所在而神有所繫者其行也足蹪趎殊埳坎頭抵植木而不自知也蹪躓也楚人讀躓為蹪招之而不能見也呼之而不能聞也耳目非去之也然而不能應者何也神失其守也精神失其所守故在於小則忘於大在於中則忘於外在於上則忘於下在於左則忘於右無所不充則無所不在精神無所不充在存也是故貴虚者以毫末為宅也虚者情無所念慮也以毫末為宅者言精微也今夫狂者之不能避水火之難而越溝瀆之險者豈無形神氣志哉然而用之異也失其所守之位而離其外内之舍是故舉錯不能當動靜不能中終身運枯形于連嶁樓列埓之門運行枯病也形體也連嶁猶離嶁也委曲之類列埒不平均也而蹪蹈于汚壑穽陷之中汚壑大壑雖生俱與人鈞然而不免為人戮笑者何也形神相失也故以神為主者形從而利以形為制者神從而害神清靜故利形有情欲故害也貪饕多欲之人漠䁕於勢利誘慕於名位漠䁕猶鈍䁕不知足也冀以過人之智植于髙世則精神日耗而彌逺久淫而不還形閉中距則神無由入矣清靜之性無從還入也是以天下時有盲妄自失之患此膏燭之類也火逾然而消逾亟夫精神氣志者靜而日充者以壯躁而日耗者以老是故聖人將養其神和弱其氣平夷其形而與道沈浮俛仰恬然則縱之迫則用之其縱之也若委衣其用之也若發機機弩機關言其疾也如是則萬物之化無不遇遇時也而百事之變無不應淮南鴻烈解卷一
