body:
  text: 淮南鴻烈解卷八漢髙誘注本經訓本始也經常也本經造化出於道治亂之由得失有常故曰本經太清之始也和順以寂漠清静也太清無為之始者謂三皇之時和順不逆天暴物也寂漠不擾民質真而素樸閑静而不躁推而無故質性真不變也素樸精不散也閑静言無欲也不躁擾故常也在内而合乎道出外而調于義在内者志在心平欲故能合於道出於外者身所履行也行不越規矩故能調義義或作徳發動而成於文行快而便於物發作動行文文章便利物事也其言略而循理其行侻脫而順情略約要也侻簡易也其心愉而不偽其事素而不飾愉和也偽虚詐也素樸也飾巧也是以不擇時日不占卦兆擇選卦八卦也兆契龜之兆世所以占吉㐫者也不謀所始不議所終安則止激則行通體于天地同精于隂陽一和于四時明照于日月與造化者相雌雄造化天地也雌雄猶和適也是以天覆以徳地載以樂四時不失其叙風雨不降其虐日月淑清而揚光光明也五星循䡄而不失其行䡄道也循順也當此之時𤣥元至碭蕩而運照𤣥天元氣也碭大也言盛徳之君恩仁廣大徧照四海也鳯麟至蓍龜兆鳯麟聖徳之世至於門庭蓍四十九䇿兆信也善言否臧也甘露下竹實滿流黄出而朱草生滿成也流黄玊也朱草生於庭皆瑞應也機械詐偽莫藏於心莫無也逮至衰世䥴山石䥴猶鑿也求金玊也䤿結金玉擿蚌蜃䤿刻金玊以為器擿猶開也開以求珠也消銅鐵而萬物不滋不滋長也言盡物類也刳胎殺夭麒麟不游胎獸胎也為類者見害故不来游也覆巢毁卵鳳凰不翔鳥未鷇曰卵鑚燧取火構木為臺焚林而田竭澤而漁田獵也竭澤漏池也人械不足畜藏有餘械器用也畜積藏餘府庫實也而萬物不繁兆萌牙卵胎而不成者處之太半矣積壤而邱處糞田而種榖掘地而井飲䟽川而為利䟽通也築城而為固拘獸以為畜則隂陽繆戾四時失叙雷霆毁折電霰降虐氛霧雪霜不霽霽止也而萬物燋夭燋夭不繁茂也菑榛穢聚埓畝茂草曰菑木聚曰榛積之於壃畝芟野菼坦長苗秀芟殺菼草苗稼也不榮而實曰秀草木之句萌衘華戴實而死者不可勝數乃至夏屋宫駕縣聫房植夏屋大屋也縣聫聫受雀頭箸桷者一曰辟帯也房室也植户植也橑老檐言榱衰題橑椽檐屋垂也榱桷題頭也雕琢刻鏤喬枝菱阿芙蓉芰荷阿曲屋也芙蓉藕華也菱桷交蓞也荷芙渠也五采爭勝流漫陸離流漫采色相參和也陸離美好貌脩掞琰曲校夭矯曾橈芒繁紛挐皆屋飾也以相交持公輸王爾無所錯其剞􅕻削鋸公輸巧者一曰魯班之號王爾古之巧匠剖巧刺畫盡頭黑邊箋也􅕻􅘫尺削兩刃句刀也然猶未能贍人主之欲也是以松柏菌綸露夏槁松柏根茂菌露竹筦皆冬生難殺之木當是時夏槁死也刺君作事不時隂陽失序江河三川絶而不流夷羊在牧夷羊土神殷之将亡見於商郊牧野之地飛蛩滿野蛩蟬蟻蠓之属一曰蝗也天旱地坼坼燥裂也坼音冊鳳凰不下句爪居牙戴角出距之獸於是鷙矣句爪鷹鸇之屬居牙熊虎之屬民之專室蓬廬無所歸宿専持小室也蓬廬籧蒢覆也宿庇宿也凍餓饑寒死者相枕席也及至分山川谿谷使有壤界計人多少衆寡使有分數築城掘池設機械險阻以為備飾職事制服等異貴賤差賢不肖經誹譽行賞罰經書也誹惡譽善賞可賞罰可罰也則兵革興而分爭生民之滅抑夭隠虐殺不辜而刑誅無罪於是生矣抑没也言民有滅没天折之痛天地之合和隂陽之陶化萬物皆乗一氣者也是故上下離心氣乃上蒸離者不和也君臣不和五榖不為不為不成也距日冬至四十六日天含和而未降也懐氣而未揚自立冬到冬至皆未動也隂陽儲與呼吸浸潭包裏風俗儲與猶尚羊無所主之貌浸潭廣衍也故曰包裹風俗斟酌萬殊旁薄衆宜旁並薄近也衆物宜適也以相嘔咐符醖釀而成育羣生醖釀猶和調也是故春肅秋榮冬雷夏霜皆賊氣之所生由此觀之天地宇宙一人之身也六合之内一人之制也是故明於性者天地不能脅也審於符者怪物不能惑也脅恐審明符驗也怪物非常人所疑惑也故聖人者由近知逺而萬殊為一古之人同氣于天地與一世而優游當此之時無慶賀之利刑罰之威禮義亷恥不設毁譽仁鄙不立而萬民莫相侵欺暴虐猶在于混㝠之中混大也大㝠之中謂道也逮至衰世人衆財寡事力勞而養不足於是忿爭生是以貴仁仁鄙不齊比周朋黨設詐諝懐機械巧故之心而性失矣諝謀也性失失其純樸之性也是以貴義隂陽之情莫不有血氣之感男女羣居雜處而無别是以貴禮性命之情淫而相脅脅迫也以不得已則不和是以貴樂是故仁義禮樂者可以救敗而非通治之至也夫仁者所以救爭也義者所以救失也禮者所以救淫也樂者所以救憂也神明定於天下而心反其初心反其初而民性善初者始也有情也未有情欲故性善也民性善而天地隂陽從而包之則財足而人贍矣貪鄙忿爭不得生焉由此觀之則仁義不用矣道徳定於天下而民純樸則目不營於色營惑也耳不淫於聲坐俳而歌謡被髪而浮游雖有毛嬙西施之色不知恱也掉羽武象不知樂也掉羽羽舞也武象周武王樂淫泆無别不得生焉由此觀之禮樂不用也是故徳衰然後仁生行沮然後義立沮敗也和失然後聲調禮淫然後容飾是故知神明然後知道徳之不足為也知道徳然後知仁義之不足行也知仁義然後知禮樂之不足修也今背其本而求其末釋其要而索之于詳未可與言至也至至徳之道也天地之大可以矩表識也矩度表影也識知也星月之行可以厯推得也厯術也推求也雷震之聲可以鼓鍾寫也寫猶放斆也風雨之變可以音律知也律知隂陽是故大可覩者可得而量也明可見者可得而蔽也蔽或作察聲可聞者可得而調也色可察者可得而别也夫至大天地弗能含也至㣲神明弗能領也領理也及至建律歴别五色異清濁清商濁宫味甘苦則樸散而為器矣立仁義修禮樂則徳遷而為偽矣修設也遷移也及偽之生也飾智以驚愚設詐以巧上巧欺也天下有能持之者有能治之者有能持之者桀紂之民有能治之者湯武之君也昔者蒼頡作書而天雨粟鬼夜哭蒼頡始視鳥迹之文造書契則詐偽萌生詐偽萌生則去本趨末棄耕作之業而務錐刀之利天知其将餓故為雨粟鬼恐為書文所効故夜哭也鬼或作兎兎恐見取毫作筆害及其軀故夜哭伯益作井而龍登𤣥雲神棲崑崙伯益佐舜初作井鑿地而求水龍知将决川谷漉陂池恐見害故登雲而去棲其神於崑崙之山能愈多而徳愈薄矣故周鼎著倕使銜其指以明大巧之不可為也倕堯之巧工及周鑄鼎著倕像於鼎使銜其指假令倕在見之伎巧不能復踰但當銜齧其指故曰以明巧之不可為也一説周人鑄鼎畫像鏤倕身於鼎使自銜其指以戒後世明不當為大巧也故至人之治也心與神處形與性調静而體徳動而理通隨自然之性而縁不得已之化洞然無為而天下自和憺然無欲而民自樸無禨祥而民不天不忿争而養足兼包海内澤及後世不知為之者誰何道無姓名自當然也故曰不知誰何也是故生無號死無諡實不聚而名不立實財也道不名故名不立施者不徳受者不讓施者不以為恩徳振不足而已受者不讓之則受之不飾辭讓也徳交歸焉而莫之充忍也忍不忍也故徳之所總道弗能害也總一也智之所不知辯弗能解也有智謀者尚不能知但口辯者何能解也不言之辯不道之道若或通焉謂之天府或有也有能通不言之辯不道之道者入天之府藏取焉而不損損减也酌焉而不竭酌猶予竭盡也莫知其所由出是謂瑶光瑶光者資糧萬物者也瑶光謂北斗杓第七星也居中而運歴指十二辰擿起隂陽以殺生萬物也一説瑶光和氣之見者也振困窮補不足則名生名仁名也興利除害伐亂禁暴則成功功武功也世無災害雖神無所施其徳上下和輯雖賢無所立其功昔容成氏之時道路鴈行列處容成黄帝時造厯術也鴈行長幼有差也託嬰兒於巢上置餘糧於畮母首虎豹可尾虺蛇可蹍碾而不知其所由然虎豹擾人無害人之心故可牽尾虺蛇不螫毒故可蹍履也時人謂自當然耳故曰不知其所由然逮至堯之時十日並出焦禾稼殺草木而民無所食猰軏貐瘉鑿齒九嬰大風封豨脩蛇皆為民害猰貐獸名状若龍首或曰似貍善走而食人鑿齒獸名齒長三尺其状如鑿下徹頷下而持戈盾九嬰水火之怪為人害大風風伯也能壊人屋舍封豕大豕也楚人謂豕為狶脩蛇大蛇也吞象三年而出其骨之類堯乃使羿誅鑿齒於疇華之野疇華南方澤名殺九嬰於㐫水之上北狄之地有㐫水繳大風於青邱之澤繳遮使不為害也一日以繳繫矢射殺之青邱東方之澤名上射十日而下殺猰貐斷脩蛇於洞庭擒封狶於桑林洞庭南方澤名桑林湯所禱旱桑山之林萬民皆喜置堯以為天子於是天下廣陜險易逺近始有道里舜之時共工振滔洪水以薄空桑共工水官名栢有之後振動滔蕩也欲壅防百川滔髙堙卑以害天下者薄迫也空桑魯地名龍門未開吕梁未發江淮通流四海溟涬民皆上邱陵赴樹木龍門河之隘也在左馮翊夏陽北禹所鑿也吕梁在彭城吕縣石生水中禹决而通之民所由得度也故曰吕梁未發之時水道不通江淮合流四海溟涬無岸畔也舜乃使禹疏三江五湖闢伊闕導㕓澗伊闕山名禹所開以通伊水故曰闢伊闕在雒陽西南九十里廛澗兩水名平通溝陸流注東海鴻水漏九州乾萬民皆寜其性是以稱堯舜以為聖晩世之時帝有桀紂為琁室瑶臺象廊玊牀琁瑶石之似玉以飾室臺也用象牙飾廊殿以玉為牀言淫役也琁或作旋瑶或作揺言室施機闗可轉旋也臺可揺動極土木之巧也紂為肉圃酒池紂積肉以為園圃積酒以為淵池今河内朝歌紂所都也城西有糟邱酒池處燎焚天下之財罷苦萬民之力刳諌者剔惕孕婦王子比干紂之諸父也數諌紂之無道紂剖其心而觀之故曰刳諌者孕婦姙身将就草之婦也紂解剔觀其胞裏故曰剔攘天下虐百姓於是湯乃以革車三百乗伐桀于南巢放之夏臺革車兵車也南巢今廬江巢縣夏臺大臺武王甲卒三千破紂牧野殺之于宣室在車曰士步曰卒牧野南郊地名在朝歌城外宣室殷宫名一曰宣室獄也天下寜定百姓和集是以稱湯武之賢由此觀之有賢聖之名者必遭亂世之患也今至人生亂世之中含徳懐道拘無窮之智鉗口寢説遂不言而死者衆矣至人至徳之人也然天下莫知貴其不言也無有貴鉗口不言而死也故道可道非常道至道無名不可道故曰可道者非常道也名可名非常名真人之名不可得名也著於竹帛鏤於金石可傳於人者其粗也五帝三王殊事而同指異路而同歸五帝黄帝顓頊帝嚳帝堯帝舜三王夏禹殷湯周文王同歸同歸修仁義也晩世學者不知道之所一體徳之所總要總凡也要約也取成之迹相與危坐而説之鼓歌而舞之故博學多聞而不免於惑詩云不敢暴虎不敢馮河人知其一莫知其他此之謂也帝者體太一體法也太一天之刑神也王者法隂陽覇者則四時君者用六律秉太一者牢籠天地彈􅎹山川彈山川令出雲雨復能􅎹止之含吐隂陽伸曵四時伸曵猶押引和調之也紀綱八極經緯六合覆露照導普氾無私普大氾衆也無私愛憎言皆公也蠉飛蠕動莫不仰徳而生隂陽者承天地之和形萬殊之體含氣化物以成埒類埒形也贏縮卷舒淪於不測贏長縮短卷屈舒散淪入測深也入於不可測盡之深終始虚滿轉於無原轉化歸於無窮之源本也四時者春生夏長秋收冬藏取予有節出入有時開闔張歙不失其叙喜怒剛柔不離其理理道也六律者生之與殺也賞之與罰也予之與奪也予布施也奪取收也非此無道也故謹於權衡準繩審乎輕重足以治其境内矣權衡平也準法繩直也是故體太一者明於天地之情通於道徳之倫聰明燿於日月精神通於萬物動静調於隂陽喜怒和于四時徳澤施于方外名聲傳于後世法隂陽者徳與天地參明與日月並精與鬼神總戴圎履方抱表懐繩圎天也方地也表正也繩直也内能治身外能得人能得人之歡心發號施令天下莫不從風則四時者柔而不脆剛而不鞼鞼折也寛而不肆肆緩也肅而不悖肅急也優柔委從以養羣類類物類也其徳含愚而容不肖無所私愛私邪也用六律者伐亂禁暴進賢而廢不肖扶撥以為正撥任也扶治也壊險以為平矯枉以為直矯正枉曲也明於禁舍開閉之道乗時因勢以服役人心也役使也帝者體隂陽則侵侵為諸夏所侵凌也王者法四時則削削為諸夏所侵削也覇者節六律則辱辱為鄰國所侮辱也君者失準繩則廢廢為臣所廢絀更立賢君故小而行大則滔窕而不親滔窕不滿宻也不親不為臣下所親附也大而行小則陿隘而不容行小則政陿隘而不容包臣下貴賤不失其體而天下治矣不失其體大行大小行小也天愛其精地愛其平精光明也平正也人愛其情情性也天之精日月星辰雷電風雨也地之平水火金木土也人之情思慮聰明喜怒也故閉四闗止五遁則與道淪四闗耳目心口遁逸也淪入也是故神明藏於無形精神反於至真真身也則目明而不以視耳聰而不以聽心條達而不以思慮委而弗為和而弗矜㝠性命之情而智故不得雜焉精泄於目則其視明泄猶通也在於耳則其聽聰留於口則其言當集於心則其慮通故閉四闗則身無患百節莫苑苑病也莫死莫生莫虚莫盈是謂真人言守其常凡亂之所由生者皆在流遁流遁之所生者五流放也遁逸也大構駕興宫室構連也駕材木相乗駕也延樓棧湛道雞棲井榦延樓髙樓也棧道飛間復道相通雞棲井榦復屋熒井刻花置其中也榦音貫標枺欂櫨楺㭑柱類欂枅也櫨柱上拊即梁上短柱也以相支持木巧之飾盤紆刻儼盤盤龍也紆曲屈貌刻儼浮首虎頭之屬皆屋飾也嬴鏤雕琢詭文囘波嬴鏤文章鏤雕畫也玉曰琢皆飾巧也詭文竒異之文回波若水波也淌敞游瀷欶淢郁菱杼紾珍抱淌游瀷淢皆文畫擬象水勢之貌菱芰杼采實紾戾也抱轉也皆壮采相銜持貌也抱音嶷芒繁亂澤巧為紛挐拏以相摧錯此遁於木也皆采色形像文章貌鑿汙池之深肆畛崖之遠肆極也崖垠也来谿谷之流飾曲岸之際積牒旋石以純修碕飾治也牒累純縁也以玊石致之水邊為修以牒累流水邊為修碕修碕曲中水所棠處也抑淢怒瀨以揚激波抑止淢怒水也瀨急流也抑止之故激揚之波起也曲拂邅囘以像湡愚浯拂戾也邅迴轉流也湡畨隅浯蒼梧之二國多水江湖環之故多象渠池以自邅迴法而像之也浯音吾益樹蓮菱以食鱉魚樹種也蓮藕實也菱芰也皆可以養魚鱉鴻鵠鷫肅鷞爽稻梁饒餘鷫鷞鴈類一曰鳯之别類龍舟鷁首浮吹以娛此遁於水也龍舟大舟也刻為龍文以為飾也鷁大鳥也畫其象著船頭故曰鷁首舟中吹籟與竽以為樂故曰浮吹以娱髙築城郭設樹險阻崇臺榭之隆設施也樹立也一説種樹木以為險阻令難攻易守也侈苑囿之大以窮要妙之望侈廣也有牆曰苑無牆曰囿所以畜禽獸也盡極要之觀望也魏闕之髙上際青雲大厦增加擬於崑崙門闕髙崇嵬嵬然故曰魏闕際接也上接青雲周禮所謂象魏也大厦大屋也增重加材木相乗架也其髙與崑崙山相擬像脩為墻垣甬勇道相連甬道飛閣復道也殘髙增下積土為山殘堕增益也接徑厯逺直道夷險接疾徑行也道之阨者正直之夷平也終日馳騖而無蹟積蹈之患此遁於土也大鍾鼎美重器鍾音之君也重器大器盖鍾鼎也華蟲流鏤以相繆紾書曰山龍華蟲藻火粉米繆紾相纒結也寢兕伏虎蟠龍連組兕獸名寢伏各有形也蟠龍詰屈相連文錯如織組文也焜混昱玊錯眩照燿煇暉煌錯雜眩惑也照燿煇煌焜光澤色貌偃蹇蓼􅀈紏曲成文章雕琢之飾鍜叚錫文鐃乍晦乍明雕畫也縁錯錫鐃文加脂膩不可刷如連珠不可掇故曰乍晦乍明也抑㣲滅瑕霜文沈居若簟籧蒢言劍理之美没滅其瑕文鐃如霜皆没身中故曰沈居簟竹蓆籧蒢葦蓆取其邪文次叙劍鐃美眩人目纒錦經冗以數而䟽劍文相句連纒如綺經冗如錦似數如䟽文鐃美眩若此此遁於金也煎熬焚炙調齊和之適以窮荆吳甘酸之變荆吳二國名善酸醎之和而窮盡之焚林而獵燒燎大木鼓橐吹埵朶以銷銅鐵鼓擊也橐冶鑪排橐也埵銅橐口鐵筩埵入火中吹火也故曰吹埵銷鑠靡流堅鍜無猒足目山無峻幹林無柘梓峻幹長枝也柘桑梓滋生也燎木以為炭燔草而為灰野莽白素不得其時莽草也白素也上掩天光下殄典地財此遁於火也殄盡也此五者一足以亡天下矣一五者之一也是故古者明堂之制下之潤溼弗能及上之霧露弗能入四方之風弗能襲明堂王者布政之堂上圎下方堂四出各有左右房謂之个凡十二所王者月居其房告朔朝歴頒宣其令謂之明堂其中可以序昭穆謂之太廟其上可以望氛祥書雲物謂之靈臺其外圎似辟雍諸侯之制半天子謂之宫土事不文質也木工不斵樸也不斵或作琢不雕畫也金器不鏤不錯鏤設文飾也衣無隅差之削隅角也差邪也古者質皆全幅為衣裳無有邪角邪角削殺也冠無觚嬴之理觚嬴之理謂若馬目籠相連干也言無者冠文取平直而已也堂大足以周旋理文堂明堂所以升降揖讓修禮容故曰周旋理文理政事文書也静潔足以享上帝禮鬼神以示民知儉節夫聲色五味逺國珍怪瓌異竒物足以變心易志揺蕩精神感動血氣者不可勝計也夫天地之生財也本不過五不過五行之數聖人節五行則治不荒五行金木水火土也水屬隂行火為陽行木為燠行金為寒行土為風行五氣常行故曰五行凡人之性心和欲得則樂心和不喜不怒欲得無違耳樂斯動動斯蹈蹈斯蕩蕩斯歌歌斯舞歌舞節則禽獸跳矣人之性心有憂喪則悲悲則哀有憂艱難也喪亡也亡失所離愛則悲悲則傷哀斯憤憤斯怒怒斯動動則手足不静静寜也擗踊哭泣哀以送之也人之性有侵犯則怒怒則血充人性有侵犯則怒盛血氣充盈以成其勢血充則氣激氣激則發怒發怒則有所釋憾矣釋解也憾恨也故鍾鼓管簫干鏚七羽旄所以飾喜也衰絰苴杖苴麻之有實者也哭踊有節所以飾哀也兵革羽旄金鼓斧鉞所以飾怒也必有其質乃為之文古者聖王在上政敎平仁愛洽上下同心君臣輯睦衣食有餘家給人足父慈子孝兄良弟順生者不怨死者不恨天下和洽人得其願夫人相樂無所發貺故聖人為之作樂以和節之未世之政田漁重税闗市急征澤梁畢禁網罟無所布耒耜無所設民力竭於徭役財用殫於㑹賦㑹計人口數責其税歛也居者無食行者無糧老者不養死者不𦵏贅妻鬻子以給上求猶弗能贍贅從嫁也或作賃妻愚夫惷婦皆有流連之心悽愴之志流連猶瀾漫失其職業也悽愴傷悼之貌乃使始為之撞大鐘擊鳴鼓吹竽笙彈琴瑟失樂之本矣古者上求薄而民用給君施其徳臣盡其忠父行其慈子竭其孝各致其愛而無憾恨其間夫三年之喪非强而致之聽樂不樂食㫖不甘思慕之心未能絶也晩世風流俗敗嗜慾多禮義廢君臣相欺父子相疑怨尤充胷思心盡亡盡喪其忠孝思慕之心也被衰戴絰戯笑其中雖致之三年失喪之本也古者天子一畿諸侯一同方千里為畿方百里為同各守其分不得相侵有不行王道者暴虐萬民爭地侵壤亂政犯禁召之不至令之不行禁之不止誨之不變乃舉兵而伐之戮其君易其黨封其墓類其社祭社曰類以事類祭之也卜其子孫以代之卜擇立其子孫之賢也天子不滅國諸侯不滅姓古之政也晩世務廣地侵壤幷兼無己舉不義之兵伐無罪之國殺不辜之民絶先聖之後辜罪也民皆帝王之後故曰絶先聖之後大國出攻小國城守驅人之牛馬傒鷄人之子女傒繫囚之繫也毁人之宗廟遷人之重寳血流千里暴骸滿野以贍貪主之欲非兵之所為生也故兵者所以討暴非所以為暴也樂者所以致和非所以為淫也喪者所以盡哀非所以為偽也故事親有道矣而愛為務朝廷有容矣而敬為上處喪有禮矣而哀為主用兵有術矣而義為本本立而道行本傷而道廢淮南鴻烈解卷八
