body:
  text: 淮南鴻烈解卷五漢髙誘注時則訓則法也四時寒暑十二月之常法故曰時則孟春之月招摇北斗第七星指寅昬參中旦尾中參西方白虎之㝛昬時中於南方尾東方蒼龍之宿将旦時中於南方其位東方其日甲乙盛徳在木太皥之神治東方甲乙木日盛徳在木木王東方其蟲鱗其音角東方少陽物去大隂甲散散為鱗鱗蟲龍為之長角木也位在東方律中太蔟其數八律管音也隂衰陽發萬物太蔟地而生故曰太蔟其數八五行數五木第三故曰八也其味酸其臭羶木味酸酸者鑚也萬物應陽鑚地而生羶木香羶也其祀户祭先脾蟄伏之類始動生出由户故祀戸脾屬土陳設俎豆脾在前也春木勝土言常食所勝也一日脾屬木自用其蔵也東風解凍蟄蟲始振蘇東方木木火母也氣温故東風解水凍也振動蘇生也魚上負氷獺祭魚魚鯉鮒之屬内應陽而動上負氷也獺獱水禽也取鯉魚於水邊四面陳之世謂之祭魚候鴈北候時之鴈從彭蠡来北過周雒至漢中孕卵􅑹也天子衣青衣乗蒼龍周禮馬七尺以上曰龍服蒼玊建青旗服佩也熊虎曰旗食麥與羊麥金榖也羊土畜也金土以老食所勝也先食麥以麥為主也服八風水㸑萁該燧火取銅槃中露水服之八方風所吹也取萁木燧之火炊之東宫御女青色衣青采鼓琴瑟春王東方故處東宫琴瑟木也春木王故鼓之其兵矛矛有鋒鋭似萬物鑚地生其畜羊羊土木之母故畜之朝于青陽左个以出春令青陽者明堂也中方外圜通達四出各有左右房謂之个猶隔也東出謂之青陽南出謂之明堂𤣥堂是月天子朝日告朔行出謂之總章北出謂之於左个之房東向堂北頭室也布徳施惠行慶賞省徭賦布陽德施柔惠也慶善賞賜予也省减徭役之勞輕其賦歛也立春之日天子親率三公九卿大夫以迎歲于東郊率使也迎歲春也東郊郭外八里之郊修除祠位幣禱鬼神犧牲用牡祠位壇塲屛攝之位也幣圭璧也禱鬼神求福祥也人神曰鬼天神曰神犧牲用牡尚蠲潔也禁伐木春木王當長養故禁之毋覆巢殺胎夭毋麛毋卵胎獸胎懐姙未育者也麋子曰夭鹿子曰麛卵未驚者皆禁民不得取蕃庶物也毋聚衆置城郭掩骼薶骴毋聚合大衆建置城郭以防害農功也骼骨有肉掩覆薶蔵之慎生氣也骴音慈孟春行夏令則風雨不時草木早落國乃有恐孟春木徳用事法當寛仁而用火氣動於上故草木早落國惶恐也行秋令則其民大疫飄風暴雨總至黎莠蓬蒿並興孟春溫仁而秋正金鐵之令氣不和故民疫疾風雨隈至故黎莠蓬蒿䟽穢之草並興盛也行冬令則水潦為敗雨霜大雹首稼不入冬隂也水泉湧起而春行之故為敗氣不和故雨霜大雹百穀惟稷先種故曰首稼不入不熟也正月官司空其樹楊司空主土春土受嘉穡故官司空也楊蒲栁也楊木春光故其樹楊仲春之月招摇指卯昬弧中旦建星中弧星在輿鬼南昬時中於南方建星在斗上平旦時中於南方其位東方其日甲乙其蟲鱗其音角律中夾鍾萬物去隂夾陽聚地而生故曰夾鍾其數八其味酸其臭羶其祀户祭先脾始雨水桃李始華自冬氷雪至此春分榖雨故曰始雨水桃李於是皆秀華蒼庚鳴鷹化為鳩蒼庚黄鸝也鷹化為鳩喙正直不鷙摶也鳩布榖也天子衣青衣乗蒼龍服蒼玊建青旗食麥與羊服八風水㸑萁燧火東宫御女青色衣青采鼓琴瑟其兵矛其畜羊朝于青陽大廟太廟東向堂中央命有司省囹圄去桎梏毋笞掠止獄訟囹圄法室省輕也在足曰桎在手曰梏止禁也養㓜小存孤獨以通句勾萌句屈生者萌直生者長養㓜小存恤孤獨所以順陽氣也故草木不句萌者以通達擇元日令民社元善也日從甲至癸也社祭后土所以為民祈榖嫌日有吉否重農事故卜擇之是月也日夜分雷始發聲蟄蟲咸動蘇分等也冬隂閉固雷伏不發是月陽升雷始發聲也咸皆動蘇生也先雷三日振鐸以令於兆民曰雷且發聲鐸木鈴金口木舌且猶也有不戒其容止者生子不僃必有凶災以雷電合房室者生子必有瘖聾通精癡狂之疾令官市同度量鈞衡石角斗稱度丈尺也量釡鍾也鈞等也衡石稱也百二十斤為石角平也斗稱量器也端權槩端正也稱錘曰權槩平斗斛者令鈞等也毋竭川澤毋漉鹿陂池毋焚山林毋作大事以防農功大事戎旅征伐之事祭不用犧牲用圭璧更皮幣是月尚生育故不用犧牲也更代也以圭璧皮幣代犧牲皮謂鹿皮也幣謂𤣥纁束帛也仲春行秋令則其國大水寒氣總至冦戎来征仲春陽中也陽氣長養而行秋節殺戮之令故寒氣猥至冦兵来征伐其國行冬令則陽氣不勝麥乃不熟民多相殘仲春行冬隂之令隂氣勝陽故陽不勝則麥不升熟民相殘賊行夏令則其國大旱煗氣早来蟲螟為害仲春行夏太陽之令故大旱陽氣熱故煗極陽生隂故蟲螟作害也蟲食苗心曰螟二月官倉其樹杏二月興農播榖故官倉也杏有竅在中竅在中像隂布散在上故其樹杏季春之月招揺指辰昬七星中旦牽牛中七星南方朱鳥之宿昬時中於南方牽牛北方𤣥武之宿平旦時中於南方其位東方其日甲乙其蟲鱗其音角律中姑洗姑故也洗新也是月陽氣養生去故就新故曰姑洗其數八其味酸其臭羶其祀戸祭先脾桐始華田䑕化為鴽桐梧桐也田䑕鼢􅂒䑕也鴽鶉也虹始見萍始生虹螮蝀也萍水藻天子衣青衣乗蒼龍服蒼玊建青旗食麥與羊服八風水㸑萁燧火東宫御女青色衣青采鼓琴瑟其兵矛其畜羊朝于青陽右个南頭室曰右个舟牧覆舟五覆五反乃言具于天子舟牧主舟之官也天子将乗舟而漁故反覆而視之恐有穿漏五覆五反慎之至也天子焉始乗舟薦鮪於寢廟乃為麥祈實焉猶於也薦進也鮪魚似鯉而大進此魚於寝廟祈於宗祖求麥實前曰廟後曰寝是月也生氣方盛陽氣發泄句者畢出萌者盡達不可以内言當施㪚恩惠以順生道之宣泄不宜吝嗇閉蔵也天子命有司發囷倉助貧窮振乏絶無財曰貧鰥寡孤獨曰窮振救也開府庫出幣帛使諸侯府庫幣帛之蔵也使人聘問諸侯聘名士禮賢者有名徳之士大賢之人聘問禮之将與為治也命司空時雨将降下水上騰循行國邑周視原野司空主水土之官下水上騰恐有浸漬傷害五榖故循行徧視之也廣平曰原郊外曰野修利隄防導通溝瀆達路除道從國始至境止田獵畢畢弋罝嗟罘浮羅􅘩餒毒之藥毋出九門畢掩網也弋繳射也罝罘皆捕獸之罟羅網皆捕鳥之罟小網長柄謂之畢用以掩兎也餒㗖之也藥毒藥也七物皆不得施用于外以其逆生道也九門路門應門雉門庫門臯門城門近郊門逺郊門闗門乃禁野虞毋伐桑柘桑柘皆可養蠶故禁民伐之鳴鳩奮其羽戴鵀䛘降于桑鳴鳩奮迅其羽直刺上飛鵀戴勝鳥具撲薄曲筥筐撲持也三轉謂之撲員底曰筥方底曰筐皆受桑器后妃齋戒東鄉親桑省婦使勸蠶事命五庫令百工審金鐵皮革䈥角箭榦脂膠丹漆無有不良擇下旬吉日大合樂致歡欣樂所以移風易俗故擇吉日大合之以致歡和乃合㹎藟牛騰馬游牝于牧㹎牛特牛也騰馬騰駒跐蹏善将羣者也游從牝於所牧之地風合之令國儺那九門磔責攘以畢春氣儺􅈪宫室中區隅幽闇之處擊鼓大呼以逐不祥如今驅疫逐除是也裂牲謂之磔除禍謂之攘春者隂氣之終故磔攘以終畢厲氣也行是月令甘雨至三旬季春行冬令則寒氣時發草木皆肅國有大恐季春行冬令寒殺之氣也故寒氣時起草木上踈曰肅行夏令則民多疾疫時雨不降山陵不登季春行夏元陽之令氣不和故民疾疫雨澤不降故草木不登成行秋令則天多沈隂淫雨早降兵革並起秋金氣用事水之母也季春行之故多隂沈為雨金為兵革故並起三月官鄉其樹李三月科民户口故官鄉也李亦有核説與杏同李後杏熟故三月李也孟夏之月招揺指巳昬翼中旦婺女中翼南方朱鳥之宿昬時中於南方婺女一曰須女北方𤣥武之宿是月平旦中於南方其位南方其日丙丁盛徳在火炎帝之神治南方也丙丁火日也盛徳在火火王南方其蟲羽其音徵盛陽用事鱗散羽羽蟲鳳為長徵音火也律中仲吕其數七陽散在外隂實在中所以旅陽成功故曰仲吕其數七生數五火第二故曰七其味苦其臭焦火味苦也焦火香焦其祀竈祭先胏祝融吳囘為髙辛氏火正死為火神託祀於竈是月火王故祀竈胏屬金也祭祀之肉先用所勝也一曰胏火自用其蔵也胏音緇螻蟈國鳴邱螾出螻螻蛄也蟈蝦蟇也四月隂氣始動於下故類應鳴也邱螾蠢蝡也王𤓰生苦菜秀王𤓰本草作葭契王𤓰色赤感火之色而生苦菜味苦感火之味而成不榮而實曰秀天子衣赤衣乗赤騮服赤玊建赤旗食菽與雞菽豆連皮也雞豆皆屬火所養服八風水㸑柘燧火南宫御女赤色衣赤采吹竽笙火王南方故處南宫也竽笙空中像陽故吹之其兵㦸㦸有枝榦象陽布㪚也㦸或作弩其畜雞朝于明堂左个以出夏令南向堂當盛陽故曰明堂東頭室故曰左个雞羽蟲陽也故畜之立夏之日天子親率三公九卿大夫以迎歲於南郊迎歲迎夏也南郊七里之郊還乃賞賜封諸侯修禮樂饗左右賞賜有功割土封爵傳曰賞以春夏刑以秋冬也修治禮樂所以安上治民移風易俗也左右近臣命太尉贊傑俊選賢良舉孝悌太尉卿官命使贊白也才過千人為傑選擇賢良孝悌舉而用之蓋非太尉之職故特命之行爵出祿佐天長養繼修增髙無有隳壊毋興土功毋伐大樹令野虞行田原勸農事驅獸畜勿令害榖天子以彘嘗麥先薦寢廟是月麥始升故以豕嘗麥豕水畜宜麥先薦寢廟孝之至也聚畜百藥靡草死隂氣極藥草成故聚積之也靡草草之枝葉靡細者麥秋至决小罪斷薄刑刑者上之所施罪者下之所犯斷者定其輕重而施刑也决謂人以小罪相告者即决遣之不收擊也孟夏行秋令則苦雨數来五榖不滋四隣入保孟夏盛陽當助長養而行金氣殺戮之令故苦雨殺榖不得滋長也四方之民来入城郭自保守也行冬令則草木早枯後乃大水敗壊城郭行冬寒閉固之令故草木早枯大水敗壊其城郭奸時違行之應也行春令則螽蝗為敗暴風来格秀草不實孟夏當繼修增髙助陽長養而行春時啓蟄之令故致螽蝗之敗春木氣多風故言暴風来至使當秀之草不長茂也四月官田其樹桃四月勉農事故官田也桃説與杏同後李熟仲夏之月招揺指午昬亢中旦危中亢東方蒼龍之宿昬時中於南方危北方𤣥武之宿平旦時中於南方其位南方其日丙丁其蟲羽其音徵律中㽔賓其數七是月隂氣萎㽔在下像主人也陽氣在上像賓客也故曰㽔賓其味苦其臭焦其祀竈祭先肺小暑至螳蜋生螳蜋世謂之天馬一名齒肬鵙决始鳴反舌無聲鵙博勞鳥也五月隂氣於下博勞夏至應隂而鳴殺蛇於木反舌百舌鳥也能辨變其舌反易其聲以效百鳥之鳴故謂百舌無聲者五月陽氣極於上㣲隂起於下百舌無隂故無聲也天子衣赤衣乗赤騮服赤玊載赤旗食菽與雞服八風水㸑柘燧火南宫御女赤色衣赤采吹竽笙其兵㦸其畜雞朝于明堂太廟廟南向堂中央室也命樂師修鞀鼙琴瑟管簫調竽篪池飾鍾磬管一孔似篴簫今之歌簫是也執干戚戈羽干盾戈斧㦸屬也羽武也所持翿也命有司為民祈祀山川百源大雩帝用盛樂山者水之源将欲禱雨故先祭其本源雩者吁嗟其聲以求雨之祭周禮女巫凡邦之大烖歌哭而請亦其義也帝者天之主宰盛樂即鞀鞞以下之樂器也天子以雛嘗黍雛新雞也不言嘗雞而言嘗黍者以穀為主也羞以含桃先薦寢廟羞進也含桃鶯桃鶯所含食故言含桃是月而熟故進之禁民無刈藍以染為藍青未成故也毋燒灰火之滅者為灰是月草木未成不天物也毋􅍊布􅍊􅍊之于日也布者隂功所成不可以小功干盛陽也門閭無閉闗市無索門城門閭里門也民順陽氣散布在外當出入故不閉也闗要塞市人聚也無索不征税也盖當時氣盛大之際人君亦當體之而行寛大之政也挺重囚益其食挺者緩也存鰥寡振死事振起也先人為死難者振起其子孫也游牝别其羣執騰駒班馬政是月牝馬懐胎已定故别其羣不欲騰駒蹏傷其胎育故執之班告也馬政掌馬官也騰駒騰馬也周禮馬五尺以下曰駒日長至隂陽爭死生分君子齋戒慎身無躁節聲色薄滋味百官靜事無徑以定晏隂之所成至極也陽盡午中而㣲隂妙重淵矣此陽隂爭辨之際物之感陽氣而方長者生感隂氣而已成者死此死生分判之際也事無徑當請詳而後行也晏安也隂道静故曰晏隂鹿角解蟬始鳴解墮也蟬鼔翼始鳴半夏生木堇榮半夏草藥也木堇朝榮暮落樹髙五六尺其葉與安石榴相似是月生榮華可用作烝禁民無發火可以居髙明逺眺望登邱陵處臺榭順陽宣明也一曰望雲物占氣祥也仲夏行冬令則雹霰傷榖道路不通暴兵至冬氷凍故雹霰傷害五榖也冬氣閉蔵又多水雨故道䧟壊不通利㬥害之兵横来至也行春令則五榖不熟百螣時起其國乃饑行春令木王好生育之令故五榖晩熟百螣動股蝗屬時起害榖故國饑也行秋令則草木零落果實蚤成民殃於疫仲夏行秋成熟之令故草木零落果實早成非其時氣故民有疾疫也五月官相其樹榆是月陽氣長養故官相相佐也榆説未聞季夏之月招揺指未昬心中旦奎中心東方蒼龍之宿是月昬時中於南方奎西方白虎之宿是月中旦時中於南方其位中央其日戊巳盛徳在土黄帝之神治中央戊巳土日盛徳在土土王中央也其蟲蠃其音宫羽落而蠃蟲鱗為之長宫土也位中央五音之主也律中百鐘其數五百鐘林鐘是月陽盛隂起生養萬物故曰百鐘其數五五行數土第五也其味甘其臭香土味甘土臭香也其祀中霤祭先心土用事故祀中霤中霤室中之祭祀后土也心火也用所勝也一曰心土也自用其蔵也凉風始至蟋蟀居奥蟋蟀蜻􅖹趣織也詩云七月在野此曰居奥不與經合奥或作壁也鷹乃學習腐草化為蚈秋節将至鷹自習擊也蚈馬蚿也一曰螢火蚈音谿天子衣苑黄乗黄騮服黄玊建黄旗黄順土色也食稷與牛稷牛皆屬土服八風水㸑柘燧火中宫御女黄色衣黄采其兵劒季夏中央也劔有兩刃諭無所生也一曰諭無所主皆主之其畜牛朝于中宫中宫大室也乃命漁語人伐蛟取鼉登龜取黿漁人掌漁官蛟鼉黿皆魚屬鼉皮可以作鼔詩曰鼉鼔洋洋黿可以作羹傳曰楚人獻黿於鄭靈公靈公不與公子宋黿羮公子怒染指於鼎嘗之而出是也皆不害人易得故言取蛟有鱗甲能害人難得故言伐龜神可决吉㐫入宗廟尊之故言登令滂人入材葦滂人掌池澤之官入材葦供國用也命四監大夫令百縣之秩芻以養犧牲周制天子地方千里分為百縣縣有四郡郡有四鄙故春秋傳言下大夫受縣上大夫受郡秦初置三十六郡以監縣耳此云百縣者謂周制畿内之縣也四監監四郡大夫也秩常也常所當出芻故聚之以養犧牲以供皇天上帝名山大川四方之神宗廟社稷為民祈福行惠令弔死問疾存視長老行稃鬻厚席蓐以送萬物歸也命婦官染采黼黻文章青黄白黑莫不質良婦人能别五色故染采白與黒為黼青與赤為黻黒與赤為文赤與白為章質美良善也以給宗廟之服必宣以明宣徧明鮮明也是月也樹木方盛勿敢斬伐不可以合諸侯起土功動衆興兵必有天殃土潤溽辱暑大雨時行利以殺草糞田疇以肥土壃夏至後三十日大暑節火王也潤溽而疆漯重又有時雨燒薙行水灌之如以熱湯可以成糞田疇美土疆之界畔季夏行春令則榖實解落多風欬民乃遷徙春木王木性墮落陽發多風而行其令故榖實解落民疾病風欬嗽土氣像春陽布散民遷徙者也行秋令則邱隰水潦稼穡不熟乃多女災邱髙也隰卑也言髙下皆有水潦故殺稼令不熟隂氣過差故多女災女災生子不育也行冬令則風寒不時鷹隼蚤摯四鄙入保冬隂肅殺而行其令故寒風不節鷹隼蚤摯擊四界之民皆入城郭自保守也六月官少内其樹梓六月植稼成熟故官少内也梓説未聞孟秋之月招揺指申昬斗中旦畢中斗北方𤣥武之宿昬時中於南方畢西方白虎之宿平旦時中於南方其位西方其日庚辛盛徳在金少皥之神治西方也庚辛金也盛徳在金金王西方也其蟲毛其音商金氣寒蠃者衣毛毛蟲虎為之長商金也位在西方律中夷則其數九夷傷也則法也陽衰隂盛萬物彫傷應法成性故曰夷則也其數九五行數五金第四故曰九也其味辛其臭腥金味辛金臭腥也其祀門祭先肝孟秋始内入由門故祀門肝木也祭祀之用所勝也一曰肝金自用其蔵也凉風至白露降寒蟬鳴鷹乃祭鳥用始行戮鷹摶鷙殺鳥於大澤之中四面陳之世謂之祭鳥始行殺戮順秋氣也天子衣白衣乗白駱服白玊建白旗白順金色也白馬黑毛曰駱食麻與犬服八風水㸑柘燧火西宫御女白色衣白采撞白鐘金王西故處西宫其兵戈其畜狗朝于總章左个以出秋令總章西向堂也西方總成萬物而章明之故曰總章狗金畜也求不孝不悌戮㬥傲悍而罰之以助損氣損氣隂氣也立秋之日天子親率三公九卿大夫以迎秋于西郊西郊里之外郊也還乃賞軍率武人於朝軍率軍将也武勇者功名也命将率選卒厲兵簡練桀俊専任有功以征不義詰誅㬥慢順彼四方順循也命有司修法制繕囹圄禁姦塞邪審决獄平詞訟決斷平治也天地始肅不可以贏肅殺也殺氣始行也贏盛也是月農始升榖天子嘗新先薦寢廟升成薦進也命百官始收歛完隄防謹障塞以備水潦修城郭繕宫室所以為水潦之備者以月建在酉酉中有畢星好雨也毋以封侯立大官行重幣出大使行是月令凉風至三旬封侯列土封邑也大官九命之爵也重幣金帛之幣大使命卿使之金氣收歛皆近不宜行也孟秋行冬令則隂氣大勝介蟲敗榖戎兵乃来孟秋隂也復行冬水王之令隂氣勝也其介蟲敗榖隂氣幷故戎兵来行春令則其國乃旱陽氣復還五榖無實春陽亢燥而行其令故旱也陽氣還者此月凉風而反行温風之令故敗榖令無實也行夏令則冬多火災寒暑不節民多瘧疾夏火王而行其令故多火災寒暑相干故不節多瘧疾瘧疾寒暑所生七月官庫其樹楝庫兵府也秋節整兵故官庫也其樹楝棟實鳳凰所食也今雒城旁有樹棟實秋熟楝音練仲秋之月招揺指酉昬牽牛中旦觜嶲中牽牛北方𤣥武之宿昬時中於南方觜嶲西方白虎之宿平旦時中於南方其位西方其日庚辛其蟲毛其音商律中南吕其數九南任也言陽氣吕旅而志助隂隂任成萬物也庚辛金日其味辛其臭腥其祀門祭先肝凉風至候鴈来𤣥鳥歸羣鳥翔時候之鴈從北漠中来過周雒南至彭蠡也𤣥鳥歸秋分後歸蟄所也羣鳥翔寒氣至羣鳥肥盛試其羽翼而髙翔翔者六翮不動也天子衣白衣乗白駱服白玊建白旗食麻與犬服八風水㸑柘燧火西宫御女白色衣白采撞白鐘其兵戈其畜犬朝于總章太廟總章西向堂也太廟中央室也命有司申嚴百刑斬殺必當無或枉撓枉曲也撓弱也言平直也決獄不當反受其殃是月也養長老授几杖行稃鬻飲食乃命宰祝行犧牲案芻豢草養曰芻榖養曰豢案其薄書閲租之視肥臞全粹全無虧缺也粹毛色純也粹音祟察物色課比類量小大視少長莫不中度天子乃儺難以御秋氣儺猶除也御止也止秋氣不使為害也以犬麻先薦寢廟是月可以築城郭建都邑國有先君之宗廟曰都無曰邑都曰城邑曰築穿竇窖􅁻修囷倉穿竇所以通水不欲地濕也穿窖可以盛榖也乃命有司趣民牧歛畜采多積聚勸種宿麥若或失時行罪無疑是月也雷乃始收蟄蟲培户殺氣浸盛陽氣日衰水始涸涸凝竭或作盛言隂勝也日夜分一度量平權衡正鈞石角斗稱理闗市来商旅理通也入貨財以便民事四方来集逺方皆至財物不匱上無乏用百事乃遂遂成也仲秋行春令則秋雨不降草木生榮國有大恐春陽氣而行其令故雨不降又温煦之仁故草木生榮華也氣相干必有災咎故國大惶恐行夏令則其國乃旱蟄蟲不藏五榖皆復生行炎陽之令故旱涸氣熱故蟄蟲不藏使五榖復生行冬令則風災數起收雷先行草木早死冬行寒氣激之令故有風災又冬閉藏故收雷先行草木早死也八月官尉其樹柘尉成官也是月治兵故官尉季秋之月招揺指戌昬虚中旦栁中虚北方𤣥武之宿昬時中於南方栁南方朱雀之宿平旦中於南方其位西方其日庚辛其蟲毛其音商律中無射隂氣上升陽氣下降萬物隨陽而蔵無射出見也其數九其味辛其臭腥其祀門祭先肝候鴈来賓雀入大水為蛤鴈以仲秋先至者為主後至者為賓大水海水也菊有黄華豺乃祭獸戮禽菊色不一而専言黄者秋令在金以黄為正也豺似狗而長尾其色黄豺殺獸四面陳之世謂之祭獸戮猶殺也天子衣白衣乗白駱服白玊建白旗食麻與犬服八風水㸑柘燧火西宫御女白色衣白采撞白鐘其兵戈其畜犬朝于總章右个命有司申嚴號令百官貴賤無不務入以㑹天地之蔵無有宣出乃命冡宰農事備收舉五榖之要要簿書也蔵帝籍之收於神倉天子籍田千畝故曰帝籍之收籍田所收之榖也神倉倉也是月也霜始降百工休霜降天寒朱漆難成故百工休止不復作器乃命有司曰寒氣總至凝聚而至也民力不堪其皆入室詩曰入此室處是也上下入學習吹大饗帝嘗犧牲合諸侯制百縣上旬丁日入學官吹笙竽習禮樂饗上帝用犧牲合諸侯之制度車服之差各兩其命數也百縣畿内之縣言百舉全數耳五家為隣五隣為里四里為鄼四鄼為鄙四鄙為縣然則縣二千五百家也為来歲受朔日與諸侯所税於民輕重之法貢歲之數以逺近土地所宜為度受朔日如今計吏朝賀豫明年之厯日也度者職貢多少有常也乃教於田獵以習五戎戎兵也刀劍矛㦸矢曰五戎也命太僕及七騶咸駕戴荏授車以級皆正設于屛外級等也授當車者以髙下各隨其等級正立設陳也天子外屛屛樹垣也爾雅曰門内之垣謂之樹垣司徒搢晉朴北嚮以贊之搢挿也朴以敎導也挿置帯間贊相威儀也司徒主衆敎導之也天子乃厲服廣飾執弓操矢以獵是月天子尚武乃服猛厲之服廣其所佩之飾以取禽也命主祠祭禽四方命敎也主祠典祀之官祭禽四方祀始設禽獸者於四方報其功不知其神所在故慱求之於四方也是月草木黄落乃伐薪為炭蟄蟲咸俛乃趨獄刑毋留有罪俛伏也無留言當斷也收祿秩之不當供養之不宜者不當謂無徳受祿也不宜謂不孝也一曰所養者無勲於國其先人又無賢徳所不宜養故收之通路除道從境始至國而后巳是月天子乃以犬嘗麻先薦寢廟季秋行夏令則其國大水冬藏殃敗民多鼽仇窒季秋隂氣而行夏月霖雨之令故大水火氣故冬藏殃敗也火金相干故民鼽窒鼻不通利行冬令則國多盜賊邊境不寜土地分裂冬水純隂姦謀所生故多盜賊使邊境之民不安寧也則土地見侵削為隣國所分裂也行春令則煗風来至民氣解隋師旅並興春氣陽温故煗風至民氣解隋也木干金故師旅並興九月官候其樹槐候望也是月繕修守備故曰官候也槐懐也可以懐来逺人也孟冬之月招揺指亥昬危中旦七星中危北方𤣥武之宿昬時中於南方七星南方朱鳥之宿平旦時中於南方其位北方其日壬癸盛徳在水顓頊之神治北方壬癸水日盛徳在水王北方也其蟲介其音羽介甲也像冬閉固皮漫胡也甲蟲龜為之長明屬水也律中應鍾其數六隂應於陽轉成其功萬物聚成故日應鍾其數六五行數五水第一故曰六其味鹹其臭腐水味鹹也水臭腐也其祀井祭先腎井水給人故祀井或作行行門内地冬守在内故祀腎水自用其蔵也水始氷地始凍雉入大水為蜃虹蔵不見蜃蛟屬大水淮水也傳曰雉入于淮為蜃虹隂中之陽也是月隂盛故不見蔵氣之下伏也天子衣黑衣乗𤣥驪服𤣥玊建𤣥旗順水徳也熊與虎曰旗食黍與彘服八風水㸑松燧火北宫御女黑色衣黑采擊磬石水王北方故處北宫其兵鎩晒其畜彘鎩者却内像隂閉也彘者水畜也朝于𤣥堂左个以出冬令命有司修羣禁順隂閉諸所當禁也禁外徙閉閭大摉搜客傳曰禁舊客為露情也有新客摉出之為觀釁也閭城門之閭里門也嚴閉之守備也斷罰刑殺當罪斷罰刑當决也當罰正罪故殺之阿上亂法者誅阿意曲從取容於上以亂法度也誅治也立冬之日天子親率三公九卿大夫以迎歲于北郊還乃賞死事存孤寡有忠節蹈義死王事者賞其子孫也孤寡皆存慰矜恤之是月命太祝禱祀神位占龜䇿審卦兆以察吉㐫於是天子始裘命百官謹蓋藏命司徒行積聚修城郭警門閭修楗蹇閉慎管籥固封璽城郭欲其厚實故言修門閭備禦非常故曰警楗鎻須也閉鎻筒也管籥鎻匙也楗閉或有破壊故言修管籥不可妄開故言慎璽印也修邊境完要塞絶蹊徑飾喪紀審棺槨衣衾之薄厚飾治也紀數也二十五月之數也棺槨衣衾薄厚各有差等故審之營邱壠之小大髙庳卑使貴賤卑尊各有等級營度也邱壟冢也小大髙下各有度量也是月也工師効功陳祭器案度呈堅致為上案視度法也堅致功牢也工事苦慢作為淫巧必行其罪苦惡也慢不牢也淫巧非常之巧也苦謂監㑹之監也是月也大飲蒸天子祈来年於天宗蒸冬祭是時大飲酒而祭求明年之福祥也凡屬天子之神日月星辰皆為天宗大禱祭于公社畢饗先祖禱求也公社后土之祭生為上公死為貴神故曰公畢饗先祖先公後私之義也勞農夫以休息之命將率講武律射御角力勁律習也角平地也勁强貌乃命水虞漁師收水泉池澤之賦虞掌水官師長賦稅也毋或侵牟牟多也孟冬行春令則凍閉不宻地氣發泄民多流亡春陽氣散越故凍閉不宻地氣發泄也民多流亡像陽氣布散行夏令則多㬥風方冬不寒蟄蟲復出冬當閉藏反行夏盛陽之令故多􅍊疾陽氣温故盛冬不寒令蟄伏之蟲復出也行秋令則雪霜不時小兵時起土地侵削秋氣干冬大寒不當雪而雪不當霜而霜故曰不時十月官司馬其樹檀冬間講武故官司馬檀隂木仲冬之月招摇指子昬壁中旦軫中東壁北方𤣥武之宿昬時中於南方軫南方朱鳥之宿平旦時中於南方其位北方其日壬癸其蟲介其音羽律中黄鍾其數六黄鍾者陽氣聚於下隂氣盛於上萬物黄萌於地中故曰黄鍾其味鹹其臭腐其祀井祭先腎氷益壮地始坼鳱天鴠旦不鳴虎始交鳱鴠夜鳴求旦之鳥是月隂盛故不鳴虎陽中之隂隂氣盛以類發也交讀校天子衣黑衣乗鐵驪服𤣥玊建𤣥旗食黍與彘服八風水㸑松燧火北宫御女黑色衣黑采擊磬石其兵鎩其畜彘朝于𤣥堂太廟命有司曰土事無作無發室居及起大衆是謂發天地之藏諸蟄則死民必疾疫又隨以喪急捕盜賊誅淫泆詐偽之人命曰畼暢月隂氣在上民人空閒故命曰畼月命奄尹申宫令奄官也尹正也中宫令重戒敕也審門閭謹房室必重閉助隂氣也省婦事乃命大酋秫术稻必齊麴蘖必時婦事婦功也大酋酒官之長秫稻麴蘖酒材也齊多寡中度也時制度及時也湛審熺熾必潔水泉必香湛漬熺蒸炊也潔無所汚香無穢惡之氣陶器必良火齊必得無有差忒陶器瓦器良無罅漏之失得適生熟之宜天子乃命有司祀四海大川名澤冬令方中水復至盛故為民禱祀之也是月也農有不收藏積聚牛馬畜獸有放失者取之不詰詰呵問也山林藪澤有能取䟽食田獵禽獸者野虞敎導之其有相侵奪罪之不赦是月也日短至隂陽爭君子齋戒處必掩身欲靜去聲色禁嗜欲聲絲竹金石之聲也色美色也有貪欲濫求者禁之也寜身體安形性閉情欲也是月也茘挺出芸始生邱螾結麋角解茘馬茘草也芸蒿菜名邱螾蟲名結屈結也麋角解墮皆應㣲陽氣也水泉動則伐樹木取竹箭罷官之無事器之無用者涂塗闕庭門閭築囹圄所以助天地之閉仲冬行夏令則其國乃旱氛霧㝠㝠雷乃發聲夏氣炎陽故其國旱清濁相干故氛霧㝠㝠也行秋令則其時雨水𤓰瓠不成國有大兵秋金氣水之母也故雨水水金用事故有大兵行春令則蟲螟為敗水泉咸竭民多疾癘春陽氣蟄伏生故蟲螟敗榖水泉竭也陽干隂氣未和故多疾癘十一月官都尉其樹棗冬成軍師故官都尉棗取其赤心也季冬之月招揺指丑昬婁中旦氐中婁西方白虎之宿昬時中於南方氐東方蒼龍之宿平旦時中於南方其位北方其日壬癸其蟲介其音羽律中大吕吕旅也萬物萌動於黄泉未能達見所以旅旅去隂即陽助其成功故曰大吕其數六其味鹹其臭腐其祀井祭先腎鴈北鄉鵲加巢鴈在彭蠡之水皆北嚮将至北漠中也鵲感陽而動上加巢也雉雊雞呼卵雞呼鳴求卵也天子衣黑衣乗鐵驪服𤣥玊建𤣥旗食麥與彘服八風水㸑松燧火北宫御女黑色衣黑采擊磬石其兵鎩其畜彘朝于𤣥堂右个命有司大儺旁磔出土牛大儺今之逐隂驅疫為陽導也旁磔四面皆磔犬羊以禳四方之疾疫也出土牛今鄉縣出勸農耕之土牛於外是也命漁師始漁天子親往射漁先薦寢廟令民出五種令農計耦耕事修耒耜具田器耦耦合也命樂師大合吹而罷乃命四監收秩薪以供寢廟及百祀之薪燎秩常也謂有常數也大而可析者謂之薪小而束者謂之柴新燎炊也㸑及夜燎之用也是月也日窮于次月窮于紀星周于天歲將更始日窮于次者去年季冬次𤣥枵至此窮盡還次𤣥枵也紀㑹也去年季冬月與日相㑹于𤣥枵至此窮盡復還㑹於𤣥枵也星周于天者謂二十八舍更見南方至是月周匝也令静農民無有所使天子乃與公卿大夫飾國典論時令以待嗣歲之宜乃命太史次諸侯之列賦之犧牲賦布也以供皇天上帝社稷之芻享乃命同姓女國供寢廟之芻豢卿士大夫至于庶民供山林名川之祀季冬行秋令則白露早降介蟲為􅀈祥四鄙入保秋節白露故白露早降介甲之蟲為􅀈災金氣為兵故四境之民入城郭自保守也行春令則胎夭傷國多痼疾命之曰逆季冬大寒而行春温之令氣不和謂胎養天傷國多篤疾逆風氣之由也行夏令則水潦敗國時雪不降氷凍消釋夏氣炎陽有多霖雨故水潦敗國也時雪當降而不降氷凍不當消而消釋皆干時之徵十二月官獄其樹櫟十二月歲盡刑斷故獄官也櫟可以為車轂木不出火惟櫟為然亦應除氣也五位東方之極自竭石山過朝鮮貫大人之國竭石在遼西界海水西畔朝鮮樂浪之縣也貫通也大人國在其東東至日出之次榑扶木之地青土樹木之野榑木榑桑太皥句芒之所司者萬二千里太皥庖犧氏東方木徳之帝句芒木神司主也其令曰挺羣禁開閉闔通窮窒達障塞行優游棄怨惡解役罪免刑開闗梁宣出財和外怨撫四方行柔惠止剛强剛強侵陵人不循軌度者禁止之也南方之極自北户孫之外北户孫國名日在其北皆為北向户以日故北户貫顓頊之國南至委火炎風之野赤帝祝融之所司者萬二千里赤帝炎帝少典之子號為神農南方火徳之帝也祝融顓頊之孫老童之子吳回也一名黎為髙辛氏火正號為祝融死為火神其令曰爵有徳賞有功惠賢良救饑渴舉力農賑貧窮惠孤寡憂罷疾出大祿行大賞起毁宗立無後封建侯立賢輔應陽施也中央之極自崑崙東絶兩恒山自從也絶猶過也恒山常也言兩未聞日月之所道江漢之所出日月照其所經過之道江出岷山漢出嶓冡山衆民之野五榖之所宜龍門河濟相貫以息壤堙洪水之州東至於碣石黄帝后土之所司者萬二千里黄帝少典之子以土徳王天下號為軒轅氏死為中央土徳之帝后土者勾龍氏之子名曰后土能平九土死祀為土神其令曰平而不阿明而不苛包裹覆露露潤也無不囊懐溥汜無私正靜以和行稃鬻養老衰弔死問疾以送萬物之歸土四方之主故曰萬物之所歸也西方之極自崑崙絶流沙沈羽西至三危之國流沙葢在崑崙之西南石城金室飲氣之民不死之野少皥蓐收之所司者萬二千里少皥黄帝之子青陽也名摯以金徳王天下號為金天氏死為西方金徳之帝蓐收金天氏之裔子曰修禮死為金神其令曰審用法誅必辜備盗賊禁姦邪飾羣牧謹著聚修城郭補決竇塞蹊徑遏溝瀆止流水雝谿谷守門閭陳兵甲選百官誅不法應金斷也北方之極自九澤窮夏晦之極北至令正之谷九澤北方之澤夏大也晦暝也有凍寒積氷雪雹霜霰漂潤羣水之野顓頊𤣥㝠之所司者萬二千里顓頊黄帝之孫以水徳王天下號髙陽氏死為北方水徳之帝其神𤣥㝠者金天氏有適子曰昧為𤣥暝師死而祀為主水之神其令曰申羣禁固閉藏修障塞繕闗梁禁外徙斷罰刑殺當罪閉闗閭大搜客止交㳺禁夜樂蚤閉晏開以塞姦人已得執之必固天節已幾刑殺無赦雖有盛尊之親斷以法度毋行水毋發藏毋釋罪應隂殺也六合孟春與孟秋為合仲春與仲秋為合季春與季秋為合孟夏與孟冬為合仲夏與仲冬為合季夏與季冬為合孟春始贏孟秋始縮贏長也縮短也仲春始出仲秋始内出二月播種内八月收歛季春大出季秋大内孟夏始緩孟冬始急緩四月陽安急十月寒肅仲夏至脩仲冬至短夏至北極冬至南極短脩皆在至前季夏徳畢季冬刑畢徳畢陽施結刑畢刑獄盡故正月失政七月凉風不至二月失政八月雷不藏三月失政九月不下霜四月失政十月不凍五月失政十一月蟄蟲冬出其鄉六月失政十二月草木不脱不脱葉槁著樹不零落也七月失政正月大寒不解東風不解凍也八月失政二月雷不發不發聲也九月失政三月春風不濟濟止也十月失政四月草木不實實長也十一月失政五月下雹霜十二月失政六月五榖疾狂疾狂不華而實也春行夏令泄象盛陽發泄行秋令水水生於中故水行冬令肅象氣肅急夏行春令風象春木氣多行秋令蕪象秋氣蕪穢生行冬令格格鼔也象冬斷刑恩澤致格不流下秋行夏令華象夏氣樹華茂行春令榮象春氣生榮華行冬令耗耗零落也冬行春令泄象春氣布散發泄也行夏令旱旱象陽炎行秋令霧秋氣隂故亂霧製度隂陽大制有六度天為繩地為凖春為規夏為衡秋為矩冬為權繩者所以繩萬物也凖者所以凖萬物也規者所以貟萬物也衡者所以平萬物也矩者所以方萬物也權者所以權萬物也繩之為度也直而不争修而不窮久而不弊逺而不忘與天合徳與神合明所欲則得所惡則亡自古及今不可移匡厥徳孔宻廣大以容是故上帝以為物宗宗本也凖之為度也平而不險巧而不阿廣大以容寛裕以和柔而不剛鋭而不挫鋭利也挫折也流而不滯流行滯止也易而不穢發通而有紀紀道也周宻而不泄凖平而不失萬物皆平民無險謀怨惡不生是故上帝以為物平平評也規之為度也轉而不復貟而不垸復遏垸轉也垸音患優而不縱廣大以寛感動有理發通有紀優優簡簡百怨不起優簡寛舒之貌規度不失生氣乃理氣類理逹也衡之為度也緩而不後平而不怨施而不徳弔而不責常平民祿以繼不足㪍㪍陽陽唯徳是行養長化育萬物蕃昌以成五榖以實封疆其政不失天地乃明明理也矩之為度也肅而不悖剛而不憒取而無怨内而無害威厲而不懾令行而不廢殺伐既得仇敵乃克矩正不失百誅乃服權之為度也急而不贏殺而不割充滿以實周宻而不泄敗物而弗取罪殺而不赦誠信以必堅慤以固冀除苛慝不可以曲故冬正將行必弱以強必柔以剛權正而不失萬物乃藏明堂之制静而法準動而法繩春治以規秋治以矩冬治以權夏治以衡是故燥溼寒暑以節至甘雨膏露以時降淮南鴻烈解卷五
