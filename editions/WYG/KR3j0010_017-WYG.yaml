body:
  text: 淮南鴻烈解卷十七漢髙誘注説林訓木叢生曰林説萬物承阜若林之聚矣故曰説林以一世之度制治天下譬猶客之乗舟中流遺其劒遽契其舟㧪契刻也㧪船弦板也墮劒於中流刻下舩弦言識其於此下失劒也㧪音汜暮薄而求之其不知物類亦甚矣日暮薄岸而求劒於其所刻㧪下故曰不知物類也夫隨一隅之迹而不知因天地以游惑莫大焉雖時有所合然而不足貴也譬若旱歲之土龍疾疫之芻狗是時為帝者也土龍以求雨芻狗以求福時見貴也曹氏之裂布蛷求者貴之然非夏后氏之璜楚人名命為曹今俗間以始織布繫著其旁謂之曹布燒以傅蝫蛷瘡則愈故蛷者貴之半璧曰璜璜以發衆國家之寶故曰然非夏后氏之璜也無古無今無始無終未有天地而生天地至深微廣大矣言其深微廣大故能生天地也足以􅡮蹍者淺矣然待所不􅡮而後行􅡮履也待所履而行者則不得行故曰待所不履而後行智所知者􅄶矣然待所不知而後明褊狹知所知所不知以成明矣游者以足蹶以手􅀈潑不得其數愈蹶愈敗愈益也敗猶没也及其能游者非手足者矣鳥飛反鄉兔走歸窟狐死首邱寒將翔水各哀其所生寒將水鳥哀猶愛也毋貽盲者鏡毋與躄者履毋賞越人章甫非其用也賞遺也章甫冠越人㫁髪無用冠為椎固有柄不能自㭬涿目見百步之外不能自見其眦喻人能有所為而不能自為也狗彘不擇甂扁甌而食偷肥其體而顧近其死偷取也顧反也肥則享之故近其死也鳯凰髙翔千仞之上故莫之能致非聖徳君不致也月照天下蝕於詹諸騰蛇游霧而殆於蝍即蛆詹諸月中蝦蟇食月故曰食於詹諸殆猶畏也蝍蛆蟋蟀爾雅謂之蜻􅖹之大腹也上蛇蛇不敢動故曰殆於蝍蛆也蛆音苴烏力勝日而服於鵻追禮能有脩短也烏在日中而見故曰勝日服猶畏也鵻禮爾雅謂禆苙秦人謂之祀祝間蠶時展鳴人舍者鴻鳥皆畏之故曰能有脩短也莫夀於殤子而彭祖為夭矣生寄死歸殤子去所寄歸所卜故曰以為夀彭祖葢楚先夀八百歳不早歸故曰以為夭論語曰竊比於我老彭是也一説彭祖蓋黄帝時學倦者言不如殤子早歸神明矣短綆不可以汲深器小不可以盛大非其任也怒出於不怒為出於不為不怒乃是怒不為乃是為也視於無形則得其所見矣聽於無聲則得其所聞矣至味不慊至言不文至樂不笑至音不叫呌大匠不斵大豆不具大勇不鬬慊快叫譟呼也不斵不自斵削豆簠簋􅇼豆之器大勇人聞自畏之不復鬬也得道而徳從之矣譬若黃鍾之比宫太簇之比商無更調焉更改也以瓦鉒柱者全以金鉒者䟦以玉鉒者發鉒者提馬雒家謂之投翩全者全步除䟦者刺䟦走發者疾迅也是故所重者在外則内為之掘所重謂金與玉掘氣不安祥也逐獸者目不見太山見獸而已嗜慾在外則明所蔽矣蔽者見利不見其害聽有音之音者聾聽無音之音者聰不聾不聰與神明通卜者操龜筮者端策以問於數安所問之哉䇿四十九䇿可以占吉凶可以問於數數欲卜筮者也舞者舉節坐者不期而拚皆如一所極同也日出暘谷入於虞淵莫知其動須㬰之間俛人之頸俛猶戾也人莫欲學御龍而皆欲學御馬莫欲學治鬼而皆欲學治人急所用也解門以為薪塞井以為臼人之從事或時相似或有也相似似於愚水火相憎􅀈慧在其間五味以和鏏小鼎一曰鼎無耳為􅀈􅀈受水而火炊之故曰在其間骨肉相愛讒賊間之而父子相危楚平王晉獻公之類夫所以養而害所養譬猶削足而適􅂂殺頭而便冠所以養喻讒賊害所養喻骨肉殺頭頭大冠小不相宜削殺其頭以便冠也昌羊去􅀈虱而來蚙窮昌羊昌蒲蚙窮蝱蜒入耳之蟲也除小害而致大賊故小快而害大利牆之壞也不若無也然逾屋之覆牆之壞更為土歸於本故曰逾屋之覆也璧瑗成器礛諸之功礛諸治玉之石礛一讀曰亷鏌邪㫁割砥礪之力狡兔得而獵犬烹髙鳥盡而强弩藏喻不復用也䖟與驥致千里而不飛無糗糧之資而不饑失火而遇雨失火則不幸遇雨則幸也故禍中有福也鬻棺者欲民之疾病也畜米者欲歳之荒饑也水静則平平則清清則見物之形弗能匿也故可以為正匿猶逃也川竭而谷虛虚無水也丘夷而淵塞夷平塞滿也脣竭而齒寒河水之深其壤在山言非一朝一夕鈞之縞也一端以為冠一端以為􅙋冠則戴致之􅙋則􅡮􅂂之知己者不可誘以物明於死生者不可却以危故善游者不可懼以涉親莫親於骨肉節族之屬連也骨肉謂一人之身故曰節族之連也心失其制乃反自害言心失制度則自害身也況疏逺乎聖人之於道猶葵之與日也雖不能與終始哉其鄉之誠也宫池涔則旱旱則涸江水之原淵泉不能竭蓋非橑不能蔽日輪非輻不能追疾然而橑輻未足恃也金勝木者非以一刃殘林也土勝水者非以一墣塞江也躄者見虎而不走非勇勢不便也傾者易覆也倚者易軵冗也幾易助也濕易雨也幾近也設鼠者機動釣魚者泛杭任動者車鳴也動發也發則得鼠泛釣浮杭動動則得魚任者輦也詩曰我任我輦芻狗能立而不能行蛇牀似麋蕪而不能芳蛇牀臭麋蕪芳謂許由無徳烏獲無力莫不醜於色醜猶怒也一曰愧也人莫不奮於其所不足以兔之走使犬如馬則逮日歸風言其疾也及其為馬則又不能走矣冬有雷電夏有霜雪然而寒暑之勢不易小變不足以防大節黃帝生隂陽黃帝古天神也始造人之時化生隂陽也上駢生耳目桑林生臂手上駢桑林皆神名此女媧所以七十化也女媧王天下者也七十變造化此言造化治世非一人之功也終日言必有聖之事百發之中必有羿逢􅂪之巧然而世不與也其守節非也非者非其真也牛蹏彘顱亦骨也而世弗灼必問吉凶於龜者以其歴歳久矣近敖倉者不為之多飯臨江河者不為之多飲期滿腹而已蘭芝以芳未嘗見霜鼓造辟兵夀盡五月之望鼓造蓋謂梟一曰蝦蟇今世人五月望作梟羮亦作蝦蟇羹言物不當為用也舌之與齒孰先礲也礲摩盡也錞之與刃孰先弊也繩之與矢孰先直也今鱓之與蛇蠶之與蠋囑狀相類而愛憎異人愛鱓與蠶畏蛇與蠋故曰異也晉以垂棘之璧得虞虢驪戎以美女亡晉國美女驪姬也亡猶亂也聾者不謌無以自樂盲者不觀無以接物接猶見也觀射者遺其藝觀書者忘其愛意有所在則忘其所守古之所為不可更則推車至今無蟬匷蟬匷車類匷音矍使但吹竽使氐厭竅雖中節而不可聽但古不知吹人但讀燕無其君形者也君官主也與死者同病難為良醫與亡國同道難與為謀為客治飯而自藜藿名尊於實也尊重享仁義之名重於治飯之實也乳狗之噬虎也伏雞之摶狸也恩之所加不量其力使景曲者形也形曲則影曲也使響濁者聲也聲濁則響濁也情泄者中易測不閉其情欲發泄於外故其中心易測度知也華不時者不可食也華實若今八九月食晩𤓰令人病瘧之類故不食喻人言多不時適不可聽用也蹠越者或以舟或以車雖異路所極一也蹠至也極亦至也互文耳佳人不同體美人不同面而皆説於目梨橘棗栗不同味而皆調於口人有盜而富者富者未必盜有廉而貧者貧者未必廉蔏荻苗類絮而不可為絮蔏荻也楚人謂之蔏即所謂蘆花絮也黂焚不類布而可以為布出林者不得直道行險者不得履繩繩亦直也羿之所以射逺中微者非弓矢也造父之所以追速致逺者非轡衘也海内其所出故能大雷雨出於海復隨溝還入故曰内其所出輪復其所過故能逺其所過轉不止也羊肉不慕螘螘慕羊肉羊肉羶也醯酸不慕蚋蚋慕於醯酸嘗一臠肉而知一鑊之味懸羽與炭而知燥濕之氣以小見大以近喻逺十頃之陂可以灌四十頃畜水曰陂而一頃之陂可以灌四頃大小之衰然衰差也明月之光可以逺望而不可以細書甚霧之朝可以細書而不可以逺望尋常之外畫者謹毛而失貌謹悉微毛留意於小則失其大貌射者儀小而遺大儀望小處而射之故能中事各有宜治鼠穴而壞里閭潰小皰報而發痤疽皰面氣也痤疽廱也若珠之有纇玉之有瑕置之而全去之而虧置其纇瑕也榛巢者處林茂安也窟穴者託埵防便也埵坊髙處防隄也王子慶忌足躡麋鹿手摶兕虎置之㝠室之中不能摶龜鼈勢不便也湯放其主而有榮名崔杼弑其君而被大謗所以為之則同其所以為之則異吕望使老者奮吕望鼔刀釣魚年七十始學讀書九十為文王作師佐武王伐紂成王封之於齊故老者慕之而自奮厲項託使嬰兒矜以類相慕項託年七歳窮難孔子而為之作師故使小人之疇自矜大也使葉落者風揺之使水濁者魚撓之虎豹之文來射虎豹以有文章來使人射取之蝯狖之捷來乍蝯狖屬仰鼻而長尾乍暫疾以其操捷來使疾擊而取之行一棊不足以見智彈一弦不足以見悲三寸之管而無當當猶底也天下弗能滿十石而有塞百斗而足矣以篙測江篙終而以水為測惑矣篙擿船以篙渡江篙没因以江水為盡故曰惑也漁者走淵木者走山所急者存也朝之市則走夕過市則歩所求者亡也豹裘而雜不若狐裘之粹白璧有考不得為寶考釁汚也言至純之難也戰兵死之鬼憎神巫兵死之鬼善行病人巫能祝劾殺之憎畏也盜賊之醜吠狗醜猶惡也無鄉之社易為黍肉無國之稷易為求福無祀不禋于神而卒祀之故易為黍肉易為求福也鼈無耳而目不可以瞥精於明也不可瞥瞥之則見也瞽無目而耳不可以察精於聰也不可以察察之則聞遺腹子不思其父無貌於心也不知父貌不夢見像無形於目也不見父像蝮蛇不可為足虎豹不可使縁木蝮蛇有毒螫人不為足為足益甚虎猛獸不可使能縁木馬不食脂桑扈不啄粟非亷也桑扈青雀馬不竊脂秦通崤塞而魏築城也魏徙都大梁聞秦通治崤關知欲來東兼之故築城設守備也饑馬在廏寂然無聲投芻其傍爭心乃生引弓而射非弦不能發矢引張引也發遣也弦之為射百分之一也道徳可常權不可常故遁關不可復亡犴寒不可再遁逃也獄嘗以權變出關塞野犴亡逃不可復由其入故曰權不可常也環可以喻貟不可以輪絛可以為繶亦不必以紃紃亦繶也婉轉數也紃音巡日月不並出狐不二雄神龍不匹猛獸不羣鷙鳥不雙循繩而斵則不過懸衡而量則不差衡秤也植表而望則不惑損年則嫌于弟益年則疑於兄不如循其理若其當理道當猶實也人不見龍之飛舉而能髙者風雨奉之奉助也蠧衆則木折隙大則墻壞懸垂之類有時而隧隧墮也枝格之屬有時而弛弛落也當凍而不死者不失其適死乃為失適又死故曰不失其適也當暑而不暍者不亡其適亡亦失之未嘗適亡其適亡無也言不凍亦暍何適之有湯沐具而蟣虱相弔大厦成而燕雀相賀厦屋也憂樂别也栁下惠見飴曰可以養老盜跖見飴曰可以黏牡見物同而用之異牡門户籥牡也蠶食而不飲二十二日而化蟬飲而不食三十日而蜕蜉蝣不食不飲三日而死人食礜譽石而死蠶食之而不饑礜石出隂山一曰能殺鼠魚食巴菽而死鼠食之而肥菽豆總名類不可必推瓦以火成不可以得火竹以水生不可以得水瓦得火則破竹得水浸則死揚堁而欲弭塵被裘而以翣翼豈若適衣而已哉堁土塵也楚人謂之堁翣扇也槁竹有火弗鑽不燋土中有水弗掘無泉蠬象之病人之寶也蠬大蛤中有珠象牙還以自疾故人得以為寶人之病將有誰寶之者乎人之利欲為病無人寶之為酒人之利而不酤則竭為車人之利而不僦則不達握火提人反先之熱背一介之人物思自守者不欲使酒人車人得利不酟僦而先自竭先不達猶以火投人先自熱爛也隣之母死往哭之妻死而不泣有所劫以然也嫌於情色故曰有所劫迫之然如是也西方之倮國鳥獸弗辟與為一也一同也倮國在西南方一膞轉炭熯一膞一挺也掇之則爛指萬石俱熯去之十步而不死同氣異積大勇小勇有似於此今有六尺之廣卧而越之下材弗難植而踰之上材弗易勢施異也百梅足以為百人酸一梅不足以為一人和喻衆能濟少少不能有所成也有以飰死者而禁天下之食有以車為敗者而禁天下之乗則悖矣申生雉經晉不絶繩子胥自沉吳不斷水釣者静之􅷟于者扣舟罩者抑之罣者舉之為之異得魚一也􅷟者以柴積水中以取魚扣擊也魚聞擊舟聲藏柴下壅而取之也見象牙乃知其大於牛見虎尾而知其大於狸一節見而百節知也吳伐越至㑹稽獨獲骨節專車見一節大餘節不得小故曰百節知小國不鬬於大國之間畏見嫌也兩鹿不鬬於伏兕之旁畏見食也佐祭者得嘗救鬬者得傷䕃不祥之木為雷電所撲䕃木影撲擊也或謂冢或謂隴或謂笠或謂簦登頭虱與空木之瑟名同實異也頭中虱空木瑟其音同其實則異也日月欲明而浮雲蓋之蘭芝欲脩而秋風敗之虎有子不能搏攫者輒殺之為墮武也墮廢也武威之也龜紐之璽賢者以為佩龜紐之璽衣印也紐係佩服也土壤布在田能者以為富能動者播植嘉穀以為饒富也予拯溺者金玉不若尋常之纒索金玉雖寶非拯溺之具故曰不如尋常之纒索視書上有酒者下必有肉上有年者下必有月以類而取之􅂪塵而眯固其理也為其不出户而堁之也為不出户而塵堁眯之非其道屠者羮藿為車者步行陶者用缺盆匠人處狹廬為者不得用用者弗肯為為者不得用以利動也用者不肯為以富寵也轂立三十輻各盡其力不得相害使一輻獨入衆輻皆棄豈能致千里哉夜行者掩目而前其手涉水者解其馬載之舟事有所宜而有所不施橘柚有鄉雚歡葦有叢獸同足者相從遊鳥同翼者相從翔以類聚也田中之潦流入於海附耳之言聞於千里也附近也近耳之言謂竊語聞於千里千里知之語曰欲人不知莫如不為蘇秦步曰何故趍曰何趍馳有為則議多事固苛蘇秦為多事之人故見議見苛也皮將弗覩毛將何顧畏首畏尾身凡有幾畏始畏終中身不畏凡有幾何言常畏也欲觀九州之土足無千里之行心無政敎之原而欲為萬民之上則難無其術故曰難的的者獲提提者射的的明也為衆所見故獲提提安也若鳥不飛獸不走提提安時故為人所射故大白若辱大徳若不足若辱自同於衆人若不足者實若虛之貌未嘗稼穡粟滿倉未嘗桑蠶絲滿囊得之不以道用之必橫海不受流胔慈太山不上小人骨有肉曰胔冇不義之祥流入海海神蕩而出之故曰不受太山東嶽也王者所封禪處不令􅓇亂小人得上其上也旁光不升俎旁光胞也俎豆之實唯肩髀而脇肋不得升也駠留駮不入牲犧牲以純色也中夏用箑㰱快之至冬而不知去褰衣涉水至陵而不知下未可以應變有山無林有谷無風有石無金林生於山山未必皆有林風出於谷谷未必皆有風金生於石石未必皆有金喻聖人出衆人衆人未必皆聖賢也滿堂之坐視鉤各異滿堂坐人視其鉤各異形於環帶一也鉤與環帶一法也類雖異所用者同獻公之賢欺於孋姬殺申生也叔孫之知欺於竪牛三日不食而餓死也故鄭詹入魯春秋曰佞人來佞人來鄭詹鄭文公大夫以齊桓公卒不使鄭伯朝齊而使朝於楚齊人執之自齊逃至魯魯謂之佞人君子有酒鄙人鼓缶雖不見好亦不見醜醜惡也人性便絲衣帛或射之則被鎧甲為其所不便以得所便便利也輻之入轂各值其鑿不得相通猶人臣各守其職不得相干干亂也嘗被甲而免射者被而入水嘗抱壺而度水者抱而􅂪火可謂不知類矣君子之居民上若以腐索御奔馬若􅡮薄冰蛟在其下若入林而遇乳虎言常驚懼恐也化不洽於民民不附善用人者若蚈之足衆而不相害若脣之與齒堅柔相摩而不相敗摩近敗毁也清􅭎㼜之美始於耒耜􅭎清酒也黼黻之美在于杼軸白與黑為黼青與赤為黻皆文衣也布之新不如紵紵之弊不如布或善為新或惡為故善猶宜也􅩷業䩉付在頰則好在顙則醜􅩷䩉者頰上窐也窐者在顙以槃故醜繡以為裳則宜以為冠則譏譏人非之也馬齒非牛蹏檀根非椅枝故見其一本而萬物知知猶别也石生而堅蘭生而芳少自其質長而愈明質性也明猶盛也扶之與提謝之與讓故之與先諾之與己也相去千里汙準而粉其顙腐鼠在壇楚人謂中庭為壇燒薰於官入水而憎濡懷臭而求芳雖善者弗能為工善或作巧也再生者不穫華大旱者不胥時落不胥時落不待秋時而零落也母曰不幸甑終不墮井抽簮招燐有何為驚燐血精似野火招之應聲而至血灑汙人以簮招則不至故曰何驚也使人無度河可中河使無度不可見虎一文不知其武一文一斑也見驥一毛不知善走水蠆為䗓聰孑廉孑為蟁水蠆化為䗓䗓青蜓也孑孑結蠆水上致跂蟲兔齧為螚兔所齧草靈在其心中化為螚一説兔齧蟲名螚音那物之所為出於不意弗知者驚知者不怪銅英青金英黃玉英白黂燭捔膏燭澤也燭光捔澤喻光明有明昧也以微知明以外知内象肉之味不知於口鬼神之貌不著於目捕景之説不形於心皆所不嘗見之冬冰可折夏木可結時難得而易失木方盛茂終日采而不知秋風下霜一夕而殫殫盡也病熱而强之餐救暍而飲之寒救經而引其索拯溺而授之石欲救之反為惡惡猶害也雖欲謹亡馬不發户轔言馬亡不可發户限而求轔户限也楚人謂之轔轔音璘雖欲豫就酒不懐蓐孟賁探鼠穴鼠無時死必噬其指失其勢也孟賁勇士為探鼠於穴故曰失其勢山雲蒸柱礎楚潤礎柱下石礩也伏苓掘兔絲死所生者亡故死一家失熛標百家皆燒讒夫隂謀百姓暴骸粟得水濕而熱甑得火而液水中有火火中有水疾雷破石隂陽相薄湯沐之於河有益不多流潦注海雖不能益猶愈於己已止也一目之羅不可以得鳥無餌之釣不可以得魚遇士無禮不可以得賢兔絲無根而生蛇無足而行魚無耳而聽蟬無口而鳴有然之者也然如是也鶴夀千歳以極其游蜉蝣朝生而暮死而盡其樂脩短各得其志紂醢梅伯文王與諸侯構之構謀也桀辜諫者湯使人哭之哭猶弔也狂馬不觸木猘制狗不自投於河雖聾蟲而不自陷又況人乎聾無知也愛熊而食之鹽愛獺而飲之酒雖欲養之非其道熊食鹽而死獺飲酒而敗故曰非其道也心所説毁舟為枤第心所欲毁鍾為鐸鐸大鈴金口木舌為木鐸金舌為金鐸杕舟尾也管子以小辱成大榮管仲相子紏不能死為魯所囚是其辱卒相桓公以至霸是其大榮也蘇秦以百誕成一誠誠信也質的張而弓矢集林木茂而斧斤入非或召之形勢所致者也待利而後拯溺人亦必以利溺人矣利溺人者利人之溺得其利也舟能沉能浮愚者不加足舟船能載浮物愚者不敢加足畏其沉也騏驥驅之不進引之不止人君不以取道里刺我行者欲與我交訾我貨者欲與我市刺非訾毁也以水和水不可食一絃之瑟不可聽以其失和故不可聽刺專用也駿馬以抑死直士以正窮賢者擯於朝美女擯於宫擯棄也行者思於道而居者夢於牀慈母吟於巷適子懷於荆精相往來也赤肉懸則烏鵲集鷹隼鷙則衆鳥散物之散聚交感以然食其食者不毁其器食其實者不折其枝塞其源者竭背其本者枯交畫不暢連環不解其解之不以解暢達也不得達至也交止也解連環言不可解則得解也臨河而羨魚不如歸家織網明月之珠蠬之病而我之利虎爪象牙禽獸之利而我之害易道良馬使人欲馳飲酒而樂使人欲謌是而行之故謂之㫁非而行之必謂之亂㫁猶治也矢疾不過二里也步之遲百舍不休千里可致聖人處於隂衆人處於陽聖人行於水衆人行於霜水有形而不可毁故聖人行之無迹霜雪履有迹故衆人行之也異音者不可聽以一律異形者不可合於一體合同也農夫勞而君子養焉君子國君養焉以化澤噢休之愚者言而智者擇焉擇可用者而用之也捨茂林而集於枯不弋鵠而弋烏難與有圖圖謀也言其愚也寅邱無壑泉源不溥言汙小潦水名寅寅之邱無大壑故泉流不得溥也尋常之谿灌千頃之澤言有源也見之明白處之如玉石見之闇昧必留其謀玉之與石言可别也闇晦不明留猶思謀也以天下之大託於一人之才譬若懸千鈞之重於木之一枝負子而登牆謂之不祥為其一人隕而兩人傷負抱也隕墜也善舉事者若乗舟而悲謌一人唱而千人和言能得衆人之心也不能耕而欲黍粱不能織而喜采裳無事而求其功難矣有榮華者必有憔悴有羅紈者必有麻蒯言有盛必有衰也鳥有沸波者河伯為之不潮畏其誠也鳥大鵰也翺翔水上扇魚令出沸波攫而食之故河伯深藏於淵畏其精誠為不見故一夫出死千乗不輕主術篇曰兵莫􅉃於志莫邪為下言匹夫志意出死必戰故雖大國兵車千乗不輕之也蝮蛇螫人傅以和堇則愈和堇野葛毒藥物故有重而害反為利者聖人之處亂世若夏暴而待暮夏日中甚熱暮凉時言聖人居亂世忍以待凉桑榆之間逾易忍也言亂世將盡如日在西方桑榆間將夕故曰易忍水雖平必有波衡雖正必有差尺寸雖齊必有詭詭不同也非規矩不能定方圓非準繩不能正曲直用規矩準繩者亦有規矩準繩焉舟覆乃見善游馬奔乃見良御善游故覆舟不溺良御馬奔車不敗故見之嚼而無味者弗能内於喉視而無形者不能思於心形象無形於目不能思之於心兕虎在於後隨侯之珠在於前弗及掇者先避患而後就利隨國在漢東姬姓之後出遊於野見大蛇㫁在地隨侯令醫以續傅㫁蛇蛇得愈去後衘大珠報葢明月之珠因號隨侯之珠世以為寶也逐鹿者不顧兔決千金之貨者不爭銖兩之價言在大不顧小弓先調而後求勁馬先馴而後求良勁强馴擾也人先信而後求能人非信不立也陶人棄索車人掇之屠者棄銷而鍛者拾之所緩急異也百星之明不如一月之光十牖畢開不若一户之明矢之於十步貫兕甲及其極不能入魯縞言勢有極也太山之髙背而弗見秋毫之末視之可察山生金反自刻木生蠧反自食人生事反自賊賊敗也害也物自然也巧冶不能鑄木工匠不能斵金者形性然也白玉不雕美珠不文質有餘也性自然不復飾故跬步不休跛鼈千里跬猶咫尺也累積不輟可成邱阜輟止也城成於土木直於下非有事焉所縁使然凡用人之道若以燧取火疏之則弗得疏猶遲也數之則弗中數猶疾也正在疏數之間得其節火乃生從朝視夕者移從枉準直者虧聖人之偶物也若以鏡視形曲得其情偶猶周也楊子見逵路而哭之為其可以南可以北道九達曰逵墨子見練絲而泣之為其可以黃可以黑練白也趍舍之相合猶金石之一調相去千歳合一音也金曰鐘石曰磬雖久不變故曰相去千歳合一音也鳥不干防者雖近弗射鳥燕之屬是也其當道雖逺弗釋當道為作防害者故曰不釋也酤酒而酸買肉而臭然酤酒買肉不離屠沽之家故求物必於近之者以詐應詐以譎應譎若披簑而救火毁瀆而止水乃愈益多西施毛嬙狀貌不可同世稱其好美鈞也堯舜禹湯法籍殊類得民心一也聖人者隨時而舉事因資而立功涔則具擢對旱則修土龍擢對貯水器也土龍致雨物也臨菑之女織紈而思行者為之悖戾臨菑齊都悖麤惡也室有美容繒為之纂繹不宻緻志有感故纂徵羽之操不入鄙人之耳徵羽正音小人不知不入其耳軫和切適舉坐而善軫轉也轉其和更作急調激楚之音非正樂故舉坐而善之也過府而負手者希不有盜心府藏貨所生也故侮人之鬼者過社而搖其枝侮猶病也晉陽處父伐楚以救江故解捽者不在於捌格在於批伔批擊也伔推擊其要也伔音沉木大者根㩴山髙者基扶蹠巨者志逺體大者節疏狂者傷人莫之怨也嬰兒詈老莫之疾也賊心􅀢賊害也􅀢音忙尾生之信不如隨牛之誕尾生効信於婦人信之失隨牛弦髙矯君命為誕以存國故不如隨牛之誕也而又況一不信者乎一猶常也況常不為信不為誕乎憂父之疾者子治之者醫進獻者祝治祭者庖庖宰也淮南鴻烈解卷十七
