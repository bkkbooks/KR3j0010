body:
  text: 淮南鴻烈解卷二十一漢髙誘注要畧凡鴻烈之書二十篇畧數其要明其所指序其㣲妙論其大體故曰要畧夫作為書論者所以紀綱道德經緯人事上考之天下揆之地中通諸理雖未能抽引元妙之中才繁然足以觀終始矣總要舉凡而語不剖判純撲靡散大宗純撲太素也大宗事本也懼為人之惽惽然弗能知也故多為之辭博為之説又恐人之離本就末也故言道而不言事則無以與世浮沉言事而不言道則無以與化遊息故著二十篇有原道有俶真有天文有地形有時則有覽𠖇有精神有本經有主術有繆稱有齊俗有道應有氾論有詮言有兵畧有説山有説林有人間有修務有泰族也原道者盧牟六合盧牟由規模也混沌萬物象太一之容太一之容北極之氣合為一體也測窈㝠之深以翔虚無之軫軫道畛也託小以苞大守約以治廣使人知先後之禍福動静之利害誠通其志浩然可以大觀矣欲一言而寤覺也則尊天而保真欲再言而通則賤物而貴身欲參言而究則外物而反情執其大指以内洽五藏瀐箋濇肌膚被服法則而與之終身所以應待萬方覽耦百變也耦通也若轉丸掌中足以自樂也俶真者窮逐終始之化嬴垀呼無有之精嬴繞匝也垀靡煩也離别萬物之變合同死生之形使人遺物反己審仁義之問通同異之理觀至德之統知變化之紀説符元妙之中通廻造化之母也造化之母元氣太一之初天文者所以和隂陽之氣理日月之光節開塞之時列星辰之行知逆順之變避忌諱之殃順時運之應法五神之常使人有以仰天承順而不亂其常者也地形者所以窮南北之修極東西之廣經山陵之形區川谷之居明萬物之主知生類之衆列山淵之數規逺近之路使人通廻回周備不可動以物不可驚以怪者也時則者所以上因天時下盡地力據度行當合諸人則刑十二節一月為人一節以為法式終而復始歲終十二月從正月始也轉於無極因循倣依以知禍福操舍開塞各有龍忌中國以鬼神之日忌北胡南越皆謂之請龍發號施令以時教期使君人者知所以從事覽㝠者所以言至精之通九天也至㣲之淪無形也純粹之入至清也昭昭之通㝠㝠也乃始攬物物引類覽取撟掇撟取也掇拾也浸想宵類浸㣲視也宵物似也類衆也物之可以喻意象形者乃以穿通窘滯决瀆壅塞引人之意繫之無極乃以明物類之感同氣之應隂陽之合形埒之朕所以令人逺觀博見者也精神者所以原本人之所由生而曉寤其形骸九竅取象與天合同其血氣與雷霆風雨比類其喜怒與晝宵寒暑竝明審死生之分别同異之跡節動静之機以反其性命之宗所以使人愛養其精神撫静其䰟􅅎不以物易己而堅守虚無之宅者也本經者所以明大聖之德通維初之道埒畧衰世古今之變以褒先聖之隆盛而貶末世之曲政也所以使人黜耳目之聰明精神之感動樽流遁之觀樽止也流遁披散也節養性之和分帝王之操列小大之差者也主術者君人之事也所以因作任督責使羣臣各盡其能也明攝權操柄以制羣下提名責實提挈也考之參伍所以使人主秉數持要不妄喜怒也其數直施而正邪外私而立公使百官條通而輻輳名務其業人致其功此主術之明也繆稱者破碎道徳之論差次仁義之分畧雜人間之事總同乎神明之德假象取耦以相譬喻㫁短為節以應小具所以曲説攻論應感而不匱者也齊俗者所以一羣生之短脩同九夷之風氣通古今之論貫萬物之理財制禮義之宜擘畫人事之終始者也道應者攬掇遂事之蹤追觀往古之跡察禍福利害之反考驗乎老莊之術而以合得失之勢者也氾論者所以箴縷縩菜繺煞之間縩綃煞也㩥先揳恰唲哇齵隅之郄隙也㩥蒒也揳塞也唲齵錯梧也接徑直施以推本樸而兆見得失之變利病之反所以使人不妄没於勢利不誘惑於事態有符曮晲兼稽時勢之變而與化推移者也詮言者所以譬類人事之指解喻治亂之體也差擇㣲言之眇詮以至理之文而補縫過失之闕者也兵畧者所以明戰勝攻取之數形機之勢詐譎之變體因循之道操持後之論也持後不敀為主而為客也所以知戰陣分争之非道不行也知攻取堅守之非徳不強也誠明其意進退左右無所失擊危乘勢以為資清静以為常避實就虚若驅羣羊此所以言兵也說山説林者所以竅窕穿鑿百事之壅遏而通行貫扄萬物之窒塞者也假譬取象異類殊形以領理人之意懈墮結細説捍摶囷摶圎也囷芼也而以明事埒事者也埒兆朕也人間者所以觀禍福之變察利害之反鑚脉得失之跡標舉終始之壇也標末也壇塲也分别百事之㣲敷陳存亡之機使人知禍之為福亡之為得成之為敗利之為害也誠喻至意則有以傾側偃仰世俗之間而無傷乎讒賊螫毒者也修務者所以為人之於道未淹味論未深見其文辭反之以清浄為常恬淡為本則懈墮分學縱欲適情欲以偷自佚而塞於大道也今夫狂者無憂聖人亦無憂聖人無憂和以德也狂者無憂不知禍福也故通而無為也與塞而無為也同其無為則同其所以無為則異故為之浮稱流說其所以能聼所以使學者孳孳以自幾也泰族者横八極致髙崇上明三光下和水土經古今之道治倫理之序總萬方之指而歸之一本以經緯治道紀綱王事乃原心術理情性以館清平之靈澄澈神明之精以與天和相嬰薄嬰繞抱也所以覽五帝三王懐天氣抱天心執中含和德形於内以莙凝天地發起隂陽序四時正流方綏之斯寧推之斯行乃以陶冶萬物遊化羣生唱而和動而隨四海之内一心同歸故景星見祥風至風不鳴條也黄龍下鳯巢列樹麟止郊野徳不内形而行其法藉專用制度神祗弗應福祥不歸四海弗賔兆民弗化故徳形於内治之大本此鴻烈之泰族也凡屬書者所以窺道開塞庶後世使知舉錯取捨之宜適外與物接而不眩内有以處神養氣宴煬至和而已自樂所受乎天地者也故言道而不明終始則不知所倣依言終始而不明天地四時則不知所避諱言天地四時而不引譬援類則不識精㣲言至精而不原人之神氣則不知養生之機原人情而不言大聖之徳則不知五行之差言帝道而不言君事則不知小大之衰言君事而不為稱喻則不知動静之宜言稱喻而不言俗變則不知合同大指已言俗變而不言往事則不知道德之應知道徳而不知世曲則無以耦萬方知氾論而不知詮言則無以從容通書文而不知兵指則無以應卒已知大畧而不知譬諭則無以推明事知公道而不知人間則無以應禍福知人間而不知修務則無以使學者勸力欲強省其辭覽總其要弗曲行區入則不足以窮道德之意故著書二十篇則天地之理究矣人間之事接矣帝王之道備矣其言有小有巨有㣲有粗指奏卷異各有為語今專言道則無不在焉然而能得本知末者其唯聖人也今學者無聖人之才而不為詳説則終身顛頓乎混溟之中而不知覺寤乎昭明之術矣今易之乾坤足以窮道通意也八卦可以識吉凶知禍福矣然而伏羲為之六十四變周室増以六爻周室謂文王也所以原測淑清之道而􅫵窘逐萬物之祖也夫五音之數不過宫商角徵羽然而五弦之琴不可鼓也必有細犬駕和而後可以成曲今畵龍首觀者不知其何獸也具其形則不疑矣今謂之道則多謂之物則少謂之術則博謂之事則淺推之以論則無可言者所以為學者固欲致之不言而已也夫道論至深故多為之辭以抒其情萬物至衆故博為之説以通其意辭雖壇卷連漫絞紛逺援所以洮汰滌蕩至意洮汰潤也使之無凝竭底滯捲握而不散也夫江河之腐胔慈不可勝數然祭者汲焉大也一盃酒白蠅漬其中匹夫弗嘗者小也誠通乎二十篇之論睹凡得要以通九野徑十門八方上下也外天地捭山川捭屏去也其於逍遙一世之間宰匠萬物之形亦優游矣若然者挾日月而不烑挾至也烑音姚光也潤萬物而不耗曼兮洮兮足以覽矣藐兮浩兮曠曠兮可以游矣文王之時紂為天子賦歛無度戮殺無止康梁沉湎宫中成市康梁耽樂也沉湎淫酒也成市言集者多也作為炮烙之刑刳諫者剔孕婦天下同心而苦之文王四世纍善太王王季文王武王凡四世也修德行義處岐周之間地方不過百里天下二垂歸之文王欲以卑弱制強㬥以為天下去殘除賊而成王道故太公之謀生焉太公為周陳隂符兵謀也文王業之而不卒武王繼文王之業用太公之謀悉索薄賦薄少也賦兵也躬擐甲胄擐貫著也以伐無道而討不義誓師牧野以踐天子之位天下未定海内未輯武王欲昭文王之令徳使夷狄各以其賄來貢遼逺未能至故治三年之䘮殯文王於兩楹之間殯大歛也兩楹堂柱之間賔主夾之以俟逺方武王立三年而崩成王在褓襁之中未能用事蔡叔管叔輔公子祿父祿父紂之兄子周封之以為殷後使管蔡監之而欲為亂周公繼文王之業持天子之政以股肱周室輔翼成王懼争道之不塞臣下之危上也故縱馬華山放牛桃林敗鼓折枹搢笏而朝以寧静王室鎮撫諸侯成王既壮能從政事周公受封於魯以此移風易俗孔子修成康之道述周公之訓以教七十子使服其衣冠修其篇籍故儒者之學生焉墨子學儒者之業受孔子之術以為其禮煩擾而不悦悦易也厚𦵏靡財而貧民服傷生而害事故背周道而用夏政禹之時天下大水禹身執虆雷垂以為民先剔河而道九岐剔洩去也九岐河水播岐為九以入海也鑿江而通九路江水通則為九辟五湖使水辟人而相從也而定東海當此之時燒不暇撌撌音喟排去也濡不給扢扢音亥拭也死陵者𦵏陵死澤者𦵏澤故節財薄𦵏閑服生焉齊桓公之時天子卑弱諸侯力征南夷北狄交伐中國中國之不絶如綫綫線也齊國之地東負海而北漳河地狭田少而民多智巧桓公憂中國之患苦夷狄之亂欲以存亡繼絶崇天子之位廣文武之業故管子之書生焉齊景公内好聲色外好狗馬獵射亡歸好色無辨辨别也作為路寢之䑓族鑄大鍾族聚也撞之庭下郊雉皆呴大鍾聲似雷震雉應而呴鳴也一朝用三千鍾贛鍾十斛也贛賜也一朝賜羣臣之費三萬斛也梁丘據子家噲導於左右二人者公臣也導諫也故晏子之諫生焉晩世之時六國諸侯谿異谷别水絶山隔各自治其境内守其分地握其權柄擅其政令下無方伯上無天子力征争權勝者為右恃連與國約重致剖信符結逺援以守其國家持其社稷故縱横修短生焉申子者韓昭釐之佐韓晉别國也地墽敲民險而介於大國之間晉國之故禮未㓕韓國之新法重出先君之令未收後君之令又下新故相反前後相繆百官背亂不知所用故刑名之書生焉秦國之俗貪狼狼荒也強力寡義而趨利可威以刑而不可化以善可勸以賞而不可厲以名被險而帶河四塞以為固地利形便畜積殷富孝公欲以虎狼之勢而呑諸侯故商鞅之法生焉若劉氏之書淮南王自謂也觀天地之象通古今之事權事而立制度形而施宜原道之心合三王之風以儲與扈冶儲與猶攝業也扈冶廣大也元眇之中精揺靡覽楚人謂精進為精揺靡小皆覽之棄其畛挈楚人謂澤濁為畛挈斟其淑静以統天下理萬物應變化通殊類非循一跡之路守一隅之指拘繫牽連於物而不與世推移也故置之尋常而不塞布之天下而不窕窕緩也布之天下雖大不窕也淮南鴻烈解卷二十一
