body:
  text: 俶真訓有有始者有未始有有始者有未始有夫未始有有始者有有者有无者有未始有有無者所謂有始者繁憤未發萌兆牙蘖未有形埒无无蝡蝡將欲生興而未成物類有未始有有始者天氣始下地氣始上陰陽錯合相與優游競暢于宇宙之間被德含和繽紛蘢蓯欲與物接而未成兆朕有未始有夫未始者有有始者天含和而未降地懷氣而未揚虛无寂寞蕭條霄雿无有仿佛氣遂而大通冥冥者也有有者言萬物摻落根莖枝葉青蔥苓蘢蓶扈炫煌蠉飛蝡動蚑行噲息可切循把握而有數量有无者視之不見其形聽之不聞其聲捫之不可得也望之不可極也儲與扈冶浩浩瀚瀚不可隱儀揆度而通光燿者有未始有有无者包裹天地陶冶萬物大通混冥深閎廣大不可為外析毫剖芒不可為內无環堵之宇而生有无之根有未始有夫未始有有无者天地未剖陰陽未判四時未分萬物未生汪然平靜寂然清澄莫見其形若光燿之問於无有退而自失也曰予能有無而未能无无也及其為无无至妙何從及此哉夫大塊載我以形勞我以生逸我以老休我以死善我生者乃所以善吾死也夫藏舟於壑藏山於澤人謂之固矣雖然夜半有力者負而趨寐者不知藏小大有宜猶有所遁若藏天下於天下則无所遁其形矣物豈可謂无大揚攉乎一範人之形而猶喜若人者千變萬化而未始有極也弊而復新其為樂也可勝計邪譬若夢夢為鳥而飛於天夢為魚而沒於淵方其夢也不知其夢也覺而後知其夢也今將有大覺然後知今此之為大夢也始吾未生之時焉知生之樂也今吾未死又焉知死之不樂也昔公牛哀轉病也七日化為虎其兄掩戶而入覘之則虎搏而殺之是故文章成獸爪牙移易志與心變神與形化方其為虎也不知其嘗為人也方其為人也不知其且為虎也二者代謝舛馳各樂其成形狡猾鈍惽是非无端孰知其所萌夫水嚮冬則凝而為冰冰迎春則泮而為水冰水移易于前後若周員而趨孰暇知其所苦樂乎是故形傷于寒暑燥溼之虐者形苑而神壯神傷乎喜怒思慮之患者神盡而形有餘故罷馬之死也剝之若槁狡狗之死也割之猶濡是故傷死者其鬼嬈時既者其神漠是皆不得形神俱沒也夫聖人用心杖性依神相扶而得終始是故其寐不夢其覺不憂古之人有處混冥之中神氣不蕩于外萬物恬漠以愉靜攙搶衝杓之氣莫不彌靡而不能為害當此之時萬民倡狂不知東西含哺而游鼓腹而熙交被天和食于地德不以曲故是非相尤茫茫沆沆是謂大治於是在上位者左右而使之毋淫其性鎮撫而有之毋遷其德是故仁義不布而萬物蕃殖賞罰不施而天下賓服其道可以大美興而難以筭計舉也是故日計之不足而歲計之有餘夫魚相忘於江湖人相忘於道術古之真人立於天地之本中至優游抱德煬和而萬物炊累焉孰肯解構人間之事以物煩其性命乎夫道有經紀條貫得一之道連千枝萬葉是故貴有以行令賤有以忘卑貧有以樂業困有以處危夫大寒至霜雪降然後知松柏之茂也據難履危利害陳于前然後知聖人之不失道也是故能戴大員者履大方鏡太清者視大明立太平者處大堂能游冥冥者與日月同光是故以道為竿以德為綸禮樂為鉤仁義為餌投之於江浮之於海萬物紛紛孰非其有夫挾依於跂躍之術提挈人閒之際撢掞挺挏世之風俗以摸蘇牽連物之微妙猶得肆其志充其欲何況懷瓌瑋之道忘肝膽遺耳目獨浮游无方之外不與物相弊摋中徙倚无形之域而和以天地者乎若然者偃其聰明而抱其太素以利害為塵垢以死生為晝夜是故目觀玉輅琬象之狀耳聽白雪清角之聲不能以亂其神登千仞之谿臨蝯眩之岸不足以滑其和譬若鍾山之玉炊以鑪炭三日三夜而色澤不變則至德天地之精也是故生不足以使之利何足以動之死不足以禁之害何足以恐之明於死生之分達於利害之變雖以天下之大易骭之一毛无所概於志也夫貴賤之於身也猶條風之時麗也毀譽之於己也猶蚊䖟之一過也夫秉皓白而不黑行純粹而不糅處玄冥而不闇休于天鈞而不偽孟門終隆之山不能禁也唯體道能不敗湍瀨旋淵呂梁之深不能留也大行石澗飛狐句注之險不能難也是故身處江海之上而神游魏闕之下非得一原孰能至於此哉是故與至人居使家忘貧使王公簡其貴富而樂卑賤勇者衰其氣貪者消其欲坐而不教立而不議虛而往者實而歸故不言而能飲人以和是故至道无為一龍一蛇盈縮卷舒與時變化外從其風內守其性耳目不燿思慮不營其所居神者臺簡以游太清引楯萬物群美萌生是故事其神者神去之休其神者神居之道出一原通九門散六衢設於无垓坫之宇寂漠以虛無非有為於物也物以有為於己也是故舉事而順于道者非道之所為也非道之所施也夫天之所覆地之所載六合之所包陰陽之所呴雨露之所濡道德之所扶此皆生一父母而閱一和也是故槐榆與橘柚合而為兄弟有苗與三危通而為一家夫目視鴻鵠之飛耳聽琴瑟之聲而心在鴈門之間一身之中神之分離剖判六合之內一舉而千萬里是故自其異者視之肝膽胡越也自其同者視之萬物一圈也百家異說各有所出若夫墨楊申商之於治道猶蓋之一撩而輪之一輻有之可以備數無之未有害於用也已自以為獨擅之不通之于天地之情也今夫冶工之鑄器金踊躍于鑪中必有波溢而播棄者其中地而凝滯亦有以象於物者矣其形雖有所小周哉然未可以保於周室之九鼎也有況比於規形者乎其與道相去亦遠矣今夫萬物之䟽躍枝舉百事之莖葉條㮆皆本於一根而條循千萬也若此則有所受之矣而非所授者所受者无授也而无不受也无不受也者譬若周雲之蘢蓯遼巢彭而為雨沉溺萬物而不與為溼焉今夫善射者有儀表之度如工匠有規矩之數此皆有所得以至於妙然而奚仲不能為逢蒙造父不能為伯樂者是皆諭於一曲而不通于萬方之際也今以涅染緇則黑於涅以藍染青則青於藍涅非緇也青非藍也茲雖遇其母而无能復化已是何則以諭其轉而益薄也何況夫未始有涅藍造化之者乎其為化也雖鏤金石書竹帛何足以舉其數由此觀之物莫不生於有也小大優游矣夫秋毫之末淪於无間而復歸於大矣蘆符之厚通於无㙬而復反於敦龐矣若夫无秋毫之微蘆符之厚四達無境通于无圻而莫之要御夭遏者其襲微重妙挺挏萬物揣丸變化天地之閒何足以論之夫疾風㪍木而不能拔毛髮雲臺之高墮者折脊碎腦而蟁䖟適足以翾夫與蚑蟯同乘天機受形於一圈飛輕微細者猶足以脫其命又況未有類也由此觀之無形而生有形亦明矣是故聖人託其神於靈府而歸於萬物之初視於冥冥聽於无聲冥冥之中獨見曉焉寂漠之中獨有照焉其用之也以不用其不用也而後能用之其知之也乃不知其不知也而後能知之也夫天不定日月無所載地不定草木無所植所立於身者不寧是非無所形是故有真人然後有真知其所持者不明庸詎知吾所謂知之非不知歟今夫積惠重厚累愛襲恩以聲華嘔符嫗掩萬民百姓使之訢訢然人樂其性者仁也舉大功立顯名體君臣正上下明親䟽等貴賤存危國繼絕世決挐治煩興毀宗立無後者義也閉九竅藏心志棄聰明反無識芒然仿佯于塵埃之外而消搖于無事之業含陰吐陽而萬物和同者德也是故道散而為德德溢而為仁義仁義立而道德廢矣百圍之木斬而為犧尊鏤之以剞𠜾雜之以青黃華藻鎛鮮龍蛇虎豹曲成文章然其一斷在溝中比犧尊於溝中之斷則醜美有間矣然而失木性鈞也是故神越者其言華德蕩者其行偽至精亡於中而言行觀於外此不免以身役物矣夫趍舍行偽者為精求于外也精有湫盡而行無窮極則滑心濁神而惑亂其本矣其所守者不定而外淫於世俗之風所差跌者已斷而內以濁其清明是故躊躇以終而不得須臾恬淡矣是故聖人內修道術而不外飾仁義不知耳目之宜而游于精神之和若然者下揆三泉上尋九天橫廓六合揲貫萬物此聖人之游也若夫真人則動溶于至虛而游于滅亡之野騎蜚廉而從敦圄馳於外方休乎內宇燭十日而使風雨臣雷公役夸父妾宓妃妻織女天地之間何足以留其志是故虛無者道之舍平易者道之素夫人之事其神而嬈其精營慧然而有求於外此皆失其神明而離其宅也是故凍者假兼衣于春而暍者望冷風于秋夫有病於內者必有色於外矣夫梣木已青翳而蠃蠡瘉燭睆此皆治目之藥也人無故求此物者必有蔽其明者聖人之所以駭天下者真人未嘗過焉賢人之所以矯世俗者聖人未嘗觀焉夫牛蹏之涔無尺之鯉塊阜之山無丈之材所以然者何也皆其營宇狹小而不能容巨大也又況乎以無裹之者邪此其為山淵之勢亦遠矣夫人之拘於世也必形繫而神泄故不免於虛使我可係羈者必其命有在於外也至德之世甘瞑于溷澖之域而徙倚于汗漫之宇提挈天地而委萬物以鴻濛為景柱而浮楊乎無畛崖之際是故聖人呼吸陰陽之氣而群生莫不顒顒然仰其德以和順當此之時莫之領理決離隱密而自成渾渾蒼蒼純樸未散旁薄為一而萬物大優是故雖有羿之知而無所用之及世之衰也至伏羲氏其道昧昧芒芒然含德懷和被施頗烈而知乃始昧昧楙楙皆欲離其童蒙之心而覺視於天地之閒是故其德煩而不能一及至神農黃帝剖判大宗竅領天地襲九窾重九㙬提挈陰陽嫥捖剛柔枝解葉貫萬物百族使各有經紀條貫於此萬民睢睢盱盱然莫不竦身而載聽視是故治而不能和下棲遟至于昆吾夏后之世嗜欲連於物聰明誘於外而性命失其得施及周室澆淳散樸離道以偽儉德以行而巧故萌生周室衰而王道廢儒墨乃始列道而議分徒而訟於是博學以疑聖華誣以脅眾弦歌鼓舞緣飾詩書以買名譽於天下繁登降之禮飾紱冕之服聚眾不足以極其變積財不足以贍其費於是萬民乃始慲觟離跂各欲行其知偽以求鑿枘於世而錯擇名利是故百姓曼衍於淫荒之陂而失其大宗之本夫世之所以喪性命有衰漸以然所由來者久矣是故聖人之學也欲以反性於初而游心於虛也達人之學也欲以通性於遼廓而覺於寂漠也若夫俗世之學也則不然擢德搴性內愁五藏外勞耳目乃始招蟯振繾物之豪芒搖消掉捎仁義禮樂暴行越智於天下以招號名聲於世此我所羞而不為也是故與其有天下也不若有說也與其有說也不若尚羊物之終始而條達有無之際也是故舉世而譽之不加勸舉世而非之不加沮定于死生之境而通于榮辱之理雖有炎火洪水彌靡於天下神無虧缺於胸臆之中矣若然者視天下之閒猶飛羽浮芥也熟肯分分然以物為事也水之性真清而土汩之人性安靜而嗜欲亂之夫人之所受於天者耳目之於聲色也口鼻之於臭味也肌膚之於寒燠其情一也或通於神明或不免於癡狂者何也其所為制者異也是故神者智之淵也神清則智明矣智者心之府也智公則心平矣人莫鑑於流潦而鑒於止水者以其靜也莫窺形於生鐵而窺形於明鏡者以其易也夫唯易且靜故能形物之性情也由此觀之用也者必假之於弗用者也是故虛室生白吉祥止也夫鑑明者塵垢弗能薶神清者嗜欲弗能亂精神已越於外而事復返之是失之於本而求之於末也外內无符而欲與物接弊其玄光而求知之于耳目是釋其炤炤而道其冥冥也是之謂失道心有所至而神喟然在之反之於虛則消鑠滅息此聖人之游也故古之治天下也必達乎性命之情其舉錯未必同也其合於道一也夫夏日之不被裘者非愛之也燠有餘於身也冬日之不用翣者非𥳑之也凊有餘於適也夫聖人量腹而食度形而衣節於己而已貪污之心奚由生哉故能有天下者必無以天下為者也能有名譽者必無以趨行求者也聖人有所于達達則嗜慾之心外矣孔墨之弟子皆以仁義之術教導於世然而不免於儡身猶不能行也又況所教乎是何則其道外也夫以末求返于本許由不能行也又況齊民乎誠達于性命之情而仁義固附矣趨捨何足以滑心若夫神無所掩心無所載通洞條達恬漠無事無所凝滯虛寂以待勢利不能誘也辯者不能說也聲色不能淫也美者不能濫也知者不能動也勇者不能恐也此真人之遊也若然者陶冶萬物與造化者為人天地之閒宇宙之內莫能夭遏夫化生者不死而化物者不化神經於驪山太行而不能難入於四海九江而不能濡處小隘而不塞橫扃天地之閒而不窕不通此者雖目數千羊之群耳分八風之調足蹀陽阿之舞而手會綠水之趨智絡天地明照日月辯解連環辭潤玉石猶無益於治天下也靜漠恬澹所以養性也和愉虛無所以養德也外不滑內則性得其宜性不動和則德安其位養生以經世抱德以終年可謂能體道矣若然者血脈無鬱滯五藏無蔚氣禍福弗能撓滑非譽弗能塵垢故能致其極非有其世孰能濟焉有其人不遇其時身猶不能脫又況無道乎且人之情耳目應感動心志知憂樂手足之㩌疾蛘辟寒暑所以與物接也蜂蠆螫指而神不能憺蚊䖟噆膚而性不能平夫憂患之來攖人心也非直蜂蠆之螫毒而蚊䖟之慘怛也而欲靜漠虛无奈之何哉夫目察秋毫之末者耳不聞雷霆之音耳調玉石之聲者目不見太山之形何則小有所志而大有所忘也今萬物之來擢拔吾性攓取吾情有若泉源雖欲勿稟其可得耶今夫樹木者灌以水疇以肥壤十人養之一人拔之則必無餘㮆有況與一國同伐之哉雖欲久生豈可得乎今盆水在庭清之終日未能見眉睫濁之不過一撓而不能察方員人神易濁而難清猶盆水之類也況一世而撓滑之曷得須臾平乎古者至德之世賈便其肆農樂其業大夫安其職而處士循其道當此之時風雨不毀折草木不夭死九鼎重珠玉潤澤洛出丹書河出綠圖故許由方回善卷披衣得達其道何則世之主有欲利天下之心是以人得自樂其閒四子之才非能盡善蓋今之世也然莫能與之同光者遇唐虞之時逮至夏桀殷紂燔生人辜諫者為炮格鑄金柱剖賢人之心析才士之脛醢鬼侯之女葅梅伯之骸當此之時嶢山崩三川涸飛鳥鎩翼走獸廢腳當此之時豈獨無聖人哉然而不能通其道者不遇其世天鳥飛千仞之上獸走叢薄之中禍猶及之又況編戶齊民乎由此觀之體道者不專在於我亦有繫於世者矣夫歷陽之都一夕反而為湖勇力聖知與罷怯不肖者同命巫山之上順風縱火膏夏紫芝與蕭艾俱死故河魚不得明目穉稼不得育時其所生者然也故世治則愚者不得獨亂世亂則智者不能獨治身陷于濁世之中而責道之不行也是猶兩絆騏驥而求其致千里也置猨檻中則與豚同非不巧捷也無所肆其能也舜之耕陶也不能利其里南面王則德施乎四海仁非能益也處便而勢利也古之聖人其和愉寧靜性也其志得道行命也是故性遭命而後能行命得性而後能明烏號之弓谿子之弩不能無弦而射越舲蜀艇不能無水而浮今矰繳機而在上網罟張而在下雖欲翱翔其勢焉得故詩云采采卷耳不盈傾筐嗟我懷人寘彼周行以言慕遠世也
