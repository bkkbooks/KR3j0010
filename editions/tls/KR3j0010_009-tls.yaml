body:
  text: 主術訓人主之術處无為之事而行不言之教清靜而不動一度而不搖因循而任下責成而不勞是故心知規而師傅諭道口能言而行人稱辭足能行而相者先導耳能聽而執正進諫是故慮无失策舉无過事言為文章而行為儀表於天下進退應時動靜循理不為醜美好憎不為賞罰怒喜名各自名類各自類事猶自然莫出於己故古之王者冕而前旒所以蔽明也黈纊塞耳所以掩聰也天子外屏所以自障也故所理者遠則所在者邇所治者大則所守者小夫目妄視則淫耳妄聽則惑口妄言則亂夫三關者不可不慎守也若欲規之乃是離之若欲飾之乃是賊之天氣為魂地氣為魄反之玄房各處其宅守而勿失上通太一太一之精通合於天天道玄默无容无則天不可極深不可測尚與人化知不能得昔者神農之治天下也神不馳於胸中智不出於四域懷其仁成之心甘雨時降五穀蕃植春生夏長秋收冬藏月省時考歲終獻功以時嘗穀祀于明堂明堂之制有蓋而無四方風雨不能襲寒暑不能傷遷延而入之養民以公其民樸重端愨不忿爭而財足不勞形而功成因天地之資而與之和同是故威厲而不試刑錯而不用法省而不煩故其化如神其地南至交阯北至幽都東至湯谷西至三危莫不聽從當此之時法寬刑緩囹圄空虛而天下一俗莫懷姦心末世之政則不然上好取而无量下貪狼而无讓民貧苦而忿爭事力勞而无功智詐萌興盜賊滋彰上下相怨號令不行執政有司不務反道矯拂其本而事修其末削薄其德曾累其刑而欲以為治无以異於執彈而來鳥揮梲而狎犬也亂乃逾甚夫水濁則魚噞政苛則民亂故夫養虎豹犀象者為之圈檻供其嗜欲適其飢飽達其怒恚然而不能終其天年者刑有所劫也是以上多故則下多詐上多事則下多能上煩擾則下不定上多求則下交爭不直之於本而事之於末譬猶揚堁而弭塵抱薪以救火也故聖人事省而易治求寡而易贍不施而仁不言而信不求而得不為而成塊然保真抱德推誠天下從之如響之應聲景之像形其所修者本也刑罰不足以移風殺戮不足以禁姦唯神化為貴至精為神夫疾呼不過聞百步志之所在喻于千里冬日之陽夏日之陰萬物歸之而莫使之然故至精之像弗招而自來不麾而自往窈窈冥冥不知為之者誰而功自成智者弗能誦辯者弗能形昔孫叔敖恬臥而郢人无所容其鋒市南宜遼弄丸而兩家之難無所關其辭鞼鞈鐵鎧瞋目扼𢯲其於以御兵刃緜矣券契束帛刑罰斧鉞其於以解難薄矣待目而照見待言而使令其於為治難矣蘧伯玉為相子貢往觀之曰何以治國曰以弗治治之簡子欲伐衛使史黯往䚍焉還反報曰蘧伯玉為相未可以加兵固塞險阻何足以致之故皋陶瘖而為大理天下無虐刑有貴于言者也師曠瞽而為太宰晉无亂政有貴于見者也故不言之令不視之見此伏犧神農之所以為師也故民之化上也不從其所言而從其所行故齊莊公好勇不使鬭爭而國家多難其漸至于崔杼之亂頃襄好色不使風議而民多昏亂其積至于昭奇之難故至精之所動若春氣之生秋氣之殺也雖馳傳騖置不若此其亟故君人者其猶射者乎於此豪末於彼尋常矣故慎所以感之也夫榮啟期一彈而孔子三日樂感于和鄒忌一徽而威王終夕悲感于憂動諸琴瑟形諸音聲而能使人為之哀樂縣法設賞而不能移風易俗者其誠心弗施也甯戚商歌車下桓公喟然而寤矣至精入人深矣故曰樂聽其音則知其俗見其俗則知其化孔子學鼓琴於師襄而諭文王之志見微以知明也延陵季子聽魯樂而知殷夏之風論近以識遠也作之上古施及千歲而文不滅況於並世化民乎湯之時七年旱以身禱於桑林之際而四海之雲湊千里之雨至抱質效誠感動天地神諭方外令行禁止豈足為哉古聖王至精形於內而好憎忘於外出言以副情發號以明旨陳之以禮樂風之以歌謠葉貫萬世而不壅橫扃四方而不窮禽獸昆蟲與之陶化又況於執法施令乎故太上神化其次使不得為非其次賞賢而罰暴衡之於左右無私輕重故可以為平繩之於內外無私曲直故可以為正人主之於用法無私好憎故可以為命夫權輕重不差蟁首扶撥枉橈不失箴鋒直施矯邪不私辟險姦不能枉讒不能亂德無所立怨無所藏是任術而釋人心者也故為治者智不與焉夫舟浮於水車轉於陸此勢之自然也木擊折軸石戾破舟不怨木石而罪巧拙者知故不載焉是故道有智則惑德有心則險心有目則眩兵莫憯於意志而莫邪為下寇莫大於陰陽而枹鼓為小今夫權衡規矩一定而不易不為秦楚變節不為胡越改容常一而不邪方行而不流一日刑之萬世傳之而以無為為之故國有亡主而世無廢道人有困窮而理無不通由此觀之無為者道之宗故得道之宗應物無窮任人之才難以至治湯武聖主也而不能與越人乘軨舟而浮於江湖伊尹賢相也而不能與胡人騎騵馬而服騊駼孔墨博通而不能與山居者入榛薄出險阻也由此觀之則人知之於物也淺矣而欲以偏照海內存萬方不因道理之數而專己之能則其窮不遠矣故智不足以治天下也桀之力制觡伸鉤索鐵歙金椎移大犧水殺黿鼉陸捕熊羆然湯革車三百乘困之鳴條擒之焦門由此觀之勇不足以持天下矣智不足以為治勇不足以為強則人材不足任明也而君人者不下廟堂之上而知四海之外者因物以識物因人以知人也故積力之所舉則無不勝也眾智之所為則無不成也埳井之無黿鼉隘也園中之無脩木小也夫舉重鼎者少力而不能勝也及至其移徙之不待其多力者故千人之群無絕梁萬人之聚無廢功夫華騮綠耳一日而至千里然其使之搏兔不如狼契伎能殊也鴟夜撮蚤察分秋豪晝日瞋目不能見丘山形性詭也夫螣蛇游霧而騰應龍乘雲而舉猨得木而捷魚得水而騖故古之為車也漆者不畫鑿者不斲工無二伎士不兼官各守其職不得相姦人得其宜物得其安是以器械不苦而職事不嫚夫責少者易償職寡者易守任輕者易勸上操約省之分下效易為之功是以君臣彌久而不相猒君人之道其猶零星之尸也儼然玄默而吉祥受福是故得道者不偽醜飾不偽善極一人被之而不襃萬人蒙之而不褊是故重為惠重為暴則治道通矣為惠者尚布施也無功而厚賞無勞而高爵則守職者懈於官而游居者亟於進矣為暴者妄誅也無罪者而死亡行直者而被刑則修身者不勸善而為邪者輕犯上矣故為惠者生姦而為暴者生亂姦亂之俗亡國之風是故明主之治國有誅者而主無怒焉朝有賞者而君無與焉誅者不怨君罪之所當也賞者不德上功之所致也民知誅賞之來皆在於身也故務功修業不受贛於君是故朝廷蕪而無迹田野辟而無草故太上下知有之今夫橋植直立而不動俛仰取制焉人主靜漠而不躁百官得循焉譬而軍之持麾者妄指則亂矣慧不足以大寧智不足以安危與其譽堯而毀桀也不如掩聰明而反修其道也清靜無為則天與之時廉儉守節則地生之財處愚稱德則聖人為之謀是故下者萬物歸之虛者天下遺之夫人主之聽治也清明而不闇虛心而弱志是故群臣輻湊並進無愚智賢不肖莫不盡其能於是乃始陳其禮建以為基是乘眾勢以為車御眾智以為馬雖幽野險塗則无由惑矣人主深居隱處以避燥濕閨門重襲以備姦賊內不知閭里之情外不知山澤之形帷幕之外目不能見十里之前耳不能聞百步之外然天下之物无所不通者其灌輸之者大而斟酌之者眾也是故不出戶而知天下不窺牖而知天道乘眾人之智則天下不足有也專用其心則獨身不能保也是故人主覆之以德不行其智而因萬人之所利夫舉踵而天下得所利故處百姓之上而弗重也錯百姓之前而弗害也舉之而弗高也推之而弗猒也主道員者運轉而无端化育如神虛无因循常後而不先者也臣道方者論是而處當為事先倡守職分明以立成功者也是故君臣異道則治同道則亂各得其宜處得其當則上下有以相使也夫人主之聽治也虛心而弱意清明而不闇是故群臣輻湊並進无愚智賢不肖莫不盡其能者則君得所以制臣臣得所以事君治國之道明矣文王智而好問故聖武王勇而好問故勝夫乘眾人之智則无不任也用眾人之力則无不勝也千鈞之重烏獲不能舉也眾人相一則百人有餘力矣是故任一人之力者則烏獲不足恃乘眾人之制者則天下不足有也禹決江䟽河以為天下興利而不能使水西流稷辟土墾草以為百姓力農然不能使禾冬生豈其人事不至哉其勢不可也夫推不可為之勢而不循道理之數雖神聖人不能以成其功而況當世之主乎夫載重而馬羸雖造父不能以致遠車輕而馬良雖中工可使追速是故聖人之舉事也豈能拂道理之數詭自然之性以曲為直以屈為伸哉未嘗不因其資而用之也是以積力之所舉則无不勝也而眾智之所為則无不成也聾者可令嚼筋而不可使有聞也瘖者可使守圉而不可使通語也形有所不周而能有所不容也是故有一形者處一位有一能者服一事力勝其任則舉之者不重也能稱其事則為之者不難也毋小大脩短各得其宜則天下一齊无以相過也聖人兼而用之故无棄才人主貴正而尚忠忠正在上位執正管事則讒佞姦邪无由進矣譬猶方員之不相蓋而曲直之不相入夫鳥獸之不同群者其類異也虎鹿之不同游者力不敵也是故聖人得志而在上位讒佞姦邪而欲犯主者譬猶雀之見鸇而鼠之遇狸也亦必无餘命矣是故人主之舉也不可不慎也所任者得其人則國家治上下和群臣親百姓附所任非其人則國家危上下乖群臣怨百姓亂故一舉而不當終身傷得失之道權要在主是故繩正於上木直於下非有事焉所緣以修者然也故人主誠正則直士任事而姦人伏匿矣人主不正則邪人得志忠者隱蔽矣夫人之所以莫挀玉石而挀瓜瓠者何也无得於玉石弗犯也使人主執正持平如從繩準高下則群臣以邪來者猶以卵投石以火投水也故靈王好細腰而民有殺食自飢也越王好勇而民皆處危爭死由此觀之權勢之柄其以移風易矣堯為匹夫不能仁化一里桀在上位令行禁止由此觀之賢不足以為治而勢可以易俗明矣書曰一人有慶萬民賴之此之謂也天下多眩於名聲而寡察其實是故處人以譽尊而游者以辯顯察其所尊顯無他故焉人主不明分數利害之地而賢眾口之辯也治國則不然言事者必究於法而為行者必治於官上操其名以責其實臣守其業以效其功言不得過其實行不得踰其法群臣輻湊莫敢專君事不在法律中而可以便國佐治必參五行之陰考以觀其歸並用周聽以察其化不偏一曲不黨一事是以中立而徧運照海內群臣公正莫敢為邪百官述職務致其公迹也主精明於上官勸力於下姦邪滅迹庶功日進是以勇者盡於軍亂國則不然有眾咸譽者無功而賞守職者無罪而誅主上闇而不明群臣黨而不忠說談者游於辯脩行者競於往主上出令則非之以與法令所禁則犯之邪為智者務為巧詐為勇者務於鬭爭大臣專權下吏持勢朋黨周比以弄其上國雖若存古之人曰亡矣且夫不治官職不被甲兵不脩南畝而有賢聖之聲者非所以教於國也騏驥騄駬天下之疾馬也驅之不前引之不止雖愚者不加體焉今治亂之機轍迹可見也而世主莫之能察此治道之所以塞權勢者人主之車輿爵祿者人臣之轡衘也是故人主處權勢之要而持爵祿之柄審緩急之度而適取予之節是以天下盡力而不倦夫臣主之相與也非有父子之厚骨肉之親也而竭力殊死不辭其軀者何也勢有使之然也昔者豫讓中行文子之臣智伯伐中行氏并吞其地豫讓背其主而臣智伯智伯與趙襄子戰於晉陽之下身死為戮國分為三豫讓欲報趙襄子漆身為厲吞炭變音擿齒易貌夫以一人之心而事兩主或背而去或欲身徇之豈其趨捨厚薄之勢異哉人之恩澤使之然也紂兼天下朝諸侯人迹所及舟楫所通莫不賓服然而武王甲卒三千人擒之於牧野豈周民死節而殷民背叛哉其主之德義厚而號令行也夫風疾而波興木茂而鳥集相生之氣也是故臣不得其所欲於君者君亦不能得其所求於臣也君臣之施者相報之勢也是故臣盡力死節以與君計君垂爵以與臣市是故君不能賞無功之臣臣亦不能死無德之君君德不下流於民而欲用之如鞭蹏馬矣是猶不待雨而求熟稼必不可之數也君人之道處靜以修身儉約以率下靜則下不擾矣儉則民不怨矣下擾則政亂民怨則德薄政亂則賢者不為謀德薄則勇者不為死是故人主好鷙鳥猛獸珍怪奇物狡躁康荒不愛民力馳騁田獵出入不時如此則百官務亂事勤財匱萬民愁苦生業不修矣人主好高臺深池雕琢刻鏤黼黻文章絺綌綺繡寶玩珠玉則賦歛無度而萬民力竭矣堯之有天下也非貪萬民之富而安人主之位也以為百姓力征強凌弱眾暴寡於是堯乃身服節儉之行而明相愛之仁以和輯之是故茅茨不翦采椽不斲大路不畫越席不緣大羹不和粢食不毇巡狩行教勤勞天下周流五嶽豈其奉養不足樂哉以為社稷非有利焉年衰志憫舉天下而傳之舜猶卻行而脫蹝也衰世則不然一日而有天下之富處人主之勢則竭百姓之力以奉耳目之欲志專在于宮室臺榭陂池苑囿猛獸熊羆玩好珍怪是故貧民糟糠不接於口而虎狼熊羆猒芻豢百姓短褐不完而宮室衣錦繡人主急茲无用之功而百姓黎民顦顇於天下是故使天下不安其性人主之居也如日月之明也天下之所同側目而視側耳而聽延頸舉踵而望也是故非澹漠無以明德非寧靜無以致遠非寬大無以兼覆非慈厚無以懷眾非平正無以制斷是故賢主之用人也猶巧工之制木也大者以為舟航柱梁小者以為椄槢脩者以為櫩榱短者以為朱儒枅櫨无大小修短皆得其所宜規矩方員各有所施殊形異材莫不可得而用也天下之物莫凶於奚毒然而良醫橐而臧之有所用也是故林莽之材猶无可棄者而又況人乎今夫朝廷之所不舉而鄉曲之所不譽非其人不肖也其所以官之者非其職也鹿之上山也大獐不能跂也及其下也牧豎能追之才有所脩短也是故有大略者不可責以捷巧有小智者不可任以大功人有其才物有其形有任一而太重或任百而尚輕是故審於毫釐之小計者必遺天地之大數不失小物之選者或於大事之舉譬猶狸之不可使搏牛虎之不可使搏鼠也今人之才或欲平九州從方外存危國繼絕世志在直道正邪決煩理挐而乃責之以閨閤之禮隩窔之閒或佞巧小具諂進愉說隨鄉曲之俗卑下眾人之耳目而乃任之以天下之權治亂之機是猶以斧劗毛以刀伐木也皆失其宜矣人主者以天下之目視以天下之耳聽以天下之智慮以天下之力動是故號令能下究而臣情得上聞百官修通群臣輻湊喜不以賞賜怒不以罪誅是故威立而不廢聰明光而不弊法令察而不苛耳目達而不闇善否之情日陳於前而无所逆是故賢者盡其智不肖者竭其力德澤兼覆而不偏群臣勸務而不怠近者安其性遠者懷其德所以然者何也得用人之道而不任己之才者也故假輿馬者足不勞而致千里乘舟楫者不能游而絕江海夫人主之情莫不欲總海內之智盡眾人之力然而群臣達志效忠者希不困其身使言之而是也雖在褐夫芻蕘猶不可棄也使言之而非也雖在卿相人君揄策于廟堂之上未必可用也是非之所在不可以貴賤尊卑論也是明主之聽於群臣其計乃可用也不羞其位其言而可行也不責其辯闇主則不然所愛習親近者雖邪枉不正不能見也䟽遠卑賤者雖竭力盡忠不能知也有言者窮之以辭有諫者誅之以罪如此而欲照海內存萬方是猶塞耳而聽清濁掩目而視青黃也其離聰明則亦遠矣法者天下之度量而人主之準繩也縣法者法不法也設賞者賞當賞也法定之後中程者賞缺繩者誅尊貴者不輕其罰而卑賤者不重其刑犯法者雖賢必誅中度者雖不肖必無罪是故公道通而私道塞矣古之置有司也所以禁民使不得自恣也其立君也所以剬有司使无專行也法籍禮義者所以禁君使無擅斷也人莫得自恣則道勝道勝而理達矣故反於無為無為者非謂其凝滯而不動也以言其莫從己出也夫寸生於䅺䅺生於形形生於景景生於日此度之本也樂生於音音生於律律生於風此聲之宗也法生於義義生於眾適眾適合於人心此治之要也故通於本者不亂於末覩於要者不惑於詳法者非天墮非地生發於人間而反以自正是故有諸己不非諸人無諸己不求諸人所立於下者不廢於上所禁於民者不行於身所謂亡國者非無君也無法也變法者非無法也有法而不用與無法等是故人主之立法先以身為檢式儀表故令行於天下孔子曰其身正不令而行其身不正雖令不從故禁勝於身則令行於民矣聖主之治也其猶造父之御也齊輯之于轡銜之際而急緩之于脣吻之和正度于胸臆之中而執節于掌握之閒內得於中心外合於馬志是故能進退履繩而旋曲中規取道致遠而氣力有餘誠得其術也是故權勢者人主之車輿也大臣者人主之駟馬也體離車輿之安而手失駟馬之心而能不危者古今未有也是故輿馬不調王良不能以取道君臣不和唐虞不能以為治執術而御之則管晏之智盡矣明分以示之則跖蕎之姦止矣夫據榦而窺井底雖達視猶不能見其睛借明於鑑以照之則寸之分可得而察也是故明主之耳目不勞精神不竭物至而觀其變事來而應其化近者不亂即遠者治矣是故不用適然之數而行必然之道故萬舉而無遺策矣今夫御者馬體調于車御心和于馬則歷險致遠進退周游莫不如志雖有騏驥騄駬之良而臧獲御之則馬反自恣而人弗能制矣故治者不貴其自是而貴其不得為非也故曰勿使可欲毋曰弗求勿使可奪毋曰不爭如此則人材釋而公道行矣羡者止於度而不足者逮於用故海內可一也夫釋職事而聽非譽棄公勞而用朋黨則奇材佻長而干次守官者雍遏而不進如此則民俗亂於國而功臣爭於朝故法律度量者人主之所以執下釋之而不用是猶無轡銜而馳也群臣百姓反弄其上是故有術則制人無術則制於人吞舟之魚蕩而失水則制於螻蟻離其居也猨貁失木而擒於狐貍非其處也君人者釋所守而與臣下爭事則有司以無為持位守職者以從君取容是以人臣藏智而弗用反以事轉任其上矣夫貴富者之於勞也達事者之於察也驕恣者之於恭也勢不及君君人者不任能而好自為之則智日困而自負其責也數窮於下則不能伸理行墮於國則不能專制智不足以為治威不足以行誅則無以與下交也喜怒形於心耆欲見於外則守職者離正而阿上有司枉法而從風賞不當功誅不應罪上下離心而君臣相怨也是以執政阿主而有過則無以責之有罪而不誅則百官煩亂而智弗能解也毀譽萌生而明不能照也不正本而反自脩則人主逾勞人臣逾逸是猶代庖宰剝牲而為大匠斲也與馬競走筋絕而弗能及上車執轡則馬服于衡下故伯樂相之王良御之明主乘之無御相之勞而致千里者乘於人資以為羽翼也是故君人者無為而有守也有立而無好也有為則讒生有好則諛起昔者齊桓公好味而易牙烹其首子而餌之虞君好寶而晉獻以璧馬釣之胡王好音而秦穆公以女樂誘之是皆以利見制於人也故善建者不拔言建之无形也夫火熱而水滅之金剛而火銷之木強而斧伐之水流而土遏之唯造化者物莫能勝也故中欲不出謂之扃外邪不入謂之閉中扃外閉何事之不節外閉中扃何事之不成弗用而後能用之弗為而後能為之精神勞則越耳目淫則竭故有道之主滅想去意清虛以待不代之言不奪之事循名責實官使自司任而弗詔責而弗教以不知為道以奈何為寶如此則百官之事各有所守矣攝權勢之柄其於化民易矣衛君伇子路權重也景桓臣管晏位尊也怯服勇而愚制智其所託勢者勝也故枝不得大於榦末不得強於本言輕重小大有以相制也若五指之屬於臂也搏援攫捷莫不如志言以小屬於大也是故得勢之利者所持甚小所任甚大所守甚約所制甚廣是故十圍之木能持千鈞之屋五寸之鍵而制開闔豈其材之巨小足任哉所居要也孔丘墨翟脩先聖之術通六藝之論口道其言身行其志慕義從風而為之服伇者不過數十人使居天子之位則天下徧為儒墨矣楚莊王傷文無畏之死於宋也奮袂而起衣冠相連於道遂成軍宋城之下權柄重也楚文王好服解冠楚國效之趙武靈王貝帶鵔翿而朝趙國化之使在匹夫布衣雖冠解冠帶貝帶鵔翿而朝則不免為人笑也夫民之好善樂正不待禁誅而自中法度者萬無一也下必行之令從之者利逆之者凶日陰未移而海內莫不被繩矣故握劍鋒以雖北宮子司馬蒯蕢不可使應敵操其觚招其末則庸人能以制勝今使烏獲藉蕃從後牽牛尾尾絕而不從者逆也若指之桑條以貫其鼻則五尺童子牽而周四海者順也夫七尺之橈而制船之左右者以水為資天子發號令行禁止以眾為勢也夫防民之所害開民之所利威之行也若發堿決塘故循流而下易以至背風而馳易以遠桓公立政去食肉之獸食粟之鳥係罝之罔三舉而百姓說紂殺王子比干而骨肉怨斮朝涉者之脛而萬民叛再舉而天下失矣故義者非能徧利天下之民也利一人而天下從風暴者非能盡害海內之眾也害一人而天下離叛故桓公三舉而九合諸侯紂再舉而不得為匹夫故舉錯不可不審人主之租斂於民也必先計歲收量民積聚知饒饉有餘不足之數然後取車輿衣食供養其欲高臺層榭接屋連閣非不麗也然而民無堀室狹廬所以託身者則明主弗樂也肥醲甘脆非不美也然民有糟糠菽粟不接於口者則明主弗甘也匡床蒻席非不寧也然而民有處邊城犯危難澤死暴骸者則明主弗安也故古之君人者其慘怛於民也國有飢者食不重味民有寒者而冬不被裘歲登民豐乃始縣鍾鼓陳干戚君臣上下同心而樂之國無哀人故古之為金石管絃者所以宣樂也兵革斧鉞者所以飾怒也觴酌俎豆酬酢之禮所以效喜也衰絰菅屨辟踊哭泣所以諭哀也此皆有充於內而成像於外者也及至亂主取民則不裁其力求於下則不量其積男女不得事耕織之業以供上之求力勤財匱君臣相疾也故民至於焦脣沸肝有今無儲而乃始撞大鍾擊鳴鼓吹竽笙彈琴瑟是猶貫甲冑而入宗廟被羅紈而從軍旅失樂之所由生矣夫民之為生也一人跖耒而耕不過十畝中田之獲卒歲之收不過畝四石妻子老弱仰而食之時有涔旱災害之患有以給上之徵賦車馬兵革之費由此觀之則人之生閔矣夫天地之大計三年耕而餘一年之食率九年而有三年之畜十八年而有六年之積二十七年而有九年之儲雖涔旱災害之殃民莫困窮流亡也故國無九年之畜謂之不足無六年之積謂之閔急無三年之畜謂之窮乏故有仁君明主其取下有節自養有度則得承受於天地而不離飢寒之患矣若得貪主暴君撓於其下侵漁其民以適無窮之欲則百姓無以被天和而履地德矣食者民之本也民者國之本也國者君之本也是故君人者上因天時下盡地財中用人力是以群生遂長五穀蕃植教民養育六畜以時種樹務脩田疇滋植桑麻肥墝高下各因其宜丘陵阪險不生五穀者以樹竹木春伐枯槁夏取果蓏秋畜䟽食冬伐薪蒸以為民資是故生無乏用死無轉尸故先王之法畋不掩群不取麛夭不涸澤而漁不焚林而獵豺未祭獸罝罦不得布於野獺未祭魚罔罟不得入於水鷹隼未摯羅網不得張於谿谷草木未落斤斧不得入山林昆蟲未蟄不得以火田孕育不得殺鷇卵不得探魚不長尺不得取彘不㫷年不得食是故草木之發若蒸氣禽獸歸之若流泉飛鳥歸之若煙雲有所以致之也故先王之政四海之雲至而脩封疆蝦蟆鳴燕降而達路除道陰降百泉則脩橋梁昏張中則務種穀大火中則種黍菽虛中則種宿麥昴中則收斂畜積伐薪木上告于天下布之民先王之所以應時脩備富國利民實曠來遠者其道備矣非能目見而足行之也欲利之也欲利之也不忘於心則官自備矣心之於九竅四肢也不能一事焉然而動靜聽視皆以為主者不忘于欲利之也故堯為善而眾善至矣桀為非而眾非來矣善積即功成非積則禍極凡人之論心欲小而志欲大智欲員而行欲方能欲多而事欲鮮所謂心欲小者慮患未生備禍未發戒過慎微不敢縱其欲也志欲大者兼包萬國壹齊殊俗并覆百姓若合一族是非輻湊而為之轂智欲員者環復轉運終始無端旁流四達淵泉而不竭萬物並興莫不嚮應也行欲方者直立而不橈素白而不污窮不易操通不肆志能欲多者文武備具動靜中儀舉動廢置曲得其宜無所擊戾莫不畢宜也事欲鮮者執柄持術得要以應眾執約以治廣處靜持中運於琁樞以一合萬若合符者也故心小者禁於微也志大者無不懷也知員者無不知也行方者有不為也能多者無不治也事鮮者約所持也古者天子聽朝使公卿正諫博士誦詩瞽箴師誦庶人傳語史書其過宰徹其膳猶以為未足也故堯置敢諫之鼓也舜立誹謗之木湯有司直之人武王立戒慎之鞀過若豪釐而既已備之矣夫聖人之於善也無小而不舉其於過也無微而不改湯堯舜武皆坦然南面而王天下焉當此之時伐鼛而食奏雍而徹已飯而祭竈行不用巫祝鬼神弗敢祟山川弗敢禍可謂至貴矣然而戰戰慄慄日慎一日由此觀之則聖人之心小矣詩云惟此文王小心翼翼昭事上帝聿懷多福其斯之謂歟武王克殷發鉅橋之粟散鹿臺之錢封比干之墓表商容之閭朝成湯之廟解箕子之囚使各處其宅田其田無故無新唯賢是親用非其有使非其人晏然若故有之由此觀之則聖人之志大也文王周觀得失徧覽是非堯舜所以昌桀紂所以亡者皆著於明堂於是略智博聞以應無方由此觀之則聖人之智員矣成康繼文武之業守明堂之制觀存亡之迹見成敗之變非道不言非義不行言不苟出行不苟為擇善而後從事焉由此觀之則聖人之行方矣孔子之通智過於萇弘勇服於孟賁足躡郊菟力招城關能亦多矣然而勇力不聞伎巧不知專行孝道以成素王事亦鮮矣春秋二百四十二年亡國五十二弒君三十六采善鉏醜以成王道論亦博矣然而圍於匡顏色不變絃歌不輟臨死亡之地犯患難之危據義行理而志不懾分亦明矣然為魯司寇聽獄必為斷作為春秋不道鬼神不敢專己夫聖人之智固已多矣其所守者有約故舉而必榮愚人之智固已少矣其所事者又多故動而必窮矣吳起張儀智不若孔墨而爭萬乘之君此其所以車裂支解也夫以正教化者易而必成以邪巧世者難而必敗凡將設行立趣於天下捨其易而必成者而從事難而必敗者愚惑之所致也凡此六反者不可不察也徧知萬物而不知人道不可謂智徧愛群生而不愛人類不可謂仁仁者愛其類也智者不可或也仁者雖在斷割之中其所不忍之色可見也智者雖煩難之事其不闇之效可見也內恕反情心之所不欲其不加諸人由近知遠由己知人此人智之所合而行也小有教而大有存也小有誅而大有寧也唯惻隱推而行之此智者之所獨斷也故仁智有時錯有時合合者為正錯者為權其義一也府史守法君子制義法而無義亦府史也不足以為政耕之為事也勞織之為事也擾擾勞之事而民不舍者知其可以衣食也人之情不能無衣食衣食之道必始於耕織萬民之所容見也物之若耕織者始初甚勞終必利也物之可備者眾愚人之所備者寡事之可權者多愚人之所權者少此愚者之所以多患也物之可備者智者盡備之可權者盡權之此智者所以寡患也故智者先忤而後合愚者始於樂而終於哀今日何為而榮乎旦日何為而義乎此易言也今日何為而義旦日何為而榮此難知也問瞽師曰白素何如曰縞然曰黑何若曰黮然援白黑而示之則不處焉人之視白黑以目言白黑以口瞽師有以言白黑無以知白黑故言白黑與人同其別白黑與人異入孝於親出忠於君無愚智賢不肖皆知其為義也使陳忠孝行而知所出者鮮矣凡人思慮莫不先以為可而後行之其是或非此愚知之所以異凡人之性莫貴於仁莫急於智仁以為質知以行之兩者為本而加之以勇力辯慧捷疾劬錄巧敏犀利聰明審察盡眾益也身材未脩伎藝曲備而無仁智以為表榦而加之以眾美則益其損故不仁而有勇力果敢則猶狂而操利劍不智而辯慧懁給則猶乘驥而或雖有材能其施之不當其處之不宜適足以輔偽飾非伎藝之眾不如其寡也故有野心者不可借便勢有愚質者不可與利器魚得水而游焉則樂塘決水涸則為螻蟻所食有掌脩其隄防補其缺漏則魚得而利之國有以存人有以生國之所以存者仁義是也人之所以生者行善是也國無義雖大必亡人無善志雖勇必傷治國上使不得與焉孝於父母弟於兄嫂信於朋友不得上令而可得為也釋己之所得為而責于其所不得制悖矣士處卑隱欲上達必先反諸己上達有道名譽不起而不能上達矣取譽有道不信於友不能得譽信於友有道事親不說不信於友說親有道脩身不誠不能事親矣誠身有道心不專一不能誠身道在易而求之難驗在近而求之遠故弗得也
