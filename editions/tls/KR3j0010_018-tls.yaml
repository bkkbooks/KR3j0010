body:
  text: 人間訓清淨恬愉人之性也儀表規矩事之制也知人之性其自養不勃知事之制其舉錯不或發一端散无竟周八極總一筦謂之心見本而知末觀指而睹歸執一而應萬握要而治詳謂之術居智所為行智所之事智所秉動智所由謂之道道者置之前而不𨎌錯之後而不軒內之尋常而不塞布之天下而不窕是故使人高賢稱譽己者心之力也使人卑下誹謗己者心之罪也夫言出於口者不可止於人行發於邇者不可禁於遠事者難成而易敗也名者難立而易廢也千里之隄以螻螘之穴漏百尋之屋以突隙之煙焚堯戒曰戰戰慄慄日慎一日莫蹪於山而蹪於垤是故人者輕小害易微事以多悔患至而後憂之是由病者已惓而索良醫也雖有扁鵲俞跗之巧猶不能生也夫禍之來也人自生之福之來也人自成之禍與福同門利與害為鄰非神聖人莫之能分凡人之舉事莫不先以其知規慮揣度而後敢以定謀其或利或害此愚智之所以異也曉然自以為智存亡之樞機禍福之門戶舉而用之陷溺於難者不可勝計也使知所以為是者事必可行則天下无不達之塗矣是故知慮者禍福之門戶也動靜者利害之樞機也百事之變化國家之治亂待而後成是故不溺於難者成是故不可不慎也天下有三危少德而多寵一危也才下而位高二危也身无大功而有厚祿三危也故物或損之而益或益之而損何以知其然也昔者楚莊王既勝晉於河雍之間歸而封孫叔敖孫叔敖辭而不受病且死謂其子曰吾則死矣王必封女女必讓肥饒之地而受沙石之地楚越之閒有有寢之丘者此其地确而名醜荊人鬼越人禨人莫之利也孫叔敖死王果封其子以肥饒之地其子辭而不受請有寢之丘楚國之俗功臣二世而收爵祿唯孫叔敖獨存此所謂損之而益也何謂益之而損昔晉厲公南伐楚東伐齊西伐秦北伐燕兵行天下而无所綣威服四方而无所詘遂合諸侯於嘉陵氣充志驕淫侈无度暴虐萬民內无輔拂之臣外无諸侯之助戮殺大臣親近導諛明年出遊匠驪氏欒書中行偃劫而幽之諸侯莫之救百姓莫之哀三月而死夫戰勝攻取地廣而名尊此天下之所願也然而終於身死國亡此所謂益之而損者也夫孫叔敖之請有寢之丘沙石之地所以累世不奪也晉厲公之合諸侯於嘉陵所以身死於匠驪氏也眾人皆知利利而病病也唯聖人知病之為利知利之為病也夫再實之木根必傷掘藏之家必有殃以言大利而反為害也張武教智伯奪韓魏之地而擒於晉陽申叔時教莊王封陳氏之後而霸天下孔子讀易至損益未嘗不嘳然而歎曰益損者其王者之事與事或欲利之適足以害之或欲害之乃反以利之利害之反禍福之門不可不察也陽虎為亂於魯魯君令人閉城門而捕之得者有重賞失者有重罪圍三匝而陽虎將舉劍而伯頤門者止之曰我將出子陽虎因赴圍而逐揚劍提戈而走門者出之顧反取其出之者以戈椎之攘袪薄腋出之者怨之曰我非故與子友也為之蒙死被罪而乃反傷我宜矣其有此難也魯君聞陽虎失大怒問所出之門使有司拘之以為傷者戰鬭者也不傷者為縱之者傷者受重賞而不傷者被重罪此所謂害之而反利之者也何謂欲利之而反害之楚恭王與晉人戰於鄢陵戰酣恭王傷而休司馬子反渴而求飲豎陽穀奉酒而進之子反之為人也嗜酒而甘之不能絕於口遂醉而臥恭王欲復戰使人召司馬子反子反辭以心疾王駕而往視之入幄中而聞酒臭恭王大怒曰今日之戰不穀親傷所恃者司馬也而司馬又若此是亡楚國之社稷而不恤吾眾也不穀无與復戰矣於是罷師而去之斬司馬子反以為僇故豎陽穀之進酒也非欲禍子反也誠愛而欲快之也而適足以殺之此所謂欲利之而反害之者也夫病溫而強之餐病暍而飲之寒此眾人之所以為養也而良醫之所以為病也悅於目悅於心此愚者之所利也然而有論者之所辟也故聖人先忤而後合眾人先合而後忤有功者人臣之所務也有罪者人臣之所辟也或有功而見疑或有罪而益信何也則有功者離恩義有罪者不敢失仁心也魏將樂羊攻中山其子執在城中城中縣其子以示樂羊樂羊曰君臣之義不得以子為私攻之愈急中山因烹其子而遺之鼎羹與其首樂羊循而泣之曰是吾子已為使者跪而啜三杯使者歸報中山曰是伏約死節者也不可忍也遂降之為魏文侯大開地有功自此之後日以不信此所謂有功而見疑者也何謂有罪而益信孟孫獵而得麑使秦西巴持歸烹之麑母隨之而嗁秦西巴弗忍縱而予之孟孫歸求麑安在秦西巴對曰其母隨而嗁臣誠弗忍竊縱而予之孟孫怒逐秦西巴居一年取以為子傅左右曰秦西巴有罪於君今以為子傅何也孟孫曰夫一麑而弗忍又何況於人乎此所謂有罪而益信者也故趨舍不可不審也此公孫鞅之所以抵罪於秦而不得入魏也功非不大也然而累足无所踐者不義之故也事或奪之而反與之或與之而反取之智伯求地於魏宣子宣子弗欲與之任登曰智伯之強威行於天下求地而弗與是為諸侯先受禍也不若與之宣子曰求地不已為之奈何任登曰與之使喜必將復求地於諸侯諸侯必植耳與天下同心而圖之一心所得者非直吾所亡也魏宣子裂地而授之又求地於韓康子韓康子不敢不予諸侯皆恐又求地於趙襄子襄子弗與於是智伯乃從韓魏圍襄子於晉陽三國通謀擒智伯而三分其國此所謂奪人而反為人所奪者也何謂與之而反取之晉獻公欲假道於虞以伐虢遺虞垂棘之璧與屈產之乘虞公或於璧與馬而欲與之道宮之奇諫曰不可夫虞之與虢若車之有輔也輔依於車車亦依輔虞之與虢也相恃之勢也若假之道則虢朝亡而虞夕從之矣虞公弗聽遂假之道荀息伐虢遂克之還反伐虞又拔之此所謂與之而反取之者也聖王布德施惠非求其報於百姓也郊望禘嘗非求福於鬼神也山致其高而雲雨起焉水致其深而蛟龍生焉君子致其道而福祿歸焉夫有陰德者必有陽報有隱行者必有昭名古者溝防不脩水為民害禹鑿龍門辟伊闕平治水土使民得陸處百姓不親五品不慎契教以君臣之義父子之親夫妻之辨長幼之序田野不脩民食不足后稷乃教之辟地墾草糞土種穀令百姓家給人足故三后之後無不王者有陰德也周室衰禮義廢孔子以三代之道教導於世其後繼嗣至今不絕者有隱行也秦王趙政兼吞天下而亡智伯侵地而滅商鞅支解李斯車裂三代種德而王齊桓繼絕而霸故樹黍者不穫稷樹怨者無報德昔者宋人有好善者三世不解家無故而黑牛生白犢以問先生先生曰此吉祥也以饗鬼神居一年其父無故而盲其牛又復生白犢其父又復使其子以問先生其子曰前聽先生言而失明今又復問之奈何其父曰聖人之言先忤而後合其事未究固試往復問之其子又復問先生先生曰此吉祥也復教以饗鬼神歸致命其父其父曰行先生之言也居一年其子又無故而盲其後楚攻宋圍其城當此之時易子而食之析骸而炊之丁壯者死老病童兒皆上城堅守而不下楚王大怒城已破諸城守者皆屠之此獨以父子盲之故得無乘城軍罷圍解則父子俱視夫禍福之轉而相生其變難見也近塞上之人有善術者馬無故亡而入胡人皆弔之其父曰此何遽不能為福乎居數月其馬將胡駿馬而歸人皆賀之其父曰此何遽不能為禍乎家富良馬其子好騎墮而折其髀人皆弔之其父曰此何遽不能為福乎居一年胡人大入塞丁壯者皆控絃而戰近塞之人死者十九此獨以跛之故父子相保故福之為禍禍之為福化不可極深不可測也或直於辭而不周於事者或虧於耳以忤於心而合於實者高陽魋將為室問匠人匠人對曰未可也木尚生加塗其上必將撓以生材任重塗今雖成後必敗高陽魋曰不然夫木枯則益勁塗乾則益輕以勁材任輕塗今雖惡後必善匠人窮於辭無以對受令而為室其始成也竘然善也而後果敗此所謂直於辭而不周於事者也何謂虧於耳忤於心而合於實靖郭君將城薛賓客多止之弗聽靖郭君謂謁者曰無為賓通言齊人有請見者曰臣請道三言而已過三言請烹靖郭君聞而見之賓趨而進再拜而興因稱曰海大魚則反走靖郭君止之曰願聞其說賓曰臣不敢以死為熙靖郭君曰先生不遠道而至此願為寡人稱之賓曰海大魚綱弗能止也釣弗能牽也蕩而失水則螻螘皆得志焉今夫齊君之淵也君失齊則薛能自存乎靖郭君曰善乃止不城薛此所謂虧於耳忤於心而得事實者也夫以無城薛止城薛其於以行說乃不若海大魚故物或遠之而近或近之而遠或說聽計當而身䟽或言不用計不行而益親何以明之三國伐齊圍平陸括子以報於牛子曰三國之地不接於我踰鄰國而圍平陸利不足貪也然則求名於我也請以齊侯往牛子以為善括子出無害子入牛子以括子言告無害子無害子曰異乎臣之所聞牛子曰國危不而安患結不而解何謂貴智無害子曰臣聞裂壤土以安社稷者聞殺身破家以存其國者不聞出其君以為封疆者牛子不聽無害子之言而用括子之計三國之兵罷而平陸之地存自此之後括子日以䟽無害子日以進故謀患而患解圖國而國存括子之智得矣無害子之慮無中於策謀無益於國然而心調於君有義行也今人待冠而飾首待履而行地冠履之於人也寒不能煖風不能障暴不能蔽也然而戴冠履履者其所自託者然也夫咎犯戰勝城濮而雍季無尺寸之功然而雍季先賞而咎犯後存者其言有貴者也故義者天下之所貴也百言百當不若擇趨而審行也或無功而先舉或有功而後賞何以明之昔晉文公將與楚人戰於城濮問於咎犯曰為奈何咎犯曰仁義之事不猒忠信戰陳之事不猒詐偽君其詐之而已矣文公辭咎犯問雍季雍季對曰焚林而獵愈多得獸後必無獸以詐偽遇人雖愈利後亦無復君其正之而已矣於是不聽雍季之計而用咎犯之謀與楚人戰大破之還歸賞有功者先雍季而後咎犯左右曰城濮之戰咎犯之謀也君行賞先雍季何也文公曰咎犯之言一時之權也雍季之言萬世之利也吾豈可以一時之權而先萬世之利也哉智伯率韓魏二國伐趙圍晉陽決晉水而灌之城中緣木而處縣釜而炊襄子謂張孟談曰城中力已盡糧食匱乏武大夫病為之奈何張孟談曰亡不能存危弗能安無為貴智臣請試潛行見韓魏之君而約之乃見韓魏之君說之曰臣聞之唇亡而齒寒今智伯率二君而伐趙趙將亡矣趙亡則二君為之次矣不及今而圖之禍將及二君二君曰智伯之為人也粗中而少親我謀而泄事必敗為之奈何張孟談曰言出二君之口入臣之耳人孰知之者乎且同情相成同利相死君其圖之二君乃與張孟談陰謀與之期張孟談乃報襄子至期日之夜趙氏殺其守隄之吏決水灌智伯軍智伯軍救水而亂韓魏翼而擊之襄子將卒犯其前大敗智伯軍殺其身而三分其國襄子罷圍乃賞有功者而高赫為賞首群臣請曰晉陽之存張孟談之功也而赫為賞首何也襄子曰晉陽之圍也寡人國家危社稷殆群臣無不有驕侮之心者唯赫不失君臣之禮吾是以先之由此觀之義者人之大本也雖有戰勝存亡之功不如行義之隆故老子曰美言可以市尊美行可以加人或有罪而可賞也或有功而可罪也西門豹治鄴廩無積粟府無儲錢庫無甲兵官無計會人數言其過於文侯文侯身行其縣果若人言文侯曰翟璜任子治鄴而大亂子能變道則可不能將加誅於子西門豹曰臣聞王主富民霸主富武亡國富庫今君欲為霸王者也臣故蓄積於民君以為不然臣請升城鼓之甲兵粟米可立具也於是乃升城而鼓之一鼓民被甲括矢操兵弩而出再鼓服輦載粟而至文侯曰罷之西門豹曰與民約信非一日之積也一舉而欺之後不可復用也燕常侵魏八城臣請北擊之以復侵地遂舉兵擊燕復地而後反此有罪而可賞者解扁為東封上計而入三倍有司請賞之文侯曰吾土地非益廣也人民非益眾也入何以三倍對曰以冬伐木而積之於春浮之河而鬻之文侯曰民春以力耕夏以強耘秋以收歛冬間無事又伐林而積之負軛而浮之河是用民不得休息也民以弊矣雖有三倍之入將焉用之此有功可罪者賢主不苟得忠臣不苟利何以明之中行穆伯攻鼓弗能下餽聞倫曰鼓之嗇夫聞倫知之請無罷武大夫而鼓可得也穆伯弗應左右曰不折一戟不傷一卒而鼓可得也君奚為弗使穆伯曰聞倫為人佞而不仁若使聞倫下之吾可以勿賞乎若賞之是賞佞人佞人得志是使晉國之武舍仁而為佞雖得鼓將何所用之攻城者欲以廣地也得地而不取者見其本而知其末也秦穆公使孟盟舉兵襲鄭過周以東鄭之賈人弦高蹇他相與謀曰師行數千里數絕諸侯之地其勢必襲鄭凡襲國者以為無備也今示以知其情必不敢進乃矯鄭伯之命以十二牛勞之三率相與謀曰凡襲人者以為弗知今已知之矣守備必固進必無功乃還師而反晉先軫舉兵擊之大破之殽鄭伯乃以存國之功賞弦高弦高辭之曰誕而得賞則鄭國之信廢矣為國而無信是俗敗也賞一人而敗國俗仁者弗為也以不信得厚賞義者弗為也遂以其屬徙東夷終身不反故仁者不以欲傷生知者不以利害義聖人之思脩愚人之思叕忠臣者務崇君之德諂臣者務廣君之地何以明之陳夏徵舒弒其君楚莊王伐之陳人聽令莊王已討有罪遣卒戍陳大夫畢賀申叔時使於齊反還而不賀莊王曰陳為無道寡人起九軍以討之征暴亂誅罪人群臣皆賀而子獨不賀何也申叔時曰人有牽牛而徑於人之田中田主殺其人而奪之牛罪則有之罰亦重矣今君王以陳為無道興兵而政之以誅罪人遣人戍陳諸侯聞之以王為非誅罪人也貪陳國也蓋聞君子不棄義以取利王曰善乃罷陳之戍立陳之後諸侯聞之皆朝於楚此務崇君之德者也張武為智伯謀曰晉六將軍中行文子最弱而上下離心可伐以廣地於是伐范中行滅之矣又教智伯求地於韓魏趙韓魏裂地而授之趙氏不與乃率韓魏而伐趙圍之晉陽三年三國陰謀同計以擊智氏遂滅之此務為君廣地者也夫為君崇德者霸為君廣地者滅故千乘之國行文德者王湯武是也萬乘之國好廣地者亡智伯是也非其事者勿仞也非其名者勿就也無故有顯名者勿處也無功而富貴者勿居也夫就人之名者廢仞人之事者敗無功而大利者後將為害譬猶緣高木而望四方也雖偷樂哉然而疾風至未嘗不恐也患及身然後憂之六驥追之弗能及也是故忠臣之事君也計功而受賞不為苟得量力而受官不貪爵祿其所能者受之勿辭也其所不能者與之勿喜也辭所能則匿欲所不能則惑辭所不能而受所能則得無損墮之勢而无不勝之任矣昔者智伯驕伐范中行而克之又劫韓魏之君而割其地尚以為未足遂興兵伐趙韓魏反之軍敗晉陽之下身死高梁之東頭為飲器國分為三為天下笑此不知足之禍也老子曰知足不辱知止不殆可以修久此之謂也或譽人而適足以敗之或毀人而乃反以成之何以知其然也費無忌復於荊平王曰晉之所以霸者近諸夏也而荊之所以不能與之爭者以其僻遠也王若欲從諸侯不若大城城父而令太子建守焉以來北方王自收其南是得天下也楚王悅之因命太子建守城父命伍子奢傅之居一年伍子奢遊人於王側言太子甚仁且勇能得民心王以告費無忌無忌曰臣固聞之太子內撫百姓外約諸侯齊晉又輔之將以害楚其事已構矣王曰為我太子又尚何求曰以秦女之事怨王王因殺太子建而誅伍子奢此所謂見譽而為禍者也何謂毀人而反利之唐子短陳駢子於齊威王威王欲殺之陳駢子與其屬出亡奔薛孟嘗君聞之使人以車迎之至而養以芻豢黍粱五味之膳日三至冬日被裘罽夏日服絺紵出則乘牢車駕良馬孟嘗君問之曰夫子生於齊長於齊夫子亦何思於齊對曰臣思夫唐子者孟嘗君曰唐子者非短子者耶曰是也孟嘗君曰子何為思之對曰臣之處於齊也糲粢之飯藜藿之羹冬日則寒凍夏日則暑傷自唐子之短臣也以身歸君食芻豢飯黍粱服輕煖乘牢良臣故思之此所謂毀人而反利之者也是故毀譽之言不可不審也或貪生而反死或輕死而得生或徐行而反疾何以知其然也魯人有為父報讎於齊者刳其腹而見其心坐而正冠起而更衣徐行而出門上車而步馬顏色不變其御欲驅撫而止之曰今日為父報讎以出死非為生也今事已成矣又何去之追者曰此有節行之人不可殺也解圍而去之使彼衣不暇帶冠不及正蒲伏而走上車而馳必不能自免於十步之中矣今坐而正冠起而更衣徐行而出門上車而步馬顏色不變此眾人所以為死也而乃反以得活此所謂徐而馳遟於步也夫走者人之所以為疾也步者人之所以為遟也今乃反以人之所以為遟者為疾明於分也有知徐之為疾遟之為速者則幾於道矣故黃帝亡其玄珠使離珠攫剟索之而弗能得之也於是使忽怳而後能得之聖人敬小慎微動不失時百射重戒禍乃不滋計福勿及慮禍過之同日被霜蔽者不傷愚者有備與知者同功夫爝火在縹烟之中也一指之所能息也塘漏若鼷穴一墣之所能塞也及至火之燔孟諸而炎雲夢水決九江而漸荊州雖起三軍之眾弗能救也夫積愛成福積怨成禍若癰疽之必潰也所浼者多矣諸御鞅復於簡公曰陳成常宰予二子者甚相憎也臣恐其構難而危國也君不如去一人簡公不聽居無幾何陳成常果攻宰予於庭中而弒簡公於朝此不知敬小之所生也魯季氏與郈氏鬭雞郈氏介其雞而季氏為之金距季氏之雞不勝季平子怒因侵郈氏之宮而築之郈昭伯怒傷之魯昭公曰禘於襄公之廟舞者二人而已其餘盡舞於季氏季氏之無道無上久矣弗誅必危社稷公怒以告子家駒子家駒曰季氏之得眾三家為一其德厚其威強君胡得之昭公弗聽使郈昭伯將卒以攻之仲孫氏叔孫氏相與謀曰無季氏則吾族也死亡無日矣遂興兵以救之郈昭伯不勝而死魯昭公出奔齊故禍之所從生者始於雞足及其大也至於亡社稷故蔡女蕩舟齊師侵楚兩人構怨廷殺宰予簡公遇殺身死無後陳氏代之齊乃無呂兩家鬭雞季氏金距郈氏作難魯昭出走故師之所處生以棘楚禍生而不蚤滅若火之得燥水之得濕浸而益大癰疽發於指其痛徧於體故蠹啄剖梁柱蟁䖟走牛羊此之謂也人皆務於救患之備而莫能知使患無生夫使患無生易於救患而莫能加務焉則未可與言術也晉公子重耳過曹曹君欲見其骿脅使之袒而捕魚釐負羈止之曰公子非常人也從者三人皆霸王之佐也遇之無禮必為國憂君弗聽重耳反國起師而伐曹遂滅之身死人手社稷為墟禍生於袒而捕魚齊楚欲救曹不能存也聽釐負羈之言則無亡患矣今不務使患無生患生而救之雖有聖知弗能為謀且患禍之所由來者萬端無方是故聖人深居以避辱靜安以待時小人不知禍福之門戶妄動而絓羅網雖曲為之備何足以全其身譬猶失火而鑿池被裘而用箑也且塘有萬穴塞其一魚何遽無由出室有百戶閉其一盜何遽無從入夫牆之壞也於隙劍之折必有齧聖人見之蚤故萬物莫能傷也太宰子朱侍飯於令尹子國令尹子國啜羹而熱援卮漿而沃之明日太宰子朱辭官而歸其僕曰楚太宰未易得也辭官去之何也子朱曰令尹輕行而簡禮其辱人不難明年伏郎尹而笞之三百夫上仕者先避患而後就利先遠辱而後求名太宰子朱之見終始微矣夫鴻鵠之未孚於卵也一指篾之則靡而無形矣及至其筋骨之已就而羽翮之既成也則奮翼揮䎚凌乎浮雲背負青天膺摩赤霄翱翔乎忽荒之上析惕乎虹蜺之間雖有勁弩利矰微繳蒲沮子之巧亦弗能加也江水之始出於岷山也可攓衣而越也及至其下洞庭騖石城經丹徒起波濤舟杭一日不能濟也是故聖人者常從事於無形之外而不留思盡慮於成事之內是故患禍弗能傷也人或問於孔子曰顏回何如人也曰仁人也丘弗如也子貢何如人也曰辨人也丘弗如也子路何如人也曰勇人也丘弗如也賓曰三人皆賢夫子而為夫子役何也孔子曰丘能仁且忍辯且訥勇且怯以三子之能易丘一道丘弗為也孔子知所施之也秦牛缺徑於山中而遇盜奪之車馬解其橐笥拖其衣被盜還反顧之無懼色憂志驩然有以自得也盜遂問之曰吾奪子財貨劫子以刀而志不動何也秦牛缺曰車馬所以載身也衣被所以揜形也聖人不以所養害其養盜相視而笑曰夫不以欲傷生不以利累形者世之聖人也以此而見王者必且以我為事也還反殺之此能以知知矣而未能以知不知也能勇於敢矣而未能勇於不敢也凡有道者應卒而不乏遭難而能免故天下貴之今知所以自行也而未知所以為人行也其所論未之究者也人能由昭昭於冥冥則幾於道矣詩曰人亦有言无哲不愚此之謂也事或為之適足以敗之或備之適足以致之何以知其然也秦皇挾錄圖見其傳曰亡秦者胡也因發卒五十萬使蒙公楊翁子將築脩城西屬流沙北擊遼水東結朝鮮中國內郡輓車而餉之又利越之犀角象齒翡翠珠璣乃使尉屠睢發卒五十萬為五軍一軍塞鐔城之嶺一軍守九嶷之塞一軍處番禺之都一軍守南野之界一軍結餘干之水三年不解甲弛弩使監祿轉餉又以卒鑿渠而通糧道以與越人戰殺西嘔君譯吁宋而越人皆入叢薄中與禽獸處莫肯為秦虜相置桀駿以為將而夜攻秦人大破之殺尉屠睢伏尸流血數十萬乃發適戍以備之當此之時男子不得脩農畝婦人不得剡麻考縷羸弱服格於道大夫箕會於衢病者不得養死者不得葬於是陳勝起於大澤奮臂大呼天下席卷而至於戲劉項興義兵隨而定若折槁振落遂失天下禍在備胡而利越也欲知築脩城以備亡而不知築脩城之所以亡也知發適戍以備越而不知難之從中發也夫烏鵲先識歲之多風也去高木而巢扶枝大人過之則探鷇嬰兒過之則挑其卵知備遠難而忘近患故秦之設備也烏鵲之智也或爭利而反強之或聽從而反止之何以知其然也魯哀公欲西益宅史爭之以為西益宅不祥哀公作色而怒左右數諫不聽乃以問其傅宰折睢曰吾欲益宅而史以為不祥子以為何如宰折睢曰天下有三不祥而西益宅不與焉哀公大悅而喜頃復問曰何謂三不祥對曰不行禮義一不祥也嗜慾无止二不祥也不聽強諫三不祥也哀公默然深念憤然自反遂不西益宅夫史以爭為可以止之而不知不爭而反取之也知者離路而得道愚者守道而失路夫兒說之巧於閉結无不解非能閉結而盡解之也不解不可解也至乎以弗解解之者可與及言論矣或明禮義推道體而不行或解構妄言而反當何以明之孔子行於東野馬失食農夫之稼野人怒取馬而繫之使子貢往說之畢辭而不能得也孔子曰夫以人之所不能聽說人譬猶以大牢享野獸以九韶樂飛鳥也予之罪也非彼人之過也乃使馬圉往說之至見野人曰子耕於東海至於西海吾馬之失安得不食子之苗野人大喜解馬而與之說若此其无方也而反行事有所至而巧不若拙故聖人量鑿而正枘夫歌采菱發陽阿鄙人聽之不若延露以和非歌者拙也聽者異也故交畫不暢連環不解物之不通者聖人不爭也仁者百姓之所慕也義者眾庶之所高也為人之所慕行人之所高此嚴父之所以教子而忠臣之所以事君也然世或用之而身死國亡者不周於時也昔徐偃王好行仁義陸地之朝者三十二國王孫厲謂楚莊王曰王不伐徐必反朝徐王曰偃王有道之君也好行仁義不可伐也王孫厲曰臣聞之大之與小強之與弱也猶石之投卵虎之啗豚又何疑焉且也為文而不能達其德為武而不能任其力亂莫大焉楚王曰善乃舉兵而伐徐遂滅之此知仁義而不知世變者也申菽杜茝美人之所懷服也及漸之於滫則不能保其芳矣古者五帝貴德三王用義五霸任力今取帝王之道而施之五霸之世是由乘驥逐人於榛薄而蓑笠盤旋也今霜降而樹穀冰泮而求穫欲其食則難矣故易曰潛龍勿用者言時之不可以行也故君子終日乾乾夕惕若厲无咎終日乾乾以陽動也夕惕若厲以陰息也因日以動因夜以息唯有道者能行之夫徐偃王為義而滅燕子噲行仁而亡哀公好儒而削代君為墨而殘滅亡削殘暴亂之所致也而四君獨以為仁義儒墨而亡者遭之時務異也非仁義儒墨不行非其世而用之則為之擒矣夫戟者所以攻城也鏡者所以照形也宮人得戟則以刈葵盲者得鏡則以蓋卮不知所施之也故善鄙同誹譽在俗趨舍同逆順在時狂譎不受祿而誅段干木辭相而顯所行同也而利害異者時使然也故聖人雖有其志不遇其世僅足以容身何功名之可致也知天之所為知人之所行則有以徑於世矣知天而不知人則无以與俗交知人而不知天則无以與道遊單豹倍世離俗巖居谷飲不衣絲麻不食五穀行年七十猶有童子之色卒而遇飢虎殺而食之張毅好恭過宮室廊廟必趨見門閭聚眾必下厮徒馬圉皆與伉禮然不終其壽內熱而死豹養其內而虎食其外毅脩其外而疾攻其內故直意適情則堅強賊之以身役物則陰陽食之此皆載務而虧乎其和者也得道之士外化而內不化外化所以入人也內不化所以全其身也故內有一定之操而外能詘伸贏縮卷舒與物推移故萬舉而不陷所以貴聖人者以其能龍變也今捲捲然守一節推一行雖以毀碎滅沉猶且弗易者此察於小好而塞於大道也趙宣孟活飢人於委桑之下而天下稱仁焉荊佽非犯江中之難不失其守而天下稱勇焉是故見小行則可以論大體矣田子方出見老馬於通喟然有志焉以問其御曰此何馬也其御對曰此故公家畜也老罷而不為用故出而鬻之也田子方曰少而貪其力老而棄其身仁者弗為也束帛以贖之罷武聞之知所歸心矣齊莊公出獵有一蟲舉足將搏其輪問其御曰此何蟲也對曰此所謂螳蜋者也其為蟲也知進而不知卻不量力而輕敵莊公曰此為人必為天下勇武矣於是迴車而避之勇武聞之知所盡死矣故田子方隱一老馬而魏國戴之齊莊公避一螳蜋而勇武歸之湯教祝網者而四十國朝文王葬死人之骸而九夷歸武王蔭暍人於樾下左擁而右扇之而天下懷越王句踐一決獄不辜援龍淵而切其股血流至足以自罰也而戰武必死感於恩也故聖人行之於小則可以覆大矣審之於近則可以懷遠矣孫叔敖決期思之水而灌雩婁之野莊王知其可以為令尹也子發辨擊劇而勞佚齊楚國知其可以為兵主也此皆形於小微而通於大理者也聖人之舉事不加憂焉察其所以而已矣今萬人調鍾不能比之律誠得知者一人而足矣說者之論亦猶此也誠得其數則无所用多矣夫車之所以能轉千里者以其要在三寸之轄夫勸人而弗能使也禁人而弗能止也其所由者非理也昔者衛君朝於吳吳王囚之欲流之於海說者冠蓋相望而弗能止魯君聞之撤鍾鼓之縣縞素而朝仲尼入見曰君胡為有憂色魯君曰諸侯无親以諸侯為親大夫无黨以大夫為黨今衛君朝於吳吳王囚之而欲流之於海孰意衛君之仁義而遭此難也吾欲免之而不能為之奈何仲尼曰若欲免之則請子貢行魯君召子貢授之將軍之印子貢辭曰貴无益於解患在所由之道斂躬而行至於吳見太宰嚭太宰嚭甚悅之欲薦之於王子貢曰子不能行說於王奈何吾因子也太宰嚭曰子焉知嚭之不能也子貢曰衛君之來也衛國之半曰不若朝於晉其半曰不若朝於吳然衛君以為吳可以歸骸骨也故束身以受命今子受衛君而囚之又欲流之於海是賞言朝於晉者而罰言朝於吳者也且衛君之來也諸侯皆以為蓍龜兆今朝於吳而不利則皆移心於晉矣子之欲成霸王之業不亦難乎太宰嚭入復之於王王報出令於百官曰比十日而衛君之禮不具者死子貢可謂知所以說矣魯哀公為室而大公宣子諫曰室大眾與人處則譁少與人處則悲願公之適之也公曰寡人聞命矣築室不輟公宣子復見曰國小而室大百姓聞之必怨吾君諸侯聞之必輕吾國魯君曰聞命矣築室不輟公宣子復見曰左昭而右穆為大室以臨二先君之廟得无害於為子乎公乃令罷役除版而去之魯君之欲為室誠矣公宣子止之必矣然三說而一聽者其二者非其道也夫臨河而釣日入而不能得一儵魚者非江河魚不食也所以餌之者非其欲也及至良工執竿投而擐脣吻者能以其所欲而釣者也夫物无不可奈何有人无奈何鈆之與丹異類殊色而可以為丹者得其數也故繁稱文辭无益於說審其所由而已矣物類之相摩近而異門戶者眾而難識也故或類之而非或不類之而是或若然而不然者或不然而若然者諺曰鳶墮腐鼠而虞氏以亡何謂也曰虞氏梁之大富人也家充盈殷富金錢无量財貨无貲升高樓臨大路設樂陳酒積博其上游俠相隨而行樓下博上者射朋張中反兩而笑飛鳶適墮其腐鼠而中游俠游俠相與言曰虞氏富樂之日久矣而常有輕易人之志吾不敢侵犯之而乃辱我以腐鼠此而不報无以立矜於天下請與公僇力一志悉率徒屬而必滅其家其夜乃攻虞氏大滅其家此所謂類之而非者也何謂非類而是屈建告石乞曰白公勝將為亂石乞曰不然白公勝卑身下士不敢驕賢其家无筦籥之信關楗之固大斗斛以出輕斤兩以內而乃論之以不宜也屈建曰此乃所以反也居三年白公勝果為亂殺令尹子椒司馬子期此所謂弗類而是者也何謂若然而不然子發為上蔡令民有罪當刑獄斷論定決於令前子發喟然有悽愴之心罪人已刑而不忘其恩此其後子發盤罪威王而出奔刑者遂襲恩者恩者逃之於城下之廬追者至踹足而怒曰子發親決吾罪而被吾刑吾怨之憯於骨髓使我得其肉而食之其知猒乎追者皆以為然而不索其內果活子發此所謂若然而不若然者何謂不然而若然者昔越王句踐卑下吳王夫差請身為臣妻為妾奉四時之祭祀而入春秋之貢職委社稷效民力居為隱蔽而戰為鋒行禮甚卑辭甚服其離叛之心遠矣然而甲卒三千人以擒夫差於姑胥此四策者不可不審也夫事之所以難知者以其竄端匿跡立私於公倚邪於正而以勝惑人之心者也若使人之所懷於內者與所見於外者若合符節則天下无亡國破家矣夫狐之搏雉也必先卑體弭毛以待其來也雉見而信之故可得而擒也使狐瞋目植睹見必殺之勢雉亦知驚憚遠飛以避其怒矣夫人偽之相欺也非直禽獸之詐計也物類相似若然而不可從外論者眾而難識矣是故不可不察也
