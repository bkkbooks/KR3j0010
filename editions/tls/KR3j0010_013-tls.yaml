body:
  text: 氾論訓古者有鍪而綣領以王天下者矣其德生而不殺予而不奪天下不非其服同懷其德當此之時陰陽和平風雨時節萬物蕃息烏鵲之巢可俯而探也禽獸可羈而從也豈必襃衣博帶句襟委章甫哉古者民澤處復穴冬日則不勝霜雪霧露夏日則不勝暑熱蟁䖟聖人乃作為之築土構木以為室屋上棟下宇以蔽風雨以避寒暑而百姓安之伯余之初作衣也緂麻索縷手經指挂其成猶網羅後世為之機杼勝複滕椱以便其用而民得以掩形御寒古者剡耜而耕摩蜃而耨木鉤而樵抱甀而汲民勞而利薄後世為之耒耜耰鋤斧柯而樵桔皋而汲民逸而利多焉古者大川名谷衝絕道路不通往來也乃為窬木方板以為舟航故地勢有无得相委輸為靼蹻而超千里肩負儋之勤也而作為之楺輪建輿駕馬服牛民以致遠而不勞為鷙禽猛獸之害傷人而无以禁御也而作為之鑄金鍛鐵以為兵刃猛獸不能為害故民迫其難則求其便困其患則造其備人各以其知去其所害就其所利常故不可循器械不可因也則先王之法度有移易者矣古之制婚禮不稱主人舜不告而娶非禮也立子以長文王舍伯邑考而用武王非制也禮三十而娶文王十五而生武王非法也夏后氏殯於阼階之上殷人殯於兩楹之間周人殯於西階之上此禮之不同者也有虞氏用瓦棺夏后氏堲周殷人用槨周人牆置翣此葬之不同者也夏后氏祭於闇殷人祭於陽周人祭於日出以朝此祭之不同者也堯大章舜九韶禹大夏湯大濩周武象此樂之不同者也故五帝異道而德覆天下三王殊事而名施後世此皆因時變而制禮樂者也譬猶師曠之施瑟柱也所推移上下者无寸尺之度而靡不中音故通於禮樂之情者能作言有本主於中而以知矩矱之所周用者也魯昭公有慈母而愛之死為之練冠故有慈母之服陽侯殺蓼侯而竊其夫人故大饗廢夫人之禮先王之制不宜則廢之末世之事善則著之是故禮樂未始有常也故聖人制禮樂而不制於禮樂治國有常而利民為本政教有經而令行為上苟利於民不必法古苟周於事不必循舊夫夏商之衰也不變法而亡三代之起也不相襲而王故聖人法與時變禮與俗化衣服器械各便其用法度制令各因其宜故變古未可非而循俗未足多也百川異源而皆歸於海百家殊業而皆務於治王道缺而詩作周室廢禮義壞而春秋作詩春秋學之美者也皆衰世之造也儒者循之以教導於世豈若三代之盛哉以詩春秋為古之道而貴之又有未作詩春秋之時夫道其缺也不若道其全也誦先王之詩書不若聞其言聞其言不若得其所以言得其所以言者言弗能言也故道可道者非常道也周公之事文王也行无專制事无由己身若不勝衣言若不出口有奉持於文王洞洞屬屬如將不能恐失之可謂能子矣武王崩成王幼少周公繼文王之業履天子之籍聽天下之政平夷狄之亂誅管蔡之罪負扆而朝諸侯誅賞制斷無所顧問威動天地聲懾海內可謂能武矣成王既壯周公屬籍致政北面委質而臣事之請而後為復而後行无擅恣之志无伐矜之色可謂能臣矣故一人之身而三變者所以應時也何況乎君數易世國數易君人以其位達其好憎以其威勢供其嗜欲而欲以一行之禮一定之法應時偶變其不能中權亦明矣故聖人所由曰道所為曰事道猶金石一調不更事猶琴瑟每終改調故法制禮義者治之具也而非所以為治也故仁以為經義以為紀此萬世不更者也若乃人考其才而時省其用雖日變可也天下豈有常法哉當於世事得於人理順於天地祥於鬼神則可以正治矣古者民醇工厖商樸女童是以政教易化風俗易移也今世德益衰民俗益薄欲以樸童之法治既弊之民是猶无鏑銜策錣而御馯馬也昔者神農無制令而民從唐虞有制令而无刑罰夏后氏不負言殷人誓周人盟逮至當今之世忍訽而輕辱貪得而寡羞欲以神農之道治之則其亂必矣伯成子高辭為諸侯而耕天下高之今時之人辭官而隱處為鄉邑之下豈可同哉古之兵弓劍而已矣槽柔无擊脩戟无刺晚世之兵隆衝以攻渠幨以守連弩以射銷車以鬭古之伐國不殺黃口不獲二毛於古為義於今為笑古之所以為榮者今之所以為辱也古之所以為治者今之所以為亂也夫神農伏犧不施賞罰而民不為非然而立政者不能廢法而治民舜執干戚而服有苗然而征伐者不能釋甲兵而制彊暴由此觀之法度者所以論民俗而節緩急也器械者因時變而制宜適也夫聖人作法而萬物制焉賢者立禮而不肖者拘焉制法之民不可與遠舉拘禮之人不可使應變耳不知清濁之分者不可令調音心不知治亂之源者不可令制法度必有獨聞之聽獨見之明然後能擅道而行也夫殷變夏周變殷春秋變周三代之禮不同何古之從大人作而弟子循知法治所由生則應時而變不知法治之源雖循古終亂今世之法籍與時變禮義與俗易為學者循先襲業據籍守舊以為非此不治是猶持方柄而周員鑿也欲得宜適致固焉則難矣今儒墨者稱三代文武而弗行也是言其所不行也非今時之世而弗改是行其所非也稱其所是行其所非是以盡日極慮而無益於治勞形竭智而無補於主也今夫圖工好畫鬼魅而憎圖狗馬者何也鬼魅不世出而狗馬可日見也夫存危治亂非智不能而道先稱古雖愚有餘故不用之法聖王弗行不驗之言聖王不聽也天地之氣莫大於和和者陰陽調日夜分而生物春分而生秋分而成生之與成必得和之精故聖人之道寬而栗嚴而溫柔而直猛而仁太剛則折太柔則卷聖人正在剛柔之閒乃得道之本積陰則沉積陽則飛陰陽相接乃能成和夫繩之為度也可卷而懷也引而伸之可直而睎也故聖人以身體之夫脩而不橫短而不窮直而不剛久而不忘者其唯繩乎故恩推則懦懦則不威嚴推則猛猛則不和愛推則縱縱則不令刑推則虐虐則無親昔者齊簡公釋其國家之柄而專任其大臣將相攝威擅勢私門成黨而公道不行故使陳成常鴟夷子皮得成其難使呂氏絕祀而陳氏有國者此柔懦所生也鄭子陽剛毅而好罰其於罰也執而无赦舍人有折弓者畏罪而恐誅則因猘狗之驚以殺子陽此剛猛之所致也今不知道者見柔懦者侵則矜於為剛毅見剛毅者亡則矜於為柔懦此无本主於中而聞見舛馳於外者也故終身而无所定趨譬猶不知音者之歌也濁之則鬱而无轉清之則憔而不調及至韓娥秦青薛談之謳侯同曼聲之歌憤於志積於內盈而發音則莫不比於律而和於人心何則中有本主以定清濁不受於外而自為儀表也今夫盲者行於道人謂之左則左謂之右則右遇君子則易道遇小人則陷溝壑何則目無以接物也故魏兩用樓翟吳起而亡西河湣王專用淖齒而死于東廟無術以御之也文王兩用呂望召公奭而王楚莊王專任孫叔敖而霸有術以御之也夫弦歌鼓舞以為樂盤旋揖讓以脩禮厚葬久喪以送死孔子之所立也而墨子非之兼愛上賢右鬼非命墨子之所立也而楊子非之全性保真不以物累形楊子之所立也而孟子非之趨捨人異各有曉心故是非有處得其處則無非失其處則無是丹穴太蒙反踵空同大夏北戶奇肱脩股之民是非各異習俗相反君臣上下夫婦父子有以相使也此之是非彼之是也此之非非彼之非也譬若斤斧椎鑿之各有所施也禹之時以五音聽治懸鍾鼓磬鐸置鞀以待四方之士為號曰教寡人以道者擊鼓諭寡人以義者擊鍾告寡人以事者振鐸語寡人以憂者擊磬有獄訟者搖鞀當此之時一饋而十起一沐而三捉髮以勞天下之民此而不能達善效忠者則才不足也秦之時高為臺榭大為苑囿遠為馳道鑄金人發適戍入芻槀頭會箕賦輸於少府丁壯丈夫西至臨洮狄道東至會稽浮石南至豫章桂林北至飛狐陽原道路死人以溝量當此之時忠諫者謂之不祥而道仁義者謂之狂逮至高皇帝存亡繼絕舉天下之大義身自奮袂執銳以為百姓請命于室天當此之時天下雄儁豪英暴露于野澤前蒙矢石而後墮谿壑出百死而紿一生以爭天下之權奮武厲誠以決一旦之命當此之時豐衣博帶而道儒墨者以為不肖逮至暴亂已勝海內大定繼文之業立武之功履天子之籍造劉氏之冠揔鄒魯之儒墨通先聖之遺教戴天子之旗乘大路建九斿撞大鍾擊鳴鼓奏咸池揚干戚當此之時有立武者見疑一世之間而文武代為雌雄有時而用也今世之為武者則非文也為文者則非武也文武更相非而不知時世之用也此見隅曲之一指而不知八極之廣大也故東面而望不見西牆南面而視不覩北方唯無所嚮者為無所不通國之所以存者道德也家之所以亡者理塞也堯無百戶之郭舜無植錐之地以有天下禹無十人之眾湯無七里之分以王諸侯文王處岐周之間也地方不過百里而立為天子者有王道也夏桀殷紂之盛也人跡所至舟車所通莫不為郡縣然而身死人手為天下笑者有亡形也故聖人見化以觀其徵德有昌衰風先萌焉故得王道者雖小必大有亡形者雖成必敗夫夏之將亡太史令終古先奔於商三年而桀乃亡殷之將敗也太史令向藝先歸文王朞年而紂乃亡故聖人之見存亡之迹成敗之際也非乃鳴條之野甲子之日也今謂彊者勝則度地計眾富者利則量粟而稱金若此則萬乘之君無不霸王者而千乘之國無不破亡者矣存亡之迹若此其易知也愚夫憃婦皆能論之趙襄子以晉陽之城霸智伯以三晉之地擒湣王以大齊亡田單以即墨有功故國之亡也雖大不足恃道之行也雖小不可輕由此觀之存在得道而不在於大也亡在失道而不在於小也詩云乃眷西顧此惟與宅言去殷而遷于周也故亂國之君務廣其地而不務仁義務高其位而不務道德是釋其所以存而造其所以亡也故桀囚於焦門而不能自非其所行而悔不殺湯於夏臺紂拘於宣室而不反其過而悔其不誅文王於羑里二君處彊大之勢而脩仁義之道湯武救罪之不給何謀之敢慮乎若上亂三光之明下失萬民之心雖微湯武孰弗能奪也今不審其在己者而反備之于人天下非一湯武也殺一人則必有繼之者也且湯武之所以處小弱而能以王者以其有道也桀紂之所以處彊大而終見奪者以其无道也今不行人之所以王而反益己之所以奪者是趨亡之道也武王剋殷欲築宮於五行之山周公曰不可夫五行之山固塞險阻之地也使我德能覆之則天下納其貢職者迴也使我有暴亂之行則天下之伐我難矣此所以三十六世而不奪也周公可謂能持滿矣昔者周書有言曰上言者下用也下言者上用也上言者常也下言者權也此存亡之術也唯聖人為能知權言而必信期而必當天下之高行也直躬其父攘羊而子證之尾生與婦人期而死之直而證父信而死女雖有直信孰能貴之夫三軍矯命過之大者也秦穆公興兵襲鄭過周而東鄭賈人弦高將西販牛道遇秦師於周鄭之閒乃矯鄭伯之命犒以十二牛賓秦師而卻之以存鄭國故事有所至信反為過誕反為功何謂失禮而有大功昔楚恭王與晉厲戰於陰陵呂錡射恭王中厥目而擒之潘尪養由基黃衰微公孫丙相與篡之恭王懼而失體黃衰微舉足蹴其體恭王乃覺怒其失禮奮體而起四大夫載而行昔蒼吾繞娶妻而美以讓於兄此所謂忠愛而不可行者也是故聖人論事之曲直與之屈伸偃仰無常儀表時屈時伸弱柔如蒲韋非攝懾奪也剛彊猛毅志厲青雲非夸矜也以乘時應變也夫君臣之接屈膝卑拜以相尊禮也至其迫於患也則舉足蹴其體天下莫能非也是故忠之所在禮不足以難之也孝子之事親和顏卑體奉帶運履至其溺也則捽其髮而拯非敢驕侮以救其死也故溺則捽父祝則名君勢不得不然也此權之所設也故孔子曰可以共學矣而未可與適道也可與適道未可以立也可以立未可與權權者聖人之所獨見也故忤而後合者謂之知權合而後舛者謂之不知權不知權者善反醜矣故禮者實之華而偽之文也方於卒迫窮遽之中也則无所用矣是故聖人以文交於世而以實從事於宜不結於一迹之塗凝滯而不化是故敗事少而成事多號令行于天下而莫之能非矣猩猩知往而不知來乾鵠知來而不知往此脩短之分也昔者萇弘周室之執數者也天地之氣日月之行風雨之變律曆之數无所不通然而不能自知鈹裂而死蘇秦匹夫徒步之人也靼蹻嬴蓋經營萬乘之主服諾諸侯然而不能自免於車裂之患徐偃王被服慈惠身行仁義陸地之朝者三十二國然而身死國亡子孫無類大夫種輔翼越王句踐而為之報怨雪恥禽夫差之身開地數千里然而身伏屬鏤而死此皆達於治亂之機而未知全性之具者故萇弘知天道而不知人事蘇秦知權謀而不知禍福徐偃王知仁義而不知時大夫種知忠而不知謀聖人則不然論世而為之事權事而為之謀是故舒之天下而不窕內之尋常而不塞使天下荒亂禮義絕綱紀廢彊弱相乘力征相攘臣主无差貴賤无序甲冑生蟣虱燕雀處帷幄而兵不休息而乃始服屬臾之貌恭儉之禮則必滅抑而不能興矣天下安寧政教和平百姓肅睦上下相親而乃始立氣矜奮勇力則必不免於有司之法矣是故聖人者能陰能陽能弱能彊隨時而動靜因資而立功物動而知其反事萌而察其變化則為之象運則為之應是以終身行而无所困故事有可行而不可言者有可言而不可行者有易為而難成者有難成而易敗者所謂可行而不可言者趨舍也可言而不可行者偽詐也易為而難成者事也難成而易敗者治也此四策者聖人之所獨見而留意也誳寸而伸尺聖人為之小枉而大直君子行之周公有殺弟之累齊桓有爭國之名然而周公以義補缺桓公以功滅醜而皆為賢今以人之小過揜其大美則天下无聖王賢相矣故目中有疵不害於視不可灼也喉中有病无害於息不可鑿也河上之丘冢不可勝數猶之為易也水激興波高下相臨差以尋常猶之為平也昔者曹子為魯將兵三戰不勝亡地千里使曹子計不顧後足不旋踵刎頸於陳中則終身為破軍擒將矣然而曹子不羞其敗恥死而无功柯之盟揄三尺之刃造桓公之胸三戰所亡一朝而反之勇聞于天下功立於魯國管仲輔公子糺而不能遂不可謂智遁逃奔走不死其難不可謂勇束縛桎梏不諱其恥不可謂貞當此三行者布衣弗友人君弗臣然而管仲免於束縛之中立齊國之政九合諸侯一匡天下使管仲出死捐軀不顧後圖豈有此霸功哉今人君之論其臣也不計其大功揔其略行而求其小善則失賢之數也故人有厚德無問其小節而有大譽无疵其小故夫牛蹏之涔不能生鱣鮪而蜂房不容鵠卵小形不足以包大體也夫人之情莫不有所短誠其大略是也雖有小過不足以為累若其大略非也雖有閭里之行未足大舉夫顏啄聚梁父之大盜也而為齊忠臣段干木晉國之大駔也而為文侯師孟卯妻其嫂有五子焉然而相魏寧其危解其患景陽淫酒被髮而御於婦人然而威服諸侯此四人者皆有所短然而功名不滅者其略得也季哀陳仲子立節抗行不入洿君之朝不食亂世之食遂餓而死不能存亡接絕者何小節伸而大略屈故小謹者无成功訾行者不容於眾體大者節䟽蹠距者舉遠自古及今五帝三王未有能全其行者也故易曰小過亨利貞言人莫不有過而不欲其大也夫堯舜湯武世主之隆也齊桓晉文五霸之豪英也然堯有不慈之名舜有卑父之謗湯武有放弒之事伍伯有暴亂之謀是故君子不責備於一人方正而不以割廉直而不以切博通而不以訾文武而不以責求於人則任以人力自脩則以道德責人以人力易償也自脩以道德難為也難為則行高矣易償則求贍矣夫夏后氏之璜不能无考明月之珠不能无纇然而天下寶之者何也其小惡不足以妨大美也今志人之所短而忘人之所脩而求得賢乎天下則難矣夫百里奚之飯牛伊尹之負鼎太公之鼓刀甯戚之商歌其美有存焉者矣眾人見其位之卑賤事之洿辱而不知其大略以為不肖及其為天子三公而立為諸侯賢相乃始信於異眾也夫發于鼎俎之閒出于屠酤之肆解于累紲之中興于牛頷之下洗之以湯沐祓之以爟火立之于本朝之上倚之于三公之位內不慚於國家外不愧於諸侯符勢有以內合故未有功而知其賢者堯之知舜也功成事立而知其賢者市人之知舜也為是釋度數而求之於朝肆草莽之中其失人也必多矣何則能效其求而不知其所以取人也夫物之相類者世主俗之所亂惑也嫌疑肖象者眾人之所眩耀也故狠者類知而非知也愚者類仁而非仁也戇者類勇而非勇也使人之相去也若玉之與石葵之與莧則論人易矣夫亂人者若芎藭之與槀本也虵床之與麋蕪也故劍工惑劍之似莫邪者唯歐冶能名其種玉工眩玉之似碧盧者唯猗頓不失其情闇主亂于姦臣小人之疑君子者唯聖人能見微以知明故虵舉首尺而脩短可知也象見其牙而大小可論也薛燭庸子見若狐甲於劍而利鈍識矣臾兒易牙淄澠之水合者嘗一哈水如甘苦知矣故聖人之論賢也見其一行而賢不肖分也孔子辭廩丘終不盜刀鉤許由讓天子終不利封侯故未嘗灼而不敢握火者見其有所燒也未嘗傷而不敢握刀者見其有所害也由此觀之見者可以論未發也而觀小節足以知大體矣故論人之道貴則觀其所舉富則觀其所施窮則觀其所不受賤則觀其所不為貧則觀其所不取視其更難以知其勇動以喜樂以觀其守委以貨財以論其仁振以恐懼以知其節則人情備矣古之善賞者費少而勸眾善罰者刑省而姦禁善予者用約而為德善取者入多而无怨趙襄子圍於晉陽罷圍而賞有功者五人高赫為賞首左右曰晉陽之難赫无大功今為賞首何也襄子曰晉陽之圍寡人社稷危國家殆群臣无不有驕侮之心唯赫不失君臣之禮故賞一人而天下之為臣者莫不終忠於其君此賞少而勸眾者也齊威王設大鼎於庭中而數无鹽令曰子之譽日聞吾耳察子之事田野蕪倉廩虛囹圄實子以姦事我者也乃烹之齊以此三十二歲道路不拾遺此刑省而姦禁者也秦穆公出遊而車敗右服失野人得之穆公追而及之岐山之陽見野人方屠而食之穆公曰夫食駿馬之肉而不還飲酒者傷人吾恐其傷汝等徧飲而去之處一年與晉惠公為韓之戰晉師圍穆公之車梁由靡扣穆公之驂將獲之食馬肉者三百餘人皆出死為穆公戰於車下遂克晉反虜惠公以歸此用約而為德者也齊桓公將欲征伐甲兵不足令有重罪者出犀甲一戟有輕罪者贖以金分訟而不勝者出一束箭百姓皆說乃矯箭為矢鑄金而為刃以伐不義而征無道遂霸天下此入多而无怨者也故聖人因民之所喜而勸善因民之所惡以禁姦故賞一人而天下譽之罰一人而天下畏之故至賞不費至刑不濫孔子誅少正卯而魯國之邪塞子產誅鄧析而鄭國之姦禁以近論遠以小知大也故聖人守約而治廣者此之謂也天下莫易於為善而莫難於為不善所謂為善者靜而無為也所謂為不善者躁而多欲也適情辭餘無所誘或循性保真無變於己故曰為善易也越城郭踰險塞姦符節盜管璽篡弒矯誣非人之性也故曰為不善難也今人之所以犯囹圄之罪而陷於刑戮之患者由嗜慾無厭不循度量之故也何以知其然天下縣官法曰發墓者誅竊盜者刑此執政之所司也夫法令罔其姦邪勒率隨其蹤跡無愚夫憃婦皆知為姦之無脫也犯禁之不得免也然而不材子不勝其欲蒙死亡之罪而被刑戮之羞立秋之後司寇之徒繼踵於門而死市之人血流於路何則惑於財利之得而蔽於死亡之患也今夫陳卒設兵兩軍相當將施令曰斬首者拜爵而屈撓者要斬然而隊伯之卒皆不能前遂斬首之功而後被要斬之罪是去恐死而就必死也故利害之反禍福之接不可不審也事或欲之適足以失之或避之適足以就之楚人有乘船而遇大風者波至而恐自投於水非不貪生而畏死也惑於恐死而反忘生也故人之嗜慾亦猶此也齊人有盜金者當市繁之時至掇而走勒問其故曰而盜金於市中何也對曰吾不見人徒見金耳志所欲則忘其為矣是故聖人審動靜之變而適受與之度理好憎之情而和喜怒之節夫動靜得則患弗遇也受與適則罪弗累也好憎理則憂弗近也喜怒節則怨弗犯也故達道之人不苟得不攘福其有弗棄非其有弗索常滿而不溢恒虛而易足今夫霤水足以溢壺榼而江河不能實漏卮故人心猶是也自當以道術度量食充虛衣禦寒則足以養七尺之形矣若無道術度量而以自儉約則萬乘之勢不足以為尊天下之富不足以為樂矣孫叔敖三去令尹而无憂色爵祿不能累也荊佽非兩蛟夾繞其船而志不動怪物不能驚也聖人心平志易精神內守物莫足以惑之夫醉者俛入城門以為七尺之閨也超江淮以為尋常之溝也酒濁其神也怯者夜見立表以為鬼也見寢石以為虎也懼揜其氣也又況乎天地之怪物乎夫雌雄相接陰陽相薄羽者為雛𪆪毛者為駒犢柔者為皮肉堅者為齒角人弗怪也水生蠬蜄山生金玉人弗怪也老槐生火久血為燐人弗怪也山出梟陽水生罔象木生畢方井生墳羊人怪之聞見鮮而識物淺也天下之怪物聖人之所獨見利害之反覆知者之所獨明達也同異嫌疑者世俗之所眩惑也夫見不可布於海內聞不可明於百姓是故因鬼神禨祥而為之立禁揔形推類而為之變象何以知其然也世俗言曰饗大高者而彘為上牲葬死人者裘不可以藏相戲以刃者太祖軵其肘枕戶橉而臥者鬼神蹠其首此皆不著於法令而聖人之所不口傳也夫饗大高而彘為上牲者非彘能賢於野獸麋鹿也而神明獨饗之何也以為彘者家人所常畜而易得之物也故因其便以尊之葬死人裘不可以藏者非能具綈綿曼帛溫煖於身也世以為裘者難得貴賈之物也而可傳於後世無益於死者而足以養生故因其資以讋之相戲以刃太祖軵其肘者夫以刃相戲必為過失過失相傷其患必大無涉血之仇爭忿鬭而以小事自內於刑戮愚者所不知忌也故因太祖以累其心枕戶橉而臥鬼神蹠其首者使鬼神能玄化則不待戶牖而行若循虛而出入則亦无能履也夫戶牖者風氣之所從往來而風氣者陰陽粗觕者也離者必病故託鬼神以申誡之也凡此之屬皆不可勝著於書策竹帛而藏於宮府者也故以禨祥明之為愚者之不知其害乃借鬼神之威以聲其教所由來者遠矣而愚者以為禨祥而狠者以為非唯有道者能通其志今世之祭井竈門戶箕帚臼杵者非以其神為能饗之也恃賴其德煩苦之無已也是故以時見其德所以不忘其功也觸石而出膚寸而合不崇朝而徧雨天下者唯太山赤地三年而不絕流澤及百里而潤草木者唯江河也是以天子祑而祭之故馬免人於難者其死也葬之以帷為衾牛有德於人者其死也葬之以大車之箱為薦牛馬有功猶不可忘又況人乎此聖人所以重仁襲恩故炎帝作火死而為竈灶禹勞力天下死而為社后稷作稼穡死而為稷羿除天下之害死而為宗布此鬼神之所以立北楚有任俠者其子孫數諫而止之不聽也縣有賊大搜其廬事果發覺夜驚而走追道及之其所施德者皆為之戰得免而遂反語其子曰汝數止吾為俠今有難果賴而免身而諫我不可用也知所以免於難而不知所以无無難論事如此豈不或哉宋人有嫁子者告其子曰嫁未必成也有如出不可不私藏私藏而富其於以復嫁易其子聽父之計竊而藏之君公知其盜也逐而去之其父不自非也而反得其計知為出藏財而不知藏財所以出也為論如此豈不勃哉今夫僦載者救一車之任極一牛之力為軸之折也有加轅軸其上以為造不知軸轅之趣軸折也楚王佩玦而逐兔為走而破其玦也因珮兩玦以為之豫兩玦相觸破乃逾疾亂國之治有似於此夫鴟目大而眎不若鼠蚈足眾而走不若虵物固有大不若小眾不若少者及至夫彊之弱弱之彊危之安存之亡也非聖人孰能觀之大小尊卑未足以論也唯道之在者為貴何以明之天子處於郊亭則九卿趨大夫走坐者伏倚者齊當此之時明堂太廟懸冠解劍緩帶而寢非郊亭大而廟堂狹小也至尊居之也天道之貴也非特天子之為尊也所在而眾仰之夫蟄蟲鵲巢皆嚮天一者至和在焉爾帝者誠能包稟道合至和則禽獸草木莫不被其澤矣而況兆民乎
