body:
  text: 說山訓魄問於魂曰道何以為體曰以無有為體魄曰無有有形乎魂曰無有魄曰無有何得而聞也魂曰吾直有所遇之耳視之無形聽之無聲謂之幽冥幽冥者所以喻道而非道也魄曰吾得之矣乃內視而自反也魂曰凡得道者形不可得而見名不可得而揚今汝已有形名矣何道之所能乎魄曰言者獨何為者吾將反吾宗矣魄反顧魂忽然不見反而自存亦以淪於無形矣人不小覺不大迷不小慧不大愚人莫鑑於流潦而鑑於澄水者以其休止不蕩也詹公之釣得千歲之鯉曾子攀柩車引輴者為之止老母行歌而動申喜精之至也瓠巴鼓瑟而淫魚出聽百牙鼓琴而駟馬仰秣介子歌龍蛇而文君垂泣故玉在山而草木潤淵生珠而岸不枯螾無筋骨之強爪牙之利上食晞堁下飲黃泉用心一也清之為明杯水見眸子濁之為闇河水不見太山視日者眩聽雷者𦗳人無為則治有為則傷無為而治者載無也為者不能有也不能無為者不能有為也人無言而神有言者則傷無言而神者載無有言則傷其神之神者鼻之所以息耳之所以聽終以其無用者為用矣物莫不因其所有而用其所無以為不信視籟與竽念慮者不得臥止念慮則有為其所止矣兩者俱亡則至德純矣聖人終身言治所用者非其言也用所以言也歌者有詩然使人善之者非其詩也鸚鵡能言而不可使長言是何則得其所言而不得其所以言故循迹者非能生迹者也神蛇能斷而復續而不能使人勿斷也神龜能見夢元王而不能自出漁者之籠四方皆道之門戶牖嚮也在所從闚之故釣可以教騎騎可以教御御可以教刺舟越人學遠射者參天而發適在五步之內不易其儀世已變矣而守其故譬猶越人之射也月望日奪其光陰不可以乘陽也日出星不見不能與之爭光也故末不可以強於本指不可以大於臂下輕上重其覆必易一淵不兩鮫一棲不兩雄一則定兩則爭水定則清正動則失平故惟不動則所以無不動也江河所以能長百谷者能下之也夫惟能下之是以能上之天下莫相憎於膠漆而莫相愛於冰炭膠漆相賊冰炭相息也牆之壞愈其立也冰之泮愈其凝也以其反宗泰山之容巍巍然高去之千里不見埵堁遠之故也秋豪之末淪於不測是故小不可以為內者大不可以為外矣蘭生幽宮不為莫服而不芳舟在江海不為莫乘而不浮君子行義不為莫知而止休夫玉潤澤而有光其聲舒揚渙乎其有似也無內無外不匿瑕穢近之而濡望之而隧夫照鏡見眸子微察秋毫明照晦冥故和氏之璧隨侯之珠出於山淵之精君子服之順祥以安寧侯王寶之為天下正陳成恒之劫子淵捷也子罕之辭其所不欲而得其所欲孔子之見黏蟬者白公勝之倒杖策也衛姬之請罪於桓公也曾子見子夏曰何肥也魏文侯之見反披裘而負芻也兒說之為宋王解閉結也此皆微眇可以觀論者人有嫁其子而教之曰爾行矣慎無為善曰不為善將為不善邪應之曰善且由弗為況不善乎此全其天器者拘囹圄者以日為脩當市死者以日為短日之脩短有度也有所在而短有所在而脩也則中不平也故以不平為平者其平不平也嫁女於病消渴者夫死則言女妨後難復處也故沮舍之下不可以坐倚牆之傍不可以立執獄牢者無病罪當死者肥澤刑者多壽心無累也良醫者常治無病之病故無病聖人者常治無患之患故無患也夫至巧不用鉤繩善閉者不用關楗淳于髡之告失火者此其類以清入濁必困辱以濁入清必覆傾君子之於善也猶采薪者見一介則掇之見青蔥則拔之天二氣則成虹地二氣則泄藏人二氣則成病陰陽不能且冬且夏月不知晝日不知夜善射者發不失的善於射矣而不善所射善釣者無所失善於釣矣而不善所釣故有所善則有不善矣鍾之與磬也近之則鍾音充遠之則磬音章物固有近不若遠遠不如近者今曰稻生於水而不能生於湍瀨之流紫芝生於山而不能生於盤石之上慈石能引鐵及其於銅則不行也水廣者魚大山高者木脩廣其地而薄其德譬猶陶人為器也揲挻其土而不益厚破乃愈疾聖人不先風吹不先雷毀不得已而動故無累月盛衰於上則蠃蛖應於下同氣相動不可以為遠執彈而招鳥揮梲而呼狗欲致之顧反走故魚不可以無餌釣也獸不可以虛器召也剝牛皮鞹以為鼓正三軍之眾然為牛計者不若服於軛也狐白之裘天子被之而坐廟堂然為狐計者不若走於澤也亡羊而得牛則莫不利失也斷指而免頭則莫不利為也故人之情於利之中則爭取大焉於害之中則爭取小焉將軍不敢騎白馬亡者不敢夜揭炬保者不敢畜噬狗雞知將旦鶴知夜半而不免於鼎俎山有猛獸林木為之不斬園有螫蟲藜藿為之不采故國有賢臣折衝千里為儒而踞里閭為墨而朝吹竽欲滅迹而走雪中拯溺者而欲無濡是非所行而行所非今夫闇飲者非嘗不遺飲也使之自以平則雖愚無失矣是故不同于和而可以成事者天下無之矣求美則不得不求美則有美矣求醜則不得醜不求醜則有醜矣不求美又不求醜則無美無醜矣是謂玄同申徒狄負石自沉於淵而溺者不可以為抗弦高誕而存鄭誕不可以為常事有一應而不可循行人有多言者猶百舌之聲也人有少言者猶不脂之戶也六畜生多耳目者不詳讖書著之百人抗浮不若一人挈而趨物固有眾而不若少者引車者二六而後之事固有相待而成者兩人俱溺不能相拯一人處陸則可矣故同不可相治必待異而後成下有伏苓上有兔絲上有叢蓍下有伏龜聖人從外知內以見知隱也喜武非俠也喜文非儒也好方非醫也好馬非騶也知音非瞽也知味非庖也此有一概而未得主名也被甲者非為十步之內也百步之外則爭深淺深則達五藏淺則至膚而止矣死生相去不可為道里楚王亡其猨而林木為之殘宋君亡其珠池中魚為之殫故澤失火而林憂上求材臣殘木上求魚臣乾谷上求楫而下致舩上言若絲下言若綸上有一善下有二譽上有三衰下有九殺大夫種知所以強越而不知所以存身萇弘知周之所以存而不知身之所以亡知遠而不知近畏馬之辟也不敢騎懼車之覆也不敢乘是以虛禍距公利也不孝弟者或詈父母生子者所不能任其必孝也然猶養而長之范氏之敗也有竊其鍾負而走者鎗然有聲懼人聞之遽掩其耳憎人聞之可也自掩其耳悖矣升之不能大於石也升在石之中夜之不能脩於歲也夜在歲之中仁義之不能大於道德也仁義在道德之包先針而後縷可以成帷先縷而後針不可以成衣針成幕蔂成城事之成敗必由小生言有漸也染者先青而後黑則可先黑而後青則不可工人下漆而上丹則可下丹而上漆則不可萬事猶此所先後上下不可不審水濁而魚噞形勞則神亂故國有賢君折衝萬里因媒而嫁不因媒而成因人而交不因人而親行合趨同千里相從趣不合行不同對門不通海水雖大不受胔芥日月不應非其氣君子不容非其類也人不愛倕之手而愛己之指不愛江漢之珠而愛己之釣以束薪為鬼以火煙為氣以束薪為鬼朅而走以火煙為氣殺豚烹狗先事如此不如其後巧者善度知者善豫羿死桃部不給射慶忌死劍鋒不給搏滅非者戶告之曰我實不與我嫂亂謗乃愈起止言以言止事以事譬猶揚堁而弭塵抱薪而救火流言雪汙譬猶以涅拭素也矢之於十步貫兕甲於三百步不能入魯縞騏驥一日千里其出致釋駕而僵大家攻小家則為暴大國并小國則為賢小馬大馬之類也小知非大知之類也被羊裘而賃固其事也貂裘而負籠甚可怪也以絜白為污辱譬猶沐浴而抒溷薰燧而負彘治疽不擇善惡醜肉而并割之農夫不察苗莠而并耘之豈不虛哉壞塘以取龜發屋而求狸掘室而求鼠割脣而治齲桀跖之徒君子不與殺戎馬而求狐狸援兩鱉而失靈龜斷右臂而爭一毛折鏌邪而爭錐刀用智如此豈足高乎寧百刺以針无一刺以刀寧一引重无久持輕寧一月飢无一旬餓萬人之蹪愈於一人之墜有譽人之力儉者舂至旦不中員呈猶讁之察之乃其母也故小人之譽人反為損東家母死其子哭之不哀西家子見之歸謂其母曰社何愛速死吾必悲哭社夫欲其母之死者雖死亦不能悲哭矣謂學不暇者雖暇亦不能學矣見窾木浮而知為舟見飛蓬轉而知為車見鳥迹而知著書以類取之以非義為義以非禮為禮譬猶倮走而追狂人盜財而予乞者竊簡而寫法律蹲踞而誦詩書割而舍之鏌邪不斷肉執而不釋馬氂截玉聖人無止無以歲賢昔日愈昨也馬之似鹿者千金然而天下無千金之鹿玉待礛諸而成器有千金之璧而無錙錘之礛諸受光於隙照一隅受光於牖照北壁受光於戶照室中無遺物況受光於宇宙乎天下莫不藉明於其前矣由此觀之所受者小則所見者淺所受者大則所照者博江出岷山河出崑崙濟出王屋潁出少室漢出嶓冢分流舛馳注於東海所行則異所歸者一通於學者若車軸轉轂之中不運於己與之致千里終而復始轉无窮之源不通於學者若迷惑告之以東西南北所居聆聆背而不得不知凡要寒不能生寒熱不能生熱不寒不熱能生寒熱故有形出於無形未有天地能生天地者也至深微廣大矣雨之集無能霑待其止而能有濡矢之發無能貫待其止而能有穿唯止能止眾止因高而為臺就下而為池各就其勢不敢更為聖人用物若用朱絲約芻狗若為土龍以求雨芻狗待之而求福土龍待之而得食魯人身善制冠妻善織履往徙於越而大困窮以其所脩而遊不用之鄉譬若樹荷山上而畜火井中操鉤上山揭斧入淵欲得所求難也方車而蹠越乘桴而入胡欲无窮不可得也楚王有白蝯王自射之則搏矢而熙使養由其射之始調弓矯矢未發而蝯擁樹號矣有先中中者也咼氏之璧夏后之璜揖讓而進之以合歡夜以投人則為怨時與不時畫西施之面美而不可說規孟賁之目大而不可畏君形者亡焉人有昆弟相分者无量而眾稱義焉夫唯無量故不可得而量也登高使人欲望臨深使人欲闚處使然也射者使人端釣者使人恭事使然也曰殺罷牛可以贖良馬之死莫之為也殺牛必亡之數以必亡贖不必死未能行之者矣季孫氏劫公家孔子說之先順其所為而後與之入政曰與枉與直如何而不得與直與枉勿與遂往此所謂同污而異塗者眾曲不容直眾枉不容正故人眾則食狼狼眾則食人欲為邪者必相明正欲為曲者必達直公道不立私欲得容者自古及今未嘗聞也此以善託其醜眾議成林無翼而飛三人成市虎一里能撓椎夫游沒者不求沐浴已自足其中矣故草食之獸不疾易藪水居之蟲不疾易水行小變而不失常信有非而禮有失尾生死其梁柱之下此信之非者孔氏不喪出母此禮之失者曾子立孝不過勝母之閭墨子非樂不入朝歌之邑曾子立廉不飲盜泉所謂養志者也紂為象箸而箕子唏魯以偶人葬而孔子歎故聖人見霜而知冰有鳥將來張羅而待之得鳥者羅之一目也今為一目之羅則無時得鳥矣今被甲者以備矢之至若使人必知所集則懸一札而已矣事或不可前規物或不可豫慮卒然不戒而至故聖人畜道以待時𨱙屯犂牛既科以橢決鼻而羈生子而犧尸祝齋戒以沈諸河河伯豈羞其所從出辭而不享哉得萬人之兵不如聞一言之當得隋侯之珠不若得事之所由得咼氏之璧不若得事之所適撰良馬者非以逐狐狢將以射麋鹿砥利劍者非以斬縞衣將以斷兕犀故高山仰止景行行止鄉者其人見彈而求鴞炙見卵而求晨夜見黂而求成布雖其理哉亦不病暮象解其牙不憎人之利之也死而棄其招簀不怨人之取之人能以所不利利人則可狂者東走逐者亦東走東走則同所以東走者則異溺者入水拯之者亦入水入水則同所以入水者則異故聖人同死生愚人亦同死生聖人之同死生通於分理愚人之同死生不知利害所在徐偃王以仁義亡國國亡者非必仁義比干以忠靡其體被誅者非必忠也故寒者顫懼者亦顫此同名而異實明月之珠出於蛖蜄周之簡圭生於垢石大蔡神龜出於溝壑萬乘之主冠錙錘之冠履百金之車牛皮為鼓正三軍之眾欲學歌謳者必先徵羽樂風欲美和者始於陽阿采菱此皆學其所不欲學而至其所欲學者燿蟬者務在明其火釣魚者務在芳其餌明其火者所以燿而致之也芳其餌者所以誘而利之也欲致魚者先通水欲致鳥者先樹木水積而魚聚木茂而鳥集好弋者先具繳與矰好魚者先具罟與罛未有无其具而得其利遺人馬而解其羈遺人車而稅其轙所愛者少而所亡者多故里人諺曰烹牛而不鹽敗所為也桀有得事堯有遺道嫫母有所美西施有所醜故亡國之法有可隨者治國之俗有可非者琬琰之玉在洿泥之中雖廉者弗釋弊箅甑𤬿在旃茵之上雖貪者不搏美之所在雖污辱世不能賤惡之所在雖高隆世不能貴春貸秋賦民皆欣春賦秋貸眾皆怨得失同喜怒為別其時異也為魚德者非挈而入淵為蝯賜者非負而緣木縱之其所利而已貂裘而雜不若狐裘而粹故人莫惡於無常行有相馬而失馬者然良馬猶在相之中今人放燒或操火往益之或接水往救之兩者皆未有功而怨德相去亦遠矣郢人有買屋棟者求大三圍之木而人予之車轂跪而度之巨雖可而長不足蘧伯玉以德化公孫鞅以刑罪所極一也病者寢席醫之用針石巫之用糈藉所救鈞也狸頭愈鼠雞頭已瘻䖟散積血斲木愈齲此類之推者也膏之殺鱉鵲矢中蝟爛灰生蠅漆見蟹而不乾此類之不推者也推與不推若非而是若是而非孰能通其微天下無粹白狐而有粹白之裘掇之眾白也善學者若齊王之食雞必食其蹠數十而後足刀便剃毛至伐大木非斧不剋物固有以剋適成不逮者視方寸於牛不知其大於羊揔視其體乃知其相去之遠孕婦見兔而子缺脣見麋而子四目小馬之目大不可謂之大馬大馬之目眇可謂之眇馬物固有似然而似不然者故決指而身死或斷臂而顧活類不可必推厲利劍者必以柔砥擊鍾磬者必以濡木轂強必以弱輻兩堅不能相和兩強不能相服故梧桐斷角馬氂截玉媒但者非學謾也但成而生不信立慬者非學鬭爭也慬立而生不讓故君子不入獄為其傷恩也不入市為其侳廉積不可不慎者也走不以手縛手走不能疾飛不以尾屈尾飛不能遠物之用者必待不用者故使之見者乃不見者也使鼓鳴者乃不鳴者也嘗一臠肉而知一鑊之味懸羽與炭而知燥溼之氣以小明大見一葉落而知歲之將暮睹瓶中之冰而知天下之寒暑以近論遠三人比肩不能外出戶二人相隨可以通天下足蹍地而為迹暴行而為影此易而難莊王誅里史孫叔敖制冠浣衣文公棄荏席後黴黑咎犯辭歸故木葉落而長年悲也鏏鼎日用而不足貴周鼎不爨而不可賤物固有以不用而為有用者地平則水不流重鈞則衡不傾物之尤必有所感物固有以不用為大用者先倮而浴則可以浴而倮則不可先祭而後饗則可先饗而後祭則不可物之先後各有所宜也祭之日而言狗生取婦夕而言衰麻置酒之日而言上冢渡江河而言陽侯之波或曰知天且赦也而多殺人或曰知天且赦也而多活人其望赦同其所利害異故或吹火而然或吹火而滅所以吹者異也烹牛以饗其里而罵其東家母德不報而身見殆文王汙膺鮑申傴背以成楚國之治裨諶出郭而知以成子產之事侏儒問天高于脩人脩人曰不知曰子雖不知猶近之於我故凡問事必於近者寇難至躄者告盲者盲者負而走兩人皆活得其所能也故使瘖者語使躄者走失其所能也郢人有鬻其母為請于買者曰此母老矣幸善食之而勿苦此行大不義而欲為小義者介蟲之動以固貞蟲之動以毒螫熊羆之動以攫搏兕牛之動以觝觸物莫措其所脩而用其所短也治國者若鎒田去害苗者而已今沐者墮髮而猶為之不止以所去者少所利者多砥石不利而可以利金擏不正而可以正弓物固有不正而可以正不利而可以利力貴齊知貴捷得之同遬為上勝之同遟為下所以貴鏌邪者以其應物而斷割也𠟣靡勿釋牛車絕轔為孔子之窮於陳蔡而廢六藝則惑為醫之不能自治其病病而不就藥則勃矣
