body:
  text: 淮南鴻烈解卷十三漢髙誘注汜論訓博說世間古今得失以道為化大歸於一故曰汜論古者有鍪謀而綣領以王天下者矣古者盖三皇以前也鍪頭著兠鍪㡌言未知制冠也綣領皮衣屈而紩之如今胡家韋襲反褶以為領一説鍪放髪也綣繞頸而已皆無飾也其德生而不辱刑措不用也予而不奪予予民財也不奪無所徵求於民也天下不非其服同懷其德非猶譏呵也懷歸也當此之時隂陽和平風雨時節萬物蕃息政不虐生無夭折也烏鵲之巢可俯而探也禽獸可覊而從也從猶牽也豈必襃衣博帶句襟委章甫哉襃衣謂方與之衣如今吏人之左衣也博帶大帶句襟今之曲領襃衣也委委貌章甫冠名古者民澤處復穴處居也復宂重窟也一説穴毁隄防崖岸之中以為窟室冬日則不勝霜雪霧露夏日則不勝暑熱蟁䖟聖人乃作為之築土構木以為宫室上棟下宇以蔽風雨棟屋穩也宇屋之垂以避寒暑而百姓安之伯余之初作衣也伯余黄帝臣世本曰伯余制衣裳一曰伯余黄帝緂恬麻索縷手經指挂其成猶網羅緂銳索功也後世為之機杼勝複以便其用而民得以揜形御寒古者剡耜而耕摩蜃而耨剡利也耜臿屬蜃大蛤摩令利用之耨耨除苗穢也木鉤而樵抱甀而汲鉤鐮也樵薪蒸甀武今兖州曰小武為甀幽州曰瓦民勞而利薄後世為之耒耜耰鋤斧柯而樵桔臯而汲㭬椎三輔謂之儓所以覆種也民逸而利多焉古者大川名谷衝絶道路不通徃來也乃為窬俞木方版以為舟航窬空也方並也舟相連為航也故地勢有無得相委輸運所有輸所無乃為靻祖蹻而超千里肩荷負儋躭之勤也靻蹻靻靸也勤勞也而作為之楺輪建輿駕馬服牛民以致逺而不勞為鷙禽猛獸之害傷人而無以禁御也而作為之鑄金鍛鐵以為兵刃猛獸不能為害故民迫其難則求其便困其患則造其備人各以其所知去其所害就其所利常故不可循器械不可因也循隨也當時之可改則改之也則先王之法度有移易者矣古之制婚禮不稱主人當婚者之身不稱其名也稱諸父兄師友舜不告而娶非禮也立子以長文王舎伯邑考而用武王非制也伯邑考武王之兄廢長立聖以庶代嫡聖人之權也禮三十而娶文王十五而生武王非法也三十而娶者隂陽未分時俱生於子男從子數左行三十年立於己女從子數右行二十年亦立於己合夫婦故聖人因是制禮使男三十而娶女二十而嫁其男子自己數左行十得寅故人十月而生於寅男子數從寅起女自己數右行得申亦十月而生於申故女子數從申起歲星十二歲而周天天道十二而備故國君十二歲而冠冠而娶十五生子重國嗣也故不從制夏后氏殯於阼階之上禮飯于牖下小歛於户内大歛於阼階在牀曰尸在棺曰柩殯於賓位祖於庭葬於墓也於阼階猶在主位未忍以賓道逺之殷人殯於兩楹之間楹柱也記曰殷殯之於堂上兩柱之間賓主共周人殯於西階之上葢以賓道遣之此禮之不同者也有虞氏用瓦棺有虞氏舜世也瓦棺陶瓦夏后氏堲即周夏后氏禹世無棺槨以瓦廣二尺長四尺側身累之以蔽土曰堲周殷人用槨用栢為槨厚之宜以棺為制也周人牆置翣此葬之不同者也周人兼用棺槨故牆設翣狀如今要扇畵文挿置棺車箱以為飾多少之差各從其爵命之數也夏后氏祭於闇於室中中夜祭之也殷人祭於陽堂上日平旦祭也周人祭於日出以朝於日出時祭於庭中朝者庭也此祭之不同者也堯大章舜九韶禹大夏湯大濩周武象此樂之不同者也故五帝異道而德覆天下三王殊事而名施後世此皆因時變而制禮樂者譬猶師曠之施瑟柱也所推移上下者無寸尺之度而靡不中音故通於禮樂之情者能作音有本主於中而以知榘矩彠約之所周者也榘方也彠度法也魯昭公有慈母而愛之死為之練冠故有慈母之服慈母父所命養己者也此大夫之妾士之妻謂之女母禮為緦麻三月昭公獨練也陽侯殺蓼侯而竊其夫人故大饗廢夫人之禮陽侯陽陵國侯也蓼侯臯陶之後偃姓之國侯也今在廬江古者大饗飲酒君執爵夫人執豆陽侯見蓼侯夫人美豔因殺蓼侯而娶夫人由是廢致夫人之禮先王之制不宜則廢之末世之事善則著之是故禮樂未始有常也故聖人制禮樂而不制於禮樂聖人能作禮樂不為禮樂所制治國有常而利民為本政教有經而令行為上茍利於民不必法古茍周於事不必循舊夫夏商之衰也不變法而亡三代之起也不相襲而王故聖人法與時變禮與俗化衣服器械各因其宜故變古未可非而循俗未足多也循隨也百川異源而皆歸於海百家殊業而皆務於治王道缺而詩作周室廢禮義壞而春秋作詩春秋學之美者也皆衰世之造也儒者循之以教導於世豈若三代之盛哉以詩春秋為古之道而貴之又有未作詩春秋之時夫道之缺也不若道其全也誦先王之詩書不若聞得其言聞得其言不若得其所以言聞聖人之言不如得其未言時本意得其所以言者言弗能言也聖人所言微妙凡人雖得之口不能以言故道可道者非常道也常道深隱幽㝠不可道也猶聖人之言微妙不可言周公事文王也行無專制專獨制斷也事無由己請而後行身若不勝衣言若不出口有奉持於文王洞洞屬屬如將不能恐失之洞洞屬屬婉順貌如將不能勝之恐失之愼之至也可謂能子矣武王崩成王㓜少周公繼文王之業履天子之籍聽天下之政籍圗籍也政治也籍或作阼平夷狄之亂誅管蔡之罪負扆而朝諸侯誅賞制斷無所顧問威動天地聲懾海内懾服也可謂能武矣成王旣壯周公屬籍致政北靣委質而臣事之以圗籍付屬成王致猶歸也北靣委玉帛之質執臣之禮也請而後為復而後行無擅恣之志無伐矜之色可謂能臣矣故一人之身而三變者所以應時矣何況乎君數易世國數易君人以其位逹其好憎人人以其寵位行其所好憎其所憎也以其威勢供嗜欲而欲以一行之禮一定之法應時偶變其不能中權亦明矣一行之禮非隨時禮也一定之法非隨時法也故聖人所由曰道所為曰事道猶金石一調不更事猶琴瑟每絃改調金石鍾聲故曰調而不更琴瑟絃有數急柱有前却故調事亦如之也故法制禮義者治人之具也而非所以為治也言法制禮義可以為治之基耳非所以為治治在其人之德猶弓矢射之具也非能必中中在其人之功故仁以為經義以為紀此萬世不更者也若乃人考其身才而時省其用雖日變可也言人能考度其才時省其行擇其善者而崇用之不必循常故曰雖日變可也唯仁義不可改耳故萬世不更天下豈有常法哉當於世事得於人理順於天地祥於鬼神則可以正治矣當合也祥順也古者人醇工龎商樸女重醇厚不虚華也工龎器堅緻也商樸不為詐也女重貞正無邪也是以政教易化風俗易移也今世德益衰民俗益薄欲以樸重之法治旣弊之民是猶無鏑銜橜策錣而御馯馬也鏑銜口中央鐵大如雞子中黄所制馬口也錣揣頭箴也馯馬突馬也昔者神農無制令而民從無制令結繩以治也唐虞有制令而無刑罰有制令焕乎其有文章其政常仁義民無犯法干誅故曰無刑夏后氏不負言言而信也殷人誓以言語要誓亦不違周人盟有事而㑹不恊而盟盟者殺牲㰱血以為信也逮至當今之世忍訽后而輕辱貪得而寡羞欲以神農之道治之則其亂必矣伯成子高辭為諸侯而耕天下高之今之時人辭官而隱處為鄉邑之下豈可同哉古之兵弓劒而已矣槽曹柔無擊脩㦸無刺槽柔木矛無擊無鐵刃也刺鋒也晩世之兵隆衝以攻渠幨以守隆高也衝所以臨敵城衝突壞之渠漸也一曰渠甲名幨幰所以禦矢也連弩以射銷車以闘連車弩通一絃以牛挽之以刃著左右為機開發之曰銷車古之伐國不殺黄口不獲二毛黄口㓜也二毛有白髪者於古為義於今為笑古之所以為榮者今之所以為辱也古之所以為治者今之所以為亂也夫神農伏羲不施賞罰而民不為非然而立政者不能廢法而治民舜執干戚而服有苗舜時有苗叛舜執干威而舞於兩階之間有苗服從然而征伐者不能釋甲兵而制疆㬥由此觀之法度者所以論民俗而節緩急也器械者因時變而制宜適也夫聖人作法而萬物制焉制猶從也賢者立禮而不肖者拘焉拘猶檢也制法之民不可與逺舉拘禮之人不可使應變耳不知清濁之分者不可令調音心不知治亂之源者不可令制法必有獨聞之耳獨見之明然後能擅道而行矣夫殷變夏周變殷春秋變周變改也三代之禮不同何古之從大人作而弟子循循遵也知法治所由生則應時而變不知法治之源雖循古終亂今世之法籍與時變禮義與俗易為學者循先襲業據籍守舊教以為非此不治是猶持方枘而周貟鑿也欲得宜適致固焉則難矣今儒墨者稱三代文武而弗行是言其所不行也非今時之世而弗改是行其所非也稱其所是行其所非是以盡日極慮而無益於治勞形竭智而無補於主也今夫圗工好畫鬼魅而憎圗狗馬者何也鬼魅不世出而狗馬可日見也夫存危治亂非智不能道而先稱古雖愚有餘故不用之法聖王弗行不驗之言聖王弗聽天地之氣莫大於和和者隂陽調日夜分而生物春分而生秋分而成生之與成必得和之精故聖人之道寛而栗嚴而温柔而直猛而仁言剛柔寛猛相濟也太剛則折太柔則卷聖人正在剛柔之間乃得道之本積隂則沉積陽則飛隂陽相接乃能成和夫繩之為度也可卷而伸也引而伸之可直而睎睎望也故聖人以身體之夫脩而不横短而不窮直而不剛乆而不忘者其唯繩乎故恩推則懦懦則不威推猶移也嚴推則猛猛則不和愛推則縱縱則不令縱放也刑推則虐虐則無親虐害也喜害人人無親之昔者齊簡公釋其國家之柄而專任其大臣簡公悼公陽生之子任也一德不解曰簡大臣陳成子將相攝威擅勢私門成黨而公道不行故使陳成田常鴟夷子皮得成其難難殺簡公之難使吕氏絶祀而陳氏有國者太公姓吕簡公其後也絶祀陳氏代之也此柔懦所生也鄭子陽剛毅而好罰子陽鄭君也一曰鄭相其於罰也執而無赦舎人有折弓者畏罪而恐誅則因猘制狗之驚以殺子陽舎人家臣也國人逐猘狗以亂擾舎人因之以殺子陽此剛猛之所致也今不知道者見柔懦者侵則矜為剛毅見剛毅者亡則矜為柔懦此本無主於中而見聞舛馳於外者也故終身而無所定趨舛乖也安定趨歸也譬猶不知音者之歌也濁之則鬱而無轉鬱湮也轉讀作傳清之則燋而不謳憔悴也謳和也及至韓娥秦青薛談之謳三人皆善謳者侯同曼聲之歌二人善歌一曰曼長憤於志積於内盈而發音則莫不比於律而和於人心何則中有本主以定清濁不受於外而自為儀表也今夫盲者行於道人謂之左則左謂之右則右遇君子則易道遇小人則䧟溝壑何則目無以接物也接見也故魏兩用樓翟吳起而亡西河魏文侯任樓翟吳起不用他賢秦伐䘮其西河之地湣汶王專用淖齒而死于東廟湣王田常之後代吕氏為齊侯春秋之後僣號稱王淖齒楚將奔齊為臣湣王無道淖齒殺之擢其筋懸廟門之梁三日而死無術以御之也文王兩用吕望召公奭而王楚莊王專任孫叔敖而覇有術以御之也孫叔敖楚大夫􅀢賈伯盈子夫弦歌鼓舞以為樂盤旋揖讓以修禮厚葬乆䘮以送死孔子之所立也而墨子非之兼愛上賢右鬼非命墨子之所立也而楊子非之兼三老五更是以兼愛選士大射是以上賢宗祀肖父是以右鬼右猶尊也順四時而行是以非命全性保眞不以物累形楊子之所立也而孟子非之全性保眞謂止㧞骬毛以利天下弗為不以物累己身形也趨捨人異各有曉心故是非有處得其處則無非失其處則無是丹宂太蒙反踵空同大夏北户竒肱脩股之民是非各異習俗相反丹宂南方當日下之地太蒙西方日所入處也反踵國名其人南行武迹北向空同戴勝極下之地大夏在西方北户在南方竒肱脩股之民在西南方凡此八者皆九州之外八寅之域者也君臣上下夫婦父子有以相使也此之是非彼之是也此之非非彼之非也此近諭諸華也彼逺諭八寅也於諸華所是八寅所非而廢也於諸華所非八寅所是而行也譬若斤斧椎鑿之各有所施也禹之時以五音聽治懸鐘皷磬鐸置鞀以待四方之士為號曰教寡人以道者擊鼓道和隂陽鼓一聲以調五音故擊之諭寡人以義者擊鐘鐘金也義者斷割故擊之告寡人以事者振鐸鐸鈴全口木舌合為音聲事者非一品故振之語寡人以憂者擊磬磬石也聲急憂亦急務故擊之有獄訟者搖鞀獄亦訟訟一辯於事故取小鞀搖也當此之時一饋而十起一沐而三捉髪饋者食也以勞天下之民勞猶憂也此而不能逹善効忠者則才不足也秦之時髙為臺榭大為苑囿逺為馳道鑄金人秦皇帝二十六年初兼天下有長人見於臨洮其高五丈足迹六尺放寫其形鑄金人以象之翁仲君何是也發適戍入芻稾戍守長城也入芻稾之稅以供國用頭㑹箕賦輸於少府頭㑹隨民口數人責其稅箕賦似箕然歛民財多取意也少府官名如今之司農也丁壯丈夫西至臨洮狄道臨洮隴西之縣洮水出北狄道漢陽之縣東至㑹稽浮石㑹稽山名浮石隨水高下言不没皆在遼西界一說㑹稽山在太山下封于太山禪於㑹稽是也㑹稽或作滄海南至豫章桂林豫章豫章郡桂林鬱林郡北至飛狐陽原飛狐葢在代郡南飛狐山也陽原葢在太原或曰伏郡廣昌東五阮門是也道路死人以溝量言滿溝也當此之時忠諫者謂之不祥而道仁義者謂之狂逮至高皇帝存亡繼絶漢高祖劉季也舉天下之大義身自奮袂執銳以為百姓請命于皇天執利兵伐無道以求百姓之命祈之於皇天也當此之時天下雄儁豪英㬥露于野澤才過千人為儁百人為豪萬人為英前蒙矢石而後墮谿壑出百死而紿代一生以爭天下之權墮入也紿至也奮武厲誠以決一旦之命當此之時豐衣博帶而道儒墨者以為不肖言尚武也逮至㬥亂已勝海内大定繼文之業立武之功繼文王受命之業武王誅無道之功履天子之圗籍造劉氏之貌冠高祖於新豐所作竹皮冠也一曰委貌冠總鄒魯之儒墨通先聖之遺教戴天子之旗乗大路建九斿撞大鐘擊鳴鼓奏咸池揚干戚周禮天子五路大路上路也王者功成作樂故撞鐘擊鼓咸池黄帝樂干楯戚斧也春秋舞者所執當此之時有立武者見疑一世之間而文武代為雌䧺有時而用也今世之為武者則非文也為文者則非武也文武更相非而不知時世之用也此見隅曲之一指而不知八極之廣大也隅曲室中之區隅言狹小八極八方之極言廣大也故東靣而望不見西牆南靣而視不覩北方唯無所嚮者則無所不通無所向則可以見四方也國之所以存者道德也家之所以亡者理塞也理也道堯無百户之郭舜無置錐之地以有天下禹無十人之衆湯無七里之分以王諸侯文王處岐周之間也地方不過百里而立為天子者有王道也夏桀殷紂之盛也人跡所至舟車所通莫不為郡縣然而身死人手而為天下笑者有亡形也故聖人見化以觀其徴徴成也德有盛衰風先萌焉風氣也萌見也故得王道者雖小必大有亡形者雖成必敗夫夏之將亡太史令終古先奔於商三年而桀乃亡殷之將敗也太史令向藝先歸文王朞年而紂乃亡終古向藝二賢人名故聖人之見存亡之迹成敗之際也非待鳴條之野甲子之日也湯伐桀禽於鳴條武王誅紂以甲子尅之今謂彊者勝則度地計衆冨者利則量粟稱金若此則千乗之君無不霸王者而萬乘之國無不破亡者矣存亡之迹若此其易知也愚夫惷婦皆能論之趙襄子以晉陽之城霸智伯以三晉之地擒湣王以大齊亡為淖齒所殺也田單以卽墨有功燕伐齊而滅之得七十城唯卽墨未下田單以市吏率卽墨市民以擊燕師破之故國之亡也雖大不足恃道之行也雖小不可輕由此觀之存在得道而不在於大也亡在失道而不在於小也詩云乃眷西顧此惟與宅言去殷而遷于周也紂治朝歌在東文王國於岐周在西天乃眷然顧西土此唯居周言我宅也故亂國之君務廣其地而不務仁義務高其位而不務道德是釋其所以存而造其所以亡也故桀囚於焦門而不能自非其所行而悔不殺湯於夏臺臺或作宫紂居於宣室而不反其過而悔不誅文王於羑里二君處彊大勢位修仁義之道湯武救罪之不給何謀之敢當若上亂三光之明下失萬民之心雖微湯武孰弗能奪也今不審其在己者而反備之于人言不愼行己之德而乃反備天下之人來誅也天下非一湯武也殺一人則必有繼之者也且湯武之所以處小弱而能以王者以其有道也桀紂之所以處彊大而見奪者以其無道也今不行人之所以王者而反益己之所以奪是趨亡之道也武王尅殷欲築宫於五行之山五行山今太行山也周公曰不可夫五行之山固塞險阻之地也使我德能覆之則天下納其貢職者廻也廻迂難也廻或作固固必也使我有㬥亂之行則天下之伐我難矣周公言我有㬥亂之行則天下當來伐我無為於五行之山使天下來伐我者難也言其依德不恃險也此所以三十六世而不奪也周公可謂能持滿矣滿而不溢也昔者周書有言曰周史之書上言者下用也下言者上用也用可否相濟也上言者常也為君常也下言者權也此存亡之術也權謀也謀度事宜不失其道也唯聖人為能知權言而必信期而必當天下之高行也直躬其父攘羊而子證之尾生與婦人期而死之尾生魯人與婦人期於梁下水至溺死也直而證父信而溺死雖有直信孰能貴之夫三軍矯命過之大者也秦穆公興兵襲鄭過周而東以兵伐國不擊鼓宻聲曰襲周者王城也鄭賈人弦高將西販牛道遇秦師於周鄭之間乃矯鄭伯之命犒以十二牛賓秦師而却之以存鄭國非君命也而稱君命曰矯酒肉曰嚮牛羊曰犒以其牛犒也秦師曰行千里而襲之逺主有備而師無繼不如還遂還師而去也故曰却之故事有所至信反為過誕反為功何謂失禮而有大功昔楚恭王戰於隂陵恭王與晉戰於隂陵吕射楚恭王中目因而擒之過而能改故曰恭也潘尫養由基黄衰微公孫丙相與簒之四子楚大夫簒晉救恭王衰讀維微讀救恭王懼而失體威儀不如常坐不能起也黄衰微舉足蹵促其體恭王乃覺怒其失禮奮體而起四大夫載而行失禮謂舉足蹵君也昔蒼吾繞娶妻而美以讓兄此所謂忠愛而不可行者也蒼吾繞孔子時人是故聖人論事之局曲直與之屈伸偃仰無常儀表時屈時伸卑弱柔如蒲韋非攝奪也剛强猛毅志厲青雲非本矜也以乘時應變也夫君臣之接屈膝卑拜以相尊禮也至其迫於患也則舉足蹵其體天下莫能非也是故忠之所在禮不足以難之也孝子之事親和顔卑體奉帶運履運正廻也至其溺也則捽其髪而拯拯升也出溺曰拯非敢驕侮以救其死也故溺則捽父祝則名君孟子曰嫂溺而不拯是豺狼也而况父兄乎故溺則拯之祝則名君周人以諱事神敬之至也勢不得不然也此權之所設也故孔子曰可以共學矣而未可以適道也可與適道未可以立也可以立未可與權權者聖人之所獨見也故忤而後合者謂之知權忤逆不合也權因事制宜權量輕重無常形勢能合醜反善合於宜適故聖人獨見之也合而後舛者謂之不知權不知權者善反醜矣故禮者實之華而偽之文也方於卒迫窮遽之中也則無所用矣是故聖人以文交於世而以實從事於冝不結於一迹之塗凝滯而不化是故敗事少而成事多號令行于天下而莫之能非矣結猶衆也猩猩知徃而不知來猩猩北方獸名人靣獸身黄色禮記曰猩猩能言不離走獸見人徃走則知人姓字又嗜酒人以酒搏之飲而不能息不知當醉以擒其身也乾干鵠知來而不知徃乾鵠鵲也人將有來事憂喜之徵則鳴知歲多風多巢於木枝人皆探其卵也此脩短之分也昔者萇𢎞周室之執數者也萇𢎞周景王之大夫數厯術也天地之氣日月之行風雨之變律厯之數無所不通然而不能自知車裂而死晉范中行氏之難以畔其君也周劉氏與晉范氏世為婚姻萇𢎞事劉文公故周人助范氏至敬王二十八年晉人讓周周為殺萇𢎞以釋之蘇秦匹夫徒走之人也靻蹻嬴蓋經營萬乘之主服諾諸侯然不自免於車裂之患蘇秦洛陽人嬴籝囊也蓋歩蓋也蘇秦相趙趙封之為武安君初帶籝囊䄡歩蓋厯説萬乘之君合山東之從利病之勢無所不下使諸侯服從無有不服諾者徐偃王被服慈惠身行仁義陸地之朝者三十二國然而身死國亡子孫無類偃王於衰亂之世修行仁義不設武備楚王㓕之大夫種輔翼越王句踐而為之報怨雪耻擒夫差之身開地數千里然而身伏屬鏤而死種佐句踐報怨於吳王夫差獲千里之地而越王終已疑之賜其屬鏤以死屬鏤利劒也此皆逹於治亂之機而未知全性之具者故萇𢎞知天道而不知人事蘇秦知權謀而不知禍福徐偃王知仁義而不知時大夫種知忠而不知謀不知為身謀也聖人則不然論世而為之事權事而為之謀是以舒之天下而不窕内之尋常而不塞不窕在大能大也八尺曰尋倍尋曰常在小能小不塞也使天下荒亂禮義絶綱紀廢彊弱相乘力征相攘臣主無差貴賤無序甲胄生蟣虱乘加也攘平除生蟣虱不離體也燕雀處帷幄而兵不休息幄幕也處猶巢也而乃始服屬㬰之貌謹也恭儉之禮則必㓕抑而不能興矣天下安寧政教和平百姓肅睦上下相親而乃始立氣矜奮勇力則必不免於有司之法矣是故聖人者能隂能陽能弱能彊隨時而動靜因資而立功物動而知其反事萌而察其變化則為之象運則為之應是以終身行而無所困故事有可行而不可言者有可言而不可行者有易為而難成者有難成而易敗者所謂可行而不可言者趨舍也可言而不可行者偽詐也易為而難成者事也難成而易敗者名也此四策者聖人之所獨見而留意也誳納寸而伸尺聖人為之小枉而大直君子行之周公有殺弟之累齊桓有爭國之名然而周公以義補缺謂翼成王以致太平七年歸政北靣為臣桓公以功㓕醜立九合一匡之功以㓕爭國之惡也而皆為賢今以人之小過揜其大美則天下無聖王賢相矣故目中有疵不害於視不可灼也疵贅灼燃也喉中有病無害於息不可鑿也鑿穿也河上之丘冡不可勝數猶之為易也言河上本非丘壟之處有易之猶多以大言之也以諭萬事多覆於少也水激興波高下相臨差以尋常猶之為平雖有激波猶以為平平者多也猶橘柚冬生人曰冬死者衆也薺麥夏死人曰夏生者多也昔者曹子為魯將兵三戰不勝亡地千里使曹子計不顧後足不旋踵刎頸於陳中則終身為破軍擒將矣然而曹子不羞其敗耻死而無功柯之盟揄三尺之刃造桓公之胷三戰所亡一朝而反之勇聞于天下功立於魯國復汶陽之田也管仲輔公子糺紏而不能遂遂成也不可謂智遁逃奔走不死其難不可謂勇束縛桎梏不諱其耻不可謂貞當此三行者布衣弗友人君弗臣布衣之士不以為益友也人君不以為義臣也然而管仲免於累紲之中立齊國之政九合諸侯一匡天下使管仲出死捐軀不顧後圗豈有此霸功哉今人君論其臣也不計其大功總其畧行而求小善則失賢之數也畧大也小善忠也數術也故人有厚德無問其小節而有大譽無疵其小故夫牛蹏之涔不能生鱣鮪鱣大魚長丈餘細鱗黄首白身短頭口在腹下鮪大魚亦長丈餘仲春二月從西河上得過龍門便為龍而蜂房不容鵠卵房巢也小形不足以包大體也夫人之情莫不有所短誠其大畧是也雖有小過不足以為累若其大畧非也雖有閭里之行未足大舉夫顔喙聚梁父之大盗也梁父齊邑而為齊忠臣段干木晉國之大駔祚也而為文侯師駔驕怛一曰駔市儈也言魏國之大儈也孟卯妻其嫂有五子焉然而相魏寧其危解其患孟卯齊人也及為魏臣能安其危解其患也戰國策曰芒卯也景陽淫酒被髪而御於婦人威服諸侯景陽楚將此四人者皆有所短然而功名不㓕者其畧得也畧猶道也季襄陳仲子立節抗行不入洿君之朝不食亂世之食遂餓而死季襄魯人孔子弟子陳仲子齊人孟子弟子居於陵不能存亡接絶者何小節伸而大畧屈伸用屈廢也故小謹者無成功訾行者不容於衆好揜人之善揚人之短訾毁人行自獨卑藏衆人所疾而不容之也一説訾毁也行有毁缺者不為衆人所容體大者節疏蹠距者舉逺疏長蹠足距大也自古及今五帝三王未有能全其行者也故易曰小過亨利貞言人莫不有過而不欲其大也夫堯舜湯武世主之隆也齊桓晉文五霸之豪英也然堯有不慈之名天下不以予子丹朱舜有卑父之謗瞽叟降在庶人湯武有放弑之事殷湯放桀南巢周武弑紂宣室五伯有㬥亂之謀齊桓晉文宋襄楚莊秦穆德未能純皆有爭奪之驗是故君子不責備於一人方正而不以割廉直而不以切博通而不以訾文武而不以責文武備具而不責備於人也求於一人則任以人力任其力所能任也自修則以道德責人以人力易償也自修以道德難為也難為則行高矣易償則求贍矣夫夏后氏之璜不能無考半圭曰璜夏后氏之珍玉也考瑕釁也明月之珠不能無纇夜光之珠有似月光故曰明月纇磐若絲之結纇也然而天下寳之者何也其小惡不足妨大美也今志人之所短而忘人之所脩而求得其賢於天下則難矣夫百里奚之飯牛伊尹之負鼎伊尹負鼎俎調五味以干湯卒為賢相太公之鼓刀太公河内汲人有屠釣之困寗戚之商歌其美有存焉者矣衆人見其位之卑賤事之洿辱而不知其大畧以為不肖及其為天子三公而立為諸侯賢相乃始信於異衆也夫發于鼎俎之間出于屠酤之肆肆列也解于累紲之中興于牛頷合之下洗之以湯沐祓弗之以爟灌火立之于本朝之上倚之于三公之位爟火取火於日之官也周禮司爟掌行火之政令火所以祓除不祥也立置也本朝國朝也内不慙於國家外不愧於諸侯符勢有以内合内合於君故未有功而知其賢者堯之知舜功成事立而知其賢者市人之知舜也為是釋度數而求之於朝肆草莾之中其失人也必多矣為上自任耳目聰明以得賢人之故不復用度量之術取人而亟求賢於朝肆之列草莾之中失賢人必多矣何可言求賢也何則能効其求而不知其所以取人也夫物之相類者世主之所亂惑也嫌疑肖象者衆人之所眩耀肖象似也故很者類知而非知很者自用像有知非真知愚者類仁而非仁愚者不能斷割有似於仁非真仁也戇者類勇而非勇戇者不知畏危難有似於勇非真勇使人之相去也若玉之與石美之與惡則論人易矣夫亂人者芎藭之與藁本也蛇牀之與麋蕪也此皆相似者言其相類但其芳臭不同猶小人類君子但其仁與不仁異也故劒工惑劒之似莫邪者唯歐冶能名其種歐冶良工也玉工眩玉之似碧盧者唯猗頓不失其情碧盧或云碔􅭏猗頓魯之富人能知玉理不失其情也闇主亂于姦臣小人之疑君子者唯聖人能見微以知明故蛇舉首尺而脩短可知也象見其牙而大小可論也薛燭庸子見若狐甲於劒而利鈍識矣薛齊邑燭庸氏子通利劒㬰兒易牙淄澠之水合者嘗一哈惡水而丼苦知矣㬰兒易牙皆齊之知味者也哈口也故聖人之論賢也見其一行而賢不肖分矣孔子辭廪邱終不盗刀鉤廩丘齊邑齊景公養孔子以言未見從道未得行不欲虚祿辭而不受故不復利人刀鉤也許由讓天子終不利封侯許由隱者陽成人堯欲以天下與之洗耳而不就故未嘗灼而不敢握火者見其有所燒也未嘗傷而不敢握刃者見其有所害也由此觀之見者可以論未發也而觀小節足以知大體矣故論人之道貴則觀其所舉富則觀其所施窮則觀其所不受賤則觀其所不為貧則觀其所不取視其更難以知其勇動以喜樂以觀其守委以財貨以論其人振以恐懼以知其節則人情備矣古之善賞者費少而勸衆善罰者刑省而姦禁善予者用約而為德善取者入多而無怨趙襄子圍於晉陽罷圍而賞有功者五人高赫為賞首左右曰晉陽之難赫無大功今為賞首何也智伯求地於趙襄子不與智伯率韓魏以圍之三月不尅趙氏之臣張孟談潜與韓魏通謀反智伯而殺之張孟談之力也襄子曰晉陽之圍寡人社稷危國家殆羣臣無不有驕侮之心唯赫不失君臣之禮故賞一人而天下為忠之臣者莫不願忠於其君此賞少而勸善者衆也齊威王設大鼎於庭中而數無鹽令曰子之譽日聞吾耳察子之事田野蕪倉廩虚囹圄實子以姦事我者也乃烹之齊以此三十二歲道路不拾遺此刑省姦禁者也秦穆公出遊而車敗右服失馬服中失馬野人得之穆公追而及之岐山之陽野人方屠而食之穆公曰夫食駿馬之肉而不還飲酒者傷人吾恐其傷汝等徧飲而去之處一年與晉惠公為韓之戰處一年者謂飲食肉人酒之明年也晉惠公夷吾倍秦納己之賂秦興兵伐晉戰於晉地韓原也晉師圍穆公之車梁由靡扣穆公之驂獲之梁由靡晉大夫扣猶牽也將獲穆公食馬肉者三百餘人皆出死為穆公戰於車下遂克晉虜惠公以歸此用約而為徳者也齊桓公將欲征伐甲兵不足令有罪者出犀甲一㦸犀甲取其堅也㦸車㦸也長丈六尺犀或作三直出三甲也有輕罪者贖以金分輕小也以金分出金隨罪輕重有分兩也訟而不勝者出一束箭箭十二為束也百姓皆説乃矯箭為矢治箭之笄好者也鑄金而為刄刄五刄也刀劒矛㦸矢也以伐不義而征無道遂霸天下此入多而無怨者也故聖人因民之所喜而勸善因民之所惡而禁姦故賞一人而天下譽之罰一人而天下畏之故至賞不費至刑不濫孔子誅少正卯而魯國之邪塞少正官卯其名也魯之謟人孔子相魯七日誅之於兩觀之下子産誅鄧析而鄭國之姦禁鄧析詭辯姦人之雄也子産誅之故姦禁以近諭逺以小知大也故聖人守約而治廣者此之謂也天下莫易於為善而莫難於為不善也為善净身無欲信仁而己順其天性故易為不善貪欲無厭毁人自成戾其天性故難所謂為善者靜而無為也所謂為不善者躁而多欲也適情辭餘無所誘惑循性保眞無變於己故曰為善易越城郭踰險塞姦符節盗管金簒弑矯誣非人之性也故曰為不善難姦私亦盗也符節成信也而盗取之管壯籥金印封亦所以為信也固閉藏也簒軾下謀上也矯擅作君命誣以惡覆人也皆非人本所受天之善性也今人所以犯囹圄之罪而䧟於刑戮之患者由嗜慾無厭不循度量之故也何以知其然天下縣官法曰發墓者誅竊盗者刑此執政之所司也夫法令者網其姦邪勒率隨其蹤跡勒主問吏也無愚夫惷婦皆知為姦之無脫也犯禁之不得免也然而不材子不勝其欲蒙死亡之罪而被刑戮之羞然而立秋之後司冦之徒繼踵於門而死市之人血流於路何則惑於財利之得而蔽於死亡之患也夫今陳卒設兵兩軍相當將施令曰斬首拜爵而屈撓者要斬然而隊階之卒皆不能前遂斬首之功遂成也而後被要斬之罪是去恐死而就必死也故利害之反禍福之接不可不審也事或欲之適足以失之或避之適足以就之楚人有乘船而遇大風者波至而自投於水非不貪生而畏死也惑於恐死而反忘生也故人之嗜慾亦猶此也齊人有盗金者當市繁之時至掇而走勒問其故曰而盗金於市中何也繁衆也故猶意也而汝也對曰吾不見人徒見金耳志所欲則忘其為矣是故聖人審動靜之變而適受與之度理好憎之情和喜怒之節夫動靜得則患弗過也受與適則罪弗累也好憎理則憂弗近也喜怒節則怨弗犯也故逹道之人不茍得不讓福其有弗棄非其有弗索常滿而不溢恒虚而易足虚無欲也今夫霤溜水足以溢壺榼渴而江河不能實漏巵故人心猶是也自當以道術度量食充虚衣御寒則足以養七尺之形矣若無道術度量而以自儉約則萬乘之勢不足以為尊天下之富不足以為樂矣孫叔敖三去令尹而無憂色爵禄不能累也荆佽非兩蛟夾繞其船而志不動怪物不能驚也聖人心平志易精神内守物莫足以惑之夫醉者俛入城門以為七尺之閨也超江淮以為尋常之溝也酒濁其神也怯者夜見立表以為鬼也見寢石以為虎也懼揜其氣也揜奪也又况無天地之怪物乎夫雌䧺相接隂陽相薄羽者為雛􅑹扣毛者為駒犢柔者為皮肉堅者為齒角人弗怪也水生蠬籠蜄甚山生金玉人弗怪也老槐生火乆血為燐璘人弗怪也血精在地㬥露百日則為燐遙望炯炯若燃火也山出嘄交陽嘄陽山精也人形長大靣黑色身有毛若反踵見人而笑水生罔象水之精也國語曰龍罔象也木生畢方木之精也狀如鳥青色赤脚一足不食五穀井生墳羊土之精也魯季子穿井獲土缶其中有羊是也人怪之聞見鮮而識物淺也天下之怪物聖人之所獨見利害之反覆知者之所獨明逹也同異嫌疑者世俗之所眩惑也夫見不可布於海内聞不可明於百姓是故因鬼神禨祥而為之立禁禨祥吉凶也禁戒也總形推類而為之變象何以知其然也世俗言曰饗大高者而彘為上牲大高祖也一曰上帝葬死人者裘不可以藏相戲以刄者太祖軵葺其肘軵擠也枕戶橉藺而卧者鬼神蹠其首此皆不著於法令而聖人之所不口傳也夫饗大高而彘為上牲者非彘能賢於野獸麋鹿也而神明獨饗之何也以為彘者家人所常畜而易得之物也故因其便以尊之裘不可以藏者非能具綈綿曼帛温煖於身也世以為裘者難得貴賈之物也曼帛細帛也裘狐之屬也故曰貴賈之物而不可傳於後世無益於死者而足以養生故因其資以讋之資用也讋忌也相戲以刃太祖軵其肘者夫以刃相戲必為過失過失相傷其患必大無渉血之讐爭忿闘而以小事自内於刑戮愚者所不知忌也故因太祖以累其心累恐也枕戶橉而卧鬼神履其首者使鬼神能𤣥化則不待戶牖之行若循虚而出入則亦無能履也虚孔竅也夫戸牖者風氣之所從徃來而風氣者隂陽粗捔角者也離者必病離遭也故託鬼神以伸誡之也凡此之屬皆不可勝著於書策竹帛而藏於宫府者也故以禨祥明之為愚者之不知其害乃借鬼神之威以聲其教所由來者逺矣而愚者以為禨祥而狠者以為非唯有道者能通其志今世之祭井竈門户箕箒臼杵者非以其神為能饗之也恃頼其德煩苦之無巳也是故以時見其德所以不忘其功也觸石而出膚寸而合不崇朝而雨天下者唯太山崇終也日旦至食時為終朝也赤地三年而不絶流澤及百里而潤草木者唯江河也是以天子秩而祭之故馬免人於難者其死也葬之牛其死也葬以大車為薦牛馬有功猶不可忘又况人乎此聖人所以重仁襲恩襲亦重累故炎帝於火而死為竈炎帝神農以火徳王天下死託祀於竈神禹勞天下而死為社勞天下謂治水之功也託祀於后土之神后稷作稼穡而死為稷稷周弃也羿除天下之害而死為宗布此鬼神之所以立羿堯時之諸侯河伯溺殺人羿射其左目風伯壊人屋室羿射中其膝又誅九嬰窫􅀢之屬有功於天下故死託於祀宗布祭田為宗布謂出也一曰今人室中所祀之宗布是也或曰司命傍布也北楚有任俠者其子孫數諫而止之不聽也縣有賊大搜其廬事果發覺夜驚而走追道及之其所施德者皆為之戰得免而遂反語其子曰汝數止吾為俠今有難果賴而免身而諫我不可用也知所以免於難而不知所以無難論事如此豈不惑哉宋人有嫁子者告其子曰嫁未必成也有如出不可不私藏私藏而富其於以復嫁易其子聽父之計竊而藏之君公知其盗也逐而去之其父不自非也而反得其計知為出藏財而不知藏財所以出也為論如此豈不勃哉今夫僦蹵載者救一車之任極一牛之力為軸之折也有如轅軸其上以為造不知軸轅之趣軸折也楚王之佩玦而逐莬兔為走而破其玦也因珮兩玦以為之豫兩玦相觸破乃逾疾亂國之治有似於此夫鴟目大而睡不若䑕蚈足衆而走不若蛇物固有大不若小衆不若少者及至夫彊之弱弱之彊危之安存之亡也非聖人孰能觀之大小尊卑未足以論也唯道之在者為貴何以明之天子處於郊亭則九卿趨大夫走坐者伏倚者齊當此之時明堂太廟懸冠解劒緩帶而寢非郊亭大而廟堂狹小也至尊居之也天道之貴也非特天子之為尊也所在而衆仰之夫蟄蟲鵲巢皆嚮天一者至和在焉爾帝者誠能包禀道合至和則禽獸草木莫不被其澤矣而况兆民乎淮南鴻烈解卷十三
