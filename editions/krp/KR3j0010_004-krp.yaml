body:
  text: 淮南鴻烈解卷四漢髙誘注墬形訓紀東西南北山川藪澤地之所載萬物形兆所化育也故曰地形墬形之所載六合之間四極之内六合巳説在原道四極四方之極無夏有外故謂之内也昭之以日月經之以星辰紀之以四時要之以太嵗要正也以太嵗所在正天時也天地之間九州八極八極八方之極也土有九山山有九塞澤有九藪風有八等水有六品何謂九州東南神州曰農土東南辰焉農神后稷之所經緯也故曰農土正南次州曰沃土沃盛也五月建午稼穡盛張故曰沃土西南戎州曰滔土滔大也七月建申五穀成大故曰滔土正西弇州曰并土并猶成也八月建酉百穀成熟故曰并土正中冀州曰中土冀大也四方之主故曰中土西北台州曰肥土正北濟州曰成土未聞東北薄州曰隠土薄猶平也隠氣所隠藏故曰隠土正東陽州曰申土申復也隂氣盡於北陽氣復起東北故曰申土何謂九山㑹稽泰山王屋首山太華岐山太行羊腸孟門㑹稽山在㑹稽郡泰山今在泰山郡是為東嶽王屋山在今河東恒縣東北所出也首山在蒲坂縣南阿曲之中伯夷所隠太華今𢎞農隂山也是為西嶽岐山今扶風漢陽縣北周家所邑也太行在今上黨太行關直河内野王縣羊腸山名今太原晉陽西北九十里通河西上郡關曰羊腸坂是孟門太行之限也何謂九塞曰太汾澠阨荆阮方城殽阪井陘令疵句注居庸太汾在晉澠阨今𢎞農澠池是也荆阮方城皆在楚殽阪𢎞農郡澠池殽欽吟是也井陘在常山通太原關令疵在遼西句注在鴈門隂館句注居庸在上谷阻陽之東通運都關何謂九藪藪澤也曰越之具區具區在吳越之間楚之雲夢雲夢在南郡華容秦之陽紆陽紆在馮翊池陽一名具圃晉之大陸大陸魏獻子所游焚焉而死者是也鄭之圃田圃田在今河南中牟傳曰鄭有原圃猶秦之具囿也吾子取其麋鹿以閒弊邑是也宋之孟諸孟諸在今梁園睢陽東北澤齊之海隅海隅猶崖葢近海濵趙之鉅鹿今鉅鹿黄阿澤是也燕之昭余昭余今太原郡古者屬燕何謂八風東北曰炎風艮氣所生也一曰融風東方曰條風震氣所生也一曰明庶風東南曰景風巽氣所生也一曰清明風南方曰巨風離氣所生也一曰凱風西南曰凉風坤氣所生也西方曰飂留風兑氣所生也西北曰麗風乾氣所生也一曰閶闔風北方曰寒風坎氣所生也一曰廣莫風何謂六水曰河水赤水遼水黒水江水淮水河水出崑崙東北陬赤水出其東南􅑍遼水出碣石山自塞北東流直遼東之西南入海黑水在雝州江水出岷山在蜀西徼淮水出桐柏山南平陽也闔四海之内東西二萬八千里南北二萬六千里子午為經卯酉為緯言經短緯長也水道八千里通谷其名川六百陸徑三千里陸徑邪徑也陸地也禹乃使太章步自東極至于西極二億三萬三千五百里七十五步使豎亥步自北極至于南極二億三萬三千五百里七十五步太章豎亥善行人皆禹臣也海内東西短南北長極内等也凡鴻水淵藪自三百仞以上二億三萬三千五百五十里有九淵禹乃以息土填洪水以為名山息土不耗減掘之益多故以填洪水名山大山也掘崑崙虚以下地掘猶平也地或作池中有增城九重其髙萬一千里百一十四步二尺六寸中崑崙虚中也增重也有五城十二樓見括地像此葢誕實未聞也上有木禾其修五尋土崑崙虚上也五尋長三十五尺珠樹玉樹琁窮樹不死樹在其西在木禾之西也沙棠琅玕在其東皆玉名也在木禾之東也一說沙棠木名也吕氏春秋曰果之美者沙棠之實也絳樹在其南絳赤色碧樹瑤樹在其北碧青玉色旁有四百四十門面有十門也門間四里里間九純純丈五尺純里名旁有九井玉横維其西北之隅横猶光也横或作彭彭受不死藥器也北門開以内不周之風傾宫旋室傾宫宫滿一頃田中也旋室以旋玉飾室也一説室璇璣關可轉旋故曰旋室縣圃涼風樊飰桐在崑崙閶闔之中閶闔崑崙虚門名縣圃涼風樊桐皆崑崙之山名是其疏圃疏圃之池浸之黄水黄水三周復其原原本也是謂丹水飲之不死河水出崑崙東北􅑍貫㴾海入禹所導積石山㴾海大海也河水自崑崙由地中行禹導而通之至積石山書曰河出積石入猶出也赤水出其東南陬西南注南海丹澤之東赤水之東弱水出自窮石窮石山名在張掖北塞水也至于合黎餘波入于流沙絶流沙南至南海絶猶過也流沙流行也洋水出其西北􅑍入于南海羽民之南洋水經隴西氐道東至武都為漢陽凡四水者帝之神泉以和百藥以潤萬物崑崙之丘或上倍之倍之髙倍之也是謂涼風之山登之而不死或上倍之是謂懸圃登之乃靈能使風雨或上倍之乃維上天登之乃神是謂太帝之居扶木在陽州日之所􅀈太帝天帝也扶木扶桑也在湯谷之南􅀈猶照也過陽州東方􅀈音費建木在都廣建木其狀如牛引之有皮若瓔黄蛇葉若羅都廣南方山名也衆帝所自上下日中無景呼而無嚮葢天地之中也衆帝之從都廣山上天還下故曰上下日中時日直人上無有晷故曰葢天地之中若木在建木西末有十日其華照下地末端也若木端有十日狀如蓮華華猶光也光照其下也九州之大純方千里純縁也亦曰量名也九州之外乃有八殥寅亦方千里殥猶逺也自東北方曰大澤曰無通大澤無通皆藪名東方曰大渚曰少海水中可居者曰渚東方多水故曰少海亦澤名東南方曰昃區曰元穴澤南方曰大夢曰浩澤夢雲夢也浩亦大也西南方曰渚資曰丹澤葢近丹水因其名故曰丹澤西方曰九區曰泉澤西北方曰大夏曰海澤北方曰大㝠曰寒澤北方多寒水故曰寒澤凡八殥八澤之雲是雨九州八殥之外而有八紘紘維也維落天地而為之表故曰紘也亦方千里自東北方曰和丘曰荒土鳳所自歌鸞所自舞名曰和丘曰荒土東方曰棘林曰桑野東南方曰大窮曰衆女南方曰都廣曰反户都廣國名也山在此國因復曰都廣山言其在日之南皆為北鄉户故反其户也西南方曰焦僥曰炎土焦僥短人之國也長不滿三尺西方曰金丘曰沃野西方金位也因為金丘沃猶白也西方白故曰沃野西北方曰一目曰沙所國人一目在面中央沙所葢流沙所出也一曰澤名北方曰積氷曰委羽北方寒氷所積因以為名積氷也委羽山名也在北極之隂不見日凡八紘之氣是出寒暑以合八正必以風雨八正八風之正也以風雨八紘之内八紘之外乃有八極自東北方曰方土之山曰蒼門東北木將用事青之始也故曰蒼門東方曰東極之山曰開明之門明者陽也日之所出也故曰開明之門東南方曰波母之山曰陽門東南月建在巳純陽用事故曰陽門據天下諸城東南角門皆陽門是其類也南方曰南極之山曰暑門南方盛陽積温所在故曰暑門西南方曰編駒之山曰白門西南月建在申金氣之始也金氣白故曰白門西方曰西極之山曰閶闔之門西方八月建酉萬物成濟將可及收斂閶大也闔閉也大聚萬物而閉之故曰閶闔之門西北方曰不周之山曰幽都之門幽闔也都聚也𤣥㝠將始用事順隂而聚故曰幽都之門北方曰北極之山曰寒門積寒所在故曰寒門凡八極之雲是雨天下八門之風是節寒暑八紘八殥八澤之雲以雨九州而和中土中土冀州東方之美者有醫母閭之珣荀玗于琪焉醫母閭山名在遼東屬國珣玗琪王名東南方之美者有㑹稽之竹箭焉㑹稽山在今㑹稽山隂縣之南禹所葬地竹箭今㑹稽郡出好竹箭是也南方之美者有梁山之犀象焉梁山在㑹稽長沙湘南有犀角象牙皆物之珍也西南方之美者有華山之金石焉金美金也石含玉之石也華山今𢎞農華隂山南西方之美者有霍山之珠玉焉出夜光之珠五色之玉也今河東永安縣西北方之美者有崑崙之球琳琅玕焉球琳琅玕皆美玉名北方之美者有幽都之筋角焉古之幽都在鴈門以北其畜宜牛羊馬出好筋角可以為弓弩東北方之美者有斥山之文皮焉文皮豹虎之皮也中央之美者有岱嶽以生五穀桑麻魚鹽出焉岱嶽泰山也王者禪代所祠因曰岱嶽五穀桑麻魚鹽所養人者凡地形東西為緯南北為經山為積徳川為積刑山仁萬物生焉故為積徳川水智智制斷故為積刑也髙者為生下者為死髙者陽主生下者隂主死丘陵為牡谿谷為牝丘陵髙敞陽也故為牡谿谷汚下隂也故為牝水圓折者有珠方折者有玉圓折者陽也珠隂中之陽方折者隂也玉陽中之隂皆以其類也清水有黄金龍淵有玉英清水澄故黄金出焉龍淵龍所出游之淵玉英轉化有精光也土地各以其類生是故山氣多男澤氣多女障氣多喑音殷啼極而無聲也風氣多聾林氣多癃音隆病也木氣多傴音羽僂也岸下氣多腫石氣多力象石堅也險阻氣多癭上下險阻氣衝喉而結多癭咽也暑氣多夭夭折不終也寒氣多壽谷氣多痺丘氣多狂衍氣多仁下而汚者為衍陵氣多貪輕土多利重土多遲利疾也清水音小濁水音大音聲也湍水人輕遲水人重湍急流悍水也中土多聖人皆象其氣皆應其類故南方有不死之草北方有不釋之氷南方温故草有不死者北方寒故氷有不泮釋者東方有君子之國東方木徳仁故有君子之國其人冠帶劒食獸使二文虎也西方有形殘之尸寢居直夢人死為鬼西方金金斷剖攻戰之事有形殘之尸也寢寐也居處也金氣方剛故其寢寐處夢悟如其夢故曰直夢不終其命死而為鬼能為祅怪病人也一説曰形殘之尸於是以兩乳為目肥臍為口操干戚以舞以無夢天神斷其手後天帝斷其首也故曰寢居直夢磁石上飛雲母來水土龍致雨燕鴈代飛湯遭旱作土龍以像龍雲從龍故致雨也燕𤣥鳥也春分而來鴈春分而去北詣漠中也燕秋分而北鴈秋分而南詣彭蠡也故曰代飛代更也蛤蟹珠龜與月盛衰與猶隨也是故堅土人剛弱土人肥壚土人大沙土人細細小也息土人美耗土人醜食水者善游能寒魚鼈鷖鶩之屬食土者無心而慧如蚯蚓之屬食木者多力而熊羆之屬煩腸黄理也音閉食草者善走而愚麋鹿之屬食葉者有絲而蛾蠶是也食肉者勇敢而捍虎豹鷹鸇之屬食氣者神明而壽仙人松喬之屬食穀者知慧而夭不食者不死而神凡人民禽獸萬物貞蟲各有以生貞蟲諸細要之屬或奇或偶或飛或走莫知其情唯知通道者能原本之天一地二人三一陽二隂也人生於天地故曰三也三三而九九九八十一一主日日數十十從甲至癸日主人人故十月而生八九七十二二主偶偶以承奇奇主辰辰主月月主馬馬故十二月而生七九六十三三主斗斗主犬犬故三月而生六九五十四四主時時主彘彘故四月而生五九四十五五主音音主猨猨故五月而生四九三十六六主律律主麋鹿麋鹿故六月而生三九二十七七主星星主虎虎故七月而生二九十八八主風風主蟲蟲故八月而化鳥魚皆生於隂隂屬於陽故鳥魚皆卵生魚游於水鳥飛於雲故立冬燕雀入海化為蛤萬物之生而各異類蠶食而不飲蟬飲而不食蜉蝣不飲不食介鱗者夏食而冬蟄介甲也龜鼈之屬鱗魚龍之屬齕吞者八竅而卵生鳥魚之屬嚼咽者九竅而胎生四足者無羽翼戴角者無上齒無角者膏而無前膏豕也熊猿之屬無前肥從前起也有角者指而無後指牛羊麋之屬無後肥從後起也晝生者類父夜生者似母至隂生牝至陽生牡夫熊羆蟄藏飛鳥時移是故白水宜玉黑水宜砥砥卓石青水宜碧赤水宜丹黄水宜金清水宜龜汾水濛濁而宜麻濟水通和而宜麥河水中濁而宜菽雒水輕利而宜禾渭水多力而宜黍漢水重安而宜竹江水肥仁而宜稻平土之人慧而宜五穀東方川谷之所注日月之所出其人兌形小頭隆鼻大口鳶肩企行竅通於目筋氣屬焉蒼色主肝長大早知而不壽其地宜麥多虎豹南方陽氣之所積暑濕居之其人修形兌上大口決􅀈慈竅通於耳血脉屬焉赤色主心早壯而夭其地宜稻多兕象西方髙土川谷出焉日月入焉其人面末僂修頸卭窮行竅通於鼻末猶脊也皮革屬焉白色主肺勇敢不仁其地宜黍多旄繆犀北方幽晦不明天之所閉也寒水之所積也蟄蟲之所伏也其人翕脅形短頸大肩下尻竅通於隂骨幹屬焉黑色主腎其人惷冲愚禽獸而壽其地宜菽菽荳也多犬馬傳曰冀之北土馬之所生言燕代出馬也中央四達風氣之所通雨露之所㑹也其人大面短頥美鬚惡肥竅通於口膚肉屬焉黄色主胃慧聖而好治其地宜禾多牛羊及六畜木勝土土勝水水勝火火勝金金勝木故禾春生秋死春木王而生秋金王而死菽夏生冬死豆火也夏火王而生冬水王而死麥秋生夏死麥金也金王而生火王而死薺冬生中夏死薺水也水王而生土王而死木壯水老火生金囚土死火壯木老土生水囚金死土壯火老金生木囚水死金壯土老水生火囚木死水壯金老木生土囚火死音有五聲宫其主也宫在中央故為主也色有五章黄其主也味有五變甘其主也位有五材土其主也是故鍊土生木鍊木生火鍊火生雲雲金氣所生鍊雲生水鍊水反土鍊甘生酸鍊酸生辛鍊辛生苦鍊苦生鹹鍊鹹反甘鍊猶治也變宫生徵變徵生商變商生羽變羽生角變角生宫是故以水和土以土和火以火化金以金治木木復反土五行相治所以成器用土本也故曰五行相生所以成器用凡海外三十六國自西北至西南方有脩股民天民肅慎民脩長也股脚也天民肅慎皆國名一曰肅敬也慎畏也白民沃民女子民丈夫民白民白身民被髮亦白女子民其貌無有鬚皆如女子也丈夫民其狀皆如丈夫衣黄衣冠帶劒皆西方之國奇嵇股民一臂民三身民奇隻也股脚也言其人一臂一手一鼻也三身民葢一頭有三身皆西方之國自西南至東南方結胷民羽民讙頭國民裸國民三苗民交股民不死民穿胷民反舌民三苗國名在豫章之彭蠡交股民脚相交切不死民不食也穿胷胷前穿孔違背反舌民語不可知而自相曉一說舌本在前不向喉故曰反舌也南方之國名豕喙民鑿齒民三頭民脩臂民豕喙民其喙如豕鑿齒民吐一齒出口下長三尺三頭民身有三頭也脩臂民一國民皆長臂臂長於身皆南方之國自東南至東北方有大人國君子國東南壚土故人大也黑齒民𤣥股民其人黑齒食稻其地在湯上谷𤣥股民其股黑兩鳥夾之見山海經毛民勞民其人體半生毛若矢鏃也勞民正理躁擾不定也皆東方國自東北至西北方有跂踵民句嬰民跂踵民踵不至地以五指行也句嬰讀為九嬰北方之國深目民無腸民柔利民皆北方之國一目民無繼民一目民目在面中央無繼民其人葢無嗣也北方之國雒棠武人在西北陬皆日所入山之名硥蚌魚在其南硥魚如鯉魚也有神聖者乘行九野在無繼民之南有神二人連臂為帝候夜在其西南方連臂大呼夜行三珠樹在其東北方有玉樹在赤水之上崑崙華丘在其東南方在無繼民之東南爰有遺玉青馬視肉其人不知言也楊桃甘樝查甘華百果所生皆異物也在木曰果在地曰蓏和丘在其東北􅑍四方而髙曰丘鸞所自歌鳳所自舞故曰和丘在無繼民東北􅑍三桑無枝在其西夸父耽耳在其北方耽耳耳垂在肩上夸父棄其策是為鄧林夸父神獸也飲河渭不足將飲西海未至道渴死見山海經策杖也其杖生木而成林鄧猶木也昆吾丘在南方昆吾楚之祖祝融之孫陸終之子為夏伯軒轅丘在西方軒轅黄帝有天下之號巫咸在其北方巫咸知天道明吉凶立登保之山𤾉谷摶團桑在東方暘谷日之所出也摶桑在登保之山東北方有娀嵩在不周之北長女簡翟少女建疵有娀國名也不周山名簡翟建疵姊妹二人在瑤臺帝嚳之妃也天使𤣥鳥降卵簡翟吞之以生契是為𤣥王殷之祖也西王母在流沙之瀕地里志曰西王石室在金城臨羌西北塞外樂民拏閭在崑崙弱水之洲水中可居曰洲三危在樂民西三危西極之山名宵明燭光在河洲所照方千里洲水中所居者燭光所照者方千里龍門在河淵湍池在崑崙龍門在河中馮翊夏陽界𤣥燿不周𤣥燿水名一曰山名申池在海隅海隅藪也孟諸在沛孟諸宋澤在睢陽東北少室太室在冀州少室太室在陽城嵩髙下之别名冀堯都冀州冀為天下之號燭龍在鴈門北蔽于委羽之山不見日其神人面龍身而無足蔽至也委羽北方山名一曰龍銜燭以照太隂葢長千里視為晝瞑為夜吹為冬呼為夏后稷壠在建木西建木在都廣都廣南方澤名其人死復蘇其半魚在其間南方人死復生或化為魚在都廣建木間流黄沃民在其北方三百里狗國在其東雷澤有神龍身人頭鼓其腹而熙雷澤大澤也鼓擊也熙戲也地理志曰於禹貢雷澤在濟隂城陽西北城陽有堯塚江出岷山東流絶漢入海左還北流至于開母之北右還東流至于東極岷山在蜀西激水絶猶過也開母山名在東海中河出積石睢出荆山河源出崑崙伏流地中方三千里禹導而通之故出積石積石山在金城郡河關縣西南荆山禹貢北條荆山在左馮翊懐徳縣之南下有荆漂原雝州浸也淮出桐柏山睢出羽山桐柏山在上黨清漳出楬恰戾濁漳出發包楬戾山在上黨發包山一名鹿苦山亦在上黨長子二漳合流經魏郡入清河也濟出王屋時泗沂出臺台術王屋山在河東垣縣東北時泗沂皆水名臺台術皆山名處則未聞洛出獵山獵山在北地西北夷中洛東南流入渭汶出弗其流合於濟弗其山在北海朱虚縣東漢出嶓冢涇出薄落之山嶓冢山漢陽縣西界漢水所出南入廣漢東南至雝州入江薄落之山一名笄頭山安定臨涇縣西禹貢涇水所出東南至陽渡大滑渭出鳥䑕同穴伊出上魏鳥䑕同穴山在隴西首陽西南直渭水所出東㑹于灃又入河雝州川也上魏山名處則未聞雒出熊耳熊耳山在京師上雒之西北浚出華竅維出覈舟汾出燕京燕京山名在太原汾陽汾水所出西南至汾陽冀州浸衽出濆熊淄出目飴目飴山名丹水出髙褚髙褚一名冢領山在京兆上雒丹水所出東至均入沔也股出嶕山鎬出鮮于涼出茅盧石梁鮮于茅盧石梁皆山名汝出猛山淇出大號猛山一名髙陵山在南定陵縣汝水所出東南至新蔡入淮大號山在河内卭縣北或曰在臨慮西晉出龍山結給合出封羊結給合一名也龍山在晉陽之西北晉水所出東入汾封羊山名遼出砥石釡出景砥石山名在塞外遼水所出南入海景山在邯鄲西南釡水所出南澤入漳其原浪沸湧正勢如釡中湯故曰釜今謂之釜口岐出石橋呼池出魯平魯平山名呼池并州之浸也今中山漢昌呼沲河泥塗淵出樠瞞山維濕北流出於燕流於北燕北塞外也諸稽攝提條風之所生也諸稽攝提天神之名也艮為條風通視明庶風之所生也通視天神也明庶風震卦之所生赤奮若清明風之所生也赤奮若天神也巽為清明風共工景風之所生也共工天神也人面蛇身離為景風諸比涼風之所生也諸比天神也坤為涼風臯稽閶闔風之所生也臯稽天神也兌為閶闔風隅强不周風之所生也隅强天神也乾為不周風窮奇廣莫風之所生也窮奇天神也在北方道足乘雨龍其形如虎坎為廣莫風突演生海人突人之先人海人生若菌郡若菌生聖人聖人生庶人凡突者生於庶人羽嘉生飛龍飛龍羽嘉飛蟲之先飛龍有翼飛龍生鳳凰鳳凰生鸞鳥鸞鳥生庶鳥凡羽者生於庶鳥毛犢生應龍應龍生建馬建馬生麒麟麒麟生庶獸凡毛者生於庶獸介鱗生蛟龍介鱗鱗蟲之先蛟龍有鱗甲之龍也蛟龍生鯤鯁鯤鯁生建邪建邪生庶魚凡鱗者生於庶魚介潭生先龍介國也龜之先先龍生𤣥黿𤣥黿生靈龜靈龜生庶龜凡介者生於庶龜煖濕生容煖一讀暵當風乾燥之貌煖濕生於毛風毛風生於濕𤣥濕𤣥生羽風羽風生煗介煗介生鱗薄鱗薄生煖介五類雜種興乎外肖形而蕃肖像也言相代象而蕃多也曰馮生陽閼曰馮水之先也陽閼生喬如喬如生幹木幹木生庶木凡根拔木者生於庶木根拔生程若根拔根生之草先也程若生𤣥玉𤣥玉生醴泉醴泉生皇辜皇辜生庶草凡根茇草者生於庶草海閭生屈龍海閭浮草之先也屈龍游龍鴻也屈龍生容華容華芙蓉草花容華生蔈蔈流也無根水中草蔈生萍藻萍藻生浮草凡浮生不根茇者生於萍藻正土之氣也御乎埃天埃天五百嵗生缺缺五百嵗生黄埃黄埃五百嵗生黄澒汞黄澒五百嵗生黄金黄金惟石名也中央數五故五百嵗而一化澒水銀也黄金千嵗生黄龍入藏生黄泉黄泉之埃上為黄雲隂陽相薄為雷激揚為電上者就下流水就通而合于黄海黄海中央之海偏土之氣御乎清天清天八百嵗生青曾青曾八百嵗生青澒青澒八百嵗生青金青金八百嵗生青龍東方木色青其數八故八百嵗而一化青龍入藏生清泉清泉之埃上為青雲隂陽相薄為雲雷激揚為電上者就下流水就通而合于青海東方之海壯土之氣御于赤天赤天七百嵗生赤丹赤丹七百嵗生赤澒赤澒七百嵗生赤金南方火其色赤其數七故七百嵗而一化赤金千嵗生赤龍赤龍入藏生赤泉赤泉之埃上為赤雲隂陽相薄為雷激揚為電上者就下流水就通而合于赤海南方之海弱土之氣御于白天白天九百嵗生白礜白礜九百嵗生白澒白澒九百嵗生白金白金白礜礜石也西方金色白其數九故九百嵗而一化白金千嵗生白龍白龍入藏生白泉白泉之埃上為白雲隂陽相薄為雷激揚為電上者就下流水就通而合于白海西方之海牝土之氣御于𤣥天𤣥天六百嵗生𤣥砥𤣥砥黑石也𤣥砥六百嵗生𤣥澒𤣥澒六百嵗生𤣥金北方水其色黒其數六故六百嵗而一化𤣥金千嵗生𤣥龍𤣥龍入藏生𤣥泉𤣥泉之埃上為𤣥雲隂陽相薄為雷激揚為電上者就下流水就通而合于𤣥海北方之海上者就下天氣復從天流下也其通流之水皆入于海淮南鴻烈解卷四
