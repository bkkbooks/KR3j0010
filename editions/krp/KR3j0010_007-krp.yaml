body:
  text: 淮南鴻烈解卷七漢髙誘注精神訓精者人之氣神者人之守也本其原説其意故曰精神古未有天地之時惟像無形惟思也念天地未成形之時無有形生窈窈冥冥芒莽芠枚漢閔澒項濛鴻贛洞同莫知其門皆未成形之氣也芒芠澒鴻洞皆無形之象故曰莫知其門也有二神混生經天營地二神隂陽之神混生俱生也孔乎莫知其所終極滔乎莫知其所止息孔深貌滔大貌於是乃别為隂陽離為八極剛柔相成萬物乃形離㪚也剛柔隂陽也煩氣為蟲煩亂也精氣為人是故精神天之有也而骨骸者地之有也精神入其門而骨骸反其根我尚何存精神無形故能入天門骨骸有形故反其根歸土也言人死各有所歸我何猶常存是故聖人法天順情不拘於俗不誘於人以天為父以地為母隂陽為綱四時為紀天静以清地定以寜萬物失之者死法之者生夫静漠者神明之宅也虚無者道之所居也是故或求之於外者失之於内有守之於内者失之於外譬猶本與末也從本引之千枝萬葉莫得不隨也夫精神者所受於天也而形體者所禀於地也故曰一生二二生三三生萬物一謂道也二曰神明三曰和氣也或説一者元氣也生二者乾坤也二生三三生萬物天地設位隂陽通流萬物乃生萬物背隂而抱陽沖氣以為和萬物以背為隂以腹為陽身中空虚和氣所行為隂故腎雙為陽故心特隂陽與和共生物形君臣以和致太平也故曰一月而膏始育如膏二月而胅跌三月而胎四月而肌五月而筋六月而骨七月而成八月而動九月而躁十月而生形體以成五藏乃形是故肺主目肺象朱雀朱雀火也火外景故主目腎主鼻腎象龜龜水也水所以通溝鼻所以通氣故主鼻膽主口膽勇者决所以處故主口肝主耳肝金也金内景故主耳外為表而内為裏開閉張歙脅各有經紀故頭之圎也象天足之方也象地天有四時五行九解四時春夏秋冬五行金木水火土也九解謂九十為一解一説九解六一之所解合也一說八方中央故曰九解三百六十六日人亦有四支五藏九竅三百六十六節天有風雨寒暑人亦有取與喜怒故膽為雲膽金也金石雲之所出故為雲肺為氣肺火也故為氣肝為風肝木也木為風生故為風腎為雨腎水也因水故雨兩或作電腎水也水為光故為電脾為雷以與天地相參也而心為之主心土也故為四行之主是故耳目者日月也血氣者風雨也日中有踆逡烏踆猶蹲也謂三足烏而月中有蟾蜍日月失其行薄蝕無光薄者迫也風雨非其時毁折生災五星失其行州國受殃五星熒惑太白歲星辰星鎮星也熒犯角亢則州國受其殃他餘凖此夫天地之道至紘以大尚猶節其章光愛其神明人之耳目曷能久熏勞而不息乎精神何能久馳騁而不既乎是故血氣者人之華也而五藏者人之精也夫血氣能専於五藏而不外越則胷腹充而嗜慾省矣胷腹充而嗜慾省則耳目清聽視達矣耳目清聽視達謂之明五藏能屬於心而無乖則㪍志勝而行不僻矣㪍志勝言己之㪍志也僻邪也勝或作遯㪍志勝而行之不僻則精神盛而氣不散矣精神盛而氣不散則理理則均均則通通則神神則以視無不見以聽無不聞也以為無不成也是故憂患不能入也而邪氣不能襲故事有求之於四海之外而不能遇或守之於形骸之内而不見也故所求多者所得少所見大者所知小夫孔竅者精神之尸牖也而氣志者五藏之使候也耳目淫於聲色之樂則五藏揺動而不定矣五藏揺動而不定則血氣滔蕩而不休矣血氣滔蕩而不休則精神馳騁於外而不守矣多情欲故神不内守精神馳騁於外而不守則禍福之至雖如邱山無由識之矣使耳目精明𤣥達而無誘慕氣志虚静恬愉而省嗜慾五藏定寜充盈而不泄精神内守形骸而不外越則望於往世之前而視於来事之後猶未足為也豈直禍福之間哉故曰其出彌逺者其知彌少以言夫精神之不可使外淫也是故五色亂目使目不明五聲譁耳使耳不聰五味亂口使口爽傷爽病病傷滋味也趣舍滑心使行飛揚滑亂也飛揚不從軌度也此四者天下之所養性也性生也然皆人累也故曰嗜慾者使人之氣越而好憎者使人之心勞弗疾去則志氣日耗越失勞病耗猶亂也夫人之所以不能終其夀命而中道夭於形戮者何也以其生生之厚夫惟能無以生為者則所以脩得生也言生生之厚者何心極嗜慾淫濫無厭以傷耳目情性故不終其夀命中道夭殞於刑辟之戮也無以生為者輕利害之鄉除情性之欲則長得生矣夫天地運而相通萬物總而為一總合一同也萬物合同統於一道能知一則無一之不知也不能知一則無一之能知也譬吾處於天下也亦為一物矣不識天下之以我備其物與且惟無我而物無不備者乎然則我亦物也物亦物也物之與物也又何以相物也物亦物也何相名為物也雖然其生我也將以何益其殺我也将以何損夫造化者既以我為坯坏矣将無所違之矣言既以我為人無所離之諭不求不避也吾安知夫刺炙而欲生者之非惑也又安知夫絞經而求死者之非福也或者生乃徭役也而死乃休息也天下茫茫孰知之哉其生我也不彊求巳巳止也言不惡生其殺我也不彊求止言不畏死欲生而不事事治也憎死而不辭唯義所在故不辭也賤之而弗憎貴之而弗喜人有惡賤己者己不憎也人有尊己者己不喜也隨其天資而安之不極資時也一曰性也極急也諭人之不急求生也吾生也有七尺之形吾死也有一棺之土吾生之比於有形之類猶吾死之淪於無形之中也然則吾生也物不以益衆吾死也土不以加厚吾又安知所喜憎利害其間者乎不知喜生之利不知憎死之害守其正性也夫造化者之攫援物也攫撮援引也譬猶陶人之埏埴也其取之地而已為盆盎也與其未離於地也無以異其已成器而破碎漫瀾而復歸其故也與其為盆盎亦無以異矣明人不當惡死死復歸其未生之故耳譬猶瓦器之破而復反於土也夫臨江之鄉居人汲水以浸其園江水弗憎也苦洿之家决洿而注之江洿水弗樂也是故其在江也無以異其浸園也其在洿也亦無以異其在江也道尚空虚貴無形江水大去不可消就易故不憎也窊水小去易小消就不消故不樂也洿水猶澹水也苦猶疾也一説言各自安其處也及其轉易亦無憎樂也是故聖人因時以安其位當世而樂其業夫悲樂者徳之邪也而喜怒者道之過也好憎者心之暴也故曰其生也天行似天氣也其死也物化如物之變化也静則與隂俱閉動則與陽俱開精神澹然無極不與物散而天下自服極盡也散雜亂貌自服服於徳也故心者形之主也而神者心之寳也形勞而不休則蹶精用而不已則竭是故聖人貴而尊之不敢越也夫有夏后氏之璜者匣匱而藏之寳之至也半璧曰璜珍玉也夫精神之可寳也非直夏后氏之璜也是故聖人以無應有必究其理以虚受實必窮其節恬愉虚静以終其命是故無所甚䟽而無所甚親抱徳煬養和以順于天煬炙也向火中炙和氣以順天道與道為際與徳為隣際合也隣比也不為福始不為禍先䰟魄處其宅而精神守其根死生無變於己故曰至神所謂真人者性合于道也故有而若無實而若虚處其一不知其二治其内不識其外治内守精神也不識其外不好憎也明白太素無為復樸體本抱神以㳺于天地之樊樊崖也音飯芒然仿佯于塵垢之外而消揺于無事之業浩浩蕩蕩乎機械之巧弗載於心是故死生亦大矣而不為變雖天地覆育亦不與之抮抱矣抮抱猶持著也言不以天地養育萬物故强與持著守其純熟也審乎無瑕而不與物糅瑕猶釁也其見利欲之来也能審順之故不與物相雜糅見事之亂而能守其宗見事有者止之亂不能眩惑故能守其宗宗本也若然者正肝膽遺耳目言精神内守也心志專于内通達耦于一一者道也居不知所為行不知所之言志意無所繫渾揮然而往逯緑然而来渾轉行貌逯謂無所為忽然往来也形若槁木心若死灰槁木無氣死灰無熱諭無為也忘其五藏損其形骸不學而知不視而見不為而成不治而辦感而應迫而動迫切不得不動然後乃動也不得已而往如光之燿如景之放以道為紃巡有待而然紃者法也以道待萬物故曰有待而黙黙如是抱其太清之本而無所容與無所容與於情欲也而物無能營營惑也一曰亂廓惝厰而虚清靖而無思慮大澤焚而不能熱河漢涸而不能寒也大雷毁山而不能驚也大風晦日而不能傷也言體道之人閉情守虚雖此四者之大不能感也是故視珍寳珠玊猶石礫也視至尊窮寵猶行客也視毛嬙西施猶䫏欺醜也至尊謂帝王也故曰窮寵行客猶行路過客毛嬙西施皆古之美人䫏頭也方相氏黄金四目衣赭稀世之䫏貌非生人也但其像耳目䫏醜言極醜也以死生為一化以萬物為一方方類也同精於太清之本而㳺於忽區之旁忽區忽恍無形之區旁也有精而不使有神而不行言不濁其精不勞其神也契大渾之樸而立至清之中樸猶質也渾不㪚之貌是故其寢不夢其智不萌其魄不抑其䰟不騰其寢不夢神内守其智不萌無思念魄隂神䰟陽神隂不沈抑陽不飛騰各守其宅也反復終始不知其端緒甘暝太宵之宅而覺視于昭昭之宇休息于無委曲之隅而㳺敖于無形埓之野太宵長夜之中也言其直瞑於大道之處㝠視昭昭矣無委曲之隅無形埒之野㝠㝠無形像之貌居而無容處而無所言其人居無形容可得見也處無常所其動無形其靜無體無形無體道之容也存而若亡生而若死出入無間役使鬼神言能化也人不與鬼同形而能使之者道也淪於不測入於無間以不同形相嬗扇也嬗傳也萬物之形不同道以相傳生也終始若環莫得其倫倫理也道也此精神之所以能登假于道也假至也上至於道是故真人之所㳺若吹呴呼吸吐故内新熊經鳥伸鳬浴蝯躩鴟視虎顧是養形之人也不以滑心㳺行也經動揺也伸頻伸也養形之人導引其神屈伸跳踉是非真人之道也滑亂也言此養形者耳不足以亂真人之心使神滔蕩而不失其充日夜無傷而與物為春充實也體道人同日夜諭賊害也無傷無所賊害也與物為春言養物也則是合而生時于心也若是者合於道生四時化其心也言不干時害物也且人有戒形而無損於心有綴宅而無耗精戒備也綴宅身也精神居其宅則生離其宅則死言人雖死精神終不耗滅故曰無耗精夫癩者趨不變狂者形不虧神將有所逺徙孰暇知其所為言病癩者形生神在故趨不變也狂體具存故曰不虧但精神散越耳故曰神有所逺徙故形有摩而神未嘗化者以不化應化千變萬抮而未始有極摩滅猶死也神變歸於無形故曰未嘗化化猶死也不化者精神化者形骸化者復歸於無形也不化者與天地俱生也夫木之死也青青去之也夫使木生者豈木也使木生者天也故曰豈木也猶充形者之非形也充形者氣也故曰非形故生生者未嘗死也其所生則死矣生生者道諭道之人若天氣未嘗死也下所生者萬物矣化物者未嘗化也其所化則化矣化物者道也道不化故未嘗化也所化者萬物也萬物有變故曰則化輕天下則神無累矣細萬物則心不惑矣齊死生則志不懾矣同變化則明不眩矣衆人以為虚言吾将舉類而實之人之所以樂為人主者以其窮耳目之欲而適躬體之便也今髙臺層榭人之所麗也而堯樸桷不斵素題不枅樸采也桷椽也素題者不加采飾不枅者不施欂櫨枅音雞或作刮珍怪竒味人之所美也而堯糲辣粢之飯藜藿之羮糲粗也粢稷也文繡狐白人之所好也而堯布衣揜形鹿裘御寒養性之具不加厚而增之以任重之憂故舉天下而傳之於舜若解重負然非直辭讓誠無以為也此輕天下之具也禹南省方濟于江黄龍負舟舟中之人五色無主禹乃熈笑而稱曰我受命於天竭力而勞萬民生寄也死歸也何足以滑和視龍猶蝘堰蜓人生不過百年故曰寄死滅没化不見故曰歸滑亂和適也蝘蜓蜥蜴也或曰守宫蜓音廷顔色不變龍乃弭耳掉尾而逃禹之視物亦細矣鄭之神巫相壺子林見其徴告列子列子行泣報壺子徵兆也列子鄭之隠士壺子弟子壺子持以天壤精神天之有也形骸地之有也死自歸其本故曰持天壤名實不入機發於踵名爵號之名實幣帛貨財之實不入者心不恤也機諭疾也謂命危殆不旋踵而至猶不恐懼壺子之視死生亦齊矣子求行年五十有四而病傴僂脊管髙于頂􅠽歇下迫頥兩脾在上燭營指天子求楚人也僂脊管下竅也髙於頂出頭上也􅠽肝胷也迫薄至於頥也兩脾下在上軀正貟也燭隂華營其竅也上指天也燭營讀曰括撮匍匐自闚於井曰偉哉造化者其以我為此拘拘邪拘拘言體拘攣也此其視變化亦同矣故覩堯之道乃知天下之輕也觀禹之志乃知天下之細也原壺子之論乃知死生之齊也見子求之行乃知變化之同也夫至人倚不㧞之柱行不闗之塗倚於不可㧞揺之柱行於不可闗閉之塗言無不通也禀不竭之府學不死之師無往而不遂無至而不通生不足以挂志死不足以幽神屈伸俛仰抱命而婉轉抱天命而婉轉不離違也禍福利害千變萬紾紾轉也孰足以患心若此人者抱素守精蟬蛻蛇解㳺於太清輕舉獨往忽然入㝠鳯凰不能與之儷而況斥鷃乎儷偕也斥澤之鷃為飛不能出於頃畮諭弱也勢位爵祿何足以槩志也晏子與崔杼盟臨死地而不易其義晏子名嬰崔舒弑齊荘公盟諸侯曰不唯崔慶是從者如此盟晏子曰嬰所不唯忠於君而利社稷者是從亦如之殖華將戰而死莒君厚賂而止之不改其行殖杞梁也華華周皆齊士為君伐莒莒人圍之壮其勇力厚胳而止之不可遂戰而死故晏子可迫以仁而不可劫以兵殖華可止以義而不可縣以利縣視也君子義死而不可以富貴留也義為而不可以死亡恐也彼則直為義耳而尚猶不拘於物又况無為者矣堯不以有天下為貴故投舜公子札不以有國為尊故讓位札吳夀夢之少子延州米季子也讓位不受兄國春秋賢之諸侯之子稱公子子罕不以玊為富故不受寳子罕宋司成樂喜也宋人或得玉以獻子罕子罕不受獻玉者曰以示玊人玊人以為寳故敢獻之子罕曰我以不貪為寳子以玊為寳若予我是皆喪寳也不如人有其寳稽首告曰小人懐寳不可以越鄉納此以請死子罕置諸其里使玊人為之攻之富而後使復其所務光不以生害義故自投於淵務光湯時隠士湯伐桀讓天下於務光人謂務光曰湯殺其君将歸不義之名於子務光因抱石自投於深淵而死由此觀之至貴不待爵至富不待財天下至大矣而以與佗人身至親矣而棄之淵外此其餘無足利矣此之謂無累之人無累之人不以天下為貴矣上觀至人之論深原道徳之意以下考世俗之行乃足羞也故通許由之意金縢豹韜廢矣金縢豹韜周公太公隂謀圗王之書延陵季子不受吳國而訟閒田者慙矣訟閒田者虞芮及暴桓公蘇信公是也子罕不利寳玊而爭劵契者媿矣務光不汚於世而貪利偷生者悶矣故不觀大義者不知生之不足貪也不聞大言者不知天下之不足利也大義死君親之難也大言體道無欲之言今夫窮鄙之社也叩盆拊瓴相和而歌自以為樂矣嘗試為之擊建皷撞巨鐘乃始仍仍然知其盆瓴之足羞也仍仍不得志之貌或作聆聆猶聞也藏詩書修文學而不知至論之㫖則拊盆叩瓴之徒也夫以天下為者學之建皷矣建皷樂之大者尊勢厚利人之所貪也使之左據天下圗圗國籍也而右手刎其喉愚夫不為由此觀之生尊于天下也聖人食足以接氣衣足以蓋形適情不求餘接續蓋覆也餘饒也無天下不虧其性有天下不羡其和羡過和適也有天下無天下一實也實等也今贛貢人敖倉予人河水贛賜也敖地名倉者榖蔵也饑而餐之渴而飲之其入腹者不過簞食瓢漿則身飽而敖倉不為之減也腹滿而河水不為之竭也有之不加飽無之不為之饑與守其篅顓𥫱頓有其井一實也篅𥫱受榖器也井家人之井水也人大怒破隂大喜墜陽説在原道訓大憂内崩大怖生狂除穢去累莫若未始出其宗乃為大通清目而不以視静耳而不以聽鉗口而不以言委心而不以慮棄聰明而反太素休精神而棄知故覺而若昧以生而若死昧暗厭也楚人謂厭為昧諭無知也終則反本未生之時而與化為一體言人之未生時欲同死生也死之與生一體也今夫繇者掲钁矍臿察負籠土繇役也掲舉也钁斫也臿鏵也籠受土籠也鹽汗交流喘息薄喉白汗醎如鹽故曰鹽汗薄迫也氣衝喉也當此之時得茠越下則脫然而喜矣茠䕃也脫舒也言繇人之得小休息則氣得舒故喜也巖穴之間非直越下之休也病疵瘕架者捧心抑腹膝上叩頭抑按也踡權跼局而諦通夕不寐當此之時噲然得卧則親戚兄弟歡然而喜夫脩夜之寜非直一噲之樂也謂得安卧極夜者樂於一噲之樂然不得比長夜之樂也故知宇宙之大則不可劫以死生知養生之和則不可縣以天下知未生之樂則不可畏以死知許由之貴於舜則不貪物墻之立不若其偃也又况不為牆乎氷之凝不若其釋也又况不為氷乎自無蹠有自有蹠無自無蹠有從無形至有形也自有蹠無從有形至無形也至無形謂死生變化也終始無端莫知其所萌非通于外内孰能無好憎無外之外至大也無内之内至貴也言天無有垠外而能為之外諭極大也無内言其小小無内而能為之内道尚㣲妙故曰至貴能知大貴何往而不遂大貴謂無内之内也言道至㣲能出入於無間衰世湊學不知原心反本湊趨也趨其末不修稽古之典茍邀名號耳直雕琢其性矯拂其情以與世交本情以合流俗與世人交接也故目雖欲之禁之以度心雖樂之節之以禮趨翔周旋詘節卑拜肉凝而不食酒澄而不飲外束其形内總其徳鉗隂陽之和而迫性命之情故終身為悲人悲哀也謂衰世之學達至道者則不然理性情治心術養以和持以適樂道而忘賤安徳而忘貧性有不欲無欲而不得言其守虚執持不欲之情性則無有所欲而不得也心有不樂無樂而弗為其志正不樂邪淫之樂則無有正樂而不為樂言皆為之樂也無益情者不以累徳而便於性者不以滑和故縱體肆意而度制無以為天下儀今夫儒者不本其所以欲而禁其所欲本所以欲謂正性恬漠也所欲謂情欲驕奢權勢也不原其所以樂而閉其所樂是猶決江河之源而障之以手也障蔽也言不能揜也夫牧民者猶畜禽獸也不塞其囿垣使有野心系絆其足以禁其動而欲脩生夀終豈可得乎夫顔囘季路子夏冉伯牛孔子之通學也然顔淵夭死季路葅於衛子夏失明冉伯牛為厲此皆迫性拂情而不得其和也故子夏見曾子一臞一肥曾子問其故曰出見富貴之樂而欲之入見先王之道又説之兩者心戰故臞先王之道勝故肥精神内守無思慮故肥推此志非能貪富貴之位不便侈靡之樂直宜迫性閉欲以義自防也雖情心鬱殪形性屈竭猶不得已自强也故莫能終其天年義以自防故情心鬰殪不通形性屈竭也以不得止而自勉强故無能終其天年之命若夫至人量腹而食度形而衣容身而游適情而行餘天下而不貪委萬物而不利委棄也處大廓之宇游無極之野廓虚也極盡也登太皇馮太一玩天地於掌握之中太皇天也馮依也太一天之形神也玩弄也夫豈為貧富肥臞哉故儒者非能使人弗欲而能止之言不能使人無情欲也己雖欲之能以義自止非能使人勿樂而能禁之言不能使人無樂富貴能以禮自禁止之夫使天下畏刑而不敢盜豈若能使無有盜心哉越人得􅛂然蛇以為上肴中國得而棄之無用􅛂蛇大蛇也其長數丈俗以為上肴故知其無所用貪者能辭之不知其無所用亷者不能讓也夫人主之所以殘亡其國家損棄其社稷身死於人手為天下笑未嘗非為非欲也夫仇由貪大鍾之賂而亡其國仇由近晉之狄國也晉智襄子欲伐之先賂以大鍾仇由之君貪開道来受鍾為和親智伯因是以兵滅取其國也虞君利垂棘之璧而擒其身獻公豔驪姬之美而亂四世晉獻公伐驪戎得驪姬及其娣好色曰美好體曰豔獻公豔其色而嬖之生奚齊其姊生卓子遂為殺太子申生而立奚齊殺嫡立庶曰亂四世者奚齊卓子惠公夷吾懐公圉也桓公甘易牙之和而不以時𦵏齊桓好味易牙蒸其首子而進之遂見信用專任嫡庶桓公卒五公子爭立六十日而殯蟲流出户五月不𦵏胡王淫女樂之娱而亡上地胡葢西戎之君也秦穆公欲伐之先遺女樂以淫其志其臣由余諌不從去戎来適秦秦伐得其上地上地美地也使此五君者適情辭餘以己為度不隨物而動豈有此大患哉故射者非矢不中也學射者不治矢也御者非轡不行學御者不為轡也知冬日之箑劄夏日之裘無用於己則萬物之變為塵埃矣箑扇也楚人謂扇為箑故以湯止沸沸乃不止誠知其本則去火而已矣淮南鴻烈解卷七
