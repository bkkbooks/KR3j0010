body:
  text: 淮南鴻烈解卷十漢髙誘注繆稱訓繆異之論稱物假類同之神明以知所貴故曰繆稱道至高無上至深無下平乎凖直乎繩員乎規方乎矩包裹宇宙而無表裏洞同覆載而無所礙礙挂也是故體道者不哀不樂不喜不怒其坐無慮其寢無㝱物來而名事來而應主者國之心心治則百節皆安心擾則百節皆亂故其心治者支體相遺也其國治者君臣相忘也黄帝曰芒芒昧昧從天之道與元同氣故至德者言同畧事同指上下一心無歧道旁見者遏障之於邪開道之於善而民鄉方矣故易曰同人于野利渉大川言能同人道至于野則可以濟大川大川大難也道者物之所導也德者性之所扶也仁者積恩之見證也義者比於人心而合於衆適者也故道㓕而德用德衰而仁義生故上世體道而不德中世守德而弗壞也末世繩繩乎唯恐失仁義君子非仁義無以生失仁義則失其所以生小人非嗜欲無以活失嗜欲則失其所以活故君子懼失仁義小人懼失利觀其所懼知各殊矣易曰即鹿無虞惟入于林中君子幾不如舎徃吝即就也鹿以諭民虞欺也幾終也就民欺之即入林中幾終不如舎之使之不終如其吝也其施厚者其報美其怨大者其禍深薄施而厚望畜怨而無患者古今未之有也是故聖人察其所以徃則知其所以來者聖人之道猶中衢而致尊邪道六通謂之衢尊酒器也過者斟酌多少不同各得其所宜是故得一人所以得百人也一人來得其心百人來亦得其心人以其所願於上以與其下交誰弗戴以其所欲於下以事其上誰弗喜詩云媚兹一人應侯愼德愼德大矣一人小矣能善小斯能善大矣君子見過忘罰故能諫見賢忘賤故能讓見不足忘貧故能施情繫於中行形於外凡行戴情雖過無怨不戴其情雖忠來惡戴心所感也情誠也后稷廣利天下猶不自矜禹無廢功無廢財自視猶觖如也觖不滿也滿如陷陷少也實如虚盡之者也凡人各賢其所說而說其所快世莫不舉賢或以治或以亂非自遁遁欺求同乎己者也己未必得賢而求與己同者而欲得賢亦不幾矣使堯度舜則可使桀度堯是猶以升量石也今謂狐狸則必不知狐又不知狸俱不知此二獸非未嘗見狐者必未嘗見狸也狐狸非異同類也而謂狐狸則不知狐狸是故謂不肖者賢則必不知賢謂賢者不肖則必不知不肖者矣聖人在上則民樂其治在下則民慕其意小人在上位如寢關曝纊寢謂卧闗上之不安纊蠒也曝蠒踊動揺不休死乃止也不得須臾寧故易曰乘馬班如泣血漣如諭乘馬班如難也故有泣血之憂言小人處非其位不可長也物莫無所不用天雄烏喙藥之凶毒也良醫以活人侏儒瞽師人之困懟者也懟可蹶也一曰懟極人主以備樂是故聖人制其剟拙材無所不用矣剟䟽殺也勇士一呼三軍皆辟其出之也誠故倡而不和意而不戴意恚聲也戴嗟中心必有不合者也故舜不降席而王天下者求諸己也故上多故則民多詐矣身曲而景直者未之聞也說之所不至者容貌至焉說之粗不如容貌精微入人深也容貌之所不至者感忽至焉感乎心明乎智發而成形精之至也可以形勢接而不可以照誋戎翟之馬皆可以馳驅或近或逺唯造父能盡其力三苗之民皆可使忠信或賢或不肖唯唐虞能齊其美必有不傳者心教之微眇不可傳也中行繆伯手搏虎中行繆伯晉臣也力能搏生虎而不能生也力能殺虎而徳不能服之葢力優而克不能及也克猶能也用百人之所能則得百人之力舉千人之所愛則得千人之心辟若伐樹而引其本千枝萬葉則莫得弗從也慈父之愛子非為報也不可内解於心聖王之養民非求用也性不能己若火之自熱氷之自寒夫有何修焉及恃其力賴其功者若失火舟中言舟中之人同心救火不相為易也故君子見始斯知終矣媒妁譽人而莫之德也取庸而強飯之莫之愛也雖親父慈母不加於此有以為則恩不接矣故送徃者非所以迎來也施死者非專為生也誠出於己則所動者逺矣錦繡登廟貴文也登猶入也圭璋在前尚質也文不勝質之謂君子故終年為車無三寸之鎋不可以驅馳匠人斵户無一尺之楗不可以閉藏故君子行思乎其所結結要終也心之精者可以神化而不可以導人導教也目之精者可以消澤而不可以昭誋昭道誋誡也不可以敎導戒人在混冥之中不可諭於人混冥人心中也故舜不降席而天下治桀不下陛而天下亂葢情甚乎叫呼也言雖叫呼大語不如心行真直也無諸己求諸人古今未之聞也同言而民信信在言前也同令而民化誠在令外也聖人在上民遷而化情以先之也動於上不應於下者情與令殊也故易曰亢龍有悔仁君動極在上故有悔也三月嬰兒未知利害也而慈母之愛諭焉者情也故言之用者昭昭乎小哉不言之用者曠曠乎大哉身君子之言信也身君子之言體行君子之言也中君子之意忠也忠信形於内感動應於外故禹執干戚舞於兩階之間而三苗服三苗畔禹禹風以禮樂而服之鷹翔川魚鼈沉禹以德服三苗猶鷹翔川上魚鼈恐皆潜飛鳥揚鳥見鷹而揚去必逺害也鷹懷欲害之心故鳥魚知其情實而逺之子之死父也臣之死君也世有行之者矣非出死以要名也恩心之藏於中而不能違其難也故人之甘甘非正為蹠也人之丼丼猶樂樂而為之臣之死君子之死父非以求蹠蹠也而蹠焉徃言蹠乃徃至也君子之慘怛非正為偽形也諭乎人心非從外入自中出者也義尊乎君仁親乎父故君之於臣也能死生之不能使為茍簡易君不能使臣為茍合易行之義父之於子也能發起之不能使無憂尋憂尋憂長也仁念也仁念父母不樂子之如此然不能止故義勝君仁勝父則君尊而臣忠父慈而子孝聖人在上化育如神太上曰我其性與太上皇徳之君我性自然也其次曰微彼其如此乎其次五帝時也其民如此故我治之如彼故詩曰執轡如組易曰含章可貞動於近成文於逺夫察所夜行周公慙乎景故君子愼其獨也釋近斯逺塞矣聞善易以正身難夫子見禾之三變也夫子孔子也三變始於粟粟生於苗苗成於穗也淊淊然曰狐鄉丘而死我其首禾乎禾穗垂而向根君子不忘本也故君子見善則痛其身焉痛己身善惡自在也身茍正懷逺易矣懷來也故詩曰弗躬弗親庶民弗信小人之從事也曰茍得君子曰茍義所求者同所期者異乎擊舟水中魚沉而鳥揚同聞而殊事其情一也僖負覊以壺餐表其閭釐負覊曹臣晉重耳出過曹負覊遺以壺餐重耳反晉伐曹令兵不入其閭趙宣孟以束脯免其軀趙宣孟晉卿以束脯活靈輒後免其難也禮不隆隆多也而德有餘仁心之感恩接而憯惨怛生故其入人深俱之叫呼也在家老則為恩厚其在債人則生爭闘故曰兵莫􅉃於意志莫邪為下㓂莫大於隂陽枹鼓為小聖人為善非以求名而名從之名不與利期而利歸之故人之憂喜非為蹗鹿蹗焉徃生也言非為冀幸徃生利意也故至人不容至道之人不飾容也故若眯而撫眯芥入目也撫捫之從中發非為觀容之也若跌而據跌仆也聖人之為治漠然不見賢焉終而後知其可大也若日之行日行人不見也騏驥不能與之爭逺今夫夜有求與瞽師併東方開斯照矣言人見照用瞽者猶而無為人而以治事用思也動而有益則損隨之益所以為損也故易曰剥之不可遂盡也故受之以復言物剥落而復生也積薄為厚積卑為高故君子日孳孳以成煇小人日快快以至辱其消息也離朱弗能見也文王聞善如不及宿不善如不祥非為日不足也其憂尋推之也憂尋憂深也故詩曰周雖舊邦其命維新懷情抱質天弗能殺地弗能薶埋也聲揚天地之間配日月之光甘樂之者也茍鄉善雖過無怨茍不鄉善雖忠來患故怨人不如自怨求諸人不如求諸己得也聲自召也貌自示也名自命也文自官也無非己者操鋭以刺操刃以擊何怨乎人故筦子文錦也雖醜登廟筦仲相齊明法度審國刑不能及聖猶文錦雖惡宜以升廟也子産練染也美而不尊子産相鄭先恩而後法猶練染為衣温厚而非宗廟服也虚而能滿淡而有味被褐懷玉者故兩心不可以得一人一心可以得百人男子樹蘭美而不芳蘭芳草艾之美芳也男子樹之葢不芳繼子得食肥而不澤繼子有假母也情不相與徃來也生所假也死所歸也故𢎞演直仁而立死𢎞演衛懿公臣狄人攻衛食懿公其肝在𢎞演剖腹以盛之也王子閭張掖而受刄楚白公欲立王子閭為王不可刺之以兵子閭不受不以所託害所歸也故世治則以義衞身世亂則以身衞義死之日行之終也故君子愼一用之無勇者非先懾也難至而失其守也貪婪者非先欲也見利而忘其害也虞公見垂棘之璧而不知虢禍之及己也故至道之人不可遏奪也言至道之人其心先定不可臨以利奪其志也人之欲榮也以為己也於彼何益聖人之行義也其憂尋出乎中也於己何以利故帝王者多矣而三王獨稱貧賤者多矣而伯夷獨舉以貴為聖乎則聖者衆矣以賤為仁乎則賤者多矣何聖仁之寡也獨專之意樂哉忽乎日滔滔以自新忘老之及己也始乎叔季歸乎伯孟必此積也言自少而至長不身遁斯亦不遁人遁隠也己不自隠身之行亦不隠之於人故也故若行獨梁不為無人不競其容獨梁一木之水橋也行其上常兢兢恐陷也故使人信己者易而蒙衣自信者難及身不信故難情先動動無不得無不得則無莙君發莙而後快情先動者言人君以精勤導民也動盡得人心矣無莙結發動也雖莙結快民心故唐虞之舉錯也非以偕情也快己而天下治桀紂非正賊之也快己而百事廢喜憎議而治亂分矣下有喜議而國治有憎議而國亂也聖人之行無所合無所離譬若鼓無所與調無所不比絲筦金石小大脩短有敘異聲而和君臣上下官職有差殊事而調夫織者日以進織帛者進耕者日以却却謂耕者却行事相反成功一也申喜聞乞人之歌而悲出而視之其母也申喜亡其母母乞食於道艾陵之戰也夫差曰夷聲陽句吳其庶乎艾陵之戰吳王夫差與齊戰於艾陵夷謂吳陽告也句吳夷語不正言吳加以句也庶幾也同是聲而取信焉異有諸情也故心哀而歌不樂心樂而哭不哀夫子曰絃則是也其聲非也閔子騫三年之䘮畢援琴而彈其絃是也其聲切切而哀文者所以接物也情繫於中而欲發外者也以文滅情則失情以情滅文則失文文情理通則鳯麟極矣言至德之懷逺也輸子陽謂其子曰良工漸乎矩鑿之中漸習也矩鑿之中固無物而不周聖王以治民造父以治馬醫駱以治病醫駱越醫同材而各自取焉自從也矩鑿之中各取法度或以治民或以治馬或以治病同材而各徃從取治法也上意而民載誠中者也上有意而未言則民皆載而行之志或發中之於大未言而信弗召而至或先之也忣鶴於不己知者不自知也忣急也矜怛生於不足怛驕也不足知不足也華誣生於矜矜貪功也誠中之人樂而不忣如鴞囂好聲忠信之人自樂為之非忣忣也如鴞自好為聲耳熊之好經經動導引夫有誰為矜各任自性非徒矜也春女思秋士悲春女感陽則思秋士見隂而悲而知物化矣號而哭嘰機而哀而知聲動矣容貌顔色理詘􅀈弋倨徇􅀢知情偽矣故聖人栗栗乎其内而至乎至極矣功名遂成天也循理受順人也太公望周公旦天非為武王造之也崇侯惡來天非為紂生之也崇侯紂時諸侯惡來紂之臣有其世有其人也教本乎君子小人被其澤利本乎小人君子享其功昔東户季子之世東戸季子古之人君道路不拾遺耒耜餘糧宿諸畮首使君子小人各得其宜也故一人有慶兆民頼之凡高者貴其左天道左旋故下之於上曰左之臣辭也臣道左君下者貴其右故上之於下曰右之君讓也君謙讓佑助臣故上左遷則失其所尊也左臣辭也君以再還故失其尊臣右還則失其所貴矣右君辭也而臣以再還故失其貴小快害道斯須害儀斯須近也子産騰辭騰傳也子産作刑書獄繫而無邪獄雖益多而下無邪也失諸情者則塞於辭矣失事之情則為世人辭所窮塞也成國之道工無偽事農無遺力士無隱行官無失法譬若設網者引其綱而萬目開矣舜禹不再受命受命於人不受於天堯舜傳大焉先形乎小也形見也先見微小以知大刑於寡妻至于兄弟禪於家國而天下從風禪傳也言堯舜禹相傳天下服之也故戎兵以大知小若湯武以義伐不義從大伐小人以小知大人謂天下從風者也堯舜之民以小知堯大也君子之道近而不可以至卑而不可以登無載焉而不勝萬物載之皆勝其任大而章逺而隆知此之道不可求於人斯得諸己也釋己而求諸人去之逺矣君子者樂有餘而名不足小人樂不足而名有餘觀於有餘不足之相去昭然逺矣含而弗吐在情而不萌者未之聞也言懷其情而必萌見也君子思義而不慮利小人貪利而不顧義子曰鈞之哭也子孔子也曰子予柰何兮乘我何其哀則同其所以哀則異故哀樂之襲人情也深矣鑿地漂池人或有鑿穿或有填也言用心異也非止以勞苦民也各從其蹠而亂生焉蹠願也其載情一也施人則異矣施於人有善惡故唐虞日孳孳以致於王桀紂日怏怏以致於死不知後世之譏己也凡人情說其所苦卽樂失其所樂則哀故知生之樂必知死之哀有義者不可欺以利有勇者不可劫以懼如饑渴者不可欺以虚器也人多欲虧義欲則貪貪損義多憂害智貪憂閉寡故害智也多懼害勇嫚生乎小人嫚倨也蠻夷皆能之嫚蠻夷之行也善生乎君子誘然與日月爭光誘美稱也天下弗能遏奪故治國樂其所以存亡國亦樂其所以亡也金錫不消釋則不流刑刑法上憂尋不誠則不法民憂尋不在民則是絶民之繫也繫所以拘維民君反本而民繫固也至德小節備大節舉齊桓舉而不宻齊桓有大節小節䟽也晉文宻而不舉晉文有小節大節廢也晉文得之乎閨内失之乎境外閨内修而境外亂也齊桓失之乎閨内而得之本朝閨内亂而朝廷治也水下流而廣大君下臣而聰明君不與臣爭功而治道通矣管夷吾百里奚經而成之齊桓秦穆受而聽之聽用二臣之謀照惑者以東為西惑也照曉也見日而寤矣衞武侯謂其臣曰小子無謂我老武侯葢年九十五矣而羸我羸劣也有過必謁之是武侯如弗羸之必得羸故老而弗舎通乎存亡之論者也人無能作也有能為也有能為也而無能成也人之為天成之終身為善非天不行終身為不善非天不亡故善否我也禍福非我也非我也天所為也故君子順其在己者而已矣性者所受於天也命者所遭於時也有其材不遇其世天也太公何力比干何罪循性而行止或害或利求之有道得之在命故君子能為善而不能必其得福不忍為非而未能必免其禍君根本也臣枝葉也根本不美枝葉茂者未之聞也有道之世以人與國若堯以天下與舜也無道之世以國與人堯王天下而憂不解授舜而憂釋憂而守之而樂與賢終不私其利矣凡萬物有所施之無小不可為無所用之不知其所用也碧瑜糞土也瑜玉也不知用之則為糞土也人之情於害之中爭取小焉於利之中爭取大焉故同味而嗜厚膊搏者厚膊厚切肉也必其甘之者也同師而超羣者必其樂之者也弗甘弗樂而能為表者未之聞也表立見也君子時則進得之以義何幸之有不時則退讓之以義何不幸之有故伯夷餓死首山之下猶不自悔棄其所賤得其所貴也福之萌也緜緜禍之生也分分禍福之始萌微故民嫚之唯聖人見其始而知其終故傳曰魯酒薄而邯鄲圍魯與趙俱朝楚獻酒於楚魯酒薄而趙酒厚楚之主酒吏求酒於趙不與楚吏怒以趙所獻酒獻於楚王易魯薄酒楚王以為趙酒薄而圍邯鄲羊羮不斟而宋國危宋將華元與鄭戰殺羊食士不及其御及戰御馳馬入鄭軍華元以獲明主之賞罰非以為己也以為國也通於己而無功於國者不施賞焉逆於己便於國者不加罰焉故楚莊謂共雍曰有德者受吾爵禄有功者受吾田宅是二者女無一焉吾無以與女可謂不踰於理乎其謝之也猶未之莫與周政至殷政善夏政行共雍楚臣謝謂遣共雍也莫勉之也至至於道也善施教未至於道也行尚粗也行政善善未必至也至至之人不慕乎行不慙乎善含德履道而上下相樂也不知其所由然有國者多矣而齊桓晉文獨名㤗山之上有七十壇焉封乎㤗山葢七十二君也而三王獨道君不求諸臣臣不假之君脩近彌逺而後世稱其大不越隣而成章而莫能至焉故孝己之禮可為也而莫能奪之名也必不得其所懷也孝己殷王高宗之子也放逐而不失禮人不能與孝己爭名者不得孝己之所懷也義載乎宜之謂君子宜遺乎義之謂小人通智得而不勞通智逹道之人其次勞而不病其下病而不勞古人味而弗貪也古人知其味而不貪其食今人貪而弗味歌之脩其音也此言樂所以移風易俗歌長其音音之不足於其美者也此音不足以致美化也金石絲竹助而奏之猶未足以至於極也極治化之至也人能尊道行義喜怒取予欲如草之從風召公以桑蠶耕種之時㢮獄出拘召公周太保也使百姓皆得反業脩職文王辭千里之地而請去炮烙之刑紂拘文王文王獻寳於紂紂賞以千里之地文王不受願去炮烙之刑故聖人之舉事也進退不失時若夏就絺綌上車授綏之謂也老子學商容見舌而知守柔矣商容神人也商容吐舌示老子老子知舌柔齒剛列子學壺子觀景柱而知持後矣先有形而後有影形可亡而影不可傷故聖人不為物先而常制之其類若積薪樵後者在上人以義愛以黨羣以羣強是故德之所施者博則威之所行者逺義之所加者淺則武之制者小矣鐸以聲自毁鐸大鈴出於吳膏燭以明自鑠虎豹之文來射猨狖之捷來措措刺也故子路以勇死死衞侯輒之難萇𢎞以智困欲以衛輔周周人殺之能以智知而未能以智不知也故行險者不得履繩出林者不得直道夜行瞑目而前其手事有所至而明有所害人能貫㝠㝠入於昭昭可與言至矣鵲巢知風之所起歲多風則鵲作巢卑獺宂知水之高下水之所及則獺避而為穴暉目知晏暉目鴆鳥也晏無雲也天將晏靜暉目先鳴隂諧知雨隂諧暉目雌也天將隂雨則鳴為是謂人智不如鳥獸則不然故通於一伎察於一辭可與曲說未可與廣應也寗戚擊牛角而歌桓公舉以大政雍門子以哭見孟嘗君涕流沾纓歌哭衆人之所能為也一發聲入人耳感人心情之至者也故唐虞之法可效也其諭人心不可及也簡公以懦殺簡公齊君也以柔懦田成子殺之子陽以猛劫子陽鄭相也尚刑而劫死皆不得其道者也故歌而不比於律者其清濁一也由清濁失和故不與律合䋲之外與䋲之内皆失直者也紂為象箸而箕子嘰嘰唬也知象箸必有玉杯為杯必極滋味魯以偶人葬而孔子嘆偶人人也嘆其象人而用之見所始則知所終故水出於山入於海稼生乎野而藏乎倉聖人見其所生則知其所歸矣水濁者魚噞令苛者民亂城峭者必崩岸崝棖者必陀崝峭也陀落也陀音跎故商鞅立法而支解商鞅為秦孝公立治法百姓怨之以罪支解吳起刻削而車裂吳起相楚設貴臣相坐之法卒車裂之治國辟若張瑟大絃䋎䋎急也䋎音綻則小絃絶矣故急轡數策者非千里之御也有聲之聲不過百里無聲之聲施於四海是故禄過其功者損名過其實者蔽情行合而名副之禍福不虚至矣身有醜夢不勝正行國有妖祥不勝善政是故前有軒冕之賞不可以無功取也後有斧鉞之禁不可以無罪䝉也素修正者弗離道也君子不謂小善不足為也而舎之小善積而為大善不為小不善為無傷也而為之小不善積而為大不善是故積羽沉舟羣輕折軸故君子禁於微壹快不足以成善積快而為德壹恨不足以成非積恨而成怨故三代之善千歲之積譽也桀紂之謗千歲之積毁也天有四時人有四用何謂四用視而形之莫明於目聽而精之莫聰於耳重而閉之莫固於口含而藏之莫深於心目見其形耳聽其聲口言其誠而心致之精則萬物之化咸有極矣地以德廣人君以德廣益其土地君以德尊上也地以義廣君以義尊次也地以強廣君以強尊下也故粹者王駮者霸無一焉者亡昔二皇鳯凰至於庭三代至乎門周室至乎澤德彌麤所至彌逺德彌精所至彌近君子誠仁施亦仁不施亦仁道無為而民蒙純此所謂不施而仁小人誠不仁施亦不仁不施亦不仁善之由我與其由人若仁德之盛者也故情勝欲者昌欲勝情者亡欲知天道察其數數謂律厯之數也欲知地道物其樹五土之冝各有所種生之禾欲知人道從其欲君子欲於道小人欲於利勿驚勿駭萬物將自理勿撓勿攖萬物將自清言治天下各順其情察一曲者不可與言化一曲一事也審一時者不可與言大猶蟬不知寒也日不知夜月不知晝日月為明而弗能兼也唯天地能函之能包天地曰唯無形者也驕溢之君無忠臣口慧之人無必信交拱之木無把之枝拱抱也把握也尋常之溝無吞舟之魚根淺則末短本傷則枝枯福生於無為患生於多慾害生於弗備穢生於弗䅶聖人為善若恐不及備禍若恐不免蒙塵而欲毋眯渉水而欲毋濡不可得也是故知己者不怨人知命者不怨天福由己發禍由己生聖人不求譽不辟誹正身直行衆邪自息今釋正而追曲倍是而從衆是與俗儷走而内行無繩䋲所以彈曲者也故聖人反己而弗由也道之有篇章形埒者形埒兆朕也非至者也嘗之而無味視之而無形不可傳於人大㦸去水亭厯愈張用之不節乃反為病物多類之而非唯聖人知其微善御者不忘其馬善射者不忘其弩善為人上者不忘其下誠能愛而利之天下可從也弗愛弗利親子叛父天下有至貴而非勢位也有至富而非金玉也有至壽而非千歲也原心反性則貴矣適情知足則富矣明死生之分則壽矣言無常是行無常冝者小人也察於一事通於一伎者中人也兼覆葢而并有之度伎能而裁使之者聖人也裁制也度其伎能而裁制使之淮南鴻烈解卷十
