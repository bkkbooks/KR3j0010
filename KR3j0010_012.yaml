body:
  text: 道應訓太清問於無窮曰子知道乎无窮曰吾弗知也又問於無為曰子知道乎无為曰吾知道曰子之知道亦有數乎無為曰吾知道有數曰其數奈何無為曰吾知道之可以弱可以強可以柔可以剛可以陰可以陽可以窈可以明可以包裹天地可以應待無方此吾所以知道之數也太清又問於無始曰鄉者吾問道於無窮無窮曰吾弗知也又問於無為無為曰吾知道曰子之知道亦有數乎無為曰吾知道有數曰其數奈何無為曰吾知道之可以弱可以強可以柔可以剛可以陰可以陽可以窈可以明可以包裹天地可以應待無方此吾所以知道之數也若是則無為之知與無窮之弗知孰是孰非無始曰弗知深而知之淺弗知內而知之外弗知精而知之粗太清仰天而歎曰然則不知乃知邪知乃不知邪孰知知之為弗知弗知之為知邪無始曰道不可聞聞而非也道不可見見而非也道不可言言而非也孰知形形之不形者乎故老子曰天下皆知善之為善斯不善也故知者不言言者不知也白公問於孔子曰人可與微言乎孔子不應白公曰若以石投水何如曰吳越之善沒者能取之矣白公曰若以水投水何如孔子曰菑澠之水合易牙嘗而知之白公曰然則人固不可與微言乎孔子曰何謂不可唯知言之謂者乎夫知言之謂者不以言言也爭魚者濡逐獸者趨非樂之也故至言去言至為無為夫淺知之所爭者末矣白公不得也故死於浴室故老子曰言有宗事有君夫唯無知是以不吾知也白公之謂也惠子為惠王為國法已成而示諸民人民人皆善之奏之惠王惠王甚說之以示翟煎翟煎曰善惠王曰善可行乎翟煎曰不可惠王曰善而不可行何也翟煎對曰今夫舉大木者前呼邪許後亦應之此舉重勸力之歌也豈無鄭衛激楚之音哉然而不用者不若此其宜也夫治國在禮不在文辯故老子曰法令滋彰盜賊多有此之謂也田駢以道術說齊王齊王應之曰寡人所有者齊國也道術難以除患願聞齊國之政田駢對曰臣之言無政而可以為政譬之若林木無材而可以為材願王察其所謂而自取齊國之政焉己雖無除其患天地之間六合之內可陶冶而變化也齊國之政何足問哉此老聃之所謂無狀之狀無物之象者也若王之所問者齊也田駢之所稱者材也材不及林林不及雨雨不及陰陽陰陽不及和和不及道白公勝得荊國不能以其府庫分人七日石乞入曰不義得之又不能布施患必至矣不能予人不若焚之毋令人以害我白公弗聽九日葉公入乃發太府之貨以予眾出高庫之兵以賦民因而攻之十有九日而擒白公夫國非其有也而欲有之可謂至貪矣不能為人又無以自為可謂至愚矣譬白公之嗇也何以異於梟之愛其子也故老子曰持而盈之不如其已揣而銳之不可長保也趙簡子以襄子為後董閼于曰無卹賤今以為後何也簡子曰是其為人也能為社稷忍羞異日知伯與襄子飲而批襄子之首大夫請殺之襄子曰先君之立我也曰能為社稷忍羞豈曰能刺人哉處十月知伯圍襄子於晉陽襄子䟽隊而擊之大敗知伯破其首以為飲器故老子曰知其雄守其雌為天下谿齧缺問道於被衣被衣曰正女形壹女視天和將至攝女知正女度神將來舍德將為若美而道將為女居憃乎若新生之犢而無求其故言未卒齧缺睡寐繼以讎夷被衣行歌而去曰形若槁骸心如死灰真其實知不以故自持墨墨恢恢無心可與謀彼何人哉故老子曰明白四達能無以知乎趙襄子使攻翟而勝之取左人終人使者來謁之襄子方將食而有憂色左右曰一朝而兩城下此人之所以喜也今君有憂色何也襄子曰江河之大也不過三日飄風暴雨日中不須臾今趙氏之德行無所積一朝而兩城下亡其及我乎孔子聞之曰趙氏其昌乎夫憂所以為昌也而喜所以為亡也勝非其難者也持之其難者也賢主以此持勝故其福及後世齊楚吳越皆嘗勝矣然而卒取亡焉不通乎持勝也唯有道之主為能持勝孔子之勁扚國門之關而不肯以力聞墨子為守攻公輸般服而不肯以兵知善持勝者以強為弱故老子曰道沖而用之又弗盈也惠孟見宋康王康王蹀足謦欬疾言曰寡人所說者勇有力也不說為仁義者也客將何以教寡人惠孟對曰臣有道於此使人雖勇刺之不入雖有力擊之不中大王獨無意邪宋王曰善此寡人之所欲聞也惠孟曰夫刺之而不入擊之而不中此猶辱也臣有道於此使人雖有勇弗敢刺雖有力不敢擊夫不敢刺不敢擊非無其意也臣有道於此使人本無其意也夫無其意未有愛利之心也臣有道於此使天下丈夫女子莫不歡然皆有愛利之心此其賢於勇有力也四累之上也大王獨無意邪宋王曰此寡人所欲得也惠孟對曰孔墨是已孔丘墨翟無地而為君無官而為長天下丈夫女子莫不延頸舉踵而願安利之者今大王萬乘之主也誠有其志則四境之內皆得其利矣此賢於孔墨也遠矣宋王無以應惠孟出宋王謂左右曰辯矣客之以說勝寡人也故老子曰勇於敢則殺勇於不敢則活由此觀之大勇反為不勇耳昔堯之佐九人舜之佐七人武王之佐五人堯舜武王於九七五者不能一事焉然而垂拱受成功焉善乘人之資也故人與驥逐走則不勝驥託於車上則驥不能勝人北方有獸其名曰蹶鼠前而兔後趨則頓走則顛常為蛩蛩駏驉取甘草以與之蹶有患害蛩蛩駏驉必負而走此以其所能託其所不能故老子曰夫代大匠斲者希不傷其手薄疑說衛嗣君以王術嗣君應之曰予所有者千乘也願以受教薄疑對曰烏獲舉千鈞又況一斤乎杜赫以安天下說周昭文君昭文君謂杜赫曰願學所以安周杜赫對曰臣之所言者不可則不能安周臣之所言者可則周自安矣此所謂弗安而安者也故老子曰大制無割故致數輿無輿也魯國之法魯人為人臣妾於諸侯有能贖之者取金於府子贛贖魯人於諸侯來而辭不受金孔子聞之曰賜失之矣夫聖人之舉事也可以移風易俗而教順可施後世非獨以適身之行也今魯國之富者寡而貧者眾贖人而受金則為不廉不受金則不復贖人自今以來魯人不復贖人於諸侯矣孔子亦可謂知化矣故老子曰見小曰明魏武侯問於李克曰吳之所以亡者何也李克對曰數戰而數勝武侯曰數戰而數勝國家之福也其獨以亡何故也李克對曰數戰則民罷數勝則主憍以憍主使罷民而國不亡者天下鮮矣憍則恣恣則極物罷則怨怨則極慮上下俱極吳之亡猶晚此夫差之所以自剄於干遂也故老子曰功成名遂身退天之道也甯越欲干齊桓公困窮無以自達於是為商旅將任車以商於齊暮宿於郭門之外桓公郊迎客夜開門辟任車爝火甚盛從者甚眾甯越飯牛車下望見桓公而悲擊牛角而疾商歌桓公聞之撫其僕之手曰異哉歌者非常人也命後車載之桓公反至從者以請桓公贛之衣冠而見之甯戚見說以為天下桓公大說將任之群臣爭之曰客衛人也衛之去齊不遠君不若使人問之問之而固賢者也用之未晚也桓公曰不然問之患其有小惡也以人之小惡而忘人之大美此人主之所以失天下之士也凡聽必有驗一聽而弗復問合其所以也且人固難全也權而用其長者而已矣當是舉也桓公得之矣故老子曰天大地大道大王亦大域中有四大而王處其一焉以言其能包裹之也大王亶父居邠翟人攻之事之以皮帛珠玉而弗受曰翟人之所求者地無以財物為也大王亶父曰與人之兄居而殺其弟與人之父處而殺其子吾弗忍為也皆勉處矣為吾臣與為翟人臣奚以異且吾聞之也不以其所以養害所養杖策而去之民相連而從之遂成國於岐山之下大王亶父可謂能保生矣雖富貴不以養傷身雖貧賤不以利累形今受其先人之爵祿則必重失之生之所自來者久矣而輕失之豈不惑哉故老子曰貴以身為天下焉可以託天下愛以身為天下焉可以寄天下矣中山公子牟謂詹子曰身處江海之上心在魏闕之下為之奈何詹子曰重生重生則輕利中山公子牟曰雖知之猶不能自勝詹子曰不能自勝則從之從之神無怨乎不能自勝而強弗從者此之謂重傷重傷之人無壽類矣故老子曰知和曰常知常曰明益生曰祥心使氣曰強是故用其光復歸其明也楚莊王問詹何曰治國奈何詹何對曰何明於治身而不明於治國楚王曰寡人得奉宗廟社稷願學所以守之詹何對曰臣未嘗聞身治而國亂者也未嘗聞身亂而國治者也故本在於身不敢對以末楚王曰善故老子曰修之身其德乃真也桓公讀書於堂上輪扁斲輪於堂下釋其椎鑿而問桓公曰君之所讀書者何書也桓公曰聖人之書輪扁曰其人焉在桓公曰已死矣輪扁曰是直聖人之糟粕耳桓公悖然作色而怒曰寡人讀書工人焉得而譏之哉有說則可無說則死輪扁曰然有說臣試以臣之斲輪語之大疾則苦而不入大徐則甘而不固不甘不苦應於手猒于心而可以至妙者臣不能以教臣之子而臣之子亦不能得之於臣是以行年六十老而為輪今聖人之所言者亦以懷其實窮而死獨其糟粕在耳故老子曰道可道非常道名可名非常名昔者司城子罕相宋謂宋君曰夫國家之危安百姓之治亂在君之行賞罰夫爵賞賜予民之所好也君自行之殺戮刑罰民之所怨也臣請當之宋君曰善寡人當其美子受其怨寡人自知不為諸侯笑矣於是宋君行賞賜而與子罕刑罰國人皆知殺戮之制專在子罕也大臣親之百姓畏之居不至朞年子罕遂劫宋君而專其政故老子曰魚不可脫于淵國之利器不可以示人王壽負書而行見徐馮於周徐馮曰事者應變而動變生於時故知時者無常行書者言之所出也言出於知知者不藏書於是王壽乃焚其書而舞之故老子曰多言數窮不如守中令尹子佩請飲莊王莊王許諾子佩具於京臺莊王不往明日子佩跣揖北面立於殿下曰昔者君王許之今不果往意者臣有罪乎莊王曰吾聞子具於強臺強臺者南望料山北臨方皇左江而右淮其樂忘死若吾薄德之人不可以當此樂也恐留而不能反故老子曰不見可欲使心不亂晉公子重耳出亡過曹曹君無禮焉釐負羇之妻謂釐負羇曰君無禮於晉公子吾觀其從者皆賢人也若以相夫子反晉國必伐曹子何不先加德焉釐負羇遺之壺餕而加璧焉重耳受其餕而反其璧及其反國起師伐曹剋之令三軍無入釐負羇之里故老子曰曲則全枉則正越王勾踐與吳戰而不勝國破身亡困於會稽忿心張膽氣如涌泉選練甲卒赴火若滅然而請身為臣妻為妾親執戈為吳王先馬果擒之於干遂故老子曰柔之勝剛也弱之勝強也天下莫不知而莫之能行越王親行之故霸中國趙簡子死未葬中牟入齊已葬五日襄子起兵攻之圍未合而城自壞者十丈襄子擊金而退之軍吏諫曰君誅中牟之罪而城自壞是天助我也何故去之襄子曰吾聞之叔向曰君子不乘人於利不迫人於險使之治城城治而後攻之中牟聞其義乃請降故老子曰夫唯不爭故莫能與之爭秦穆公謂伯樂曰子之年長矣子姓有可使求馬者乎對曰良馬者可以形容筋骨相也相天下之馬者若滅若失若亡其一若此馬者絕塵弭轍臣之子皆下材也可告以良馬而不可告以天下之馬臣有所與共儋纆采薪者九方堙此其於馬非臣之下也請見之穆公見之使之求馬三月而反報曰已得馬矣在於沙丘穆公曰何馬也對曰牝而黃使人往取之牡而驪穆公不說召伯樂而問之曰敗矣子之所使求馬者毛物牝牡尚弗能知又何馬之能知伯樂喟然大息曰一至此乎是乃其所以千萬臣而无數者也若堙之所觀者天機也得其精而忘其粗在其內而忘其外見其所見而不見其所不見視其所視而遺其所不視若彼之所相者乃有貴乎馬者也馬至而果千里之馬也故老子曰大直若屈大巧若拙吳起為楚令尹適魏問屈宜咎曰王不知起之不肖而以為令尹先生試觀起之為之也屈子曰子將奈何吳起曰將衰楚國之爵而平其制祿損其有餘而綏其不足砥礪甲兵以時爭利於天下屈子曰宜若聞之昔善治國家者不變其故不易其常今子將衰楚國之爵而平其制祿損其有餘而綏其不足是變其故易其常也行之者不利宜若聞之曰怒者逆德也兵者凶器也爭者人之所去也今子陰謀逆德好用凶器治人之所去逆之至也且子用魯兵不宜得志於齊而得志焉子用魏兵不宜得志於秦而得志焉宜若聞之非禍人不能成禍吾固惑吾王之數逆天道戾人理至今无禍差須夫子也吳起惕然曰尚可更乎屈子曰成刑之徒不可更也子不若敦愛而篤行之老子曰挫其銳解其紛和其光同其塵晉伐楚三舍不止大夫請擊之莊王曰先君之時晉不伐楚及孤之身而晉伐楚是孤之過也若何其辱群大夫大夫曰先臣之時晉不伐楚及臣之身而晉伐楚此臣之罪也請王擊之莊王俛而泣涕沾襟起而拜君大夫晉人聞之曰君臣爭以過為在己且君輕下其臣不可伐也夜還師而歸故老子曰能受國之垢是謂社稷主宋景公之時熒惑在心公懼召子韋而問焉曰熒惑在心何也子韋曰熒惑者天罰也心者宋之分野也禍且當於君雖然可移於宰相公曰宰相所使治國家也而移死焉不祥寡人請自當也子韋曰可移於民公曰民死寡人誰為君乎寧獨死耳子韋曰可移於歲公曰歲民之命也歲饑民必死矣為人君而欲殺其民以自活也其誰以我為君者乎是寡人之命固已盡矣子无復言矣子韋還走北面再拜曰敢賀君天之處高而聽卑君有君人之言三天必三賞君今夕星必徙三舍君延年二十一歲公曰子奚以知之對曰君有君人之言三故有三賞星必三徙舍舍行七星星一徙當一年三七二十一臣故曰君延年二十一歲臣請伏於陛下以司之星不徙臣請死之公曰可是夕也星果三徙舍故老子曰能受國之不祥是謂天下之王昔者公孫龍在趙之時謂弟子曰人而無能者龍不能與遊有客衣褐帶索而見曰臣能呼公孫龍顧謂弟子曰門下故有能呼者乎對曰無有公孫龍曰與之弟子之籍後數日往說燕王至於河上而航在一汜使善呼者呼之一呼而航來故聖人之處世不逆有伎能之士故老子曰人無棄人物無棄物是謂襲明子發攻蔡踰之宣王郊迎列田百頃而封之執圭子發辭不受曰治國立政諸侯入賓此君之德也發號施令師未合而敵遁此將軍之威也兵陳戰而勝敵者此庶民之力也夫乘民之功勞而取其爵祿者非仁義之道也故辭而弗受故老子曰功成而不居夫唯不居是以不去晉文公伐原與大夫期三日三日而原不降文公令去之軍吏曰原不過一二日將降矣君曰吾不知原三日而不可得下也以與大夫期盡而不罷失信得原吾弗為也原人聞之曰有君若此可弗降也遂降溫人聞之亦請降故老子曰窈兮冥兮其中有精其精甚真其中有信故美言可以市尊美行可以加人公儀休相魯而嗜魚一國獻魚公儀子不受其弟子問曰夫子嗜魚弗受何也荅曰夫唯嗜魚故弗受夫受魚而免於相雖嗜魚不能自給魚毋受魚而不免於相則能長自給魚此明於為人為己者也故老子曰後其身而身先外其身而身存非以其無私邪故能成其私一曰知足不辱狐丘丈人謂孫叔敖曰人有三怨子知之乎孫叔敖曰何謂也對曰爵高者士妬之官大者主惡之祿厚者怨處之孫叔敖曰吾爵益高吾志益下吾官益大吾心益小吾祿益厚吾施益博以是免三怨可乎故老子曰故貴必以賤為本高必以下為基大司馬捶鉤者年八十矣而不失鉤芒大司馬曰子巧邪有道邪曰臣有守也臣年二十好捶鉤於物無視也非鉤無察也是以用之者必假於弗用也而以長得其用而況持不用者乎物孰不濟焉故老子曰從事於道者同於道文王砥德脩政三年而天下二垂歸之紂聞而患之曰余夙興夜寐與之競行則苦心勞形縱而置之恐伐余一人崇侯虎曰周伯昌仁義而善謀太子發勇敢而不疑中子旦恭儉而知時若與之從則不堪其殃縱而赦之身必危亡冠雖弊必加於頭及其未成請圖之屈商乃拘文王於羑里於是散宜生乃以千金求天下之珍怪得騶虞雞斯之乘玄玉百工大貝百朋玄豹黃羆青犴白虎文皮千合以獻於紂因費仲而通紂見而說之乃免其身殺牛而賜之文王歸乃為玉門築靈臺相女童擊鍾鼓以待紂之失也紂聞之曰周伯昌改道易行吾無憂矣乃為炮格剖比干剔孕婦殺諫者文王乃遂其謀故老子曰知其榮守其辱為天下谷成王問政於尹佚曰吾何德之行而民親其上對曰使之以時而敬順之王曰其度安至曰如臨深淵如履薄冰王曰懼哉王人乎尹佚對曰天地之間四海之內善之則吾畜也不善則吾讎也昔夏商之臣反讎桀紂而臣湯武宿沙之民皆自攻其君而歸神農此世之所明知也如何其無懼也故老子曰人之所畏不可不畏也跖之徒問於跖曰盜亦有道乎跖曰奚適其有道也夫意而中藏者聖也入先者勇也出後者義也分均者仁也知可否者智也五者不備而能成大盜者天下無之由此觀之盜賊之心必託聖人之道而後可行故老子曰絕聖棄智民利百倍楚將子發好求技道之士楚有善為偷者往見曰聞君求技道之士臣楚市偷也願以技齎一卒子發聞之衣不給帶冠不暇正出見而禮之左右諫曰偷者天下之盜也何為禮之君曰此非左右之所得與後無幾何齊興兵伐楚子發將師以當之兵三卻楚賢良大夫皆盡其計而悉其誠齊師愈強於是市偷進請曰臣有薄技願為君行之子發曰諾不問其辭而遣之偷則夜出解齊將軍之幬帳而獻之子發因使人歸之曰卒有出薪者得將軍之帷使歸之於執事明夕復往取其枕子發又使人歸之明夕復往取其簪子發又使歸之齊師聞之大駭將軍與軍吏謀曰今日不去楚軍恐取吾頭則還師而去故伎無細而能無薄在人君用之耳故老子曰不善人善人之資也顏回謂仲尼曰回益矣仲尼曰何謂也曰回忘禮樂矣仲尼曰可矣猶未也異日復見曰回益矣仲尼曰何謂也曰回忘仁義矣仲尼曰可矣猶未也異日復見曰回坐忘矣仲尼造然曰何謂坐忘顏回曰隳支體黜聰明離形去知洞於化通是謂坐忘仲尼曰洞則無善也化則無常矣而夫子薦賢丘也請從之後故老子曰載營魄抱一能毋離乎專氣至柔能如嬰兒乎秦穆公興師將以襲鄭蹇叔曰不可臣聞襲國者以車不過百里以人不過三十里為其謀未及發泄也甲兵未及銳弊也糧食未及乏絕也人民未及罷病也皆以其氣之高與其力之盛至是以犯敵能威今行數千里又數絕諸侯之地以襲國臣不知其可也君重圖之穆公不聽蹇叔送師衰絰而哭之師遂行過周而東鄭賈人弦高矯鄭伯之命以十二牛勞秦師而賓之三帥乃懼而謀曰吾行數千里以襲人未至而人已知之其備必先成不可襲也還師而去當此之時晉文公適薨未葬先軫言於襄公曰昔吾先君與穆公交天下莫不聞諸侯莫不知今吾君薨未葬而不弔吾喪而不假道是死吾君而弱吾孤也請擊之襄公許諾先軫舉兵而與秦師遇於殽大破之擒其三軍以歸穆公聞之素服廟臨以說於眾故老子曰知而不知尚矣不知而知病也齊王后死王欲置后而未定使群臣議薛公欲中王之意因獻十珥而美其一旦日因問美珥之所在因勸立以為王后齊王大說遂重薛公故人主之意欲見於外則為人臣之所制故老子曰塞其兌閉其門終身不勤盧敖游乎北海經乎太陰入乎玄闕至於蒙穀之上見一士焉深目而玄鬢渠頸而鳶肩豐上而殺下軒軒然方迎風而舞顧見盧敖慢然下其臂遯逃乎碑下盧敖就而視之方倦龜殼而食蛤梨盧敖與之語曰唯敖為背群離黨窮觀於六合之外者非敖而已乎敖幼而好遊至長不渝解周行四極唯北陰之未闚今卒睹天子於是子殆可與敖為友乎若士者齤然而笑曰嘻子中州之民寧肯而遠至此此猶光乎日月而載列星陰陽之所行四時之所生其比夫不名之地猶窔奧也若我南游乎罔㝗之野北息乎沉墨之鄉西窮乎窅冥之黨東關乎鴻濛之光此其下無地而上無天聽焉無聞視焉則眴此其外猶有汰沃之汜其餘一舉而千萬里吾猶未能之在今子游始至於此乃語窮觀豈不亦遠哉然子處矣吾與汗漫期于九垓之上吾不可以久若士舉臂而竦身遂入雲中盧敖仰而視之弗見乃止駕心柸治悖若有喪也曰吾比夫子猶黃鵠與蠰蟲也終日行不離咫尺而自以為遠豈不悲哉故莊子曰小年不及大年小知不及大知朝秀不知晦朔蟪蛄不知春秋此言明之有所不見也宓子治亶父三年而巫馬期絻衣短褐易容貌往觀化焉見夜漁者得魚則釋之巫馬期問焉曰凡子所為漁者欲得也今得而釋之何也漁者對曰宓子不欲人之取小魚也所得者小魚是以釋之巫馬期歸以報孔子曰宓子之德至矣使人闇行若有嚴刑在其側者宓子何以至於此孔子曰丘嘗問之以治言曰誠於此者刑於彼宓子必行此術也故老子曰去彼取此罔兩問於景曰照照者神明也景曰非也罔兩曰子何以知之景曰扶桑受謝日炤宇宙炤炤之光輝燭四海闔戶塞牖則無由入矣若神明四通並流無所不極上際於天下蟠於地化育萬物而不可為象俛仰之間而撫四海之外照照何足以名之故老子曰天下之至柔馳騁於天下之至堅光耀問於無有曰子果有乎其果無有乎無有弗應也光耀不得問而孰視其狀貌冥然忽然視之不見其形聽之不聞其聲搏之不可得望之不可極也光耀曰貴矣哉其孰能至于此乎予能有無矣而未能無無也及其為無無矣又何從至於此哉故老子曰無有入于無間吾是以知無為之有益也白公勝慮亂罷朝而立到杖策錣上貫頤血流至地而弗知也鄭人聞之曰頤之忘將何不忘哉此言精神之越於外智慮之蕩於內則不能漏理其形也是故神之所用者遠則所遺者近也故老子曰不出戶以知天下不窺牖以見天道其出彌遠其知彌少此之謂也秦皇帝得天下恐不能守發邊戍築長城脩關梁設障塞具傳車置邊吏然劉氏奪之若轉閉錘昔武王伐紂破之牧野乃封比干之墓表商容之閭柴箕子之門朝成湯之廟發鉅橋之粟散鹿臺之錢破鼓折枹弛弓絕絃去舍露宿以示平易解劍帶笏以示无仇於此天下歌謠而樂之諸侯執幣相朝三十四世不奪故老子曰善閉者无關鍵而不可開也善結者無繩約而不可解也尹需學御三年而無得焉私自苦痛常寢想之中夜夢受秋駕於師明日往朝其師望而謂之曰吾非愛道於子也恐子不可予也今日將教子以秋駕尹需反走北面再拜曰臣有天幸今夕固夢受之故老子曰致虛極守靜篤萬物並作吾以觀其復也昔孫叔敖三得令尹無喜志三去令尹无憂色延陵季子吳人願一以為王而不肯許由讓天下而弗受晏子與崔杼盟臨死地不變其儀此皆有所遠通也精神通於死生則物孰能惑之荊有佽非者得寶劍於干隊還反度江至於中流陽侯之波兩蛟挾繞其舩佽非謂枻舡者曰嘗見有如此而得活者乎對曰未嘗見也於是佽非㪍然瞋目攘臂拔劍曰武士可以仁義之禮說也不可劫而奪也此江中之腐肉朽骨棄劍以全己余有奚愛焉赴江刺蛟遂斷其頭舩中之人盡活風波畢除荊王爵為執圭孔子聞之曰夫善哉不以腐肉朽骨棄劍者佽非之謂乎故老子曰夫唯無以生為者是賢於貴生焉齊人淳于髡以從說魏王魏王辯之約車十乘將使之荊辭而行又以為從未足也復以衡說魏王其辭若然魏王乃止其行而䟽其身失從之志而有不能成衡之事是其所以為固也夫言有宗事有本失其宗本技能雖多不若其寡也故周鼎著倕而使齕其指先王有以見大巧之不可為也故慎子曰匠人知為門能以門所以不知門也故必杜然後能門墨者有田鳩者欲見秦惠王約車申轅留於秦三年不得見客有言之楚王者往見楚王楚王甚悅之予以節使於秦至因見惠王而說之出舍喟然而歎告從者曰吾留秦三年不得見不識道之可以從楚也物固有近之而遠遠之而近者故大人之行不掩以繩至所極而已矣此筦子所謂鳥飛而準繩者豐水之深千仞而不受塵垢投金鐵焉則形見於外非不深且清也魚鱉龍蛇莫之肯歸也是故石上不生五穀禿山不游麋鹿無所陰蔽也昔趙文子問於叔向曰晉六將軍其孰先亡乎對曰其中行知氏乎文子曰何故對曰其為政也以苛為察以切為明以刻下為忠以計多為功譬之猶廓革者也廓之大則大矣裂之道也故老子曰其政惛惛其民純純其政察察其民缺缺景公謂太卜曰子之道何能對曰能動地晏子往見公公曰寡人問太卜曰子之道何能對曰能動地地可動乎晏子默然不對出見太卜曰昔吾見句星在駟心之閒地其動乎太卜曰然晏子出太卜走往見公曰臣非能動地地固將動也田子陽聞之曰晏子默而不對者不欲太卜之死也往見太卜者恐公之欺也晏子可謂忠於上而惠於下矣故老子曰方而不割廉而不劌魏文侯觴諸大夫於曲陽飲酒酣文侯喟然歎曰吾獨無豫讓以為臣乎蹇重舉白而進之曰請浮君君曰何也對曰臣聞之有命之父母不知孝子有道之君不知忠臣夫豫讓之君亦何如哉文侯受觴而飲之釂而不獻曰無管仲鮑叔以為臣故有豫讓之功故老子曰國家昏亂有忠臣孔子觀桓公之廟有器焉謂之宥卮孔子曰善哉乎得見此器顧曰弟子取水水至灌之其中則正其盈則覆孔子造然革容曰善哉持盈者乎子貢在側曰請問持盈曰揖而損之曰何謂揖而損之曰夫物盛而衰樂極則悲日中而移月盈而虧是故聰明叡知守之以愚多聞博辯守之以儉武力毅勇守之以畏富貴廣大守之以陋德施天下守之以讓此五者先王所以守天下而弗失也反此五者未嘗不危也故老子曰服此道者不欲盈夫唯不盈是以能弊而不新成武王問太公曰寡人伐紂天下是臣殺其主而下伐其上也吾恐後世之用兵不休鬭爭無已為之奈何太公曰甚善王之問也夫未得獸者惟恐其創之小也已得之唯恐傷肉之多也王若欲久持之則塞民於兌道全為無用之事煩擾之教彼皆樂其業佚其情昭昭而道冥冥於是乃去其瞀而載之朮解其劍而帶之笏為三年之喪令類不蕃高辭卑讓使民不爭酒肉以通之竽瑟以娛之鬼神以畏之繁文滋禮以弇其質厚葬久喪以亶其家含珠鱗施綸組以貧其財深鑿高壟以盡其力家貧族少慮患者寡以此移風可以持天下弗失故老子曰化而欲作吾將鎮之以無名之樸也
